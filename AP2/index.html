<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="description" content="Dự án AP2 - Premium Tech & Personal Log">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://kit.fontawesome.com/9392097706.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        zinc: {
                            50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7',
                            300: '#d4d4d8', 400: '#a1a1aa', 500: '#71717a',
                            600: '#52525b', 700: '#3f3f46', 800: '#27272a',
                            900: '#18181b', 950: '#09090b',
                        }
                    }
                }
            }
        }

    <style type="text/tailwindcss">
        @layer utilities {
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { @apply bg-transparent; }
            ::-webkit-scrollbar-thumb { @apply bg-zinc-300 dark:bg-zinc-700 rounded-full; }
            
            /* Typography Minimal */
            .prose-custom p { @apply mb-6 leading-relaxed text-zinc-600 dark:text-zinc-400 text-[1rem] sm:text-[1.05rem]; }
            .prose-custom img, .prose-custom video { @apply rounded-2xl my-6 sm:my-8 w-full object-cover bg-zinc-100 dark:bg-zinc-900 cursor-zoom-in transition-transform duration-500 hover:scale-[1.02]; }
            .prose-custom a { @apply text-zinc-900 dark:text-white font-medium hover:text-blue-500 transition-colors underline decoration-zinc-300 dark:decoration-zinc-700 underline-offset-4; }
            .prose-custom h1, .prose-custom h2, .prose-custom h3 { @apply font-bold text-zinc-900 dark:text-white mt-10 mb-4 tracking-tight; }
            .prose-custom h1 { @apply text-2xl sm:text-3xl; }
            .prose-custom h2 { @apply text-xl sm:text-2xl; }
            .prose-custom h3 { @apply text-lg sm:text-xl; }
            .prose-custom ul { @apply list-disc list-outside ml-5 mb-6 text-zinc-600 dark:text-zinc-400 space-y-2; }
            .prose-custom blockquote { @apply border-l-2 border-zinc-900 dark:border-white pl-5 py-1 italic text-zinc-700 dark:text-zinc-300 my-6; }
            
            /* Performance Animations */
            .will-change-transform { will-change: transform, opacity; }
            
            .scroll-reveal {
                opacity: 0;
                transform: translate3d(0, 40px, 0);
                transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                            transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .scroll-reveal.active {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        /* Ẩn UI Google Translate */
        body { top: 0 !important; position: static !important; }
        .skiptranslate iframe, .goog-te-banner-frame, #google_translate_element, .goog-tooltip { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }

        .hide-media .prose-custom img, .hide-media .prose-custom video, .hide-media .custom-gallery { display: none !important; }
    </style>
</head>

    <script type="text/javascript">
        function googleTranslateElementInit() { 
            new google.translate.TranslateElement({ 
                pageLanguage: 'vi', 
                includedLanguages: 'en,de,ja',
                autoDisplay: false 
            }, 'google_translate_element'); 
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // --------------------------------------------------------
        // 1. SCROLL & PARALLAX ANIMATIONS (GPU Accelerated)
        // --------------------------------------------------------
        let scrollY = window.scrollY;
        let ticking = false;

        function updateParallax() {
            const hero = document.getElementById('hero-content');
            const b1 = document.getElementById('px-blob-1');
            const b2 = document.getElementById('px-blob-2');
            
            if (hero) hero.style.transform = `translate3d(0, ${scrollY * 0.25}px, 0)`;
            if (b1) b1.style.transform = `translate3d(0, ${scrollY * 0.4}px, 0) scale(${1 + scrollY * 0.0005})`;
            if (b2) b2.style.transform = `translate3d(0, ${scrollY * -0.15}px, 0)`;
            ticking = false;
        }

        window.addEventListener('scroll', () => {
            scrollY = window.scrollY;
            if (!ticking) {
                window.requestAnimationFrame(updateParallax);
                ticking = true;
            }

            const btn = document.getElementById('scrollTopBtn');
            if (scrollY > 300) btn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            else btn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        }, { passive: true });

        const initScrollReveal = () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
            document.querySelectorAll('.feed-item').forEach(item => observer.observe(item));
        };

        // --------------------------------------------------------
        // 2. THEME LOGIC
        // --------------------------------------------------------
        let currentTheme = localStorage.getItem('theme') || 'auto';
        function applyTheme(theme) {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            isDark ? html.classList.add('dark') : html.classList.remove('dark');
            btn.innerHTML = `<i class="fas fa-${theme === 'auto' ? 'adjust' : (theme === 'dark' ? 'moon' : 'sun')} text-sm"></i>`;
            localStorage.setItem('theme', theme);
        }
        function cycleTheme() { 
            currentTheme = currentTheme === 'auto' ? 'light' : (currentTheme === 'light' ? 'dark' : 'auto'); 
            applyTheme(currentTheme); 
        }
        applyTheme(currentTheme);

        // --------------------------------------------------------
        // 3. RSS FEED & UI RENDER
        // --------------------------------------------------------
        const rssUrl = 'https://projectap2.wordpress.com/feed/';
        fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(rssUrl))
            .then(res => res.text())
            .then(str => new DOMParser().parseFromString(str, "text/xml"))
            .then(data => {
                const items = data.querySelectorAll("item");
                let html = '';
                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const content = item.querySelector("encoded").textContent;
                    const date = new Date(item.querySelector("pubDate").textContent);
                    const author = item.querySelector("creator").textContent;
                    const dateStr = `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;
                    
                    html += `
                        <article class="feed-item scroll-reveal bg-zinc-50/50 dark:bg-zinc-900/30 rounded-[2rem] p-5 sm:p-8 md:p-10 border border-zinc-100 dark:border-zinc-800/50">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-10 h-10 rounded-full bg-zinc-200 dark:bg-zinc-800 flex items-center justify-center font-bold text-sm">${author.charAt(0)}</div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-bold">${author}</span>
                                    <span class="text-xs text-zinc-400">${dateStr}</span>
                                </div>
                            </div>
                            <h2 class="text-2xl sm:text-4xl font-bold tracking-tight mb-6 leading-tight">${title}</h2>
                            <div class="prose-custom">${content}</div>
                        </article>
                    `;
                });
                document.getElementById('feed-area').innerHTML = html;
                postProcessMedia();
                initScrollReveal();
            })
            .catch(() => document.getElementById('feed-area').innerHTML = '<div class="text-center text-sm text-red-500">Lỗi tải dữ liệu.</div>');

        // --------------------------------------------------------
        // 4. MEDIA PROCESSING & MODAL LOGIC
        // --------------------------------------------------------
        let modalImages = [], modalCurrentIndex = 0;
        function postProcessMedia() {
            document.querySelectorAll('.prose-custom').forEach(prose => {
                const allImages = Array.from(prose.querySelectorAll('img'));
                const imageUrls = allImages.map(img => img.src);

                prose.querySelectorAll('.wp-block-gallery').forEach(gallery => {
                    const imgs = Array.from(gallery.querySelectorAll('img'));
                    if(!imgs.length) return;
                    
                    const wrap = document.createElement('div');
                    wrap.className = 'custom-gallery my-6 rounded-2xl overflow-hidden';
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-2 gap-1';
                    
                    imgs.forEach((img, idx) => {
                        if(idx > 3) return;
                        const div = document.createElement('div');
                        div.className = `relative w-full aspect-square bg-zinc-100 dark:bg-zinc-900 cursor-zoom-in ${imgs.length === 3 && idx === 0 ? 'col-span-2 aspect-[2/1]' : ''}`;
                        div.innerHTML = `<img src="${img.src}" class="w-full h-full object-cover !my-0 !rounded-none">`;
                        if(imgs.length > 4 && idx === 3) div.innerHTML += `<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-white font-bold text-xl">+${imgs.length - 4}</div>`;
                        div.onclick = () => openModal(imageUrls, imageUrls.indexOf(img.src));
                        grid.appendChild(div);
                    });
                    wrap.appendChild(grid);
                    gallery.parentNode.replaceChild(wrap, gallery);
                });

                prose.querySelectorAll('img:not(.custom-gallery img)').forEach(img => {
                    img.onclick = () => openModal(imageUrls, imageUrls.indexOf(img.src));
                });
            });
        }

        function openModal(urls, idx) {
            modalImages = urls; modalCurrentIndex = idx; updateModal();
            const m = document.getElementById('imgModal');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
            document.addEventListener('keydown', modalKey);
        }
        function updateModal() {
            const img = document.getElementById('modalImg');
            img.style.opacity = 0;
            setTimeout(() => { img.src = modalImages[modalCurrentIndex]; img.style.opacity = 1; }, 150);
            document.getElementById('modalCounter').innerText = `${modalCurrentIndex + 1} / ${modalImages.length}`;
            document.getElementById('modalControls').style.display = modalImages.length > 1 ? 'flex' : 'none';
        }
        function prevModalImage(e) { if(e) e.stopPropagation(); modalCurrentIndex = (modalCurrentIndex - 1 + modalImages.length) % modalImages.length; updateModal(); }
        function nextModalImage(e) { if(e) e.stopPropagation(); modalCurrentIndex = (modalCurrentIndex + 1) % modalImages.length; updateModal(); }
        function closeModal() {
            const m = document.getElementById('imgModal'); m.classList.add('opacity-0');
            document.removeEventListener('keydown', modalKey);
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        }
        function modalKey(e) { if(e.key === 'ArrowLeft') prevModalImage(); else if(e.key === 'ArrowRight') nextModalImage(); else if(e.key === 'Escape') closeModal(); }
        function toggleImages() { 
            document.body.classList.toggle('hide-media'); 
            document.getElementById('btnImg').innerHTML = document.body.classList.contains('hide-media') ? '<i class="fas fa-heading text-sm text-blue-500"></i>' : '<i class="fas fa-image text-sm"></i>'; 
        }

        // --------------------------------------------------------
        // 5. CALCULATOR LOGIC
        // --------------------------------------------------------
        function toggleCalc() {
            const a = document.getElementById('calcArea');
            a.classList.toggle('hidden');
            if(!a.classList.contains('hidden')) setTimeout(() => window.scrollTo({top: a.offsetTop - 80, behavior: 'smooth'}), 50);
        }
        function calculateSignal() {
            const [aMin, aMax, aVal, bMin, bMax] = ['A-Min', 'A-Max', 'A-Need', 'B-Min', 'B-Max'].map(id => parseFloat(document.getElementById(id).value));
            const res = document.getElementById('B-Need');
            if([aMin, aMax, aVal, bMin, bMax].some(isNaN)) return res.value = "Lỗi";
            if(aMax === aMin) return res.value = "Lỗi /0";
            res.value = (((aVal - aMin) * (bMax - bMin) / (aMax - aMin)) + bMin).toFixed(3);
        }
        function clearCalc() { document.getElementById('A-Need').value = ''; document.getElementById('B-Need').value = ''; }

        // --------------------------------------------------------
        // 6. SEARCH LOGIC (Full Khôi Phục)
        // --------------------------------------------------------
        let currentMatchIndex = -1;
        let currentMatches = [];

        function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function clearHighlight() {
            const marks = document.querySelectorAll('mark.search-highlight');
            marks.forEach(mark => {
                const parent = mark.parentNode;
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            });
            currentMatches = [];
            currentMatchIndex = -1;
            window.lastSearchTerm = "";
            const controls = document.getElementById('searchControls');
            if(controls) { controls.classList.add('hidden'); controls.classList.remove('flex'); }
            const counter = document.getElementById('searchCounter');
            if(counter) counter.innerText = "0/0";
        }

        function highlightText(node, regex) {
            if (node.nodeType === 3) {
                const text = node.nodeValue;
                if (regex.test(text)) {
                    const fragment = document.createDocumentFragment();
                    let lastIdx = 0;
                    text.replace(regex, (match, p1, offset) => {
                        if (offset > lastIdx) fragment.appendChild(document.createTextNode(text.slice(lastIdx, offset)));
                        const mark = document.createElement('mark');
                        mark.className = 'search-highlight bg-yellow-300 dark:bg-yellow-500/80 text-zinc-900 rounded-[2px] px-0.5 transition-all';
                        mark.textContent = match;
                        fragment.appendChild(mark);
                        lastIdx = offset + match.length;
                        return match;
                    });
                    if (lastIdx < text.length) fragment.appendChild(document.createTextNode(text.slice(lastIdx)));
                    node.parentNode.replaceChild(fragment, node);
                }
            } else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE' && !node.classList.contains('search-highlight')) {
                Array.from(node.childNodes).forEach(child => highlightText(child, regex));
            }
        }

        function handleSearchKey(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (event.shiftKey) navigateSearch(-1);
                else doSearch();
            }
        }

        function doSearch() {
            const input = document.getElementById('searchInput');
            const term = input.value.trim();

            if (!term) { clearHighlight(); return; }
            if (window.lastSearchTerm === term && currentMatches.length > 0) { navigateSearch(1); return; }

            clearHighlight();
            window.lastSearchTerm = term;

            const regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');
            const feedArea = document.getElementById('feed-area');

            highlightText(feedArea, regex);

            currentMatches = document.querySelectorAll('mark.search-highlight');
            if (currentMatches.length > 0) {
                document.getElementById('searchControls').classList.remove('hidden');
                document.getElementById('searchControls').classList.add('flex');
                currentMatchIndex = 0;
                updateSearchCounter();
                scrollToMatch(currentMatches[0]);
            } else {
                showToast("Không tìm thấy kết quả phù hợp!");
            }
        }

        function navigateSearch(direction) {
            if (currentMatches.length === 0) return;
            currentMatchIndex += direction;
            if (currentMatchIndex >= currentMatches.length) currentMatchIndex = 0;
            if (currentMatchIndex < 0) currentMatchIndex = currentMatches.length - 1;
            updateSearchCounter();
            scrollToMatch(currentMatches[currentMatchIndex]);
        }

        function updateSearchCounter() {
            document.getElementById('searchCounter').innerText = `${currentMatchIndex + 1}/${currentMatches.length}`;
        }

        function scrollToMatch(element) {
            currentMatches.forEach(m => {
                m.classList.remove('bg-orange-400', 'dark:bg-orange-500', 'ring-2', 'ring-blue-600', 'scale-110', 'z-10', 'relative', 'shadow-sm');
                m.classList.add('bg-yellow-300', 'dark:bg-yellow-500/80');
            });
            element.classList.remove('bg-yellow-300', 'dark:bg-yellow-500/80');
            element.classList.add('bg-orange-400', 'dark:bg-orange-500', 'ring-2', 'ring-blue-600', 'scale-110', 'z-10', 'relative', 'shadow-sm');
            const offsetPosition = element.getBoundingClientRect().top + window.pageYOffset - 140;
            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }

        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('searchInput');
            if (container.classList.contains('max-h-0')) {
                container.classList.remove('max-h-0');
                container.classList.add('max-h-24');
                setTimeout(() => { input.focus(); input.select(); }, 300);
            } else {
                container.classList.add('max-h-0');
                container.classList.remove('max-h-24');
                input.value = '';
                clearHighlight();
            }
        }

        // --------------------------------------------------------
        // 7. TRANSLATION & TOAST NOTIFICATION LOGIC
        // --------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            const savedLangName = localStorage.getItem('langName');
            if (savedLangName) document.getElementById('currentLangLabel').innerText = savedLangName;
            
            // Xóa việc ép hiện bảng ngôn ngữ lần đầu để không làm phiền người dùng
        });

        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.querySelector('span').innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }, 4500); // Tự ẩn sau 4.5 giây
        }

        function toggleLangModal() {
            const m = document.getElementById('langModal');
            if(m.classList.contains('hidden')) { 
                m.classList.remove('hidden'); m.classList.add('flex'); 
                setTimeout(() => { m.classList.remove('opacity-0'); m.children[0].classList.remove('scale-95'); }, 10); 
            } else { 
                m.classList.add('opacity-0'); m.children[0].classList.add('scale-95'); 
                setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300); 
            }
        }

        function requestTranslate(langCode, langName) {
            localStorage.setItem('langSelected', 'true');
            toggleLangModal();

            document.getElementById('currentLangLabel').innerText = langName;
            localStorage.setItem('langName', langName);

            if (langCode === 'vi') {
                // Hủy dịch, tải lại trang
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; domain=" + window.location.hostname + "; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; domain=." + window.location.hostname + "; path=/;";
                window.location.reload(true); 
                return;
            }

            // KÍCH HOẠT THÔNG BÁO CẢNH BÁO DỊCH THUẬT
            showToast("Bản dịch được thực hiện bởi AI và có thể có sai sót.");
            
            // Thực hiện dịch
            executeTranslation(langCode);
        }

        function executeTranslation(langCode) {
            const selectField = document.querySelector("#google_translate_element select");
            if (!selectField) {
                showToast("Công cụ dịch đang tải, vui lòng thử lại sau!");
                return;
            }

            selectField.value = langCode;
            let event;
            if (typeof Event === 'function') {
                event = new Event('change', { bubbles: true, cancelable: true });
            } else {
                event = document.createEvent('HTMLEvents');
                event.initEvent('change', true, true);
            }
            selectField.dispatchEvent(event);

            const domain = window.location.hostname;
            document.cookie = `googtrans=/vi/${langCode}; path=/; domain=${domain};`;
            document.cookie = `googtrans=/vi/${langCode}; path=/; domain=.${domain};`; 
            document.cookie = `googtrans=/vi/${langCode}; path=/;`;
        }

        // Auto Title
        const wt = document.getElementById('welcomeText'); 
        const titles = ["AP2 LOG", "HUNQ.DEV", "MINIMAL"]; 
        let ti = 0;
        setInterval(() => { 
            wt.style.opacity = 0; 
            setTimeout(() => { 
                ti = (ti + 1) % titles.length; 
                wt.innerText = titles[ti]; 
                wt.style.opacity = 1; 
            }, 300); 
        }, 3500);
    </script>
</body>
