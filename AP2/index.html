    <!-- Script nạp API Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'vi',
                includedLanguages: 'en,de,ja',
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // --- 1. THEME LOGIC ---
        const themeIcons = { 'auto': '<i class="fas fa-adjust"></i>', 'light': '<i class="fas fa-sun"></i>', 'dark': '<i class="fas fa-moon"></i>' };
        let currentTheme = localStorage.getItem('theme') || 'auto';

        function applyTheme(theme) {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (theme === 'auto') {
                btn.innerHTML = themeIcons['auto'];
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) html.classList.add('dark');
                else html.classList.remove('dark');
            } else {
                btn.innerHTML = themeIcons[theme];
                if (theme === 'dark') html.classList.add('dark');
                else html.classList.remove('dark');
            }
            localStorage.setItem('theme', theme);
        }

        function cycleTheme() {
            if (currentTheme === 'auto') currentTheme = 'light';
            else if (currentTheme === 'light') currentTheme = 'dark';
            else currentTheme = 'auto';
            applyTheme(currentTheme);
        }
        applyTheme(currentTheme);
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem('theme') === 'auto') applyTheme('auto');
        });

        // --- 2. RSS FEED LOGIC (Thiết kế Card Bài Viết Premium) ---
        const rssUrl = 'https://projectap2.wordpress.com/feed/';
        const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=';

        fetch(proxyUrl + encodeURIComponent(rssUrl))
            .then(res => res.text())
            .then(str => new DOMParser().parseFromString(str, "text/xml"))
            .then(data => {
                const items = data.querySelectorAll("item");
                let html = '';

                items.forEach((item, index) => {
                    const title = item.querySelector("title").textContent;
                    const content = item.querySelector("encoded").textContent;
                    const date = new Date(item.querySelector("pubDate").textContent);
                    const author = item.querySelector("creator").textContent;

                    const dateStr = `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;
                    const avatar = author === 'HunqD'
                        ? 'https://graph.facebook.com/100045640179308/picture?type=large'
                        : `https://ui-avatars.com/api/?name=H&background=ddd`;

                    html += `
                        <article class="feed-item bg-white dark:bg-zinc-900 border border-zinc-200/50 dark:border-zinc-800/50 rounded-[2.5rem] p-8 md:p-14 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.1)] mb-3 relative overflow-hidden group">
                            
                            <!-- Hiệu ứng màu nền trang trí cho Card -->
                            <div class="absolute top-0 right-0 w-64 h-64 bg-zinc-50 dark:bg-white/[0.02] rounded-full blur-3xl -z-10 transition-colors"></div>

                            <div class="flex items-center justify-between mb-10">
                                <div class="flex items-center gap-4">
                                    <img src="${avatar}" alt="${author}" class="w-12 h-12 rounded-full shadow-sm border-2 border-white dark:border-zinc-800">
                                    <div class="flex flex-col">
                                        <span class="text-base font-bold text-zinc-900 dark:text-white tracking-tight notranslate" translate="no">${author}</span>
                                        <span class="text-sm font-semibold text-zinc-400 dark:text-zinc-500">${dateStr}</span>
                                    </div>
                                </div>
                                <div class="hidden sm:block px-4 py-2 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 rounded-full text-xs font-bold uppercase tracking-widest">
                                    Ghi chép
                                </div>
                            </div>

                            <h2 class="text-3xl sm:text-5xl font-black tracking-tighter mb-8 leading-[1.1] text-zinc-900 dark:text-white transition-colors">${title}</h2>
                            
                            <div class="prose-custom relative z-10">${content}</div>
                        </article>
                    `;
                });

                document.getElementById('feed-area').innerHTML = html;
                postProcessMedia();
            })
            .catch(err => {
                document.getElementById('feed-area').innerHTML = '<div class="py-20 text-center text-red-500 font-bold tracking-tight text-xl">Không thể tải dữ liệu. Vui lòng thử lại sau.</div>';
                console.error(err);
            });


        // --- 3. LOGIC MEDIA & GRID ẢNH INSTAGRAM STYLE ---
        let modalImages = [], modalCurrentIndex = 0;

        function postProcessMedia() {
            document.querySelectorAll('video').forEach(v => {
                v.removeAttribute('controls');
                v.classList.add('cursor-pointer');
                v.onclick = () => v.paused ? v.play() : v.pause();
            });

            document.querySelectorAll('.prose-custom').forEach(prose => {
                const allImages = Array.from(prose.querySelectorAll('img'));
                if (allImages.length === 0) return;
                const imageUrls = allImages.map(img => img.src);

                const wpGalleries = prose.querySelectorAll('.wp-block-gallery');
                wpGalleries.forEach(gallery => {
                    const imgs = Array.from(gallery.querySelectorAll('img'));
                    if (imgs.length === 0) return;

                    // Khung bọc Thư viện - Sẽ bị ẩn khi bật text-only
                    const galleryWrapper = document.createElement('div');
                    galleryWrapper.className = 'custom-gallery my-8 rounded-[1.5rem] overflow-hidden ring-1 ring-zinc-900/5 dark:ring-white/10 shadow-sm bg-zinc-200 dark:bg-zinc-800';

                    // Lưới ảnh phong cách Instagram (Vuông vức, gap siêu nhỏ)
                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-2 gap-[2px] sm:gap-1';

                    imgs.forEach((img, idx) => {
                        if (idx > 3) return;

                        const globalIdx = imageUrls.indexOf(img.src);
                        const itemWrapper = document.createElement('div');
                        itemWrapper.className = 'relative w-full aspect-square overflow-hidden cursor-pointer group bg-zinc-100 dark:bg-zinc-900';

                        // Nếu có 3 ảnh, ảnh đầu tiên chiếm cả 2 cột và dẹt hơn
                        if (imgs.length === 3 && idx === 0) {
                            itemWrapper.classList.remove('aspect-square');
                            itemWrapper.classList.add('col-span-2', 'aspect-[2/1]');
                        }

                        const newImg = document.createElement('img');
                        newImg.src = img.src;
                        // Ép buộc loại bỏ border-radius mặc định của ảnh để bo góc nằm ở Wrapper ngoài cùng
                        newImg.className = 'w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 !my-0 !rounded-none';
                        itemWrapper.appendChild(newImg);

                        // Đếm ảnh dư
                        if (imgs.length > 4 && idx === 3) {
                            const overlay = document.createElement('div');
                            overlay.className = 'absolute inset-0 bg-zinc-900/60 flex items-center justify-center backdrop-blur-sm transition-colors group-hover:bg-zinc-900/50';
                            overlay.innerHTML = `<span class="text-white font-black text-3xl tracking-widest">+${imgs.length - 4}</span>`;
                            itemWrapper.appendChild(overlay);
                        }

                        itemWrapper.onclick = () => openModal(imageUrls, globalIdx);
                        grid.appendChild(itemWrapper);
                    });

                    galleryWrapper.appendChild(grid);
                    gallery.parentNode.replaceChild(galleryWrapper, gallery);
                });

                // Xử lý sự kiện click cho các ảnh lẻ tẻ không nằm trong Gallery
                const finalRemainingImages = prose.querySelectorAll('img');
                finalRemainingImages.forEach(img => {
                    if (!img.closest('.custom-gallery')) {
                        const globalIdx = imageUrls.indexOf(img.src);
                        if (globalIdx !== -1) img.onclick = () => openModal(imageUrls, globalIdx);
                    }
                });
            });
        }

        // --- 4. MODAL XEM ẢNH TỔNG HỢP ---
        function openModal(imageUrls, startIndex) {
            modalImages = imageUrls;
            modalCurrentIndex = startIndex;
            updateModalImage();

            const modal = document.getElementById('imgModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('modalControls').style.display = imageUrls.length > 1 ? 'flex' : 'none';
            document.getElementById('modalCounter').style.display = imageUrls.length > 1 ? 'block' : 'none';

            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            document.addEventListener('keydown', modalKeyHandler);
        }

        function updateModalImage() {
            const mImg = document.getElementById('modalImg');
            mImg.style.opacity = '0.3';
            mImg.style.transform = 'scale(0.98)';
            setTimeout(() => {
                mImg.src = modalImages[modalCurrentIndex];
                mImg.onload = () => {
                    mImg.style.opacity = '1';
                    mImg.style.transform = 'scale(1)';
                };
            }, 150);

            const counter = document.getElementById('modalCounter');
            if (counter) counter.innerText = `${modalCurrentIndex + 1} / ${modalImages.length}`;
        }

        function prevModalImage(e) { if (e) e.stopPropagation(); modalCurrentIndex = (modalCurrentIndex - 1 + modalImages.length) % modalImages.length; updateModalImage(); }
        function nextModalImage(e) { if (e) e.stopPropagation(); modalCurrentIndex = (modalCurrentIndex + 1) % modalImages.length; updateModalImage(); }

        function modalKeyHandler(e) {
            if (e.key === 'ArrowLeft') prevModalImage();
            else if (e.key === 'ArrowRight') nextModalImage();
            else if (e.key === 'Escape') closeModal();
        }

        function closeModal() {
            const modal = document.getElementById('imgModal');
            modal.classList.add('opacity-0');
            document.removeEventListener('keydown', modalKeyHandler);
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('modalImg').src = '';
            }, 300);
        }

        // --- 5. LOGIC DỊCH THUẬT (Google Translate) ---

        // Tự động hiện modal ngôn ngữ trong lần đầu truy cập
        window.addEventListener('DOMContentLoaded', () => {
            const savedLangName = localStorage.getItem('langName');
            if (savedLangName) {
                document.getElementById('currentLangLabel').innerText = savedLangName;
            }

            if (!localStorage.getItem('langSelected')) {
                setTimeout(() => {
                    toggleLangModal();
                }, 1000); // Chờ 1s cho mượt
            }
        });

        function toggleLangModal() {
            const modal = document.getElementById('langModal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.children[0].classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modal.children[0].classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        function requestTranslate(lang, langName) {
            localStorage.setItem('langSelected', 'true');
            toggleLangModal(); // Tắt bảng chọn ngôn ngữ ngay lập tức

            document.getElementById('currentLangLabel').innerText = langName;
            localStorage.setItem('langName', langName);

            if (lang === 'vi') {
                // KHI VỀ BẢN GỐC: Xoá Cookie của Google Translate và tải lại trang
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; domain=" + window.location.hostname + "; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; domain=." + window.location.hostname + "; path=/;";
                window.location.reload(true); // Thêm 'true' để ép Safari tải lại từ Server thay vì Cache
                return;
            }

            // Dịch ngay lập tức
            executeTranslation(lang);
        }

       function executeTranslation(langCode) {
            const selectField = document.querySelector("#google_translate_element select");
            
            if (!selectField) {
                alert("Công cụ dịch đang tải, vui lòng thử lại sau vài giây.");
                return;
            }

            // 1. Cập nhật giá trị thẻ select của Google
            selectField.value = langCode;

            // 2. Kích hoạt sự kiện tương thích ngược với Safari iOS cũ
            let event;
            if (typeof Event === 'function') {
                // Dành cho trình duyệt hiện đại
                event = new Event('change', { bubbles: true, cancelable: true });
            } else {
                // Dành cho trình duyệt cũ (Safari iOS thấp)
                event = document.createEvent('HTMLEvents');
                event.initEvent('change', true, true);
            }
            selectField.dispatchEvent(event);

            // 3. Ép ghi Cookie thủ công để vượt qua bộ lọc ITP của Safari
            const domain = window.location.hostname;
            document.cookie = `googtrans=/vi/${langCode}; path=/; domain=${domain};`;
            document.cookie = `googtrans=/vi/${langCode}; path=/; domain=.${domain};`; // Dự phòng cho subdomain
            document.cookie = `googtrans=/vi/${langCode}; path=/;`;
        }

        // --- 6. TƯƠNG TÁC UI KHÁC ---
        let currentMatchIndex = -1;
        let currentMatches = [];

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function clearHighlight() {
            const marks = document.querySelectorAll('mark.search-highlight');
            marks.forEach(mark => {
                const parent = mark.parentNode;
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            });
            currentMatches = [];
            currentMatchIndex = -1;
            window.lastSearchTerm = "";
            
            // Ẩn thanh điều hướng và reset bộ đếm
            const controls = document.getElementById('searchControls');
            if(controls) {
                controls.classList.add('hidden');
                controls.classList.remove('flex');
            }
            const counter = document.getElementById('searchCounter');
            if(counter) counter.innerText = "0/0";
        }

        function highlightText(node, regex) {
            if (node.nodeType === 3) {
                const text = node.nodeValue;
                if (regex.test(text)) {
                    const fragment = document.createDocumentFragment();
                    let lastIdx = 0;
                    text.replace(regex, (match, p1, offset) => {
                        if (offset > lastIdx) {
                            fragment.appendChild(document.createTextNode(text.slice(lastIdx, offset)));
                        }
                        const mark = document.createElement('mark');
                        mark.className = 'search-highlight bg-yellow-300 dark:bg-yellow-500/80 text-zinc-900 rounded-[2px] px-0.5 transition-all';
                        mark.textContent = match;
                        fragment.appendChild(mark);
                        lastIdx = offset + match.length;
                        return match;
                    });
                    if (lastIdx < text.length) {
                        fragment.appendChild(document.createTextNode(text.slice(lastIdx)));
                    }
                    node.parentNode.replaceChild(fragment, node);
                }
            } else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE' && !node.classList.contains('search-highlight')) {
                Array.from(node.childNodes).forEach(child => highlightText(child, regex));
            }
        }

        // Xử lý phím Enter và Shift+Enter
        function handleSearchKey(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (event.shiftKey) {
                    navigateSearch(-1); // Shift + Enter -> Lên
                } else {
                    doSearch(); // Enter -> Xuống
                }
            }
        }

        function doSearch() {
            const input = document.getElementById('searchInput');
            const term = input.value.trim();

            if (!term) {
                clearHighlight();
                return;
            }

            if (window.lastSearchTerm === term && currentMatches.length > 0) {
                navigateSearch(1);
                return;
            }

            clearHighlight();
            window.lastSearchTerm = term;

            const regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');
            const feedArea = document.getElementById('feed-area');

            highlightText(feedArea, regex);

            currentMatches = document.querySelectorAll('mark.search-highlight');
            if (currentMatches.length > 0) {
                document.getElementById('searchControls').classList.remove('hidden');
                document.getElementById('searchControls').classList.add('flex');
                
                currentMatchIndex = 0;
                updateSearchCounter();
                scrollToMatch(currentMatches[0]);
                
                document.querySelectorAll('.feed-item').forEach(i => i.classList.remove('opacity-30', 'scale-[0.98]', 'scale-95'));
            } else {
                alert('Không tìm thấy nội dung!');
            }
        }

        // Chuyển hướng lên/xuống giữa các kết quả
        function navigateSearch(direction) {
            if (currentMatches.length === 0) return;
            
            currentMatchIndex += direction;
            
            // Tạo vòng lặp nếu vượt quá số lượng kết quả
            if (currentMatchIndex >= currentMatches.length) currentMatchIndex = 0;
            if (currentMatchIndex < 0) currentMatchIndex = currentMatches.length - 1;
            
            updateSearchCounter();
            scrollToMatch(currentMatches[currentMatchIndex]);
        }

        function updateSearchCounter() {
            document.getElementById('searchCounter').innerText = `${currentMatchIndex + 1}/${currentMatches.length}`;
        }

        function scrollToMatch(element) {
            // Reset toàn bộ highlight về màu vàng mặc định
            currentMatches.forEach(m => {
                m.classList.remove('bg-orange-400', 'dark:bg-orange-500', 'ring-2', 'ring-blue-600', 'scale-110', 'z-10', 'relative', 'shadow-sm');
                m.classList.add('bg-yellow-300', 'dark:bg-yellow-500/80');
            });
            
            // Đổi màu kết quả hiện tại sang màu cam và phóng to nhẹ
            element.classList.remove('bg-yellow-300', 'dark:bg-yellow-500/80');
            element.classList.add('bg-orange-400', 'dark:bg-orange-500', 'ring-2', 'ring-blue-600', 'scale-110', 'z-10', 'relative', 'shadow-sm');

            const headerOffset = 140; 
            const elementPosition = element.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

            window.scrollTo({ top: offsetPosition, behavior: "smooth" });
        }

        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('searchInput');
            if (container.classList.contains('max-h-0')) {
                container.classList.remove('max-h-0');
                container.classList.add('max-h-24');
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 300);
            } else {
                container.classList.add('max-h-0');
                container.classList.remove('max-h-24');
                input.value = '';
                clearHighlight();
            }
        }
        // Chế độ văn bản (Ẩn hình ảnh và thư viện lưới)
        function toggleImages() {
            const btn = document.getElementById('btnImg');

            // Kiểm tra trạng thái body
            const isHidden = document.body.classList.contains('hide-media');

            if (!isHidden) {
                // Kích hoạt ẩn media
                document.body.classList.add('hide-media');
                btn.classList.add('text-blue-500');
                btn.innerHTML = '<i class="fas fa-heading"></i>';
            } else {
                // Hủy kích hoạt ẩn media
                document.body.classList.remove('hide-media');
                btn.classList.remove('text-blue-500');
                btn.innerHTML = '<i class="fas fa-images"></i>';
            }
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (window.scrollY > 500) {
                btn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            } else {
                btn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }
        });

        function toggleCalc() {
            const area = document.getElementById('calcArea');
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                area.classList.add('block');
                setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
            } else {
                area.classList.add('hidden');
                area.classList.remove('block');
            }
        }

        function calculateSignal() {
            const aMin = parseFloat(document.getElementById('A-Min').value);
            const aMax = parseFloat(document.getElementById('A-Max').value);
            const aVal = parseFloat(document.getElementById('A-Need').value);
            const bMin = parseFloat(document.getElementById('B-Min').value);
            const bMax = parseFloat(document.getElementById('B-Max').value);

            if (isNaN(aVal) || isNaN(aMin) || isNaN(aMax) || isNaN(bMin) || isNaN(bMax)) {
                document.getElementById('B-Need').value = "Lỗi!"; return;
            }
            if (aMax - aMin === 0) { document.getElementById('B-Need').value = "Lỗi /0"; return; }

            const result = ((aVal - aMin) * (bMax - bMin) / (aMax - aMin)) + bMin;
            document.getElementById('B-Need').value = result.toFixed(3);
        }

        function clearCalc() { document.getElementById('A-Need').value = ''; document.getElementById('B-Need').value = ''; }

        // Chữ chạy Header
        const welcomeEl = document.getElementById('welcomeText');
        const titles = ["PROJECT AP2", "BY Hunq", "TECH LOG"];
        let tIndex = 0;
        setInterval(() => {
            welcomeEl.classList.add('opacity-0', 'translate-y-2');
            setTimeout(() => {
                tIndex = (tIndex + 1) % titles.length;
                welcomeEl.innerText = titles[tIndex];
                welcomeEl.classList.remove('opacity-0', 'translate-y-2');
            }, 300);
        }, 4000);

    </script>
</body>

</html>
