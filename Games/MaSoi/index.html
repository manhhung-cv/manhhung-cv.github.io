    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes scaleIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        .pulse-glow { animation: pulseGlow 2s infinite alternate; }
        @keyframes pulseGlow { from { box-shadow: 0 0 10px rgba(153, 27, 27, 0.5); } to { box-shadow: 0 0 20px rgba(220, 38, 38, 0.8); } }

        body { overscroll-behavior-y: contain; background-color: #020617; color: #e2e8f0; } 
        
        /* Glassmorphism Classes */
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { background: rgba(30, 41, 59, 0.7); border-color: rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; }
        .glass-input:focus { border-color: rgba(99, 102, 241, 0.5); outline: none; background: rgba(0, 0, 0, 0.5); }

        /* Game Phases */
        #app { transition: background 1.5s ease; background-size: cover; background-position: center; }
        .phase-lobby { background: radial-gradient(circle at top, #1e1b4b, #020617); }
        .phase-night { background: radial-gradient(circle at top, #450a0a, #020617); }
        .phase-day { background: radial-gradient(circle at top, #334155, #020617); }

        /* Chat Bubbles */
        .chat-area { scroll-behavior: smooth; }
        .chat-bubble { padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        
        .chat-mine { background: rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.3); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-other { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-wolf { background: rgba(153, 27, 27, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .chat-dead { opacity: 0.6; border: 1px dashed rgba(148, 163, 184, 0.3); background: transparent; }

        .chat-system { align-self: center; font-size: 0.75rem; color: #64748b; margin: 12px 0; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .chat-narrator {
            align-self: center; background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 80%);
            color: #fbbf24; font-family: 'Be Vietnam Pro', sans-serif; font-style: italic; font-weight: 500; font-size: 1rem;
            text-align: center; margin: 20px 0; padding: 10px 0; width: 100%; border-top: 1px solid rgba(251, 191, 36, 0.2); border-bottom: 1px solid rgba(251, 191, 36, 0.2);
        }

        /* Target Selection */
        .target-selected-wolf { border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.1); transform: translateY(-2px); }
        .target-selected-seer { border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); background: rgba(139, 92, 246, 0.1); transform: translateY(-2px); }
        .target-selected-guard { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); background: rgba(59, 130, 246, 0.1); transform: translateY(-2px); }
        .target-selected-day { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); background: rgba(245, 158, 11, 0.1); transform: translateY(-2px); }
        
        .dead-player { filter: grayscale(100%) opacity(50%); position: relative; }
        .dead-player::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent 45%, rgba(239,68,68,0.6) 48%, rgba(239,68,68,0.6) 52%, transparent 55%); pointer-events: none; }
    </style>

            document.querySelectorAll('#handbook-tabs button').forEach(b => {
                b.classList.remove('bg-amber-500/20', 'border-amber-500/30', 'text-amber-100', 'opacity-100');
                b.classList.add('opacity-50', 'bg-white/5', 'border-transparent', 'text-slate-300');
            });
            btn.classList.add('bg-amber-500/20', 'border-amber-500/30', 'text-amber-100', 'opacity-100');
            btn.classList.remove('opacity-50', 'bg-white/5', 'border-transparent', 'text-slate-300');
            renderRoleDetail(role);
            // Tự động cuộn tab vào giữa màn hình khi bấm
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        };
        
        tabsContainer.appendChild(btn);
        if (index === 0) btn.click();
    });
};

        const renderRoleDetail = (role) => {
            const content = document.getElementById('handbook-content');
            
            const renderList = (items) => items.map(item => `<li class="relative pl-5 before:content-['◆'] before:absolute before:left-0 before:top-0 before:text-[10px] before:text-amber-500/50">${item}</li>`).join('');

            content.innerHTML = `
                <div class="fade-in">
                    <div class="flex items-center gap-4 mb-8 border-b border-white/10 pb-6">
                        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                            <img src="${role.img}" onerror="this.src='${role.fallback}'" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h3 class="font-serif text-3xl font-bold text-white tracking-widest mb-1 ${role.color}">${role.name}</h3>
                            <span class="inline-block px-3 py-1 rounded-full text-[9px] font-serif uppercase tracking-[0.2em] border ${role.team === 'Dân Làng' ? 'bg-blue-900/30 text-blue-300 border-blue-500/30' : 'bg-blood-900/30 text-blood-300 border-blood-500/30'} backdrop-blur-sm">
                                Phe ${role.team}
                            </span>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <section>
                            <h4 class="font-serif text-[10px] uppercase tracking-[0.2em] text-mystic-400 mb-3 flex items-center gap-2"><i class="fas fa-magic"></i> Năng lực</h4>
                            <p class="text-slate-300 leading-relaxed font-light glass-card p-4 rounded-xl italic">${role.desc}</p>
                        </section>

                        <section>
                            <h4 class="font-serif text-[10px] uppercase tracking-[0.2em] text-amber-500/80 mb-3 flex items-center gap-2"><i class="fas fa-star"></i> Tầm quan trọng</h4>
                            <ul class="space-y-3 text-slate-300 font-light text-sm">${renderList(role.importance)}</ul>
                        </section>

                        <section>
                            <h4 class="font-serif text-[10px] uppercase tracking-[0.2em] text-emerald-500/80 mb-3 flex items-center gap-2"><i class="fas fa-chess-knight"></i> Chiến thuật</h4>
                            <ul class="space-y-3 text-slate-300 font-light text-sm">${renderList(role.tactics)}</ul>
                        </section>

                        <section class="glass-card bg-blood-900/10 border-blood-500/20 p-4 rounded-xl">
                            <h4 class="font-serif text-[10px] uppercase tracking-[0.2em] text-blood-400 mb-3 flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Lời nguyền (Luật)</h4>
                            <ul class="space-y-2 text-slate-300 font-light text-xs">${renderList(role.rules)}</ul>
                        </section>
                    </div>
                </div>
            `;
        };

        // === SETTINGS & ROLE REVEAL ===
        window.openSettings = () => {
            document.getElementById('toggle-narrator').checked = window.gameSettings.useNarrator;
            document.getElementById('toggle-ai').checked = window.gameSettings.useAI;
            document.getElementById('gemini-key').value = window.gameSettings.apiKey || '';
            toggleAPIInput();
            document.getElementById('settings-modal').classList.remove('hidden');
        };

        window.closeSettings = () => document.getElementById('settings-modal').classList.add('hidden');

        const toggleAPIInput = () => {
            document.getElementById('api-key-container').style.display = document.getElementById('toggle-ai').checked ? 'block' : 'none';
        }
        document.getElementById('toggle-ai').addEventListener('change', toggleAPIInput);
        document.getElementById('toggle-narrator').addEventListener('change', () => {
            const isNarrator = document.getElementById('toggle-narrator').checked;
            document.getElementById('ai-toggle-container').style.opacity = isNarrator ? '1' : '0.4';
            document.getElementById('toggle-ai').disabled = !isNarrator;
        });

        window.saveSettings = () => {
            window.gameSettings = { 
                useNarrator: document.getElementById('toggle-narrator').checked,
                useAI: document.getElementById('toggle-ai').checked,
                apiKey: document.getElementById('gemini-key').value.trim()
            };
            localStorage.setItem('ww_settings_mystic', JSON.stringify(window.gameSettings));
            closeSettings();
            showToast("Đã lưu dấu ấn", "success");
        };

        const showMyRoleModal = () => {
            const r = ROLES_DATA[roomData.players[currentUser.uid].role];
            document.getElementById('role-icon-container').innerHTML = `<img src="${r.img}" onerror="this.src='${r.fallback}'" class="w-24 h-24 mx-auto rounded-full object-cover border-2 border-white/20">`;
            document.getElementById('role-name-display').textContent = r.name;
            document.getElementById('role-name-display').className = `font-serif text-3xl font-bold mb-2 drop-shadow-md ${r.color}`;
            document.getElementById('role-desc-display').textContent = r.desc;
            document.getElementById('role-modal').classList.remove('hidden');
        };

        window.closeRoleModal = () => document.getElementById('role-modal').classList.add('hidden');
        window.showMyRole = () => { if(roomData && roomData.status === 'playing') showMyRoleModal(); }


        // === GAME LOGIC ===
        const handleCreateRoom = async () => {
            const roomId = generateRoomId();
            const initialData = {
                roomId, host: currentUser.uid, status: 'lobby', phase: 'night', dayCount: 0,
                players: { [currentUser.uid]: { uid: currentUser.uid, name: myProfile.name, avatar: myProfile.avatar, isAlive: true, role: 'villager' } },
                actions: {}, nightActions: {}, dayActions: {}, chat: [], winner: null
            };
            try { await setDoc(getRoomRef(roomId), initialData); joinRoom(roomId); } catch (e) { showToast("Năng lượng gián đoạn", "error"); }
        };

        const joinRoom = async (roomId) => {
            if (!currentUser) return;
            const roomRef = getRoomRef(roomId);
            try {
                const docSnap = await getDoc(roomRef);
                if (!docSnap.exists()) return showToast("Làng không tồn tại", "error");
                if (docSnap.data().status !== 'lobby' && !docSnap.data().players[currentUser.uid]) return showToast("Trận đấu đang diễn ra", "error");

                if (!docSnap.data().players[currentUser.uid]) {
                    await updateDoc(roomRef, { [`players.${currentUser.uid}`]: { uid: currentUser.uid, name: myProfile.name, avatar: myProfile.avatar, isAlive: true, role: 'villager' } });
                }
                currentRoomId = roomId; listenToRoom();
            } catch (e) { showToast("Năng lượng gián đoạn", "error"); }
        };

        const handleLeaveRoom = async () => {
            if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
            currentRoomId = null; roomData = null; selectedTargetId = null; renderMenu();
        };

        const listenToRoom = () => {
            if (unsubscribeRoom) unsubscribeRoom();
            unsubscribeRoom = onSnapshot(getRoomRef(currentRoomId), (docSnap) => {
                if (!docSnap.exists()) { handleLeaveRoom(); showToast("Làng đã bị phá hủy", "error"); return; }
                const oldStatus = roomData ? roomData.status : null;
                const oldPhase = roomData ? roomData.phase : null;
                roomData = docSnap.data();
                
                if (oldStatus === 'lobby' && roomData.status === 'playing') showMyRoleModal();

                if (roomData.status === 'lobby') renderLobby();
                else { if (oldPhase !== roomData.phase) selectedTargetId = null; renderGame(); }
            }, () => showToast("Mất kết nối tinh linh", "error"));
        };

        const handleStartGame = async () => {
            const players = Object.values(roomData.players);
            if (players.length < 1) return;

            let rolePool = players.length >= 4 ? ['wolf', 'seer', 'guard'] : ['wolf', 'seer', 'villager'];
            while(rolePool.length < players.length) rolePool.push('villager');
            rolePool.sort(() => Math.random() - 0.5);

            const updates = { status: 'playing', phase: 'night', dayCount: 1, nightActions: { 1: {} }, dayActions: { 1: {} } };
            players.forEach((p, i) => { updates[`players.${p.uid}.role`] = rolePool[i]; updates[`players.${p.uid}.isAlive`] = true; });

            try { await updateDoc(getRoomRef(currentRoomId), updates); triggerNarrator('START'); } catch (e) {}
        };

        const handlePlayerAction = async () => {
            if (!selectedTargetId) return;
            const my = roomData.players[currentUser.uid];
            const isNight = roomData.phase === 'night';
            const day = roomData.dayCount;
            const ref = getRoomRef(currentRoomId);

            try {
                if (isNight) {
                    if (my.role === 'seer') {
                        const targetRole = roomData.players[selectedTargetId].role;
                        showToast(`Kẻ này là ${ROLES_DATA[targetRole].name} ${ROLES_DATA[targetRole].icon}`);
                        await updateDoc(ref, { [`nightActions.${day}.${currentUser.uid}`]: 'checked' });
                    } else if (my.role === 'wolf' || my.role === 'guard') {
                        await updateDoc(ref, { [`nightActions.${day}.${currentUser.uid}`]: selectedTargetId });
                        showToast("Đã khắc ghi hành động");
                    }
                } else {
                    await updateDoc(ref, { [`dayActions.${day}.${currentUser.uid}`]: selectedTargetId });
                    showToast("Đã bỏ phiếu treo cổ");
                }
                selectedTargetId = null;
            } catch (e) {}
        };

        const handleEndPhase = async () => {
            const isNight = roomData.phase === 'night';
            const day = roomData.dayCount;
            const ref = getRoomRef(currentRoomId);
            let updates = {};
            
            if (isNight) {
                const acts = roomData.nightActions[day] || {};
                let w = null; let g = null;
                for (const [u, t] of Object.entries(acts)) {
                    if (t === 'checked') continue;
                    if (roomData.players[u].role === 'wolf') w = t;
                    if (roomData.players[u].role === 'guard') g = t;
                }
                if (w && w !== g) updates[`players.${w}.isAlive`] = false;
                updates.phase = 'day'; updates[`dayActions.${day}`] = {}; 
            } else {
                const votes = roomData.dayActions[day] || {};
                const counts = {}; for (const t of Object.values(votes)) counts[t] = (counts[t] || 0) + 1;
                let max = 0; let target = null; let tie = false;
                for (const [t, c] of Object.entries(counts)) {
                    if (c > max) { max = c; target = t; tie = false; } else if (c === max) tie = true;
                }
                if (target && !tie) updates[`players.${target}.isAlive`] = false;
                updates.phase = 'night'; updates.dayCount = day + 1; updates[`nightActions.${day + 1}`] = {}; 
            }

            const temp = JSON.parse(JSON.stringify(roomData.players));
            for (const k in updates) { if (k.includes('.isAlive')) temp[k.split('.')[1]].isAlive = updates[k]; }
            let wCount = 0; let vCount = 0;
            Object.values(temp).forEach(p => { if (p.isAlive) p.role === 'wolf' ? wCount++ : vCount++; });

            if (wCount === 0) updates.winner = 'villagers';
            else if (wCount >= vCount) updates.winner = 'wolves';

            try {
                await updateDoc(ref, updates);
                
                if (updates.winner) triggerNarrator(updates.winner === 'wolves' ? 'WOLF_WIN' : 'VILLAGER_WIN');
                else if (isNight) {
                    const deathUid = Object.keys(updates).find(k => k.startsWith('players.') && updates[k]===false)?.split('.')[1];
                    if (deathUid) triggerNarrator('NIGHT_KILL', {name: roomData.players[deathUid].name});
                    else triggerNarrator('NIGHT_PEACE');
                } else {
                    const deathUid = Object.keys(updates).find(k => k.startsWith('players.') && updates[k]===false)?.split('.')[1];
                    if (deathUid) triggerNarrator('DAY_LYNCH', {name: roomData.players[deathUid].name});
                    else triggerNarrator('DAY_TIE');
                }
            } catch (e) {}
        };

        const triggerNarrator = async (eventKey, context = {}) => {
            if (!window.gameSettings.useNarrator) return;
            
            const resolveScript = (k, c) => {
                const scripts = {
                    'START': "Đêm buông xuống. Những kẻ ẩn nấp bắt đầu hành động.",
                    'NIGHT_KILL': `Bình minh hé rạng. Thi thể của ${c.name} được tìm thấy.`,
                    'NIGHT_PEACE': "Một đêm tĩnh lặng trôi qua. Phép thuật bảo hộ mọi người.",
                    'DAY_LYNCH': `Đám đông phán quyết. ${c.name} bị đưa lên giàn hỏa thiêu.`,
                    'DAY_TIE': "Sự lưỡng lự bao trùm. Hôm nay không có ai phải chết.",
                    'WOLF_WIN': "Tiếng tru vang vọng. Ngôi làng đã chìm trong biển máu.",
                    'VILLAGER_WIN': "Bóng tối tan biến. Lời nguyền Ma Sói đã bị phá vỡ."
                };
                return scripts[k].replace('undefined', '');
            };

            let text = "";

            if (window.gameSettings.useAI && window.gameSettings.apiKey) {
                let eventDesc = "";
                switch(eventKey) {
                    case 'START': eventDesc = "Bắt đầu ván game Ma Sói. Đêm đầu tiên, sói đi săn."; break;
                    case 'NIGHT_KILL': eventDesc = `Sáng ra, người chơi ${context.name} chết vì bị sói cắn.`; break;
                    case 'NIGHT_PEACE': eventDesc = "Sáng ra, không ai chết đêm qua vì được Bảo vệ hoặc sói không cắn."; break;
                    case 'DAY_LYNCH': eventDesc = `Dân làng đã biểu quyết treo cổ người chơi ${context.name}.`; break;
                    case 'DAY_TIE': eventDesc = "Biểu quyết hòa, không ai bị treo cổ hôm nay."; break;
                    case 'WOLF_WIN': eventDesc = "Sói chiến thắng, dân làng bị tiêu diệt hết."; break;
                    case 'VILLAGER_WIN': eventDesc = "Dân làng chiến thắng, sói đã bị tiêu diệt."; break;
                }
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${window.gameSettings.apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Bạn là quản trò game Ma Sói. Sự kiện: "${eventDesc}". Hãy viết 1 câu dẫn truyện ngắn gọn, bí ẩn, phong cách ma thuật hắc ám. Không giải thích.` }] }] })
                    });
                    const data = await response.json();
                    text = data.candidates[0].content.parts[0].text.trim().replace(/^["']|["']$/g, '');
                } catch (e) { text = resolveScript(eventKey, context); }
            } else { text = resolveScript(eventKey, context); }

            if (text) {
                try { await updateDoc(getRoomRef(currentRoomId), { chat: arrayUnion({ uid: 'narrator', name: 'Quản Trò', text: text, type: 'narrator', timestamp: Date.now() }) }); } catch(e) {}
            }
        };

        const sendChat = async (text) => {
            const my = roomData.players[currentUser.uid];
            let t = 'normal';
            if (!my.isAlive) t = 'dead'; else if (roomData.phase === 'night' && my.role === 'wolf') t = 'wolf';
            try { await updateDoc(getRoomRef(currentRoomId), { chat: arrayUnion({ uid: currentUser.uid, name: myProfile.name, text, type: t, timestamp: Date.now() }) }); } catch (e) {}
        };

        const resetToLobby = async () => { if (roomData.host === currentUser.uid) try { await updateDoc(getRoomRef(currentRoomId), { status: 'lobby', winner: null, chat: [], dayCount: 0 }); } catch(e) {} }

        initAuth();
    </script>
</body>
</html>
