<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bản đồ Tra cứu Nhật Bản</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Tùy chỉnh thanh cuộn thanh lịch cho Desktop */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .leaflet-control-layers { border-radius: 12px !important; border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; font-family: 'Inter', sans-serif; }
        
        /* Hiệu ứng Skeleton cho lúc chờ dịch */
        .skeleton-text { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; color: transparent; border-radius: 4px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .animate-fade-up { animation: fadeUp 0.4s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 overflow-hidden">

    <main class="flex flex-col md:flex-row h-[100dvh] w-full relative">
        
        <section class="w-full h-[45dvh] md:h-full md:flex-1 relative z-0 order-1 md:order-2">
            <div id="map" class="absolute inset-0 w-full h-full"></div>
            
            <button id="gpsBtn" title="Định vị của tôi" class="absolute bottom-6 right-4 md:bottom-8 md:right-8 z-[400] w-12 h-12 bg-white text-blue-600 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.15)] flex justify-center items-center text-xl transition-transform active:scale-90 hover:bg-blue-50 border border-gray-100">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>
        </section>

        <aside class="w-full h-[60dvh] md:h-full md:w-[420px] lg:w-[460px] bg-white z-10 order-2 md:order-1 flex flex-col -mt-6 md:mt-0 rounded-t-3xl md:rounded-none shadow-[0_-8px_30px_rgba(0,0,0,0.08)] md:shadow-[8px_0_30px_rgba(0,0,0,0.05)] relative transition-all">
            
            <div class="w-full flex justify-center pt-3 md:hidden shrink-0">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
            </div>

            <div class="px-5 pt-3 pb-4 border-b border-gray-100 shrink-0 bg-white/95 backdrop-blur-sm z-20">
                <div class="flex justify-between items-end mb-3">
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight">Khám phá</h1>
                        <p id="resultCount" class="text-xs font-medium text-gray-500 mt-1">Đang tải dữ liệu...</p>
                    </div>
                </div>
                
                <div class="space-y-2.5">
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" disabled placeholder="Tìm tên, địa chỉ tiếng Nhật/Anh..." class="w-full pl-10 pr-4 py-3 bg-gray-100/70 border border-transparent focus:bg-white focus:border-blue-500 rounded-xl text-sm transition-all focus:ring-4 focus:ring-blue-500/10">
                    </div>
                    
                    <div class="flex gap-2.5">
                        <div class="relative flex-1">
                            <select id="categorySelect" disabled class="w-full pl-3 pr-8 py-2.5 bg-gray-100/70 border border-transparent rounded-xl text-sm focus:outline-none focus:bg-white focus:border-blue-500 cursor-pointer appearance-none font-medium text-gray-700 truncate">
                                <option value="all">Tất cả danh mục</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-[10px] pointer-events-none"></i>
                        </div>

                        <div class="relative flex-1">
                            <select id="sortSelect" disabled class="w-full pl-3 pr-8 py-2.5 bg-blue-50 border border-blue-100 text-blue-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none font-medium truncate">
                                <option value="default">Mặc định</option>
                                <option value="name">Tên A-Z</option>
                                <option value="distance">Gần tôi nhất</option>
                            </select>
                            <i class="fa-solid fa-arrow-down-short-wide absolute right-3 top-1/2 -translate-y-1/2 text-blue-500 text-[11px] pointer-events-none"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div id="resultsList" class="flex-1 overflow-y-auto px-4 py-4 space-y-3 bg-gray-50/50 relative">
                </div>
            
            <div id="scrollSentinel" class="h-14 w-full flex justify-center items-center text-gray-400 text-sm hidden shrink-0 bg-white border-t border-gray-50">
                <i class="fa-solid fa-spinner fa-spin-pulse mr-2 text-blue-500 text-lg"></i> Đang tải thêm...
            </div>
        </aside>
    </main>

    <script>
        const VI_CATEGORIES = {
            '飲食店': '🍽️ Nhà hàng', 'スーパー、コンビニ': '🛒 Siêu thị/Mini',
            '衣料品、靴、クリーニング': '👕 Thời trang', 'ギフト、雑貨店': '🎁 Quà tặng',
            '文具、印鑑、写真': '✂️ Văn phòng phẩm', 'ドラッグストア、薬局': '💊 Nhà thuốc',
            'ガソリンスタンド、燃料': '⛽ Trạm xăng', 'その他': '📦 Khác'
        };

        let allData = [], filteredData = [], mapMarkers = [];
        let currentPage = 1, ITEMS_PER_PAGE = 20, userLocation = null;

        const getCache = (k) => JSON.parse(localStorage.getItem(k));
        const setCache = (k, v) => localStorage.setItem(k, JSON.stringify(v));
        let recentStores = getCache('recentStores_v6') || [];

        // --- BẢN ĐỒ HYBRID ---
        const streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' });

        let map = L.map('map', { zoomControl: false, layers: [streetLayer] }).setView([35.6895, 139.6917], 5);
        L.control.layers({ "<i class='fa-solid fa-map mr-1'></i> Bản đồ": streetLayer, "<i class='fa-solid fa-satellite mr-1'></i> Vệ tinh": satelliteLayer }, null, { position: 'topright' }).addTo(map);
        
        // Tùy chỉnh vị trí nút Zoom lên xíu để không che mất GPS trên Mobile
        L.control.zoom({ position: 'topleft' }).addTo(map);

        const defaultIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="bg-slate-500 w-3.5 h-3.5 rounded-full border-2 border-white shadow-sm"></div>`, iconSize: [14, 14], iconAnchor: [7, 7]});
        const activeIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="bg-blue-600 w-5 h-5 rounded-full border-2 border-white shadow-[0_0_15px_rgba(37,99,235,0.6)]"></div>`, iconSize: [20, 20], iconAnchor: [10, 10]});

        const resultsList = document.getElementById('resultsList');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const sortSelect = document.getElementById('sortSelect');
        const gpsBtn = document.getElementById('gpsBtn');

        // --- DỊCH & GEOCODE ---
        async function translate(text) {
            if(!text) return "";
            const ck = `en_v6_${text}`;
            if(getCache(ck)) return getCache(ck);
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ja|en`);
                const d = await res.json();
                setCache(ck, d.responseData.translatedText);
                return d.responseData.translatedText;
            } catch(e) { return text; }
        }

        async function geocode(addr) {
            const ck = `geo_v6_${addr}`;
            if(getCache(ck)) return getCache(ck);
            try {
                const res = await fetch(`https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(addr.replace(/株式会社|有限会社/g, ''))}`);
                const d = await res.json();
                if(d?.length) {
                    const c = { lat: d[0].geometry.coordinates[1], lng: d[0].geometry.coordinates[0] };
                    setCache(ck, c); return c;
                }
            } catch(e) {} return null;
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295;
            const a = 0.5 - Math.cos((lat2 - lat1) * p)/2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)); 
        }

        // --- RENDER MAP ---
        function renderMap() {
            mapMarkers.forEach(m => map.removeLayer(m.marker));
            mapMarkers = [];
            if(userLocation) {
                L.marker([userLocation.lat, userLocation.lng], {
                    icon: L.divIcon({className: 'user-pos', html: '<div class="relative"><div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-md relative z-10"></div><div class="w-10 h-10 bg-blue-500/30 rounded-full animate-ping absolute -top-3 -left-3 z-0"></div></div>'})
                }).addTo(map);
            }
            
            recentStores.forEach(s => {
                let m = L.marker([s.lat, s.lng], {icon: defaultIcon}).addTo(map)
                         .bindPopup(`<div class="font-sans"><b>${s.name}</b><br><span class="text-xs text-gray-500">${s.address}</span></div>`);
                mapMarkers.push({ id: s.id, marker: m });
            });

            if(mapMarkers.length > 0) {
                let g = new L.featureGroup(mapMarkers.map(m => m.marker));
                if(userLocation) g.addLayer(L.marker([userLocation.lat, userLocation.lng]));
                map.fitBounds(g.getBounds().pad(0.15), { maxZoom: 16 });
            }
        }

        // --- CLICK CARD ---
        async function onCardClick(item, el) {
            el.classList.add('ring-2', 'ring-blue-500', 'bg-blue-50');
            let coords = (item.lat && item.lng) ? {lat: item.lat, lng: item.lng} : await geocode(item.address);
            if(!coords) {
                alert("Tạm thời không định vị được điểm này.");
                el.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-50');
                return;
            }

            recentStores = recentStores.filter(s => s.id !== item.id);
            recentStores.unshift({ id: item.id, name: item.store_name, address: item.address, ...coords });
            if(recentStores.length > 30) recentStores.pop();
            setCache('recentStores_v6', recentStores);

            renderMap();
            let mObj = mapMarkers.find(m => m.id === item.id);
            if(mObj) {
                mObj.marker.setIcon(activeIcon).setZIndexOffset(1000).openPopup();
                // Bay đến map nhưng chếch lên một chút để BottomSheet không che khuất (Mobile UX)
                const isMobile = window.innerWidth < 768;
                const offsetLat = isMobile ? coords.lat - 0.003 : coords.lat; 
                map.flyTo([offsetLat, coords.lng], 16, {duration: 1.2});
            }
            document.querySelectorAll('#resultsList > div').forEach(c => { if(c !== el) c.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-50')});
        }

        // --- TẠO CARD (Thiết kế mới) ---
        function createCard(item) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-[20px] shadow-sm border border-gray-100/80 hover:shadow-md cursor-pointer transition-all animate-fade-up relative overflow-hidden";
            const catLabel = VI_CATEGORIES[item.store_type_name] || item.store_type_name || 'Khác';
            
            let webBtn = item.website_url ? `<a href="${item.website_url}" target="_blank" class="flex-1 flex justify-center items-center gap-1.5 py-2 bg-gray-50 hover:bg-blue-50 text-blue-600 rounded-xl text-[13px] font-semibold transition-colors"><i class="fa-solid fa-globe"></i> Web</a>` : '';
            let mapBtn = item.google_map_url ? `<a href="${item.google_map_url}" target="_blank" class="flex-1 flex justify-center items-center gap-1.5 py-2 bg-gray-50 hover:bg-emerald-50 text-emerald-600 rounded-xl text-[13px] font-semibold transition-colors"><i class="fa-solid fa-diamond-turn-right"></i> Đường đi</a>` : '';

            let distanceBadge = (item.distance && item.distance !== Infinity) ? 
                `<span class="px-2 py-1 bg-blue-100/50 text-blue-700 rounded text-[10px] font-bold"><i class="fa-solid fa-location-arrow mr-1"></i>${item.distance.toFixed(1)} km</span>` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start gap-3">
                    <div class="flex-1">
                        <div class="flex flex-wrap gap-2 items-center mb-1.5">
                            <span class="text-[10px] font-bold px-2 py-0.5 bg-gray-100 text-gray-600 rounded-md">${catLabel}</span>
                            ${distanceBadge}
                        </div>
                        <h2 class="text-base font-bold text-gray-900 leading-tight">${item.store_name}</h2>
                        <p class="en-name text-xs text-gray-400 font-medium mt-1 skeleton-text w-3/4">Translating name...</p>
                    </div>
                </div>
                
                <div class="mt-3.5 space-y-2 text-[13px] text-gray-600">
                    <div class="flex items-start gap-2.5">
                        <i class="fa-solid fa-location-dot mt-0.5 text-gray-400 text-sm"></i>
                        <div class="leading-snug">
                            <span class="font-medium text-gray-700">${item.address}</span>
                            <div class="en-address text-[11px] text-gray-400 mt-1 skeleton-text w-5/6">Translating address...</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <i class="fa-solid fa-phone text-gray-400 text-sm"></i>
                        <span class="font-medium tracking-wide text-gray-700">${item.phone_number || '---'}</span>
                    </div>
                </div>
                
                ${(webBtn || mapBtn) ? `<div class="mt-4 flex gap-3 z-20 relative">${webBtn}${mapBtn}</div>` : ''}
            `;

            translate(item.store_name).then(t => { 
                const el = card.querySelector('.en-name'); el.innerHTML = t; el.classList.remove('skeleton-text'); el.classList.add('text-blue-500');
            });
            translate(item.address).then(t => { 
                const el = card.querySelector('.en-address'); el.innerHTML = t; el.classList.remove('skeleton-text');
            });
            
            card.onclick = (e) => { if(!e.target.closest('a')) onCardClick(item, card); };
            return card;
        }

        // --- LOGIC LỌC & TÍNH KHOẢNG CÁCH ---
        function apply() {
            const term = searchInput.value.toLowerCase();
            const cat = categorySelect.value;
            const sort = sortSelect.value;

            let res = allData.filter(i => {
                const enName = getCache(`en_v6_${i.store_name}`) || "";
                const enAddr = getCache(`en_v6_${i.address}`) || "";
                return (i.store_name.toLowerCase().includes(term) || i.address.toLowerCase().includes(term) || enName.toLowerCase().includes(term) || enAddr.toLowerCase().includes(term) || (i.phone_number||'').includes(term)) 
                        && (cat === 'all' || i.store_type_name === cat);
            });

            if(sort === 'distance' && userLocation) {
                res.forEach(item => {
                    let cachedGeo = getCache(`geo_v6_${item.address}`);
                    let lat = item.lat || (cachedGeo ? cachedGeo.lat : null);
                    let lng = item.lng || (cachedGeo ? cachedGeo.lng : null);
                    item.distance = (lat && lng) ? calcDist(userLocation.lat, userLocation.lng, lat, lng) : Infinity;
                });
                res.sort((a,b) => a.distance - b.distance);
            } else {
                res.forEach(item => item.distance = undefined);
                if(sort === 'name') res.sort((a,b) => a.store_name.localeCompare(b.store_name, 'ja'));
            }

            filteredData = res; resultsList.innerHTML = ''; currentPage = 1;
            document.getElementById('resultCount').innerHTML = `Hiển thị <b>${res.length}</b> kết quả`;
            loadMore();
        }

        function loadMore() {
            const chunk = filteredData.slice((currentPage-1)*ITEMS_PER_PAGE, currentPage*ITEMS_PER_PAGE);
            if(!chunk.length) return document.getElementById('scrollSentinel').classList.add('hidden');
            chunk.forEach(i => resultsList.appendChild(createCard(i)));
            currentPage++;
            document.getElementById('scrollSentinel').classList.toggle('hidden', (currentPage-1)*ITEMS_PER_PAGE >= filteredData.length);
        }

        // --- ĐỊNH VỊ GPS ---
        gpsBtn.onclick = () => {
            const icon = gpsBtn.querySelector('i');
            icon.className = 'fa-solid fa-spinner fa-spin';
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                icon.className = 'fa-solid fa-location-crosshairs';
                sortSelect.value = 'distance'; apply(); renderMap();
                map.flyTo([userLocation.lat, userLocation.lng], 14, {duration: 1.2});
            }, () => {
                alert("Hãy bật quyền GPS."); icon.className = 'fa-solid fa-location-crosshairs';
            });
        };

        searchInput.oninput = () => { clearTimeout(this.t); this.t = setTimeout(apply, 300); };
        categorySelect.onchange = apply;
        sortSelect.onchange = apply;

        new IntersectionObserver(e => { if(e[0].isIntersecting) loadMore(); }, {root: resultsList}).observe(document.getElementById('scrollSentinel'));

        async function init() {
            try {
                const r = await fetch('./data.json');
                allData = await r.json();
                Object.keys(VI_CATEGORIES).forEach(k => {
                    let o = document.createElement('option'); o.value = k; o.textContent = VI_CATEGORIES[k].split(' (')[0];
                    categorySelect.appendChild(o);
                });
                [searchInput, categorySelect, sortSelect].forEach(i => i.disabled = false);
                apply(); renderMap();
            } catch(e) { document.getElementById('resultCount').textContent = "Lỗi kết nối dữ liệu."; }
        }
        init();
    </script>
</body>
</html>
