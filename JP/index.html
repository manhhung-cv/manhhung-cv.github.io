                                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-5 border-b border-slate-700/50 pb-4 gap-3 relative z-10">
                                    <div class="flex items-center gap-2">
                                        <div class="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-400 shrink-0 border border-rose-500/30">
                                            <i class="fa-solid fa-triangle-exclamation text-xs animate-pulse"></i>
                                        </div>
                                        <span class="text-sm font-bold text-white uppercase tracking-wider">Báo cáo Địa chấn & Thiên tai</span>
                                    </div>
                                    <span class="text-[10px] font-black px-3 py-1.5 rounded-lg border ${getRiskBadge(p.disaster.level)} inline-block text-center whitespace-nowrap shadow-md uppercase tracking-widest">
                                        RỦI RO: ${p.disaster.level}
                                    </span>
                                </div>
                                
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 relative z-10">
                                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 hover:bg-slate-800 transition-colors shadow-inner">
                                        <div class="flex items-center gap-1.5 text-[10px] text-rose-400 font-bold uppercase tracking-widest mb-2">
                                            <i class="fa-solid fa-radar"></i> Dự báo & Cảnh báo (Tương lai)
                                        </div>
                                        <div class="text-sm text-slate-200 font-medium leading-relaxed">${p.disaster.prediction}</div>
                                    </div>
                                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 hover:bg-slate-800 transition-colors shadow-inner">
                                        <div class="flex items-center gap-1.5 text-[10px] text-amber-400 font-bold uppercase tracking-widest mb-2">
                                            <i class="fa-solid fa-clock-rotate-left"></i> Lịch sử nổi bật (Đã qua)
                                        </div>
                                        <div class="text-sm text-slate-300 leading-relaxed">${p.disaster.history}</div>
                                    </div>
                                </div>

                                <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800 flex flex-col sm:flex-row gap-5 items-start sm:items-center relative z-10 shadow-inner">
                                     <div class="flex-1">
                                         <div class="flex items-center gap-1.5 text-[10px] text-indigo-400 font-bold uppercase tracking-widest mb-1.5">
                                             <i class="fa-solid fa-circle-info"></i> Đặc thù rủi ro địa phương
                                         </div>
                                         <div class="text-sm text-slate-400 leading-relaxed">${p.disaster.detail}</div>
                                     </div>
                                     <div class="bg-indigo-500/10 text-indigo-300 text-[10px] uppercase tracking-wider font-bold px-3.5 py-2.5 rounded-xl border border-indigo-500/30 shrink-0 flex items-center gap-2">
                                        <i class="fa-solid fa-shield-halved text-indigo-400"></i> An ninh: ${p.safety.text}
                                     </div>
                                </div>
                            </div>

                            <!-- Box 7: ĐIỂM ĐẾN & ĐẶC SẢN (Highlights Đã làm nổi bật) -->
                            <div class="col-span-2 bg-gradient-to-br from-amber-100 to-orange-50 p-5 sm:p-6 rounded-3xl border border-amber-200 shadow-sm relative overflow-hidden mt-2">
                                <i class="fa-solid fa-crown absolute -right-4 -bottom-4 text-[120px] text-amber-500/10 rotate-12"></i>
                                
                                <div class="flex items-center gap-2.5 mb-4 relative z-10">
                                    <div class="w-9 h-9 rounded-full bg-amber-500 flex items-center justify-center text-white shrink-0 shadow-md">
                                        <i class="fa-solid fa-star text-sm"></i>
                                    </div>
                                    <div>
                                        <h3 class="text-sm font-black text-amber-900 uppercase tracking-widest leading-none mb-1">Đặc Sản & Địa Danh</h3>
                                        <p class="text-[10px] font-bold text-amber-700/80 uppercase">Những biểu tượng làm nên tên tuổi của ${p.name}</p>
                                    </div>
                                </div>
                                
                                <div class="flex gap-2.5 flex-wrap relative z-10 pt-2">
                                    ${p.highlights.map(hlt => `
                                        <div class="bg-white/80 backdrop-blur-sm border border-amber-300/60 text-amber-900 text-sm font-bold px-4 py-2.5 rounded-2xl shadow-sm flex items-center gap-2 hover:bg-amber-50 transition-colors cursor-default">
                                            <i class="fa-solid fa-circle-check text-amber-500"></i> ${hlt}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Box 8: Các tỉnh giáp ranh -->
                            <div class="col-span-2 mt-4">
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">Tỉnh giáp ranh (${p.neighbors.length})</div>
                                ${neighborsHTML}
                            </div>

                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize Application
        renderApp();

    </script>
</body>
</html>
