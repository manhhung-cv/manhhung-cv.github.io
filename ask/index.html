<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hỏi Đáp - Messenger Flow Luxury</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        /* PREMIUM LUXURY COLOR SYSTEM */
        :root {
            --theme-gold: #D4AF37;
            --theme-gold-hover: #C5A017;
        }

        /* PURE BLACK / AMOLED */
        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #111111;
            --border-color: #222222;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --bubble-system: #1A1A1A;
            --nav-bg: rgba(0, 0, 0, 0.85);
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }

        /* PURE WHITE */
        [data-theme="light"] {
            --bg-color: #FFFFFF;
            --surface-color: #F7F7F7;
            --border-color: #E5E5E5;
            --text-primary: #000000;
            --text-secondary: #666666;
            --bubble-system: #F0F0F0;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
            animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #feedTabBtn {
            -webkit-touch-callout: none;
            user-select: none;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ms: {
                            bg: 'var(--bg-color)',
                            surface: 'var(--surface-color)',
                            border: 'var(--border-color)',
                            gold: 'var(--theme-gold)',
                            goldHover: 'var(--theme-gold-hover)',
                            textPrimary: 'var(--text-primary)',
                            textSecondary: 'var(--text-secondary)',
                            bubbleSys: 'var(--bubble-system)',
                            nav: 'var(--nav-bg)'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="selection:bg-ms-gold selection:text-black">

    <div class="app-container">
        <header
            class="w-full md:w-[calc(100%-80px)] md:absolute md:right-0 z-40 px-5 py-4 flex justify-between items-center border-b border-ms-border backdrop-blur-xl bg-ms-nav">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full border border-ms-gold flex items-center justify-center text-ms-gold shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                    <i class="fa-solid fa-bolt text-sm"></i>
                </div>
                <div class="text-[15px] font-semibold text-ms-textPrimary tracking-wide">Hunq FAQ</div>
            </div>
            <button id="themeToggleBtn" onclick="cycleThemeMode()"
                class="w-8 h-8 rounded-full bg-ms-surface flex items-center justify-center text-ms-textSecondary hover:text-ms-gold transition-colors">
                <i class="fa-solid fa-circle-half-stroke text-sm"></i>
            </button>
        </header>

        <nav
            class="w-full fixed bottom-0 left-0 z-50 md:w-[80px] md:h-full md:top-0 md:relative backdrop-blur-xl border-t md:border-t-0 md:border-r border-ms-border pb-safe transition-colors bg-ms-nav">
            <div
                class="flex md:flex-col justify-around md:justify-start md:pt-24 items-center h-[60px] md:h-full md:gap-8 px-2 md:px-0">
                <button onclick="switchTab('submit', 0)"
                    class="nav-btn w-full md:w-auto flex flex-col items-center gap-1 text-ms-gold transition-colors p-2">
                    <i class="fa-solid fa-comment-dots text-[20px]"></i>
                    <span class="text-[9px] font-medium tracking-wide">Nhắn tin</span>
                </button>
                <button id="feedTabBtn"
                    class="nav-btn w-full md:w-auto flex flex-col items-center gap-1 text-ms-textSecondary hover:text-ms-textPrimary transition-colors p-2 relative">
                    <i class="fa-solid fa-layer-group text-[20px]"></i>
                    <span class="text-[9px] font-medium tracking-wide">Bảng tin</span>
                </button>
            </div>
        </nav>

        <main class="main-content pb-[60px] ">

            <section id="content-submit"
                class="tab-content active w-full h-full max-w-3xl mx-auto border-x border-ms-border bg-ms-bg relative">

                <div id="chatHistory" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 scroll-smooth pb-6">
                </div>

                <div
                    class="bg-ms-surface border-t border-ms-border p-3 w-full flex items-end gap-2.5 z-10 relative shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">

                    <button onclick="resetChatFlow()"
                        class="w-[46px] h-[46px] mb-0.5 flex-shrink-0 flex items-center justify-center bg-ms-bg border border-ms-border rounded-full text-ms-textSecondary hover:text-ms-gold hover:border-ms-gold transition-all active:scale-95 shadow-sm"
                        title="Đặt lại từ đầu">
                        <i class="fa-solid fa-rotate-right text-[18px]"></i>
                    </button>

                    <div id="chatInputArea" class="flex-1 min-w-0">

                        <div id="inputStateName" class="flex items-center gap-2.5 transition-all w-full">
                            <div
                                class="flex-1 bg-ms-bg border border-ms-border rounded-full flex items-center px-4 focus-within:border-ms-gold transition-colors h-[46px]">
                                <input type="text" id="nameInput"
                                    class="w-full bg-transparent outline-none text-[15px] text-ms-textPrimary placeholder:text-ms-textSecondary"
                                    placeholder="Nhập tên của bạn..."
                                    onkeydown="if(event.key==='Enter') submitName(this.value, false)">
                            </div>
                            <button onclick="submitName(document.getElementById('nameInput').value, false)"
                                class="w-[46px] h-[46px] flex-shrink-0 flex items-center justify-center text-ms-gold bg-ms-bg border border-ms-border rounded-full hover:opacity-80 transition-opacity active:scale-90 shadow-sm">
                                <i class="fa-solid fa-paper-plane text-[18px]"></i>
                            </button>
                        </div>

                        <div id="inputStateCaptcha"
                            class="hidden flex justify-center transition-all origin-left w-full pb-1">
                            <div class="scale-[0.85] md:scale-100 origin-bottom">
                                <div class="g-recaptcha" data-sitekey="6Lfq0YQsAAAAAGwargZMaws6m9oLYXAR6BHF50O2"
                                    data-theme="dark" data-callback="onCaptchaVerified"></div>
                            </div>
                        </div>

                        <div id="inputStateMsg" class="hidden flex items-end gap-2.5 transition-all">
                            <div
                                class="flex-1 bg-ms-bg border border-ms-border rounded-[23px] flex items-end px-4 focus-within:border-ms-gold transition-colors min-h-[46px]">
                                <textarea id="msgInput" rows="1"
                                    class="w-full bg-transparent outline-none text-[16px] text-ms-textPrimary resize-none max-h-32 py-3 placeholder:text-ms-textSecondary leading-relaxed"
                                    placeholder="Nhập thông điệp..."
                                    oninput="this.style.height='';this.style.height=this.scrollHeight+'px';"></textarea>
                            </div>
                            <button onclick="submitFinalMessage()" id="btnSendFinal"
                                class="w-[46px] h-[46px] mb-0.5 flex-shrink-0 flex items-center justify-center bg-ms-gold text-black rounded-full hover:opacity-90 transition-opacity disabled:opacity-50 active:scale-90 shadow-md">
                                <i class="fa-solid fa-arrow-up text-[18px]"></i>
                            </button>
                        </div>

                        <div id="inputStateDone" class="hidden flex justify-center transition-all">
                            <div
                                class="w-full h-[46px] rounded-2xl border border-ms-gold/50 bg-ms-gold/10 text-ms-gold flex items-center justify-center font-semibold text-[14px]">
                                <i class="fa-solid fa-circle-check mr-2"></i> Thông điệp đã được gửi!
                            </div>
                        </div>

                    </div>
                </div>
            </section>

            <section id="content-feed"
                class="tab-content w-full h-full max-w-3xl mx-auto border-x border-ms-border bg-ms-bg">
                <div
                    class="p-4 border-b border-ms-border bg-ms-nav backdrop-blur-md sticky top-0 z-10 flex flex-col gap-4">
                    <div
                        class="bg-ms-surface border border-ms-border rounded-full flex items-center gap-3 px-4 py-2.5 focus-within:border-ms-gold transition-colors shadow-sm">
                        <i class="fa-solid fa-magnifying-glass text-ms-textSecondary"></i>
                        <input type="text" id="searchInput" placeholder="Nhập mã tuyệt mật (5 ký tự)..." maxlength="5"
                            class="bg-transparent border-none outline-none text-[15px] text-ms-textPrimary uppercase placeholder:normal-case flex-1 tracking-widest font-medium placeholder:tracking-normal">
                        <button onclick="searchPrivateMsg()"
                            class="text-ms-gold font-semibold text-[14px] hover:opacity-80 transition-opacity">Tìm</button>
                    </div>
                    <div id="localHistoryContainer" class="hidden px-2"></div>
                </div>
                <div id="qnaFeed" class="flex-1 overflow-y-auto p-4 flex flex-col gap-6"></div>
            </section>

            <section id="content-admin" class="tab-content p-0 w-full h-full overflow-hidden">
                <div id="adminLoginSection" class="flex-1 flex flex-col items-center justify-center px-4 bg-ms-surface">
                    <div
                        class="w-full max-w-sm bg-ms-card border border-ms-border p-8 rounded-3xl shadow-2xl text-center">
                        <i class="fa-solid fa-fingerprint text-5xl text-ms-gold mb-6"></i>
                        <h2 class="text-xl font-bold text-ms-textPrimary mb-8 tracking-wide uppercase">System Admin</h2>
                        <div class="space-y-4 mb-8">
                            <input type="email" id="adminEmail" placeholder="ID Quản trị"
                                class="w-full bg-ms-surface border border-ms-border rounded-xl px-4 py-3.5 text-[15px] text-center focus:border-ms-gold outline-none transition-colors">
                            <input type="password" id="adminPwd" placeholder="Mật mã"
                                class="w-full bg-ms-surface border border-ms-border rounded-xl px-4 py-3.5 text-[15px] text-center focus:border-ms-gold outline-none transition-colors">
                        </div>
                        <button onclick="adminLogin()" id="btnLogin"
                            class="w-full bg-ms-gold text-black font-bold text-[15px] py-3.5 rounded-xl hover:opacity-90 transition-opacity active:scale-95 shadow-md">XÁC
                            THỰC</button>
                    </div>
                </div>

                <div id="adminDashboardSection" class="hidden w-full h-full flex flex-col md:flex-row bg-ms-bg">
                    <div class="w-full md:w-[350px] h-full flex flex-col border-r border-ms-border bg-ms-surface">
                        <div
                            class="p-4 border-b border-ms-border flex justify-between items-center sticky top-0 bg-ms-card z-10">
                            <h2 class="text-[18px] font-bold text-ms-textPrimary">Hộp thư quản trị</h2>
                            <div class="flex gap-2">
                                <button onclick="document.getElementById('filterOptions').classList.toggle('hidden')"
                                    class="w-9 h-9 rounded-full bg-ms-surface border border-ms-border flex items-center justify-center text-ms-textPrimary hover:text-ms-gold"><i
                                        class="fa-solid fa-sliders text-sm"></i></button>
                                <button onclick="adminLogout()"
                                    class="w-9 h-9 rounded-full bg-ms-surface border border-ms-border flex items-center justify-center text-rose-500 hover:bg-rose-500/10"><i
                                        class="fa-solid fa-right-from-bracket text-sm"></i></button>
                            </div>
                        </div>
                        <div id="filterOptions"
                            class="hidden p-3 border-b border-ms-border bg-ms-card flex flex-col gap-3 shadow-inner">
                            <div class="flex gap-3">
                                <select id="filterStatus" onchange="applyFilters()"
                                    class="bg-ms-surface text-[13px] font-medium border border-ms-border rounded-xl px-3 py-2 flex-1 text-ms-textPrimary outline-none focus:border-ms-gold transition-colors">
                                    <option value="pending">Mới nhất</option>
                                    <option value="answered">Đã duyệt</option>
                                    <option value="all">Tất cả trạng thái</option>
                                </select>
                                <select id="filterAnon" onchange="applyFilters()"
                                    class="bg-ms-surface text-[13px] font-medium border border-ms-border rounded-xl px-3 py-2 flex-1 text-ms-textPrimary outline-none focus:border-ms-gold transition-colors">
                                    <option value="all">Mọi đối tượng</option>
                                    <option value="anon">Chỉ Ẩn danh</option>
                                </select>
                            </div>

                            <div
                                class="bg-ms-surface border border-ms-border rounded-xl flex items-center px-3 py-2 focus-within:border-ms-gold transition-colors">
                                <i class="fa-solid fa-magnifying-glass text-ms-textSecondary text-[13px] mr-2"></i>
                                <input type="text" id="adminSearchInput" oninput="applyFilters()"
                                    placeholder="Tìm theo tên, nội dung, mã tra cứu..."
                                    class="bg-transparent border-none outline-none text-[13px] text-ms-textPrimary flex-1 placeholder:text-ms-textSecondary">
                            </div>
                        </div>

                        <div id="bulkActionBar"
                            class="hidden p-3 border-b border-ms-border bg-ms-gold/10 flex justify-between items-center transition-all">
                            <div class="flex items-center gap-3 pl-2">
                                <input type="checkbox" id="selectAllCheckbox" onchange="toggleAllCheckboxes()"
                                    class="w-4 h-4 rounded border-ms-border text-ms-gold focus:ring-ms-gold bg-ms-surface cursor-pointer accent-ms-gold">
                                <span class="text-[13px] font-bold text-ms-gold" id="selectedCountText">0 mục</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="bulkExportImages()"
                                    class="w-8 h-8 rounded-full bg-ms-surface text-ms-gold border border-ms-gold hover:opacity-80 flex items-center justify-center transition-opacity shadow-sm"
                                    title="Tải xuống tất cả">
                                    <i class="fa-solid fa-download text-sm"></i>
                                </button>
                                <button onclick="confirmBulkDelete()"
                                    class="w-8 h-8 rounded-full bg-ms-surface text-rose-500 border border-rose-500 hover:opacity-80 flex items-center justify-center transition-opacity shadow-sm"
                                    title="Xóa tất cả">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <div id="adminInbox" class="flex-1 overflow-y-auto"></div>
                    </div>

                    <div id="adminDetailPanel"
                        class="w-full md:flex-1 h-full hidden md:flex flex-col bg-ms-bg absolute md:relative z-20">
                        <div id="emptyMessageState"
                            class="flex-1 flex flex-col items-center justify-center text-ms-textSecondary">
                            <div
                                class="w-24 h-24 rounded-full bg-ms-surface border border-ms-border flex items-center justify-center mb-6">
                                <i class="fa-brands fa-space-awesome text-4xl opacity-50"></i>
                            </div>
                            <p class="text-[15px] font-medium tracking-wide">Chọn một phiên liên lạc</p>
                        </div>

                        <div id="activeMessage" class="hidden flex-1 flex flex-col h-full">
                            <div
                                class="p-4 border-b border-ms-border flex justify-between items-center bg-ms-card sticky top-0 z-10 shadow-sm">
                                <div class="flex items-center gap-3">
                                    <button onclick="closeMobileDetail()"
                                        class="md:hidden w-8 h-8 flex items-center justify-center text-ms-textPrimary"><i
                                            class="fa-solid fa-arrow-left"></i></button>
                                    <div
                                        class="w-11 h-11 rounded-full bg-ms-surface border border-ms-border flex items-center justify-center text-ms-textSecondary">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <div>
                                        <h3 id="adminMsgAuthor"
                                            class="text-[16px] font-semibold text-ms-textPrimary tracking-tight"></h3>
                                        <div class="flex items-center gap-2 mt-0.5">
                                            <div id="adminMsgStatusDot"
                                                class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_currentColor]">
                                            </div>
                                            <p id="adminMsgStatusText"
                                                class="text-[12px] font-medium text-ms-textSecondary"></p>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="confirmDelete()"
                                        class="w-9 h-9 rounded-full bg-ms-surface text-rose-500 flex items-center justify-center hover:bg-rose-500/10"
                                        title="Xóa"><i class="fa-solid fa-trash text-sm"></i></button>
                                    <button onclick="exportImage('square')"
                                        class="w-9 h-9 rounded-full bg-ms-surface text-ms-gold flex items-center justify-center hover:border border-ms-gold"
                                        title="Xuất ảnh"><i class="fa-solid fa-download text-sm"></i></button>
                                </div>
                            </div>

                            <div class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-5 bg-ms-bg">
                                <div class="text-center text-[11px] text-ms-textSecondary uppercase tracking-widest font-semibold my-2 bg-ms-surface px-4 py-1 rounded-full mx-auto border border-ms-border"
                                    id="adminMsgTime"></div>

                                <div class="flex items-end gap-3">
                                    <div
                                        class="w-9 h-9 rounded-full bg-ms-surface border border-ms-border flex items-center justify-center flex-shrink-0 text-ms-textSecondary text-[13px]">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <div
                                        class="bg-ms-surface border border-ms-border px-5 py-3.5 rounded-2xl rounded-bl-sm text-[16px] text-ms-textPrimary max-w-[80%] break-words leading-relaxed shadow-sm">
                                        <p id="adminMsgContent"></p>
                                    </div>
                                </div>

                                <div id="adminPrevReplyBox" class="hidden flex items-end justify-end gap-3">
                                    <div
                                        class="bg-ms-gold text-black px-5 py-3.5 rounded-2xl rounded-br-sm text-[16px] font-medium max-w-[80%] break-words leading-relaxed shadow-md">
                                        <p id="adminPrevReplyText"></p>
                                    </div>
                                    <div
                                        class="w-9 h-9 rounded-full bg-ms-surface border border-ms-gold flex items-center justify-center flex-shrink-0 text-ms-gold text-[13px]">
                                        <i class="fa-solid fa-bolt"></i>
                                    </div>
                                </div>
                            </div>

                            <div
                                class="p-4 border-t border-ms-border bg-ms-surface flex flex-col gap-3 shadow-[0_-5px_15px_rgba(0,0,0,0.3)]">
                                <div class="px-2 flex justify-between items-center text-[12px] font-medium">
                                    <span id="adminMetaSecurity" class="text-ms-gold tracking-widest uppercase"></span>
                                    <span id="adminMetaIP" class="text-ms-textSecondary font-mono"></span>
                                </div>
                                <div
                                    class="flex items-end gap-3 bg-ms-bg border border-ms-border rounded-3xl px-5 py-2 focus-within:border-ms-gold transition-colors">
                                    <textarea id="adminReplyInput" rows="1"
                                        class="flex-1 bg-transparent outline-none text-[16px] text-ms-textPrimary resize-none max-h-32 py-2.5 placeholder:text-ms-textSecondary leading-relaxed"
                                        placeholder="Soạn phản hồi cho người dùng này..."
                                        oninput="this.style.height='';this.style.height=this.scrollHeight+'px';"></textarea>
                                    <button onclick="submitReply()"
                                        class="w-11 h-11 bg-ms-gold text-black rounded-full flex items-center justify-center flex-shrink-0 hover:opacity-90 active:scale-90 transition-all shadow-md mb-0.5">
                                        <i class="fa-solid fa-paper-plane text-lg"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="customModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 backdrop-blur-sm transition-opacity duration-300 opacity-0"
            style="background-color: var(--modal-overlay);" id="modalBackdrop"></div>
        <div class="w-full max-w-sm bg-ms-surface border border-ms-border rounded-3xl flex flex-col text-center transform scale-95 opacity-0 transition-all duration-300 z-10 shadow-2xl overflow-hidden"
            id="modalContentBox">
            <div class="p-8">
                <div id="modalIconContainer" class="text-5xl mb-5 text-ms-gold"><i class="fa-solid fa-circle-info"></i>
                </div>
                <h3 id="modalTitle" class="text-[18px] font-bold text-ms-textPrimary mb-2 tracking-tight"></h3>
                <p id="modalMessage" class="text-[14px] text-ms-textSecondary leading-relaxed"></p>

                <div id="modalTrackingBox"
                    class="hidden mt-6 bg-ms-bg border border-ms-border rounded-2xl p-4 flex justify-between items-center shadow-inner">
                    <span id="modalTrackingCode"
                        class="text-[20px] font-mono font-bold tracking-widest text-ms-textPrimary pl-2 select-all"></span>
                    <button onclick="copyTrackingCode()"
                        class="bg-ms-gold text-black px-4 py-2 rounded-xl text-[13px] font-bold active:scale-95 transition-all shadow-md">Copy</button>
                </div>
            </div>
            <div class="flex border-t border-ms-border bg-ms-card" id="modalButtons">
                <button onclick="closeModal()" id="modalBtnCancel"
                    class="hidden flex-1 py-4 text-[15px] font-semibold text-ms-textSecondary border-r border-ms-border hover:bg-ms-surface transition-colors">Hủy
                    bỏ</button>
                <button id="modalBtnPrimary"
                    class="flex-1 py-4 text-[15px] font-bold text-ms-textPrimary hover:bg-ms-surface transition-colors"></button>
            </div>
        </div>
    </div>

    <div id="canvas-template-container" style="position: absolute; left: -9999px; top: 0;">
        <div id="canvas-template"
            style="width: 1080px; height: 1080px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; position: relative; font-family: 'Inter', sans-serif;">
            <div id="canvas-inner-box"

        // XSS SANITIZATION

            if (!str) return '';

        const firebaseConfig = {

        // --- THEME LOGIC ---

        function applyCurrentTheme() {
            localStorage.setItem('askSystemThemeMode', currentThemeMode);
            document.querySelector('#themeToggleBtn i').className = `fa-solid ${themeIconMap[currentThemeMode]} text-sm`;
            if (currentThemeMode === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', currentThemeMode);
            }
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (currentThemeMode === 'system') applyCurrentTheme(); });
        applyCurrentTheme();

        // --- MODAL LÕI ---
        const modal = document.getElementById('customModal');
        const modalBox = document.getElementById('modalContentBox');
        const modalBackdrop = document.getElementById('modalBackdrop');

        window.showModal = function ({ title, message, trackingCode = null, isConfirm = false, onConfirm = null, type = 'info' }) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;

            const btnPrimary = document.getElementById('modalBtnPrimary');
            const btnCancel = document.getElementById('modalBtnCancel');
            const trackBox = document.getElementById('modalTrackingBox');
            const icon = document.getElementById('modalIconContainer');
            modalConfirmCallback = onConfirm;

            if (type === 'error') { icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; icon.className = "text-5xl mb-5 text-rose-500"; }
            else if (type === 'success') { icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>'; icon.className = "text-5xl mb-5 text-ms-textPrimary"; }
            else { icon.innerHTML = '<i class="fa-solid fa-circle-info"></i>'; icon.className = "text-5xl mb-5 text-ms-gold"; }

            if (isConfirm) {
                btnCancel.classList.remove('hidden');
                btnPrimary.innerText = 'Xác nhận';
                if (type === 'error') btnPrimary.classList.add('text-rose-500'); else btnPrimary.classList.remove('text-rose-500');
                btnPrimary.onclick = () => { closeModal(); if (modalConfirmCallback) modalConfirmCallback(); };
            } else {
                btnCancel.classList.add('hidden');
                btnPrimary.innerText = 'Đóng';
                btnPrimary.classList.remove('text-rose-500');
                btnPrimary.onclick = closeModal;
            }

            if (trackingCode) {
                trackBox.classList.remove('hidden');
                document.getElementById('modalTrackingCode').innerText = trackingCode;
            } else {
                trackBox.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modalBackdrop.classList.remove('opacity-0');
            modalBox.classList.remove('opacity-0', 'scale-95');
        };

        window.closeModal = function () {
            modalBackdrop.classList.add('opacity-0');

        window.copyTrackingCode = function () {

        // --- LOCAL HISTORY MÃ BÍ MẬT ---

        function renderLocalHistory() {
            const container = document.getElementById('localHistoryContainer');
            if (!container) return;
            let history = JSON.parse(localStorage.getItem('askSystemHistory') || '[]');

            let html = '<div class="text-[11px] font-semibold uppercase tracking-widest text-ms-textSecondary mb-2 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> Mã bạn đã tạo gần đây:</div><div class="flex flex-wrap gap-2">';

        // --- NAVIGATION & LONG PRESS ---
        window.switchTab = function (tabId, index) {

                    btn.classList.replace('text-ms-gold', 'text-ms-textSecondary');

            if (tabId === 'feed') { loadPublicQnA(); renderLocalHistory(); }

        const feedBtn = document.getElementById('feedTabBtn');

        feedBtn.addEventListener('mouseleave', cancelPress);

        // --- TAB 1: LUỒNG CHATBOT (CẬP NHẬT QUICK REPLY & CAPTCHA) ---
        let chatFlowData = { name: '', isAnonymous: false, visibility: '', message: '' };

        function appendSystemBubble(htmlStr) {
            const chat = document.getElementById('chatHistory');
            chat.innerHTML += `
                <div class="flex items-end gap-3 animate-pop mt-3">
                    <div class="w-8 h-8 rounded-full border border-ms-gold flex items-center justify-center text-ms-gold flex-shrink-0 text-xs bg-ms-surface shadow-sm"><i class="fa-solid fa-bolt"></i></div>
                    <div class="bg-ms-surface border border-ms-border px-4 py-3 rounded-2xl rounded-bl-sm text-[15px] text-ms-textPrimary max-w-[85%] break-words leading-relaxed shadow-sm">

        function appendUserBubble(text) {
            const chat = document.getElementById('chatHistory');

                <div class="flex items-end justify-end gap-2 animate-pop mt-3">
                    <div class="bg-ms-gold text-black px-5 py-3 rounded-2xl rounded-br-sm text-[15px] font-medium max-w-[85%] break-words leading-relaxed shadow-md">

        function setInputState(state) {

        // INIT & RESET FLOW (BƯỚC 1)
        window.resetChatFlow = function () {
            chatFlowData = { name: '', isAnonymous: false, visibility: '', message: '' };
            document.getElementById('nameInput').value = '';

            document.getElementById('chatHistory').innerHTML = `
                <div class="text-center my-6">
                    <div class="w-20 h-20 mx-auto rounded-full border-2 border-ms-gold flex items-center justify-center text-ms-gold text-3xl mb-3 shadow-[0_0_20px_rgba(212,175,55,0.15)] bg-ms-surface">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-ms-textPrimary tracking-tight">Hunq FAQ</h2>

                        <div class="bg-ms-surface border border-ms-border px-4 py-3 rounded-2xl rounded-bl-sm text-[15px] text-ms-textPrimary max-w-[85%] break-words leading-relaxed shadow-sm">

                            <i class="fa-solid fa-mask"></i> Sử dụng Ẩn danh

            setInputState('name');

        // BƯỚC 2: Nhập tên xong -> Hiển thị chọn Công khai/Bí mật
        window.submitName = function (nameVal, isAnon) {
            nameVal = nameVal.trim();

            const qrName = document.getElementById('quickReplyName');

            appendUserBubble(chatFlowData.name);
            setInputState('none');

            setTimeout(() => {
                // Injected Quick Reply: Nút Công khai / Bí mật
                const chat = document.getElementById('chatHistory');

                            <div class="bg-ms-surface border border-ms-border px-4 py-3 rounded-2xl rounded-bl-sm text-[15px] text-ms-textPrimary max-w-[85%] break-words leading-relaxed shadow-sm">

        // BƯỚC 3: Chọn quyền riêng tư xong -> Hiển thị Captcha
        window.submitVis = function (visMode) {
            const qrVis = document.getElementById('quickReplyVis');
            if (qrVis) qrVis.style.display = 'none';

            chatFlowData.visibility = visMode;
            appendUserBubble(visMode === 'public' ? '🌍 Công khai' : '🔒 Bí mật');

            setTimeout(() => {
                appendSystemBubble(`Vui lòng xác minh bạn không phải là robot để tiếp tục.`);

        // BƯỚC 4: Captcha thành công -> Hiển thị khung nhập tin nhắn
        window.onCaptchaVerified = function () {
            setInputState('none');
            setTimeout(() => {
                appendSystemBubble(`Đã rõ! Mời bạn nhập nội dung thông điệp. (Hệ thống hỗ trợ tự động mở rộng khung chữ).`);
                setInputState('msg');
                document.getElementById('msgInput').focus();
            }, 600);
        };

        async function getClientMetadata() {
            // 1. Lấy IP
            let ip = "N/A";
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                ip = (await r.json()).ip;
            } catch (e) {
                console.warn("Không thể lấy IP");
            }

            // 2. Định danh trình duyệt
            const ua = navigator.userAgent;
            let browserName = "Unknown";
            if (ua.indexOf("Firefox") > -1) browserName = "Firefox";
            else if (ua.indexOf("SamsungBrowser") > -1) browserName = "Samsung Internet";
            else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) browserName = "Opera";
            else if (ua.indexOf("Edge") > -1 || ua.indexOf("Edg") > -1) browserName = "Edge";
            else if (ua.indexOf("Chrome") > -1) browserName = "Chrome";
            else if (ua.indexOf("Safari") > -1) browserName = "Safari";

            // 3. Phân loại thiết bị chi tiết
            let deviceType = "Unknown Device";

            // --- Nhóm Apple ---
            if (/iPhone/i.test(ua)) {
                deviceType = "iPhone";
            }
            // Phát hiện iPad (Bao gồm cả iPadOS mới dùng Safari mô phỏng Desktop)
            else if (/iPad/i.test(ua) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /MacIntel/.test(navigator.platform))) {
                deviceType = "iPad";
            }
            else if (/Macintosh|Mac OS X/i.test(ua)) {
                deviceType = "Mac (MacBook/iMac)";
            }

            // --- Nhóm Android ---
            else if (/Android/i.test(ua)) {
                // Android thường thêm chữ "Mobile" nếu là điện thoại, không có là máy tính bảng
                if (/Mobile/i.test(ua)) {
                    deviceType = "Android Phone";
                } else {
                    deviceType = "Android Tablet";
                }
            }

            // --- Nhóm Windows ---
            else if (/Windows/i.test(ua)) {
                if (/Touch/i.test(ua)) {
                    deviceType = "Windows (Touch/Tablet)";
                } else {
                    deviceType = "Windows (PC/Laptop)";
                }
            }

            // --- Nhóm Linux & Khác ---
            else if (/Linux/i.test(ua)) {
                deviceType = "Linux (PC/Laptop)";
            } else if (/CrOS/i.test(ua)) {
                deviceType = "Chromebook";
            }

            return {
                ip: ip,
                browser: browserName,
                deviceType: deviceType,
                platform: navigator.platform,
                userAgent: ua // Lưu lại chuỗi gốc nếu cần tra cứu chuyên sâu sau này
            };
        }
        // BƯỚC 5: Gửi tin nhắn lên DB
        window.submitFinalMessage = async function () {
            const msg = document.getElementById('msgInput').value.trim();
            if (!msg) return;

            const btn = document.getElementById('btnSendFinal');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-lg"></i>';

            appendUserBubble(msg);
            chatFlowData.message = msg;
            setInputState('none');

            try {
                const trackCode = chatFlowData.visibility === 'private' ? Math.random().toString(36).substring(2, 7).toUpperCase() : null;

                // Thay đổi đoạn mã này:
                const clientMeta = await getClientMetadata();

                await addDoc(collection(db, "messages"), {
                    message: chatFlowData.message,
                    senderName: chatFlowData.name,
                    isAnonymous: chatFlowData.isAnonymous,
                    visibility: chatFlowData.visibility,
                    trackingCode: trackCode,
                    status: 'pending',
                    reply: null,
                    metadata: clientMeta,
                    timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    if (chatFlowData.visibility === 'private') {
                        const now = new Date();
                        const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

                        appendSystemBubble(`Đã nhận được thông điệp bí mật. Hãy lưu lại mã tra cứu này nhé:<br><div class="bg-ms-bg px-4 py-2 rounded-xl border border-ms-gold/50 inline-block mt-3 font-mono tracking-widest text-ms-gold text-[18px] font-bold select-all shadow-inner">${trackCode}</div>`);
                        saveToLocalHistory(trackCode, timeStr);
                    } else {
                        appendSystemBubble(`Thông điệp của bạn đã được gửi thành công. Admin sẽ sớm duyệt và hiển thị trên Bảng tin.`);
                    }
                    setInputState('done');
                }, 800);

            } catch (e) {
                appendSystemBubble('<span class="text-rose-500 font-medium"><i class="fa-solid fa-triangle-exclamation"></i> Lỗi kết nối mạng. Không thể gửi dữ liệu.</span>');
                setInputState('msg'); // Mở lại cho phép thử gửi lại
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-up text-[18px]"></i>';
            }
        };

        setTimeout(() => { resetChatFlow(); }, 500);

        // --- TAB 2: FEED & PRIVATE TRA CỨU ---
        window.loadPublicQnA = async function () {
            const feed = document.getElementById('qnaFeed');
            feed.innerHTML = '<div class="text-center py-20 text-ms-gold"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i><p class="text-[13px] font-medium tracking-wide">Đang đồng bộ...</p></div>';
            try {
                const snap = await getDocs(query(collection(db, "messages"), where("visibility", "==", "public"), where("status", "==", "answered")));
                if (snap.empty) { feed.innerHTML = `<div class="bg-ms-surface border border-ms-border border-dashed rounded-2xl p-10 text-center text-ms-textSecondary text-[14px]">Chưa có bài viết hiển thị.</div>`; return; }

                let html = '';
                window.publicMessagesCache = {};
                snap.docs.reverse().forEach((doc) => {
                    const d = doc.data(); window.publicMessagesCache[doc.id] = d;
                    const time = d.timestamp ? `${d.timestamp.toDate().getDate()}/${d.timestamp.toDate().getMonth() + 1}` : '';
                    html += `
                        <div class="bg-ms-surface border border-ms-border rounded-3xl p-5 md:p-6 shadow-sm relative overflow-hidden">
                            <div class="flex justify-between items-center mb-5 relative z-10">
                                <div class="flex items-center gap-3">
                                    <div class="w-11 h-11 rounded-full bg-ms-bg border border-ms-border flex items-center justify-center text-ms-textSecondary"><i class="fa-solid fa-user"></i></div>
                                    <div>
                                        <div class="text-[15px] font-semibold text-ms-textPrimary tracking-tight">${escapeHTML(d.senderName)}</div>
                                        <div class="text-[11px] text-ms-textSecondary uppercase tracking-widest mt-0.5">${time} • CỘNG ĐỒNG</div>
                                    </div>
                                </div>
                                <button onclick="exportImage('square', '${doc.id}', 'public')" class="w-10 h-10 rounded-full bg-ms-bg border border-ms-border flex items-center justify-center text-ms-textSecondary hover:text-ms-gold hover:border-ms-gold transition-colors"><i class="fa-solid fa-download text-[13px]"></i></button>
                            </div>
                            <p class="text-[16px] leading-relaxed mb-6 text-ms-textPrimary relative z-10 font-light">"${escapeHTML(d.message)}"</p>
                            <div class="bg-ms-bg border-l-[3px] border-ms-gold rounded-r-2xl p-4 md:p-5 relative z-10">
                                <div class="text-[10px] font-bold uppercase tracking-widest text-ms-gold mb-2 flex items-center gap-1.5"><i class="fa-solid fa-bolt"></i> Admin</div>
                                <p class="text-[15px] leading-relaxed text-ms-textSecondary">${escapeHTML(d.reply)}</p>
                            </div>
                        </div>`;
                });
                feed.innerHTML = html;
            } catch (error) { feed.innerHTML = '<div class="text-rose-500 text-center py-6 border border-rose-500/20 bg-rose-500/5 rounded-2xl text-[14px]">Mất kết nối mạng.</div>'; }
        }

        window.searchPrivateMsg = async function () {
            const code = document.getElementById('searchInput').value.trim().toUpperCase();
            if (code.length !== 5) { showModal({ title: 'Lỗi', message: 'Mã tra cứu phải đúng 5 ký tự.', type: 'error' }); return; }
            const feed = document.getElementById('qnaFeed');
            feed.innerHTML = '<div class="text-center py-20 text-ms-gold"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i><p class="text-[13px] font-medium tracking-wide">Đang truy xuất...</p></div>';
            try {
                const snap = await getDocs(query(collection(db, "messages"), where("trackingCode", "==", code)));
                if (snap.empty) { feed.innerHTML = `<div class="bg-ms-surface border border-rose-500/20 rounded-2xl p-8 text-center text-rose-500 text-[14px] shadow-sm"><i class="fa-solid fa-circle-xmark text-3xl mb-3"></i><br>Không tìm thấy dữ liệu cho mã <strong class="tracking-widest">${code}</strong>.</div>`; }
                else {
                    const docSnap = snap.docs[0]; const d = docSnap.data(); window.privateMessagesCache[docSnap.id] = d;
                    if (d.status === 'pending') {
                        feed.innerHTML = `
                        <div class="bg-ms-surface border border-ms-border rounded-3xl p-10 text-center shadow-lg">
                            <i class="fa-solid fa-clock text-4xl text-ms-gold opacity-50 mb-5"></i>
                            <h3 class="text-[16px] font-semibold text-ms-textPrimary mb-2">Đang xử lý</h3>
                            <p class="text-[13px] text-ms-textSecondary mb-6 leading-relaxed">Admin đã nhận được thông điệp bí mật của bạn và sẽ phản hồi sớm nhất.</p>
                            <button onclick="loadPublicQnA()" class="bg-ms-bg border border-ms-border px-6 py-2.5 rounded-full text-[13px] font-medium text-ms-textPrimary hover:border-ms-gold hover:text-ms-gold transition-colors">Quay lại</button>
                        </div>`;
                    } else {
                        const time = d.timestamp ? `${d.timestamp.toDate().getDate()}/${d.timestamp.toDate().getMonth() + 1}` : '';
                        feed.innerHTML = `
                            <div class="text-center text-[11px] font-mono tracking-widest uppercase text-ms-gold mb-4 mt-2 font-bold"><i class="fa-solid fa-lock mr-1"></i> TÀI LIỆU MẬT: ${code}</div>
                            <div class="bg-ms-surface border border-ms-gold/40 rounded-3xl p-6 md:p-8 shadow-[0_10px_30px_rgba(212,175,55,0.05)] relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-ms-gold/5 rounded-bl-[100px] pointer-events-none"></div>
                                <div class="flex justify-between items-center mb-6 relative z-10">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-full bg-ms-bg border border-ms-gold flex items-center justify-center text-ms-gold text-lg shadow-[0_0_15px_rgba(212,175,55,0.15)]"><i class="fa-solid fa-lock"></i></div>
                                        <div>
                                            <div class="text-[16px] font-semibold text-ms-textPrimary tracking-tight">${escapeHTML(d.senderName)}</div>
                                            <div class="text-[11px] text-ms-textSecondary uppercase tracking-widest mt-0.5">${time} • TUYỆT MẬT</div>
                                        </div>
                                    </div>
                                    <button onclick="exportImage('square', '${docSnap.id}', 'private')" class="w-10 h-10 rounded-full bg-ms-bg border border-ms-border flex items-center justify-center text-ms-textSecondary hover:text-ms-gold hover:border-ms-gold transition-colors"><i class="fa-solid fa-download text-[13px]"></i></button>
                                </div>
                                <p class="text-[17px] leading-relaxed mb-8 text-ms-textPrimary relative z-10 font-light">"${escapeHTML(d.message)}"</p>
                                <div class="bg-ms-bg border-l-[3px] border-ms-gold rounded-r-2xl p-5 md:p-6 relative z-10">
                                    <div class="text-[11px] font-bold uppercase tracking-widest text-ms-gold mb-2 flex items-center gap-1.5"><i class="fa-solid fa-bolt"></i> Admin phản hồi</div>
                                    <p class="text-[15px] leading-relaxed text-ms-textSecondary">${escapeHTML(d.reply)}</p>
                                </div>
                            </div>
                            <div class="text-center mt-6">
                                <button onclick="loadPublicQnA()" class="bg-ms-surface border border-ms-border px-6 py-2.5 rounded-full text-[13px] font-medium text-ms-textPrimary hover:border-ms-gold hover:text-ms-gold transition-colors shadow-sm active:scale-95">Đóng tra cứu</button>
                            </div>`;
                    }
                }
            } catch (error) { feed.innerHTML = '<div class="text-rose-500 text-center py-6 border border-rose-500/20 bg-rose-500/5 rounded-2xl text-[14px]">Lỗi hệ thống.</div>'; }
        };

        // --- TAB 3: ADMIN HỆ THỐNG ---
        let currentAdminUser = null;
        onAuthStateChanged(auth, user => { currentAdminUser = user; if (document.getElementById('content-admin').classList.contains('active')) checkAdminAuthAndLoad(); });

        function checkAdminAuthAndLoad() {
            if (currentAdminUser) { document.getElementById('adminLoginSection').classList.add('hidden'); document.getElementById('adminDashboardSection').classList.remove('hidden'); loadAdminInbox(); }
            else { document.getElementById('adminLoginSection').classList.remove('hidden'); document.getElementById('adminDashboardSection').classList.add('hidden'); }
        }

        window.adminLogin = async function () {
            const btn = document.getElementById('btnLogin');
            const orig = btn.innerText; btn.innerText = "Đang xử lý..."; btn.disabled = true;
            try { await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPwd').value); }
            catch (error) { showModal({ title: 'Từ chối', message: 'Chỉ Admin mới có quyền truy cập.', type: 'error' }); }
            finally { btn.innerText = orig; btn.disabled = false; }
        };
        window.adminLogout = async function () { await signOut(auth); };

        let currentSelectedDocId = null, allAdminMessages = [];

        async function loadAdminInbox() {
            const inbox = document.getElementById('adminInbox');
            inbox.innerHTML = '<div class="p-6 text-center text-[13px] text-ms-textSecondary">Đang tải hộp thư...</div>';
            try {
                const snap = await getDocs(query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(200)));
                allAdminMessages = []; snap.forEach(doc => allAdminMessages.push({ id: doc.id, ...doc.data() })); applyFilters();
            } catch (e) { inbox.innerHTML = '<div class="p-6 text-rose-500 text-center text-[13px]">Lỗi bảo mật</div>'; }
        }

        // Biến lưu trữ các ID đang được chọn
        window.selectedAdminDocs = new Set();

        // CẬP NHẬT HÀM APPLY FILTERS
        window.applyFilters = function () {
            const fStatus = document.getElementById('filterStatus').value;
            const fAnon = document.getElementById('filterAnon').value;
            const searchInput = document.getElementById('adminSearchInput');
            const fSearch = searchInput ? searchInput.value.toLowerCase().trim() : '';

            // Xử lý logic lọc & tìm kiếm
            let filtered = allAdminMessages.filter(m => {
                const matchStatus = (fStatus === 'all' || m.status === fStatus);
                const matchAnon = (fAnon === 'all' || (fAnon === 'anon' ? m.isAnonymous : !m.isAnonymous));

                let matchSearch = true;
                if (fSearch !== '') {
                    matchSearch = m.message.toLowerCase().includes(fSearch) ||
                        m.senderName.toLowerCase().includes(fSearch) ||
                        (m.trackingCode && m.trackingCode.toLowerCase().includes(fSearch));
                }

                return matchStatus && matchAnon && matchSearch;
            });

            const inbox = document.getElementById('adminInbox');
            if (!filtered.length) {
                inbox.innerHTML = '<div class="p-6 text-center text-[13px] text-ms-textSecondary border border-ms-border border-dashed m-4 rounded-xl">Không tìm thấy dữ liệu phù hợp.</div>';
                updateBulkActionBar(0);
                return;
            }

            // Gắn ID hiện tại vào DOM để dùng cho tính năng Select All
            window.currentFilteredIds = filtered.map(d => d.id);

            let html = '';
            filtered.forEach(d => {
                const isPending = d.status === 'pending';
                const isChecked = window.selectedAdminDocs.has(d.id);

                html += `
        <div class="border-b border-ms-border hover:bg-ms-card transition-colors flex items-center gap-3 pr-4 ${currentSelectedDocId === d.id ? 'bg-ms-card border-l-2 border-l-ms-gold' : 'border-l-2 border-l-transparent'}">
            <div class="pl-4 py-4 cursor-pointer" onclick="event.stopPropagation();">
                <input type="checkbox" onchange="toggleSelectDoc('${d.id}')" ${isChecked ? 'checked' : ''} class="w-4 h-4 rounded border-ms-border text-ms-gold cursor-pointer accent-ms-gold mt-1">
            </div>
            
            <div onclick="selectMessage('${d.id}')" class="flex-1 py-4 flex items-center gap-4 cursor-pointer min-w-0">
                <div class="w-11 h-11 rounded-full bg-ms-bg border ${isPending ? 'border-ms-gold text-ms-gold shadow-[0_0_10px_rgba(212,175,55,0.2)]' : 'border-ms-border text-ms-textSecondary'} flex items-center justify-center text-[14px] relative flex-shrink-0">
                    <i class="fa-solid fa-user"></i>
                    ${isPending ? `<div class="w-3 h-3 bg-ms-gold rounded-full absolute -top-0 -right-0 border-2 border-ms-surface"></div>` : ''}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[14px] font-semibold truncate ${isPending ? 'text-ms-textPrimary' : 'text-ms-textSecondary'}">${escapeHTML(d.senderName)}</span>
                        ${d.visibility === 'private' ? '<i class="fa-solid fa-lock text-[10px] text-rose-500"></i>' : ''}
                    </div>
                    <p class="text-[13px] line-clamp-1 ${isPending ? 'text-ms-textPrimary font-medium' : 'text-ms-textSecondary font-light'}">${escapeHTML(d.message)}</p>
                </div>
            </div>
        </div>`;
            });

            inbox.innerHTML = html;

            // Đồng bộ trạng thái Select All Checkbox
            const selectAllCb = document.getElementById('selectAllCheckbox');
            if (selectAllCb) {
                selectAllCb.checked = window.currentFilteredIds.length > 0 && window.currentFilteredIds.every(id => window.selectedAdminDocs.has(id));
            }

            updateBulkActionBar(window.selectedAdminDocs.size);
        }

        // CÁC HÀM XỬ LÝ ĐA CHỌN
        window.toggleSelectDoc = function (id) {
            if (window.selectedAdminDocs.has(id)) window.selectedAdminDocs.delete(id);
            else window.selectedAdminDocs.add(id);
            applyFilters();
        }

        window.toggleAllCheckboxes = function () {
            const isChecked = document.getElementById('selectAllCheckbox').checked;
            if (isChecked) {
                window.currentFilteredIds.forEach(id => window.selectedAdminDocs.add(id));
            } else {
                window.currentFilteredIds.forEach(id => window.selectedAdminDocs.delete(id));
            }
            applyFilters();
        }

        window.updateBulkActionBar = function (count) {
            const bar = document.getElementById('bulkActionBar');
            if (!bar) return;
            if (count > 0) {
                bar.classList.remove('hidden');
                document.getElementById('selectedCountText').innerText = `Đã chọn ${count} mục`;
            } else {
                bar.classList.add('hidden');
            }
        }

        // XÓA HÀNG LOẠT
        window.confirmBulkDelete = function () {
            const count = window.selectedAdminDocs.size;
            if (count === 0) return;

            showModal({
                title: 'Cảnh báo Xóa',
                message: `Bạn sắp hủy vĩnh viễn ${count} tài liệu đã chọn khỏi Server. Hành động này không thể hoàn tác.`,
                isConfirm: true,
                type: 'error',
                onConfirm: async () => {
                    showModal({ title: 'Đang xử lý...', message: 'Vui lòng không đóng trang.' });

                    // Xóa tuần tự trên Firebase
                    for (let id of window.selectedAdminDocs) {
                        try {
                            await deleteDoc(doc(db, "messages", id));
                            allAdminMessages = allAdminMessages.filter(m => m.id !== id);
                        } catch (e) { console.error("Lỗi xóa doc", id); }
                    }

                    window.selectedAdminDocs.clear();
                    if (window.selectedAdminDocs.has(currentSelectedDocId)) {
                        document.getElementById('activeMessage').classList.add('hidden');
                        document.getElementById('emptyMessageState').classList.remove('hidden');
                        currentSelectedDocId = null;
                    }

                    applyFilters();
                    closeMobileDetail();
                    closeModal();
                    setTimeout(() => showModal({ title: 'Thành công', message: `Đã xóa ${count} mục.`, type: 'success' }), 400);
                }
            });
        }

        // XUẤT ẢNH HÀNG LOẠT (Tải xuống tuần tự)
        window.bulkExportImages = async function () {
            const docIds = Array.from(window.selectedAdminDocs);
            if (docIds.length === 0) return;

            // Cần hỏi trình duyệt cho phép tải xuống nhiều tệp
            showModal({
                title: 'Kết xuất hàng loạt',
                message: `Hệ thống sẽ tải xuống ${docIds.length} ảnh tuần tự. Vui lòng cho phép trình duyệt tải xuống nhiều tệp nếu được hỏi.`,
                isConfirm: true,
                onConfirm: async () => {
                    for (let i = 0; i < docIds.length; i++) {
                        const id = docIds[i];
                        // Gọi hàm exportImage hiện tại của bạn
                        exportImage('square', id, 'admin');

                        // Đợi 1.5 giây giữa các lần xuất ảnh để canvas xử lý kịp và không bị Crash
                        await new Promise(r => setTimeout(r, 1500));
                    }
                }
            });
        }

        window.selectMessage = function (id) {
            currentSelectedDocId = id; applyFilters();
            const m = allAdminMessages.find(x => x.id === id); if (!m) return;

            document.getElementById('adminDetailPanel').classList.remove('hidden');
            document.getElementById('emptyMessageState').classList.add('hidden');
            document.getElementById('activeMessage').classList.remove('hidden');

            document.getElementById('adminMsgAuthor').innerText = m.senderName;

            if (m.status === 'pending') {
                document.getElementById('adminMsgStatusDot').className = "w-2 h-2 rounded-full bg-rose-500 animate-pulse shadow-[0_0_5px_currentColor]";
                document.getElementById('adminMsgStatusText').innerText = "Đang chờ duyệt";
            } else {
                document.getElementById('adminMsgStatusDot').className = "w-2 h-2 rounded-full bg-ms-gold shadow-[0_0_5px_currentColor]";
                document.getElementById('adminMsgStatusText').innerText = "Đã phản hồi";
            }

            document.getElementById('adminMsgContent').innerText = m.message;
            document.getElementById('adminReplyInput').value = m.reply || '';

            if (m.reply) { document.getElementById('adminPrevReplyBox').classList.remove('hidden'); document.getElementById('adminPrevReplyText').innerText = m.reply; }
            else document.getElementById('adminPrevReplyBox').classList.add('hidden');

            const time = m.timestamp ? `${m.timestamp.toDate().getDate()}/${m.timestamp.toDate().getMonth() + 1}/${m.timestamp.toDate().getFullYear()}` : '';
            document.getElementById('adminMsgTime').innerText = time;
            document.getElementById('adminMetaSecurity').innerText = m.visibility === 'private' ? `Tuyệt mật: ${m.trackingCode}` : 'Công khai trên Bảng tin';

            // --- PHẦN CẬP NHẬT HIỂN THỊ THIẾT BỊ VÀ TRÌNH DUYỆT ---
            if (m.metadata) {
                // Lấy dữ liệu, nếu là tin nhắn cũ không có thì để mặc định là Unknown
                const ip = m.metadata.ip || 'N/A';
                const browser = m.metadata.browser || 'Unknown';
                const device = m.metadata.deviceType || 'Unknown';

                // Hiển thị chuỗi gộp dưới đáy bảng chi tiết (Góc phải dưới cùng của màn hình Admin)
                document.getElementById('adminMetaIP').innerText = `${ip} • ${browser} • ${device}`;
            } else {
                document.getElementById('adminMetaIP').innerText = 'N/A';
            }
        }

        window.closeMobileDetail = function () { document.getElementById('adminDetailPanel').classList.add('hidden'); }

        window.submitReply = async function () {
            const txt = document.getElementById('adminReplyInput').value.trim(); if (!txt || !currentSelectedDocId) return;
            try {
                await updateDoc(doc(db, "messages", currentSelectedDocId), { reply: txt, status: 'answered', repliedAt: serverTimestamp() });
                const idx = allAdminMessages.findIndex(m => m.id === currentSelectedDocId);
                if (idx > -1) { allAdminMessages[idx].reply = txt; allAdminMessages[idx].status = 'answered'; }
                document.getElementById('adminPrevReplyBox').classList.remove('hidden');
                document.getElementById('adminPrevReplyText').innerText = txt;
                document.getElementById('adminReplyInput').value = '';
                document.getElementById('adminMsgStatusDot').className = "w-2 h-2 rounded-full bg-ms-gold shadow-[0_0_5px_currentColor]";
                document.getElementById('adminMsgStatusText').innerText = "Đã phản hồi";
                applyFilters();
            } catch (e) { showModal({ title: 'Lỗi', message: 'Lỗi đồng bộ CSDL.', type: 'error' }); }
        }

        window.confirmDelete = function () {
            showModal({
                title: 'Cảnh báo', message: 'Tài liệu này sẽ bị hủy vĩnh viễn trên Server. Tiếp tục?', isConfirm: true, type: 'error', onConfirm: async () => {
                    await deleteDoc(doc(db, "messages", currentSelectedDocId));
                    allAdminMessages = allAdminMessages.filter(m => m.id !== currentSelectedDocId);
                    document.getElementById('activeMessage').classList.add('hidden');
                    document.getElementById('emptyMessageState').classList.remove('hidden');
                    currentSelectedDocId = null; applyFilters(); closeMobileDetail();
                }
            });
        }

        window.exportImage = function (size, customDocId = null, source = 'admin') {
            const targetId = customDocId || currentSelectedDocId; if (!targetId) return;
            let m;
            if (source === 'public') m = window.publicMessagesCache[targetId];
            else if (source === 'private') m = window.privateMessagesCache[targetId];
            else m = allAdminMessages.find(x => x.id === targetId);

            document.getElementById('canvas-text').innerText = `"${m.message}"`;
            document.getElementById('canvas-author').innerText = m.senderName;
            document.getElementById('canvas-admin-text').innerText = m.reply || "Chưa có phản hồi...";

            const time = m.timestamp ? `${m.timestamp.toDate().getDate()}/${m.timestamp.toDate().getMonth() + 1}` : '';
            document.getElementById('canvas-time').innerText = time;

            const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg-color').trim();
            const surface = getComputedStyle(document.documentElement).getPropertyValue('--surface-color').trim();
            const txt = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim();

            document.getElementById('canvas-template').style.backgroundColor = bg;
            document.getElementById('canvas-inner-box').style.backgroundColor = surface;
            document.getElementById('canvas-text').style.color = txt;
            document.getElementById('canvas-author').style.color = txt;

            const tpl = document.getElementById('canvas-template');
            const cont = document.getElementById('canvas-template-container');

            if (size === 'story') { tpl.style.width = '1080px'; tpl.style.height = '1920px'; }
            else { tpl.style.width = '1080px'; tpl.style.height = '1080px'; }

            cont.style.display = 'block';
            showModal({ title: 'Rendering', message: 'Hệ thống đang kết xuất ảnh chất lượng cao...' });

            setTimeout(() => {
                html2canvas(tpl, { backgroundColor: bg, scale: 2, useCORS: true }).then(canvas => {
                    closeModal();
                    const a = document.createElement('a'); a.download = `AskSystem_Export_${Date.now()}.png`; a.href = canvas.toDataURL(); a.click();
                    cont.style.display = 'none';
                });
            }, 600);
        }
    </script>
</body>

</html>
