        // 1. Render Thông tin cá nhân
        function renderStudentInfo(info) {
            const container = document.getElementById('student-info');
            for (const [key, value] of Object.entries(info)) {
                container.innerHTML += `
                    <div class="flex flex-col">
                        <span class="text-gray-500 font-medium text-xs uppercase tracking-wider">${key}</span>
                        <span class="font-semibold text-gray-800 mt-1">${value}</span>
                    </div>
                `;
            }
        }

        // 2. Render Bảng điểm từng học kỳ
        function renderGrades(semesters) {
            const container = document.getElementById('grades-container');
            
            semesters.forEach(sem => {
                // Tiêu đề Học kỳ
                let semHTML = `
                <div class="glass-panel rounded-2xl overflow-hidden">
                    <div class="bg-indigo-50/50 p-4 border-b border-white/50 flex flex-col md:flex-row justify-between items-center gap-2">
                        <h3 class="font-bold text-lg text-indigo-800">
                            Học kỳ ${sem.hoc_ki} (${sem.nien_hoc})
                        </h3>
                        <div class="flex gap-4 text-sm font-semibold text-gray-700 bg-white/60 px-4 py-2 rounded-full shadow-sm">
                            <span>TBHK: <span class="text-indigo-600">${sem.trung_binh_hk}</span></span>
                            <span>Xếp loại: <span class="text-indigo-600">${sem.xep_loai_hk}</span></span>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto custom-scroll p-4">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="text-xs font-semibold text-gray-600 uppercase border-b-2 border-indigo-100">
                                    <th class="p-3">STT</th>
                                    <th class="p-3 w-1/3">Tên Môn Học</th>
                                    <th class="p-3 text-center">HS</th>
                                    <th class="p-3">KTTX</th>
                                    <th class="p-3">KTĐK</th>
                                    <th class="p-3 text-center">TBKT</th>
                                    <th class="p-3 text-center">Điểm Thi</th>
                                    <th class="p-3 text-center">Tổng Kết</th>
                                    <th class="p-3 text-center">Kết Quả</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm divide-y divide-gray-200/50">
                `;

                // Render từng môn học
                sem.danh_sach_mon.forEach(mon => {
                    // Xử lý hiển thị chuỗi điểm
                    const kttx = mon.diem_kttx.join(', ') || '-';
                    const ktdk = mon.diem_ktdk.join(', ') || '-';
                    
                    // Ưu tiên hiển thị điểm lần cao nhất (hoặc lần thi cuối)
                    const diemThi = mon.diem_thi.l3 || mon.diem_thi.l2 || mon.diem_thi.l1 || '-';
                    const tongKet = mon.tong_ket_mon.l3 || mon.tong_ket_mon.l2 || mon.tong_ket_mon.l1 || '-';
                    
                    // Màu sắc kết quả
                    const badgeColor = mon.ket_qua === 'ĐẠT' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';

                    semHTML += `
                        <tr class="hover:bg-white/40 transition-colors">
                            <td class="p-3 text-gray-500">${mon.stt}</td>
                            <td class="p-3 font-medium text-gray-800">${mon.ten_mon}</td>
                            <td class="p-3 text-center text-gray-500">${mon.he_so}</td>
                            <td class="p-3 text-gray-600">${kttx}</td>
                            <td class="p-3 text-gray-600">${ktdk}</td>
                            <td class="p-3 text-center font-semibold">${mon.tbkt || '-'}</td>
                            <td class="p-3 text-center font-semibold text-blue-600">${diemThi}</td>
                            <td class="p-3 text-center font-bold">${tongKet}</td>
                            <td class="p-3 text-center">
                                <span class="px-2 py-1 rounded text-xs font-bold ${badgeColor}">
                                    ${mon.ket_qua || '-'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                semHTML += `
                            </tbody>
                        </table>
                    </div>
                </div>
                `;
                
                container.innerHTML += semHTML;
            });
        }

        // Khởi tạo
        document.addEventListener('DOMContentLoaded', () => {
            renderStudentInfo(studentData.thong_tin_sinh_vien);
            renderGrades(studentData.chi_tiet_diem);
        });

    </script>
