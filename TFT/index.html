<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TFT Wiki</title>
    <meta name="description" content="TFT Hunq Wiki">
    <meta name="author" content="Hunq">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="/Asset/logo/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:title" content="TFT Wiki">
    <meta property="og:description" content="TFT Hunq Wiki">
    <meta property="og:image" content="/Asset/Banner/Banner.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TFT Wiki">
    <meta name="twitter:description" content="TFT Hunq Wiki">
    <meta name="twitter:image" content="/Asset/Banner/Banner.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TFT Wiki">
    <link rel="apple-touch-icon" href="/Asset/logo/iconApps.png">
    
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./asset/css/style.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        premium: {
                            bg: '#000000',      /* Nền Pure Black tối ưu màn OLED */
                            card: '#121212',    /* Lớp thẻ thứ 1 (Rất tối) */
                            surface: '#1c1c1e', /* Lớp thẻ thứ 2 (Nổi hơn 1 chút) */
                            border: '#27272a',  /* Viền solid tinh tế (Zinc 800) */
                            gold: '#d4af37',    /* Vàng Champagne */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-zinc-50 dark:bg-premium-bg text-zinc-900 dark:text-zinc-300 font-sans antialiased min-h-screen flex flex-col selection:bg-premium-gold selection:text-black transition-colors duration-300">
    
    <!-- Header Solid Premium -->
<header class="sticky top-0 left-0 w-full z-[100] bg-white dark:bg-premium-bg border-b border-zinc-200 dark:border-premium-border transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer group" title="Bấm để làm mới dữ liệu">
            <!-- Logo Box -->
            <div onclick="window.clearTFTCache()"  class="w-9 h-9 rounded-xl bg-premium-gold flex items-center justify-center shadow-sm group-hover:scale-105 transition-transform">
                <i class="fa-solid fa-chess-knight text-black text-[16px]"></i>
            </div>
            <span class="font-black text-[18px] tracking-widest text-zinc-900 dark:text-white transition-colors uppercase">
                TFT<span class="text-premium-gold">Hunq</span>
            </span>
            
            <!-- Tag iOS -->
            <button onclick="AddIcon()" class="ml-2 w-auto h-7 px-3 rounded-full bg-zinc-100 dark:bg-premium-card border border-zinc-200 dark:border-premium-border flex items-center justify-center text-[10px] font-black tracking-widest text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-premium-gold hover:bg-zinc-200 dark:hover:bg-premium-surface transition-all outline-none uppercase">
                iOS
            </button>
        </div>
        
        <div class="relative">
            <button id="theme-toggle-btn" class="w-10 h-10 rounded-full bg-zinc-100 dark:bg-premium-card border border-zinc-200 dark:border-premium-border flex items-center justify-center text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-premium-gold transition-all outline-none">
                <i id="theme-current-icon" class="fa-solid fa-moon text-[14px]"></i>
            </button>
            
            <!-- Theme Menu Solid -->
            <div id="theme-menu-container" class="absolute right-0 mt-3 w-40 bg-white dark:bg-premium-surface rounded-2xl border border-zinc-200 dark:border-premium-border transition-all transform origin-top-right flex flex-col p-1.5 z-50 opacity-0 invisible scale-95 shadow-xl">
                <button class="theme-option flex items-center gap-3 px-3.5 py-2.5 text-xs font-black rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-premium-card hover:text-premium-gold transition-all outline-none tracking-widest uppercase" data-theme="light">
                    <i class="fa-solid fa-sun w-5 text-center"></i> Sáng
                </button>
                <button class="theme-option flex items-center gap-3 px-3.5 py-2.5 text-xs font-black rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-premium-card hover:text-premium-gold transition-all outline-none tracking-widest uppercase" data-theme="dark">
                    <i class="fa-solid fa-moon w-5 text-center"></i> Tối
                </button>
                <div class="w-full h-[1px] bg-zinc-100 dark:bg-premium-border my-1"></div>
                <button class="theme-option flex items-center gap-3 px-3.5 py-2.5 text-xs font-black rounded-xl text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-premium-card hover:text-premium-gold transition-all outline-none tracking-widest uppercase" data-theme="system">
                    <i class="fa-solid fa-display w-5 text-center"></i> Tự động
                </button>
            </div>
        </div>
    </div>
    
    <!-- Tab Nav -->
    <div class="max-w-7xl mx-auto px-4 pb-0">
        <div id="tab-nav" class="flex items-center gap-3 overflow-x-auto no-scrollbar scroll-smooth snap-x snap-mandatory pt-2 pb-3">
            <!-- Tabs render via JS -->
        </div>
    </div>
</header>

<!-- Modal Custom Solid Premium -->
<div id="custom-modal" class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center bg-black/80 p-4 opacity-0 invisible transition-all duration-200">
    <!-- Nền Modal là solid #1c1c1e (premium-surface), không blur -->
    <div class="modal-box bg-white dark:bg-premium-surface border border-zinc-200 dark:border-premium-border rounded-3xl p-4 md:p-8 w-full max-w-sm relative overflow-hidden shadow-2xl transform scale-95 transition-transform duration-200">
        <h3 id="modal-title" class="text-base font-black text-zinc-900 dark:text-white mb-3 flex items-center gap-2 tracking-widest"></h3>
        <div id="modal-message" class="text-[13px] text-zinc-600 dark:text-zinc-400 mb-8 leading-relaxed font-medium"></div>
        <div class="flex justify-end gap-3" id="modal-actions"></div>
    </div>
</div>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 lg:p-6 relative">
        <div id="tab-containers">
            <!-- Content render via JS -->
        </div>
    </main>

    <!-- Modal Custom Premium -->
    <div id="custom-modal" class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center bg-black/50 backdrop-blur-md p-4 opacity-0 invisible transition-all duration-300">
        <div class="modal-box bg-white/95 dark:bg-[#1c1c1e]/95 backdrop-blur-xl border border-zinc-200/50 dark:border-white/10 rounded-3xl p-6 md:p-8 w-full max-w-sm relative overflow-hidden shadow-[0_15px_50px_rgba(0,0,0,0.5)] transform scale-95 transition-transform duration-300">
            <!-- Accent Top Border Glow -->
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-transparent via-premium-gold to-transparent opacity-80"></div>
            
            <h3 id="modal-title" class="text-base font-black text-zinc-900 dark:text-white mb-3 flex items-center gap-2 tracking-widest"></h3>
            <div id="modal-message" class="text-[13px] text-zinc-600 dark:text-zinc-400 mb-8 leading-relaxed font-medium"></div>
            <div class="flex justify-end gap-3" id="modal-actions"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./asset/js/firebase.js"></script>
    <script src="/Asset/Extend/IABD.js"></script>
    <script src="/Asset/Extend/AddIcon.js"></script>
    <script src="./asset/js/utils.js"></script>
    <script src="./asset/js/builder.js"></script>
    <script src="./asset/js/data.js"></script>
    <script src="./asset/js/main.js"></script>
</body>
</html>
