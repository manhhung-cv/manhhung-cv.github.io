<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TFT Wiki</title>
    <meta name="description" content="Từ điển TFT">
    <meta name="author" content="Hunq">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="/Asset/logo/logo.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="TFT Wiki">
    <meta property="og:description" content="Từ điển TFT">
    <meta property="og:image" content="/Asset/Banner/Banner.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TFT Wiki">
    <meta name="twitter:description" content="Từ điển TFT">
    <meta name="twitter:image" content="/Asset/Banner/Banner.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TFT Wiki">
    <link rel="apple-touch-icon" href="/Asset/logo/iconApps.png">

    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <link rel="stylesheet" href="./asset/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./asset/css/style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        premium: {
                            bg: '#090d14',      /* Nền app tối sâu */
                            card: '#121722',    /* Nền thẻ */
                            border: '#1f2937',  /* Viền xám tối */
                            gold: '#d4af37',    /* Vàng TFT */
                            accent: '#38bdf8'   /* Xanh nhẹ */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

</head>

<body
    class="bg-slate-50 dark:bg-premium-bg text-slate-800 dark:text-slate-300 font-sans antialiased min-h-screen flex flex-col selection:bg-premium-gold selection:text-black transition-colors duration-300">

    <header
        class="sticky top-0 left-0 w-full z-[100] bg-white/95 dark:bg-[#090d14]/95 backdrop-blur-md border-b border-slate-300 dark:border-white/5 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2.5 cursor-pointer">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-premium-gold to-yellow-600 flex items-center justify-center shadow-md border border-yellow-300/50">
                    <i class="fa-solid fa-chess-knight text-black text-[15px]"></i>
                </div>
                <span class="font-black text-[17px] tracking-tight text-slate-800 dark:text-white transition-colors">
                    TFT<span class="text-yellow-600 dark:text-premium-gold">Hunq</span>
                </span>
            </div>

            <div class="relative">
                <button id="theme-toggle-btn"
                    class="w-9 h-9 rounded-full bg-slate-100 dark:bg-white/5 border border-slate-300 dark:border-white/10 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-white/10 transition-all outline-none active:scale-95">
                    <i id="theme-current-icon" class="fa-solid fa-moon text-[13px]"></i>
                </button>

                <div id="theme-menu-container"
                    class="absolute right-0 mt-2 w-36 bg-white dark:bg-slate-800 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.2)] border border-slate-100 dark:border-slate-700 transition-all transform origin-top-right flex flex-col p-1.5 z-50 opacity-0 invisible scale-95">

                    <button
                        class="theme-option flex items-center gap-2.5 px-3 py-2 text-[11px] font-bold rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors outline-none"
                        data-theme="light">
                        <i class="fa-solid fa-sun w-4 text-center"></i> Sáng
                    </button>

                    <button
                        class="theme-option flex items-center gap-2.5 px-3 py-2 text-[11px] font-bold rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors outline-none"
                        data-theme="dark">
                        <i class="fa-solid fa-moon w-4 text-center"></i> Tối
                    </button>

                    <div class="w-full h-[1px] bg-slate-100 dark:bg-slate-700 my-1"></div>

                    <button
                        class="theme-option flex items-center gap-2.5 px-3 py-2 text-[11px] font-bold rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors outline-none"
                        data-theme="system">
                        <i class="fa-solid fa-display w-4 text-center"></i> Theo thiết bị
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 pb-3">
            <div id="tab-nav"
                class="flex items-center gap-2.5 overflow-x-auto no-scrollbar scroll-smooth snap-x snap-mandatory">
            </div>
        </div>
    </header>


    <main class="flex-1 w-full max-w-7xl mx-auto p-4 lg:p-6 relative">
        <div id="tab-containers">
        </div>
    </main>

    <div id="custom-modal" class="modal-overlay fixed inset-0 z-[200] flex items-center justify-center bg-black/70 p-4">
        <div
            class="modal-box bg-white dark:bg-[#121722] border border-slate-300 dark:border-slate-700/60 rounded-3xl p-6 w-full max-w-sm shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-colors relative overflow-hidden">
            <div
                class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-premium-gold via-yellow-400 to-premium-gold opacity-80">
            </div>
            <div
                class="absolute -top-10 -right-10 w-32 h-32 bg-premium-gold/10 rounded-full blur-2xl pointer-events-none">
            </div>

            <h3 id="modal-title"
                class="text-lg font-black text-slate-800 dark:text-white mb-3 flex items-center gap-2 drop-shadow-sm">
            </h3>
            <div id="modal-message" class="text-[13px] text-slate-600 dark:text-slate-300 mb-6 leading-relaxed"></div>
            <div class="flex justify-end gap-3" id="modal-actions"></div>
        </div>
    </div>

    <script type="module" src="./asset/js/firebase.js"></script>
    <script src="/Asset/Extend/IABD.js"></script>
    <script src="./asset/js/utils.js"></script>
    <script src="./asset/js/builder.js"></script>
    <script src="./asset/js/data.js"></script>
    <script src="./asset/js/main.js"></script>
</body>

</html>

</html>
