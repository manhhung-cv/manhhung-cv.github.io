<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical System Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Ẩn mũi tên mặc định của select để tự custom */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen p-6 md:p-12 flex justify-center items-center">

    <div class="w-full max-w-3xl bg-zinc-900/50 border border-zinc-800 rounded-2xl p-8 md:p-12 shadow-2xl backdrop-blur-sm">
        
        <header class="mb-10 text-center">
            <h1 class="text-2xl font-light text-zinc-100 tracking-wider">ELECTRICAL <span class="font-semibold text-white">CALCULATOR</span></h1>
            <p class="text-sm text-zinc-500 mt-2 font-light">Công cụ tính toán tiết diện dây dẫn & aptomat (CB)</p>
        </header>

        <form id="calc-form" class="space-y-8">
            <!-- Thông số hệ thống -->
            <div>
                <h2 class="text-xs uppercase tracking-[0.2em] text-zinc-500 border-b border-zinc-800 pb-2 mb-4">1. Thông số tải</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-sm text-zinc-400 mb-2">Công suất tải (kW)</label>
                        <input type="number" id="power" step="0.1" required placeholder="VD: 5.5" class="bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition-colors">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm text-zinc-400 mb-2">Hệ thống điện</label>
                        <div class="relative">
                            <select id="voltage" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 transition-colors cursor-pointer">
                                <option value="220">1 Pha (220V)</option>
                                <option value="380">3 Pha (380V)</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tùy chọn Thiết bị -->
            <div>
                <h2 class="text-xs uppercase tracking-[0.2em] text-zinc-500 border-b border-zinc-800 pb-2 mb-4">2. Tùy chọn thiết bị</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Nhóm Cáp -->
                    <div class="space-y-4">
                        <div class="flex flex-col">
                            <label class="text-sm text-zinc-400 mb-2">Hãng dây dẫn</label>
                            <div class="relative">
                                <select id="wireBrand" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 cursor-pointer">
                                    <option value="Cadivi">Cadivi</option>
                                    <option value="Trần Phú">Trần Phú</option>
                                    <option value="Daphaco">Daphaco</option>
                                    <option value="Thịnh Phát">Thịnh Phát</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm text-zinc-400 mb-2">Chất liệu / Loại dây</label>
                            <div class="relative">
                                <select id="wireType" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 cursor-pointer">
                                    <option value="Cu">Đồng (Cu) - Cáp CXV/CV</option>
                                    <option value="Al">Nhôm (Al) - Cáp AXV/AV</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Nhóm CB -->
                    <div class="space-y-4">
                        <div class="flex flex-col">
                            <label class="text-sm text-zinc-400 mb-2">Hãng CB (Aptomat)</label>
                            <div class="relative">
                                <select id="cbBrand" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 cursor-pointer">
                                    <option value="Schneider">Schneider Electric</option>
                                    <option value="Panasonic">Panasonic</option>
                                    <option value="LS">LS Industrial</option>
                                    <option value="Mitsubishi">Mitsubishi</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm text-zinc-400 mb-2">Loại CB</label>
                            <div class="relative">
                                <select id="cbType" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-3 text-zinc-200 focus:outline-none focus:border-zinc-500 cursor-pointer">
                                    <option value="MCB">MCB (Tép)</option>
                                    <option value="MCCB">MCCB (Khối)</option>
                                    <option value="RCBO">RCBO (Chống giật)</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-zinc-500">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <button type="button" onclick="calculate()" class="w-full bg-zinc-100 text-zinc-950 font-medium py-4 rounded-lg hover:bg-white transition-colors duration-200 mt-4">
                TÍNH TOÁN & LỰA CHỌN
            </button>
        </form>

        <!-- Kết quả hiển thị -->
        <div id="result" class="hidden mt-8 p-6 bg-zinc-950/50 border border-zinc-800 rounded-xl space-y-4">
            <h3 class="text-xs uppercase tracking-[0.2em] text-zinc-500 mb-4 text-center">Bản quy cách thiết bị đề xuất</h3>
            
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div class="text-zinc-400">Dòng điện tính toán (I):</div>
                <div class="text-right font-medium text-white" id="out-current">0 A</div>
                
                <div class="text-zinc-400">Dòng cắt CB an toàn:</div>
                <div class="text-right font-medium text-white" id="out-cb-calc">0 A</div>
            </div>
            
            <hr class="border-zinc-800 my-4">

            <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800">
                <div class="text-xs text-zinc-500 mb-1 uppercase tracking-wider">Cấu hình Aptomat (CB)</div>
                <div class="text-lg text-white font-medium" id="out-cb-final">Schneider MCB 20A</div>
            </div>

            <div class="bg-zinc-900 rounded-lg p-4 border border-zinc-800">
                <div class="text-xs text-zinc-500 mb-1 uppercase tracking-wider">Cấu hình Cáp điện</div>
                <div class="text-lg text-white font-medium" id="out-wire-final">Cadivi Cu 2.5 mm²</div>
            </div>
        </div>

    </div>

    <script>
        // Dữ liệu tiêu chuẩn kỹ thuật
        const standardCBAmps = [6, 10, 16, 20, 25, 32, 40, 50, 63, 80, 100, 125, 160, 200, 250, 400];
        const standardWireSizes = [1.5, 2.5, 4.0, 6.0, 10.0, 16.0, 25.0, 35.0, 50.0, 70.0, 95.0, 120.0];
        
        // Mật độ dòng điện cho phép J (A/mm2)
        const densityCu = 6; // Đồng
        const densityAl = 4.5; // Nhôm

        function calculate() {
            // Lấy giá trị input
            const powerKw = parseFloat(document.getElementById('power').value);
            if (!powerKw || powerKw <= 0) {
                alert("Vui lòng nhập công suất hợp lệ.");
                return;
            }

            const voltage = parseInt(document.getElementById('voltage').value);
            const wireBrand = document.getElementById('wireBrand').value;
            const wireType = document.getElementById('wireType').value;
            const cbBrand = document.getElementById('cbBrand').value;
            const cbType = document.getElementById('cbType').value;

            // Tính toán dòng điện (I = P / U*cosPhi)
            // Giả sử cosPhi = 0.85
            const cosPhi = 0.85;
            const pWatt = powerKw * 1000;
            let current = 0;

            if (voltage === 220) {
                current = pWatt / (voltage * cosPhi);
            } else {
                // 3 Pha: I = P / (sqrt(3) * U * cosPhi)
                current = pWatt / (Math.sqrt(3) * voltage * cosPhi);
            }

            // Chọn CB (Hệ số an toàn 1.25 -> 1.5)
            const calcCB = current * 1.25;
            let selectedCB = standardCBAmps[standardCBAmps.length - 1]; // Mặc định max
            for (let amp of standardCBAmps) {
                if (amp >= calcCB) {
                    selectedCB = amp;
                    break;
                }
            }

            // Tính tiết diện cáp (S = I / J)
            const density = (wireType === 'Cu') ? densityCu : densityAl;
            // Dây dẫn phải chịu được dòng của CB (S >= Icb / J)
            const calcWireSection = selectedCB / density; 
            
            let selectedWire = standardWireSizes[standardWireSizes.length - 1];
            for (let size of standardWireSizes) {
                if (size >= calcWireSection) {
                    selectedWire = size;
                    break;
                }
            }

            // Format UI loại cáp
            const prefixWire = (voltage === 220) ? "2 lõi (L, N)" : "4 lõi (3L, N)";
            const materialName = (wireType === 'Cu') ? "CXV (Đồng)" : "AXV (Nhôm)";

            // Đẩy dữ liệu ra UI
            document.getElementById('out-current').textContent = current.toFixed(2) + " A";
            document.getElementById('out-cb-calc').textContent = calcCB.toFixed(2) + " A";
            
            let poles = (voltage === 220) ? "2P" : "3P/4P";
            document.getElementById('out-cb-final').textContent = `${cbBrand} ${cbType} ${selectedCB}A - ${poles}`;
            document.getElementById('out-wire-final').textContent = `${wireBrand} - Cáp ${materialName} ${selectedWire} mm² (${prefixWire})`;

            // Hiển thị khung kết quả
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.classList.add('animate-fade-in');
        }
    </script>
</body>
</html>
