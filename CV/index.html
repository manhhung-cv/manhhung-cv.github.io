<!DOCTYPE html>
<html lang="vi">

<head>
    <title>CV DINH MANH HUNG</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/Asset/logo/logo.png" />
    <link rel="stylesheet" href="./Asset/Style.css" />
    <script src="https://kit.fontawesome.com/9392097706.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid-overlay"></div>

    <div class="controls-wrapper glass">
        <!-- Nút In CV -->
        <button class="icon-btn" title="In CV" onclick="printCV()">
            <i class="fas fa-print"></i>
        </button>

        <!-- Nút Tải CV PDF -->
        <button id="downloadPdfBtn" class="icon-btn" title="Tải CV (PDF)" onclick="DownloadCV()">
            <i class="fas fa-download"></i>
        </button>

        <div class="divider-vertical"></div>
        <button id="viewModeBtn" class="icon-btn" title="Chế độ xem A4">
            <i class="fas fa-file-alt"></i>
        </button>
        <button id="glassToggle" class="icon-btn" title="Hiệu ứng Kính">
            <i class="fa-solid fa-droplet"></i>
        </button>
        <div class="divider-vertical"></div>
        <button id="themeToggle" class="icon-btn" title="Giao diện">
            <i class="fas fa-desktop"></i>
        </button>
        <div class="lang-wrapper">
            <button class="icon-btn" onclick="toggleDropdown()">
                <img id="currentFlag" src="./Asset/icon/flag/Vietnam.png" alt="Lang">
            </button>
            <div class="lang-dropdown glass hidden" id="languageDropdown">
                <div class="lang-option" onclick="setLanguage('vi')"><img src="./Asset/icon/flag/Vietnam.png">
                    <span>Tiếng Việt</span>
                </div>
                <div class="lang-option" onclick="setLanguage('en')"><img src="./Asset/icon/flag/US.png">
                    <span>English</span>
                </div>
                <div class="lang-option" onclick="setLanguage('ja')"><img src="./Asset/icon/flag/Japan.png">
                    <span>日本語</span>
                </div>
                <div class="lang-option" onclick="setLanguage('de')"><img src="./Asset/icon/flag/germany.png">
                    <span>Deutsch</span>
                </div>
                <div class="lang-option" onclick="setLanguage('zh')"><img src="./Asset/icon/flag/china.png">
                    <span>中文</span>
                </div>
            </div>
        </div>
    </div>

    <main class="app-container" id="mainContainer">
        <aside class="profile-panel glass-panel">
            <div class="profile-header">
                <div class="avatar-frame">
                    <img src="./Asset/img/AVT2.png" alt="Avatar">
                    <div class="status-dot"></div>
                </div>
                <p class="greeting" data-translate="welcomeText">Xin chào, tôi là</p>
                <h1 class="name" data-translate="Fullname">Đinh Mạnh Hùng</h1>
                <p class="position" data-translate="Position">Kỹ thuật</p>
            </div>
            <div class="profile-body">
                <div class="bio-box">
                    <i class="fas fa-quote-left"></i>
                    <p data-translate="Quote">Mong muốn phát triển vững vàng...</p>
                </div>
                <div class="contact-list">
                    <a href="mailto:manhhung.cvo@gmail.com" class="contact-item">
                        <i class="fas fa-envelope"></i> <span>manhhung.cvo@gmail.com</span>
                    </a>
                    <a href="https://mhung.site" target="_blank" class="contact-item">
                        <i class="fas fa-globe"></i> <span>mhung.site</span>
                    </a>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i> <span data-translate="Location">Việt Nam</span>
                    </div>
                </div>
            </div>
            <div class="profile-footer">
                <a href="mailto:manhhung.cvo@gmail.com" class="btn-primary full-width">
                    <span data-translate="BtnHireMe">Tuyển dụng</span>
                </a>
                <button class="btn-outline full-width" onclick="DownloadCV()" data-translate="BtnDownloadCV">Tải
                    CV</button>
            </div>
        </aside>

        <section class="details-panel glass-panel">
            <div class="details-grid">
                <div class="col-skills">
                    <div class="scroll-wrapper">
                        <div class="section-head">
                            <i class="fas fa-layer-group"></i>
                            <h3 data-translate="SkillsText">Kỹ năng</h3>
                        </div>

                        <!-- CHỈ CẦN KHUNG NÀY, JS SẼ TỰ ĐỘNG ĐỔ DỮ LIỆU KỸ NĂNG VÀO ĐÂY -->
                        <div class="skill-list" id="dynamic-skills">
                        </div>

                        <div class="divider-mini"></div>

                        <div class="section-head">
                            <i class="fas fa-language"></i>
                            <h3 data-translate="LanguagesText">Ngoại ngữ</h3>
                        </div>
                        <div class="tag-cloud">
                            <span class="tag" data-translate="LanEN">Tiếng Anh A2</span>
                            <span class="tag" data-translate="LanJA">Tiếng Nhật N4</span>
                        </div>
                    </div>
                </div>

                <div class="vertical-line"></div>

                <div class="col-exp">
                    <div class="scroll-wrapper">
                        <div class="section-head">
                            <i class="fas fa-briefcase"></i>
                            <h3 data-translate="ExpText">Kinh nghiệm</h3>
                        </div>

                        <!-- CHỈ CẦN KHUNG NÀY, JS SẼ TỰ ĐỘNG ĐỔ DỮ LIỆU KINH NGHIỆM VÀO ĐÂY -->
                        <div class="timeline-compact" id="dynamic-experience">
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-glass">
            <h3 id="modalTitle">Thông báo</h3>
            <div id="modalContent" class="modal-body">Nội dung</div>
            <div class="modal-footer"><button class="btn-text" onclick="closeModal()">Đóng</button></div>
        </div>
    </div>

    <script src="./Asset/Main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>
