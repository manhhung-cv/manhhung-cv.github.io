<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị CV | AI Translate & Smart Edit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .key-item.active {
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen overflow-hidden flex relative">

    <!-- CỘT TRÁI: Sidebar danh sách Key -->
    <div class="w-1/3 max-w-sm bg-white border-r border-slate-200 flex flex-col shadow-sm z-10">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="font-semibold text-slate-900">Danh sách Từ khóa</h1>
                <p class="text-xs text-slate-500 mt-1" id="statusMessage">Đang tải dữ liệu...</p>
            </div>
        </div>
        
        <div class="p-3 border-b border-slate-100 bg-slate-50/50">
            <div class="relative">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" onkeyup="filterKeys()" placeholder="Tìm khóa..." class="w-full bg-white border border-slate-200 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto" id="keyList">
            <!-- Render bằng JS -->
        </div>
        
        <!-- KHU VỰC THAO TÁC NHANH -->
        <div class="p-4 border-t border-slate-100 bg-slate-50 flex flex-col gap-2">
            <div class="flex gap-2">
                <button onclick="addSmartSkill()" title="Tự động thêm cặp Name/Percent" class="flex-1 flex items-center justify-center gap-1 px-2 py-2 bg-emerald-600 text-white text-xs font-medium rounded hover:bg-emerald-700 transition-colors shadow-sm">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    + Kỹ năng
                </button>
                <button onclick="addSmartExp()" title="Tự động thêm bộ Time/Name/Role/Desc" class="flex-1 flex items-center justify-center gap-1 px-2 py-2 bg-blue-600 text-white text-xs font-medium rounded hover:bg-blue-700 transition-colors shadow-sm">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    + Kinh nghiệm
                </button>
            </div>
            <button onclick="addNewKey()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded hover:bg-slate-900 transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Thêm Khóa Tùy Chỉnh
            </button>
        </div>
    </div>

    <!-- CỘT PHẢI: Trình chỉnh sửa (Editor) -->
    <div class="flex-1 flex flex-col bg-slate-50/50">
        
        <div class="h-16 px-6 border-b border-slate-200 bg-white flex items-center justify-between shadow-sm z-10 relative">
            <div class="text-sm font-medium text-slate-500" id="currentKeyLabel">
                Hãy chọn từ khóa bên trái để chỉnh sửa
            </div>
            
            <div class="flex items-center gap-2">
                <span class="text-xs font-medium text-slate-400 uppercase tracking-wider mr-2">Dữ liệu:</span>
                <button onclick="viewJSON('vi')" title="Xem hoặc tải vi.json" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded hover:bg-slate-50 transition-colors">🇻🇳 vi</button>
                <button onclick="viewJSON('en')" title="Xem hoặc tải en.json" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded hover:bg-slate-50 transition-colors">🇺🇸 en</button>
                <button onclick="viewJSON('ja')" title="Xem hoặc tải ja.json" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded hover:bg-slate-50 transition-colors">🇯🇵 ja</button>
                <button onclick="viewJSON('zh')" title="Xem hoặc tải zh.json" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded hover:bg-slate-50 transition-colors">🇨🇳 zh</button>
                <button onclick="viewJSON('de')" title="Xem hoặc tải de.json" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded hover:bg-slate-50 transition-colors">🇩🇪 de</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10 hidden" id="editorArea">
            <div class="max-w-4xl mx-auto space-y-6" id="editorContent">
                <!-- Render các Textarea bằng JS -->
            </div>
            <div class="max-w-4xl mx-auto mt-10 pt-6 border-t border-slate-200 text-right">
                <button onclick="deleteCurrentKey()" class="inline-flex items-center gap-2 text-sm text-rose-600 hover:text-rose-800 font-medium px-4 py-2 hover:bg-rose-50 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Xóa từ khóa này
                </button>
            </div>
        </div>
        
        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-400">
            <svg class="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
            <p>Chọn từ khóa từ danh sách bên trái để chỉnh sửa, hoặc thêm mới.</p>
        </div>
    </div>

    <!-- MODAL XEM JSON -->
    <div id="jsonModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center transition-opacity">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[85vh] flex flex-col mx-4">
            <div class="flex justify-between items-center p-5 border-b border-slate-100">
                <h3 class="font-semibold text-slate-800 text-lg" id="jsonModalTitle">Xem JSON</h3>
                <button onclick="closeJsonModal()" class="text-slate-400 hover:text-rose-500 transition-colors p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-5 flex-1 overflow-auto bg-slate-800 text-emerald-400">
                <pre id="jsonModalContent" class="text-sm font-mono whitespace-pre-wrap select-all"></pre>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-xl">
                <button onclick="closeJsonModal()" class="px-4 py-2 text-slate-600 text-sm font-medium hover:bg-slate-200 rounded-lg transition-colors">Đóng</button>
                <button id="btnCopyJson" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Nội Dung
                </button>
                <button id="btnDownloadJson" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Tải File .json
                </button>
            </div>
        </div>
    </div>

    <script>
        const languages = [
            { code: 'vi', name: 'Tiếng Việt', flag: '🇻🇳', gtCode: 'vi' },
            { code: 'en', name: 'Tiếng Anh', flag: '🇺🇸', gtCode: 'en' },
            { code: 'ja', name: 'Tiếng Nhật', flag: '🇯🇵', gtCode: 'ja' },
            { code: 'zh', name: 'Tiếng Trung', flag: '🇨🇳', gtCode: 'zh-CN' },
            { code: 'de', name: 'Tiếng Đức', flag: '🇩🇪', gtCode: 'de' }
        ];
        
        let translations = { vi: {}, en: {}, ja: {}, zh: {}, de: {} };
        let currentSelectedKey = null;

        // --- CORE CHƯƠNG DỊCH THUẬT (GOOGLE TRANSLATE HACK) ---
        async function translateText(text, sourceLang, targetLang) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                let translated = '';
                data[0].forEach(item => {
                    translated += item[0];
                });
                return translated;
            } catch (error) {
                console.error("Lỗi khi dịch:", error);
                return text; // Lỗi thì trả về text gốc
            }
        }

        // Dịch 1 ngôn ngữ
        async function autoTranslate(targetLangCode, gtCode, isBulk = false) {
            if (!currentSelectedKey) return;
            const viText = translations['vi'][currentSelectedKey] || document.getElementById('input-vi').value;
            
            if (!viText || viText.trim() === '') {
                if(!isBulk) alert("Vui lòng nhập nội dung tiếng Việt trước khi dịch!");
                return;
            }

            const btn = document.getElementById(`btn-translate-${targetLangCode}`);
            const originalHtml = btn ? btn.innerHTML : '';
            if (btn) {
                btn.innerHTML = `Đang dịch...`;
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            try {
                const result = await translateText(viText, 'vi', gtCode);
                const textarea = document.getElementById(`input-${targetLangCode}`);
                if (textarea) textarea.value = result;
                updateValue(targetLangCode, result);
            } catch (error) {
                console.error(error);
            } finally {
                if (btn) {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }
        }

        // Dịch TẤT CẢ ngôn ngữ (TÍNH NĂNG MỚI)
        async function autoTranslateAll() {
            if (!currentSelectedKey) return;
            const viText = translations['vi'][currentSelectedKey] || document.getElementById('input-vi').value;
            
            if (!viText || viText.trim() === '') {
                alert("Vui lòng nhập nội dung tiếng Việt trước khi dịch tất cả!");
                return;
            }

            const btnAll = document.getElementById('btn-translate-all');
            const originalHtml = btnAll.innerHTML;
            btnAll.innerHTML = `<svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Đang dịch tất cả...`;
            btnAll.disabled = true;
            btnAll.classList.add('opacity-50', 'cursor-not-allowed');

            // Lọc ra các ngôn ngữ không phải tiếng Việt và chạy dịch đồng thời
            const targets = languages.filter(l => l.code !== 'vi');
            const translationPromises = targets.map(lang => autoTranslate(lang.code, lang.gtCode, true));
            
            await Promise.all(translationPromises);

            btnAll.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Hoàn tất!`;
            setTimeout(() => {
                btnAll.innerHTML = originalHtml;
                btnAll.disabled = false;
                btnAll.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 2000);
        }

        // --- LOAD VÀ HIỂN THỊ DỮ LIỆU ĐƯỢC TỐI ƯU ---
        async function loadData() {
            document.getElementById('statusMessage').innerHTML = `<span class="text-amber-600 font-medium">Đang tải vi.json gốc...</span>`;
            
            // 1. Tải vi.json trước tiên làm gốc
            try {
                const viResponse = await fetch(`./Asset/locales/vi.json?t=${new Date().getTime()}`);
                if (viResponse.ok) {
                    translations['vi'] = await viResponse.json();
                } else {
                    translations['vi'] = {}; // Đảm bảo luôn có object nếu lỗi
                }
            } catch (error) {
                console.warn("Chưa có vi.json hoặc lỗi tải. Sẽ khởi tạo trống.");
                translations['vi'] = {};
            }

            // 2. Tải các ngôn ngữ khác (Trống hoặc lỗi không sao cả)
            document.getElementById('statusMessage').innerHTML = `<span class="text-amber-600 font-medium">Đang kiểm tra các ngôn ngữ khác...</span>`;
            const otherLangs = languages.filter(l => l.code !== 'vi');
            
            const fetchPromises = otherLangs.map(async (lang) => {
                try {
                    const response = await fetch(`./Asset/locales/${lang.code}.json?t=${new Date().getTime()}`);
                    if (response.ok) {
                        translations[lang.code] = await response.json();
                    } else {
                        translations[lang.code] = {};
                    }
                } catch (error) {
                    translations[lang.code] = {};
                }
            });

            await Promise.all(fetchPromises);
            
            document.getElementById('statusMessage').innerHTML = `<span class="text-emerald-600 font-medium">Đã sẵn sàng.</span>`;
            renderSidebar();
        }

        function getAllKeys() {
            let allKeys = new Set();
            // Lấy toàn bộ key từ vi.json
            Object.keys(translations['vi']).forEach(key => allKeys.add(key));
            // Quét thêm nếu các file khác có key lạ (phòng hờ)
            languages.forEach(lang => {
                if(translations[lang.code]) {
                    Object.keys(translations[lang.code]).forEach(key => allKeys.add(key));
                }
            });
            return Array.from(allKeys).sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
        }

        function renderSidebar(filterText = "") {
            const keyList = document.getElementById('keyList');
            keyList.innerHTML = '';
            
            const keys = getAllKeys();
            
            keys.forEach(key => {
                if (filterText && !key.toLowerCase().includes(filterText.toLowerCase())) return;
                const viPreview = translations['vi'][key] || "Trống...";
                
                const div = document.createElement('div');
                div.className = `key-item p-4 border-b border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors border-l-4 border-l-transparent ${key === currentSelectedKey ? 'active' : ''}`;
                div.onclick = () => selectKey(key);
                
                div.innerHTML = `
                    <div class="font-mono text-sm font-semibold text-slate-800 break-all">${key}</div>
                    <div class="text-xs text-slate-500 mt-1 truncate" title="${viPreview}">${viPreview}</div>
                `;
                keyList.appendChild(div);
            });
        }

        function filterKeys() {
            const val = document.getElementById('searchInput').value;
            renderSidebar(val);
        }

        function selectKey(key) {
            currentSelectedKey = key;
            renderSidebar(document.getElementById('searchInput').value);
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('editorArea').classList.remove('hidden');
            document.getElementById('currentKeyLabel').innerHTML = `Đang chỉnh sửa: <span class="font-mono text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded">${key}</span>`;
            
            const editorContent = document.getElementById('editorContent');
            editorContent.innerHTML = '';

            languages.forEach(lang => {
                const value = (translations[lang.code] && translations[lang.code][key]) ? translations[lang.code][key] : '';
                
                // HTML nút Dịch Nhanh: 
                // Với 'vi' -> Nút "Dịch ra tất cả ngôn ngữ"
                // Với các ngôn ngữ khác -> Nút "Dịch từ tiếng Việt"
                const translateBtnHtml = lang.code !== 'vi' ? 
                    `<button id="btn-translate-${lang.code}" onclick="autoTranslate('${lang.code}', '${lang.gtCode}')" class="text-xs font-semibold text-indigo-600 hover:text-white hover:bg-indigo-600 bg-indigo-50 px-2.5 py-1.5 rounded-md transition-colors flex items-center gap-1 shadow-sm border border-indigo-100">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Dịch từ tiếng Việt
                    </button>` : 
                    `<button id="btn-translate-all" onclick="autoTranslateAll()" class="text-xs font-semibold text-amber-600 hover:text-white hover:bg-amber-600 bg-amber-50 px-2.5 py-1.5 rounded-md transition-colors flex items-center gap-1 shadow-sm border border-amber-100">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                        Dịch ra tất cả ngôn ngữ
                    </button>`;

                const block = document.createElement('div');
                block.className = "bg-white p-5 rounded-xl border border-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all";
                
                block.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <label class="flex items-center gap-2 text-sm font-semibold text-slate-700">
                            <span>${lang.flag}</span> ${lang.name} <span class="text-slate-400 font-normal">(${lang.code})</span>
                        </label>
                        ${translateBtnHtml}
                    </div>
                    <textarea 
                        id="input-${lang.code}"
                        oninput="updateValue('${lang.code}', this.value)"
                        class="w-full bg-transparent border-0 focus:ring-0 p-0 text-slate-800 resize-y min-h-[80px]"
                        placeholder="${lang.code === 'vi' ? 'Nhập nội dung ở đây...' : 'Bấm dịch hoặc tự nhập...'}">${value}</textarea>
                `;
                editorContent.appendChild(block);
            });
        }

        function updateValue(langCode, value) {
            if (!currentSelectedKey) return;
            if (!translations[langCode]) translations[langCode] = {};
            translations[langCode][currentSelectedKey] = value;
            
            if (langCode === 'vi') {
                renderSidebar(document.getElementById('searchInput').value);
            }
        }

        // --- CÁC TÍNH NĂNG SMART ADD (THÊM MỚI NHANH) ---
        function getNextIndex(prefix) {
            let max = 0;
            const keys = getAllKeys();
            keys.forEach(k => {
                if (k.startsWith(prefix)) {
                    const match = k.match(new RegExp(`^${prefix}_?(\\d+)`)); 
                    if (match && match[1]) {
                        max = Math.max(max, parseInt(match[1]));
                    }
                }
            });
            return max + 1;
        }

        function addMultipleKeys(newKeys) {
            let firstKey = newKeys[0];
            newKeys.forEach(cleanKey => {
                languages.forEach(lang => {
                    if (!translations[lang.code]) translations[lang.code] = {};
                    translations[lang.code][cleanKey] = "";
                });
            });
            
            document.getElementById('searchInput').value = '';
            renderSidebar();
            selectKey(firstKey);
        }

        function addSmartSkill() {
            const nextIdx = getNextIndex('Skill');
            const keysToAdd = [`Skill_${nextIdx}_Name`, `Skill_${nextIdx}_Percent`];
            addMultipleKeys(keysToAdd);
            alert(`Đã tự động tạo các biến: ${keysToAdd.join(', ')}`);
        }

        function addSmartExp() {
            const nextIdx = getNextIndex('Exp');
            const keysToAdd = [`Exp_${nextIdx}_Time`, `Exp_${nextIdx}_Name`, `Exp_${nextIdx}_Role`, `Exp_${nextIdx}_Desc`];
            addMultipleKeys(keysToAdd);
            alert(`Đã tự động tạo các biến: ${keysToAdd.join(', ')}`);
        }

        function addNewKey() {
            const newKey = prompt("Nhập tên từ khóa mới (VD: Quote, Fullname...):");
            if (newKey) {
                const cleanKey = newKey.trim();
                const keys = getAllKeys();
                if (keys.includes(cleanKey)) {
                    alert("Khóa này đã tồn tại!");
                    return;
                }
                addMultipleKeys([cleanKey]);
            }
        }

        function deleteCurrentKey() {
            if (!currentSelectedKey) return;
            if (confirm(`Bạn có chắc chắn muốn xóa "${currentSelectedKey}" khỏi toàn bộ các ngôn ngữ không?`)) {
                languages.forEach(lang => {
                    if(translations[lang.code]) delete translations[lang.code][currentSelectedKey];
                });
                
                currentSelectedKey = null;
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('editorArea').classList.add('hidden');
                document.getElementById('currentKeyLabel').innerHTML = "Hãy chọn từ khóa để chỉnh sửa";
                renderSidebar(document.getElementById('searchInput').value);
            }
        }

        // --- XEM VÀ TẢI XUỐNG JSON ---
        function viewJSON(langCode) {
            const data = translations[langCode] || {};
            const jsonString = JSON.stringify(data, null, 4);
            const langName = languages.find(l => l.code === langCode).name;
            
            document.getElementById('jsonModalTitle').innerText = `Dữ liệu JSON - ${langName} (${langCode}.json)`;
            document.getElementById('jsonModalContent').textContent = jsonString;
            
            document.getElementById('btnDownloadJson').onclick = () => downloadJSON(langCode, jsonString);
            
            const copyBtn = document.getElementById('btnCopyJson');
            copyBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> Copy Nội Dung`;
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(jsonString).then(() => {
                    const originalHtml = copyBtn.innerHTML;
                    copyBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Đã Copy!`;
                    setTimeout(() => copyBtn.innerHTML = originalHtml, 2000);
                });
            };

            document.getElementById('jsonModal').classList.remove('hidden');
        }

        function closeJsonModal() {
            document.getElementById('jsonModal').classList.add('hidden');
        }

        function downloadJSON(langCode, jsonString) {
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${langCode}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.getElementById('jsonModal').addEventListener('click', function(e) {
            if (e.target === this) closeJsonModal();
        });

        loadData();
    </script>
</body>
</html>
