<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu đơn hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
        <h1 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Tra Cứu Đơn Hàng</h1>

        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Nhập mã đơn hàng của bạn..."
                class="uppercase w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition">
        </div>
        <button id="searchBtn"
            class="w-full bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition">
            Tra cứu
        </button>

        <div id="loading" class="hidden text-center mt-4 text-gray-500">Đang tìm kiếm...</div>

        <div id="resultArea" class="hidden mt-6 pt-6 border-t border-gray-100">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Thông tin đơn hàng</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-500">Mã đơn:</span>
                    <span id="resOrderId" class="font-medium text-gray-800"></span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-500">Người mua:</span>
                    <span id="resBuyer" class="font-medium text-gray-800"></span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                    <span class="text-gray-500">Sản phẩm:</span>
                    <span id="resProduct" class="font-medium text-gray-800 text-right max-w-[60%]"></span>
                </div>
                <div class="flex justify-between items-start pt-2">
                    <span class="text-gray-500">Hạn sử dụng:</span>
                    <div class="text-right">
                        <div id="resExpiryDate" class="font-semibold text-gray-800"></div>
                        <div id="resExpiryDays" class="text-sm mt-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorArea" class="hidden mt-4 p-4 bg-red-50 text-red-600 text-sm rounded-lg text-center">
            Không tìm thấy đơn hàng. Vui lòng kiểm tra lại mã!
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3iNgTEPWTLts2MoFEZm29WjAgqIeS6bs",
            authDomain: "tra-cuu-hunq.firebaseapp.com",
            projectId: "tra-cuu-hunq",
            storageBucket: "tra-cuu-hunq.firebasestorage.app",
            messagingSenderId: "132028098824",
            appId: "1:132028098824:web:6e2f550fc8a08fb6b424bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('searchBtn').addEventListener('click', async () => {
            const searchInput = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!searchInput) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('errorArea').classList.add('hidden');

            try {
                const q = query(collection(db, "orders"), where("orderId", "==", searchInput));
                const querySnapshot = await getDocs(q);

                document.getElementById('loading').classList.add('hidden');

                if (querySnapshot.empty) {
                    document.getElementById('errorArea').classList.remove('hidden');
                } else {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        document.getElementById('resOrderId').innerText = data.orderId;
                        document.getElementById('resBuyer').innerText = data.buyerName;
                        document.getElementById('resProduct').innerText = data.productName;

                        // Tính toán hạn sử dụng
                        const expDate = new Date(data.expiryDate);
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        expDate.setHours(0, 0, 0, 0);

                        const diffTime = expDate - today;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                        // Hiển thị ngày cụ thể
                        const formattedDate = expDate.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                        document.getElementById('resExpiryDate').innerText = formattedDate;

                        const daysEl = document.getElementById('resExpiryDays');
                        if (diffDays > 0) {
                            daysEl.innerText = `(Còn ${diffDays} ngày)`;
                            daysEl.className = "text-sm mt-1 text-green-600 font-medium";
                        } else if (diffDays === 0) {
                            daysEl.innerText = `(Hết hạn hôm nay)`;
                            daysEl.className = "text-sm mt-1 text-yellow-600 font-medium";
                        } else {
                            daysEl.innerText = `(Đã hết hạn ${Math.abs(diffDays)} ngày)`;
                            daysEl.className = "text-sm mt-1 text-red-600 font-medium";
                        }
                    });
                    document.getElementById('resultArea').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Lỗi: ", error);
                document.getElementById('loading').classList.add('hidden');
                alert("Có lỗi xảy ra khi kết nối dữ liệu.");
            }
        });
    </script>
</body>

</html>
