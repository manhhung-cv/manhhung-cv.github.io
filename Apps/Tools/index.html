<!DOCTYPE html>
<html lang="vi" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hunq AIO | Workspace</title>
    <meta name="description" content="Tiện ích hỗ trợ tốt cho công việc & đời sống">
    <meta name="author" content="Hunq">
    <meta name="theme-color" content="#ffffff">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="mhung.siite">
    <link rel="icon" href="/Asset/logo/logo.png">

    <meta property="og:url" content="mhung.siite">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Hunq AIO | Workspace">
    <meta property="og:description" content="Tiện ích hỗ trợ tốt cho công việc & đời sống">
    <meta property="og:image" content="/Asset/Banner/Banner.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="mhung.siite">
    <meta property="twitter:url" content="mhung.siite">
    <meta name="twitter:title" content="Hunq AIO | Workspace">
    <meta name="twitter:description" content="Tiện ích hỗ trợ tốt cho công việc & đời sống">
    <meta name="twitter:image" content="/Asset/Banner/Banner.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Hunq AIO">
    <link rel="apple-touch-icon" href="/Asset/logo/iconApps.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
        integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Addon JS -->
    <script src="./js/jszip.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        zinc: { 950: '#09090b', 900: '#121214', 800: '#1e1e20' }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-[#fafafa] dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-500 overflow-hidden h-screen flex flex-col">

    <header
        class="flex-none z-50 bg-white/70 dark:bg-zinc-950/70 backdrop-blur-xl border-b border-zinc-200/50 dark:border-zinc-800/50">
        <div class="max-w-[1600px] mx-auto h-12 md:h-14 px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="logo-btn" class="flex items-center gap-2 group focus:outline-none" title="Cuộn lên đầu">
                    <div
                        class="w-7 h-7 rounded-lg bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 flex items-center justify-center text-[10px] shadow-sm group-hover:scale-105 transition-transform">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="font-bold text-sm tracking-tight hidden sm:block">Hunq AIO</span>
                </button>

                <div class="h-4 w-px bg-zinc-200 dark:border-zinc-800 mx-1 hidden md:block"></div>

                <button id="open-cmd"
                    class="flex items-center gap-3 px-3 py-1.5 hover:bg-zinc-100 dark:hover:bg-zinc-900/50 rounded-xl transition-all group">
                    <i
                        class="fas fa-search text-[12px] text-zinc-400 group-hover:text-zinc-900 dark:group-hover:text-white"></i>
                    <span class="text-xs text-zinc-400 hidden lg:block">Tìm nhanh...</span>
                </button>
            </div>

            <div class="flex items-center gap-1">
                <button id="toggle-tabs"
                    class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all text-zinc-500 hover:text-zinc-900 dark:hover:text-white"
                    title="Ẩn/Hiện thanh Tab">
                    <i class="fas fa-table-columns text-xs"></i>
                </button>
                <button id="theme-toggle"
                    class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all text-zinc-500 hover:text-zinc-900 dark:hover:text-white">
                    <i class="fas fa-desktop text-xs"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="tab-strip-container"
        class="flex-none bg-white/50 dark:bg-zinc-950/50 backdrop-blur-md border-b border-zinc-200/50 dark:border-zinc-800/50 flex items-center px-2 py-1.5 shadow-sm z-40 transition-all duration-300 origin-top">
        <div class="pr-2 mr-1 border-r border-zinc-200 dark:border-zinc-800 flex-none">
            <button onclick="window.openToolGlobal('home')"
                class="w-7 h-7 flex items-center justify-center text-zinc-500 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">
                <i class="fas fa-home text-[12px]"></i>
            </button>
        </div>
        <nav class="flex items-center gap-1.5 overflow-x-auto hide-scrollbar flex-1" id="tab-strip"></nav>
        <div class="pl-2 ml-1 border-l border-zinc-200 dark:border-zinc-800 flex-none flex items-center gap-2">
            <span id="tab-count-badge"
                class="text-[10px] font-bold bg-zinc-100 dark:bg-zinc-800 text-zinc-500 px-1.5 py-0.5 rounded-md border border-zinc-200 dark:border-zinc-700">0</span>
            <button id="new-tab-btn"
                class="w-7 h-7 flex items-center justify-center text-zinc-500 hover:text-zinc-900 dark:hover:text-white hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-lg transition-colors">
                <i class="fas fa-plus text-[10px]"></i>
            </button>
        </div>
    </div>

    <main id="app-viewport" class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth">
        <div id="tab-contents-container" class="max-w-5xl mx-auto p-4 md:p-8"></div>

        <button id="back-to-top"
            class="fixed bottom-6 right-6 w-11 h-11 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-800 rounded-full shadow-xl flex items-center justify-center text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all transform translate-y-20 opacity-0 z-50">
            <i class="fas fa-arrow-up text-sm"></i>
        </button>
    </main>

    <div id="cmd-palette"
        class="fixed inset-0 z-[100] bg-zinc-950/40 backdrop-blur-sm hidden flex items-start justify-center pt-[15vh] px-4 opacity-0 transition-opacity duration-300">
        <div
            class="w-full max-w-xl bg-white/90 dark:bg-zinc-900/90 rounded-2xl shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="flex items-center p-4 border-b border-zinc-200/50 dark:border-zinc-800/50">
                <input type="text" id="cmd-input" placeholder="Gõ tên công cụ..."
                    class="flex-1 bg-transparent border-none outline-none text-base">
            </div>
            <ul id="cmd-results" class="max-h-[50vh] overflow-y-auto py-2"></ul>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 left-6 z-[110] flex flex-col gap-2 pointer-events-none"></div>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
