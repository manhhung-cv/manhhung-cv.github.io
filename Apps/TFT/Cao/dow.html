<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TFT Asset Tool - Smart Reuse Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 25px; border: none; background: #e4e6eb; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .tab-btn.active { background: #1a73e8; color: white; }
        textarea { width: 100%; height: 300px; border: 1px solid #ddd; border-radius: 8px; padding: 15px; font-family: 'Fira Code', monospace; font-size: 13px; box-sizing: border-box; background: #fafafa; }
        .settings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#process { background: #28a745; color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button#process:hover { background: #218838; }
        #log { margin-top: 20px; padding: 15px; background: #1e1e1e; color: #00ff00; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 250px; overflow-y: auto; }
        .skip { color: #888; } /* Màu cho các file được tái sử dụng */
    </style>
</head>
<body>

<div class="container">
    <h2>TFT Asset Tool: Smart Reuse Edition</h2>
    
    <div class="tabs">
        <button id="btnChamps" class="tab-btn active" onclick="switchTab('champs', this)">Tướng (Array)</button>
        <button id="btnItems" class="tab-btn" onclick="switchTab('items', this)">Trang bị (Object)</button>
    </div>

    <textarea id="jsonInput" placeholder="Dán JSON vào đây..."></textarea>

    <div class="settings">
        <div>
            <label>Thư mục ảnh chính:</label>
            <input type="text" id="pathMain" value="./asset/champs">
        </div>
        <div>
            <label>Thư mục Icons chỉ số:</label>
            <input type="text" id="pathIcon" value="./asset/iconother">
        </div>
        <div>
            <label>Tên file ZIP:</label>
            <input type="text" id="zipName" value="tft_smart_assets.zip">
        </div>
    </div>

    <button id="process" onclick="run()">BẮT ĐẦU XỬ LÝ & TỐI ƯU FILE</button>
    <div id="log" style="display:none"></div>
</div>

<script>
    let currentMode = 'champs';

    function switchTab(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('pathMain').value = mode === 'champs' ? './asset/champs' : './asset/items';
    }

    function cleanFileName(str) {
        if (!str) return "unknown";
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[đĐ]/g, 'd').replace(/\s+/g, '').replace(/[^a-zA-Z0-9]/g, '');
    }

    async function run() {
        const input = document.getElementById('jsonInput').value;
        const mainPath = document.getElementById('pathMain').value.replace(/\/$/, "");
        const iconPath = document.getElementById('pathIcon').value.replace(/\/$/, "");
        const logDiv = document.getElementById('log');
        const btn = document.getElementById('process');
        
        // Cấu trúc Set để theo dõi các file đã tải
        const downloadedFiles = new Set();
        
        try {
            const rawData = JSON.parse(input);
            const zip = new JSZip();
            const mainFolder = zip.folder("images");
            const iconFolder = zip.folder("iconother");
            
            logDiv.style.display = "block";
            logDiv.innerHTML = "<b>[1/3] Đang phân tích...</b><br>";
            btn.disabled = true;

            let itemsToProcess = [];
            if (currentMode === 'items') {
                for (let cat in rawData) { rawData[cat].forEach(i => itemsToProcess.push(i)); }
            } else { itemsToProcess = rawData; }

            for (let obj of itemsToProcess) {
                // 1. Xử lý ảnh chính (image) - Thường là duy nhất cho mỗi tướng/item
                if (obj.image && obj.image.startsWith('http')) {
                    const mainUrl = obj.image;
                    const mainExt = mainUrl.split('.').pop().split(/\#|\?/)[0] || 'png';
                    const mainFile = `${cleanFileName(obj.name)}.${mainExt}`;
                    
                    if (!downloadedFiles.has(mainFile)) {
                        try {
                            const res = await fetch(mainUrl);
                            const blob = await res.arrayBuffer();
                            mainFolder.file(mainFile, blob);
                            downloadedFiles.add(mainFile);
                            logDiv.innerHTML += `✓ Tải ảnh chính: ${mainFile}<br>`;
                        } catch(e) { logDiv.innerHTML += `<span style="color:red">✗ Lỗi: ${mainFile}</span><br>`; }
                    }
                    obj.image = `${mainPath}/${mainFile}`;
                }

                // 2. Xử lý Icons (stats) - ĐÂY LÀ NƠI TỐI ƯU TÁI SỬ DỤNG
                if (obj.stats && Array.isArray(obj.stats)) {
                    for (let stat of obj.stats) {
                        if (stat.icon && stat.icon.startsWith('http')) {
                            const iconUrl = stat.icon;
                            const iconFileName = iconUrl.substring(iconUrl.lastIndexOf('/') + 1).split(/\#|\?/)[0];
                            
                            // Kiểm tra xem icon này đã được tải chưa
                            if (!downloadedFiles.has(iconFileName)) {
                                try {
                                    const res = await fetch(iconUrl);
                                    const blob = await res.arrayBuffer();
                                    iconFolder.file(iconFileName, blob);
                                    downloadedFiles.add(iconFileName); // Đánh dấu đã tải
                                    logDiv.innerHTML += `✓ Tải Icon mới: ${iconFileName}<br>`;
                                } catch(e) { logDiv.innerHTML += `<span style="color:orange">✗ Lỗi Icon: ${iconFileName}</span><br>`; }
                            } else {
                                // Nếu đã tải rồi, chỉ ghi log thông báo tái sử dụng (optional)
                                logDiv.innerHTML += `<span class="skip">→ Tái sử dụng: ${iconFileName}</span><br>`;
                            }
                            // Luôn cập nhật lại link trong JSON cho dù tải mới hay tái sử dụng
                            stat.icon = `${iconPath}/${iconFileName}`;
                        }
                    }
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            logDiv.innerHTML += "<b>[3/3] Đang đóng gói...</b><br>";
            zip.file("data_updated.json", JSON.stringify(rawData, null, 4));
            const zipContent = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipContent);
            link.download = document.getElementById('zipName').value;
            link.click();
            logDiv.innerHTML += "<b style='color:#00ff00'>HOÀN TẤT!</b>";
            btn.disabled = false;
        } catch (e) { alert("Lỗi JSON!"); btn.disabled = false; }
    }
</script>
</body>
</html>
