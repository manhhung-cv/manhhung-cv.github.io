<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MetaTFT Scraper - Kai'Sa Build</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #output { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; white-space: pre-wrap; overflow-x: auto; max-height: 500px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        .status { margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Cào dữ liệu Kai'Sa MetaTFT</h1>
    
    <div class="controls">
        <button id="btnStart">Bắt đầu cào dữ liệu</button>
        <span id="status" class="status">Sẵn sàng</span>
    </div>

    <h3>Dữ liệu JSON:</h3>
    <pre id="output">Chưa có dữ liệu...</pre>

    <script>
        // Danh sách 5 Proxy vượt CORS dự phòng
        const PROXY_LIST = [
            "https://api.allorigins.win/get?url=",
            "https://corsproxy.io/?",
            "https://thingproxy.freeboard.io/fetch/",
            "https://api.codetabs.com/v1/proxy/?quest=",
            "https://cors-anywhere.herokuapp.com/" // Cần kích hoạt demo trước khi dùng
        ];

        const TARGET_URL = "https://www.metatft.com/units/Kaisa?set=TFTSet17";

        async function fetchData() {
            const btn = document.getElementById('btnStart');
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            btn.disabled = true;
            output.textContent = "Đang tải...";

            let htmlContent = "";
            let success = false;

            // Thử lần lượt các Proxy
            for (let i = 0; i < PROXY_LIST.length; i++) {
                try {
                    status.textContent = `Đang thử Proxy ${i + 1}...`;
                    const proxyUrl = PROXY_LIST[i] + encodeURIComponent(TARGET_URL);
                    
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error("Proxy error");

                    const data = await response.json();
                    // AllOrigins trả về data.contents, các proxy khác trả trực tiếp text
                    htmlContent = data.contents || data; 
                    
                    if (htmlContent) {
                        success = true;
                        break;
                    }
                } catch (err) {
                    console.warn(`Proxy ${i + 1} thất bại, thử proxy tiếp theo...`);
                }
            }

            if (!success) {
                status.textContent = "Thất bại: Tất cả proxy đều không phản hồi.";
                btn.disabled = false;
                return;
            }

            status.textContent = "Đang xử lý dữ liệu...";
            parseData(htmlContent);
            btn.disabled = false;
        }

        function parseData(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const results = [];

            // Tìm tất cả các dòng chứa build (ItemHolderRow)
            const rows = doc.querySelectorAll('.ItemHolderRow');

            rows.forEach(row => {
                // Lấy danh sách trang bị
                const items = [];
                row.querySelectorAll('.BuildImg img').forEach(img => {
                    items.push(img.getAttribute('alt'));
                });

                // Lấy các chỉ số
                const avgPlace = row.querySelector('.ItemHolderStatAvgPlace .ItemHolderStatNum')?.textContent || "";
                const delta = row.querySelector('.ItemHolderStat:nth-child(3) .ItemHolderStatNum')?.textContent || "";
                const pickRate = row.querySelector('.ItemHolderStatNumPercent')?.textContent || "";

                results.push({
                    items: items,
                    stats: {
                        average_placement: avgPlace,
                        delta: delta,
                        pick_rate: pickRate
                    }
                });
            });

            if (results.length === 0) {
                document.getElementById('output').textContent = "Không tìm thấy dữ liệu cấu trúc phù hợp. Có thể trang web đã thay đổi cấu trúc hoặc Proxy không render được JS.";
                document.getElementById('status').textContent = "Lỗi cấu trúc";
            } else {
                document.getElementById('output').textContent = JSON.stringify(results, null, 4);
                document.getElementById('status').textContent = "Hoàn tất!";
            }
        }

        document.getElementById('btnStart').addEventListener('click', fetchData);
    </script>
</body>
</html>
