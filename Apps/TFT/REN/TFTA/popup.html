<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
      --primary: #E91E63; --primary-hover: #c2185b;
      --secondary: #8b5cf6; --secondary-hover: #7c3aed;
      --border: #e2e8f0; --input-bg: #f8fafc;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; width: 320px; margin: 0; padding: 20px; background: var(--bg); color: var(--text-main); }
    .header { text-align: center; margin-bottom: 20px; }
    .header h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .header p { margin: 4px 0 0; font-size: 12px; color: var(--text-sub); }
    
    .input-group { margin-bottom: 10px; }
    input[type="number"], input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; text-align: center; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text-main); outline: none; transition: 0.2s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1); }
    
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; padding: 10px; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--border); }
    .cb-label { display: flex; align-items: center; font-size: 12px; cursor: pointer; color: var(--text-main); }
    .cb-label input { margin-right: 6px; width: auto; cursor: pointer; }

    .btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s ease; }
    .btn:active { transform: scale(0.98); }
    #btnV1 { background: var(--primary); box-shadow: 0 4px 12px rgba(233, 30, 99, 0.25); }
    #btnV1:hover { background: var(--primary-hover); box-shadow: 0 6px 16px rgba(233, 30, 99, 0.35); }
    #btnPRO { background: var(--secondary); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25); }
    #btnPRO:hover { background: var(--secondary-hover); box-shadow: 0 6px 16px rgba(139, 92, 246, 0.35); }
  </style>
</head>
<body>
  <div class="header">
    <h3>🚀 TFT DATA SCRAPER</h3>
    <p>Cấu hình tùy chọn lấy dữ liệu</p>
  </div>

  <div class="input-group">
    <input type="number" id="limitInput" placeholder="Số lượng (Để trống = Tất cả)">
  </div>
  <div class="input-group">
    <input type="text" id="customInput" placeholder="Ghi chú custom (vd: Đội hình 14.1)">
  </div>

  <div class="options-grid">
    <label class="cb-label"><input type="checkbox" id="optTitle" checked> Tên Đội Hình</label>
    <label class="cb-label"><input type="checkbox" id="optTags" checked> Tags/Rank</label>
    <label class="cb-label"><input type="checkbox" id="optUnits" checked> Tướng & Items</label>
    <label class="cb-label"><input type="checkbox" id="optCode" checked> Copy Team Code</label>
    <label class="cb-label"><input type="checkbox" id="optEarly" checked> Early Options</label>
    <label class="cb-label"><input type="checkbox" id="optQuick" checked> Lên cấp / Đi chợ</label>
    <label class="cb-label"><input type="checkbox" id="optBoard" checked> Vị trí Bàn Cờ</label>
    <label class="cb-label"><input type="checkbox" id="optAugments" checked> Lõi (Bản PRO)</label>
  </div>

  <button id="btnV1" class="btn">🎯 CÀO BẢN META (V1)</button>
  <button id="btnPRO" class="btn">👑 CÀO BẢN TFTA (PRO)</button>
  
  <script src="popup.js"></script>
</body>
</html>
