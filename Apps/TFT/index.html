                            </div>`;
                            } else {
                                boardContainer.innerHTML += `<div class="absolute z-10 transition-all duration-200 cursor-pointer scale-[0.95] group hover:scale-100 hover:z-20" style="width: 13.333%; height: 30.769%; left: ${left}%; top: ${top}%;" onclick="window.handleHexClick(${r}, ${c})" ondragover="event.preventDefault(); this.classList.add('scale-105', 'brightness-150');" ondragleave="this.classList.remove('scale-105', 'brightness-150');" ondrop="window.handleBuilderDrop(event, ${r}, ${c}); this.classList.remove('scale-105', 'brightness-150');"><div class="absolute inset-0 bg-slate-300 dark:bg-slate-700/60 opacity-60 group-hover:opacity-100 group-hover:bg-premium-gold/50 transition-colors" style="${hexClip}"></div><div class="absolute w-[94%] h-[94%] left-[3%] top-[3%] bg-slate-100 dark:bg-[#121a28] group-hover:bg-slate-200 transition-colors" style="${hexClip}"></div></div>`;
                            }
                        }
                    }
                };

                const renderPool = () => {
                    const pool = document.getElementById('builder-pool-container');
                    if (!pool) return;
                    const query = window._builderSearchQuery.toLowerCase();
                    const gridClass = "grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-2 px-1";
                    let poolHTML = '';

                    if (window._builderActiveTab === 'champ') {
                        const filtered = champsData.filter(c => c.name.toLowerCase().includes(query) && (window._builderActiveTraits.size === 0 || [...window._builderActiveTraits].every(st => c.traits.some(t => t.name === st))));
                        [1, 2, 3, 4, 5].forEach(tier => {
                            const champsInTier = filtered.filter(c => c.cost === tier);
                            if (champsInTier.length === 0) return;
                            let tierColor = 'text-slate-600 dark:text-slate-400'; let tierBg = 'bg-slate-400';
                            if (tier === 2) tierColor = 'text-emerald-600'; if (tier === 3) tierColor = 'text-blue-600'; if (tier === 4) tierColor = 'text-purple-600'; if (tier === 5) tierColor = 'text-yellow-600';
                            poolHTML += `<div class="flex flex-col gap-3 mb-2"><div class="flex items-center gap-2 sticky top-0 bg-white/95 dark:bg-premium-card/95 backdrop-blur-md z-20 py-1.5"><div class="w-1.5 h-4 rounded-full ${tierBg}"></div><h4 class="text-[11px] font-black ${tierColor} uppercase tracking-wider">${tier} VÀNG</h4><div class="flex-1 h-[1px] bg-gradient-to-r from-slate-200 dark:from-white/10 to-transparent"></div></div><div class="${gridClass}">${champsInTier.map(champ => `<div class="relative w-full aspect-square rounded-lg overflow-hidden cursor-pointer transition-all ${window._builderActiveTool?.id === champ.name ? 'ring-[3px] ring-premium-gold scale-105 z-10' : 'ring-[1px] ring-slate-300 dark:ring-white/20'}" onclick="window.selectBuilderTool('champ', '${escapeJS(champ.name)}')" draggable="true" ondragstart="window.handleBuilderDragStart(event, 'champ', '${escapeJS(champ.name)}')"><img src="${champ.image}" class="w-full h-full object-cover object-[80%] bg-black pointer-events-none"><div class="absolute top-1 left-1 flex flex-col gap-[3px] pointer-events-none z-10 opacity-95">${champ.traits.slice(0, 3).map(t => `<div class="w-3 h-3 bg-white" style="-webkit-mask-image: url('./asset/traits/${getTraitIconName(t.name)}.svg'); mask-image: url('./asset/traits/${getTraitIconName(t.name)}.svg'); -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center;"></div>`).join('')}</div><div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 pt-5 pb-1 px-1 text-center pointer-events-none"><span class="block text-[10px] font-bold text-white truncate drop-shadow-md leading-none">${champ.name}</span></div></div>`).join('')}</div></div>`;
                        });
                    } else {
                        const categories = [{ key: 'normal', name: 'Cơ Bản' }, { key: 'emblem', name: 'Ấn Hệ Tộc' }, { key: 'radiant', name: 'Ánh Sáng' }, { key: 'artifact', name: 'Tạo Tác' }, { key: 'support', name: 'Hỗ Trợ' }];
                        categories.forEach(cat => {
                            const itemsInCat = itemsList.filter(i => i.name.toLowerCase().includes(query) && (i.category?.toLowerCase() || 'normal') === cat.key);
                            if (itemsInCat.length === 0) return;
                            poolHTML += `<div class="flex flex-col gap-3 mb-2"><div class="flex items-center gap-2 sticky top-0 bg-white/95 dark:bg-premium-card/95 backdrop-blur-md z-20 py-1.5"><div class="w-1.5 h-4 rounded-full bg-rose-500"></div><h4 class="text-[11px] font-black text-slate-600 uppercase tracking-wider">${cat.name}</h4><div class="flex-1 h-[1px] bg-gradient-to-r from-slate-200 dark:from-white/10 to-transparent"></div></div><div class="${gridClass}">${itemsInCat.map(item => `<div class="relative w-full aspect-square rounded-lg overflow-hidden cursor-pointer transition-all ${window._builderActiveTool?.id === item.name ? 'ring-[3px] ring-rose-400 scale-105 z-10' : 'ring-[1px] ring-slate-300 dark:ring-white/20'}" onclick="window.selectBuilderTool('item', '${escapeJS(item.name)}')" draggable="true" ondragstart="window.handleBuilderDragStart(event, 'item', '${escapeJS(item.name)}')"><img src="${item.image}" class="w-full h-full object-cover bg-black pointer-events-none"><div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 pt-5 pb-1 px-1 text-center pointer-events-none"><span class="block text-[9px] font-bold text-white truncate drop-shadow-md leading-none">${item.name}</span></div></div>`).join('')}</div></div>`;
                        });
                    }
                    pool.innerHTML = poolHTML || '<p class="text-center text-[11.5px] text-slate-500 py-6">Không tìm thấy kết quả.</p>';
                };

                // --- 4. TƯƠNG TÁC & LOGIC ---
                const attachFilterEvents = () => {
                    document.querySelectorAll('.builder-filter-trait-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            const trait = e.currentTarget.dataset.trait;
                            if (window._builderActiveTraits.has(trait)) window._builderActiveTraits.delete(trait);
                            else window._builderActiveTraits.add(trait);
                            renderBuilderInterface();
                        };
                    });
                };

                window.setBuilderTab = (tab) => {
                    window._builderActiveTab = tab;
                    window._builderSearchQuery = '';
                    window._builderActiveTool = null;
                    renderBuilderInterface();
                };

                window.updateBuilderSearch = (val) => { window._builderSearchQuery = val; renderPool(); };

                window.selectBuilderTool = (type, id) => {
                    if (window._builderActiveTool?.id === id) window._builderActiveTool = null;
                    else window._builderActiveTool = { type, id, r: -1, c: -1 };
                    renderBoard(); renderPool();
                };

                window.handleHexClick = (r, c) => {
                    const tool = window._builderActiveTool;
                    const cell = window._builderBoardState[r][c];
                    if (tool) {
                        if (tool.type === 'champ') {
                            window._builderBoardState[r][c] = { champ: tool.id, items: [] };
                            window._builderActiveTool = null;
                        } else if (tool.type === 'item') {
                            if (cell) {
                                if (cell.items.length < 3) cell.items.push(tool.id);
                                else uiAlert('Đầy đồ', 'Tướng chỉ mang tối đa 3 trang bị.', 'info');
                                window._builderActiveTool = null;
                            }
                        } else if (tool.type === 'move') {
                            if (tool.r === r && tool.c === c) window._builderActiveTool = null;
                            else {
                                const temp = window._builderBoardState[r][c];
                                window._builderBoardState[r][c] = window._builderBoardState[tool.r][tool.c];
                                window._builderBoardState[tool.r][tool.c] = temp;
                                window._builderActiveTool = null;
                            }
                        }
                    } else if (cell) {
                        window._builderActiveTool = { type: 'move', id: cell.champ, r, c };
                    }
                    renderBoard(); renderPool();
                };

                window.removeBuilderEntity = (r, c) => {
                    window._builderBoardState[r][c] = null;
                    window._builderActiveTool = null;
                    renderBoard();
                };

                window.handleBuilderDragStart = (e, type, id, r = -1, c = -1) => {
                    e.dataTransfer.setData('text/plain', JSON.stringify({ type, id, r, c }));
                    window._builderActiveTool = { type, id, r, c }; renderBoard(); renderPool();
                };

                window.handleBuilderDrop = (e, r, c) => {
                    e.preventDefault();
                    try { window._builderActiveTool = JSON.parse(e.dataTransfer.getData('text/plain')); window.handleHexClick(r, c); } catch (err) { }
                };

                // (Chèn thêm nút này vào HTML của renderBuilderInterface, ngay cạnh nút Nhập)
                // <button onclick="window.openLoadMenu()" class="px-2.5 py-1.5 rounded-lg bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-500 hover:text-white border border-emerald-500/30 text-[10.5px] font-bold shadow-sm outline-none transition-colors"><i class="fa-solid fa-folder-open"></i> Đã Lưu</button>

                // =======================================================
                // --- 5. HỆ THỐNG LƯU TRỮ (TỰ ĐỘNG + 5 SLOT THỦ CÔNG) ---
                // =======================================================
                const BUILDER_STORAGE_KEY = 'tft_builder_saves_v2';
                
                // Lấy toàn bộ data
                window.getAllSavedData = () => {
                    const data = localStorage.getItem(BUILDER_STORAGE_KEY);
                    return data ? JSON.parse(data) : { auto: null, manual: [] };
                };

                // Lưu TỰ ĐỘNG (Sẽ gọi ngầm khi có thay đổi trên bàn cờ)
                window.autoSaveBoard = () => {
                    const data = window.getAllSavedData();
                    const now = new Date();
                    const timeString = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} ${now.getDate()}/${now.getMonth() + 1}`;
                    data.auto = {
                        name: `Bản lưu Tự động (${timeString})`,
                        board: window._builderBoardState
                    };
                    localStorage.setItem(BUILDER_STORAGE_KEY, JSON.stringify(data));
                };

                // Lưu THỦ CÔNG (Đổi nút "Lưu Tạm" thành lưu có tên)
                window.saveLocalBoard = () => {
                    const data = window.getAllSavedData();
                    if (data.manual.length >= 5) {
                        uiAlert('Lỗi đầy bộ nhớ', 'Bạn đã lưu tối đa 5 đội hình. Vui lòng mở Danh sách Đã lưu để xóa bớt!', 'error');
                        return;
                    }
                    
                    // Xây dựng giao diện ô nhập liệu (Input) nhúng vào Modal
                    const inputHTML = `
                        <div class="flex flex-col gap-2 mt-1 text-left">
                            <p class="text-[11.5px] text-slate-500 dark:text-slate-400">Vui lòng đặt tên để dễ dàng quản lý (tối đa 5 bản lưu).</p>
                            <input type="text" id="custom-save-name" placeholder="VD: Đội hình Exodia..." 
                                class="w-full bg-slate-100 dark:bg-black/40 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2.5 text-[13px] text-slate-800 dark:text-white focus:outline-none focus:border-premium-gold dark:focus:border-premium-gold transition-colors mt-1 shadow-inner" 
                                autocomplete="off">
                        </div>
                    `;

                    // Tận dụng hàm uiConfirm có sẵn để làm Modal đặt tên
                    uiConfirm('Lưu Đội Hình', inputHTML, () => {
                        const nameInput = document.getElementById('custom-save-name');
                        const saveName = nameInput ? nameInput.value.trim() : '';
                        
                        // Kiểm tra nếu người dùng để trống
                        if (!saveName || saveName === "") {
                            // Delay 100ms để modal cũ kịp đóng trước khi mở modal lỗi
                            setTimeout(() => uiAlert('Lỗi', 'Tên đội hình không được để trống!', 'error'), 100);
                            return;
                        }

                        // Tiến hành lưu nếu hợp lệ
                        data.manual.push({
                            id: Date.now(),
                            name: saveName,
                            board: JSON.parse(JSON.stringify(window._builderBoardState)) // Tránh dính reference
                        });
                        localStorage.setItem(BUILDER_STORAGE_KEY, JSON.stringify(data));
                        
                        setTimeout(() => uiAlert('Thành công', `Đã lưu đội hình: <b class="text-premium-gold">${saveName}</b>`, 'info'), 100);
                    });

                    // UX Trick: Tự động trỏ chuột (focus) vào ô nhập và bắt phím Enter
                    setTimeout(() => {
                        const inp = document.getElementById('custom-save-name');
                        if (inp) {
                            inp.focus();
                            inp.addEventListener('keypress', (e) => {
                                if (e.key === 'Enter') {
                                    // Tìm và bấm vào nút "Xác nhận" (nút thứ 2 trong modalActions)
                                    const confirmBtn = document.getElementById('modal-actions').querySelectorAll('button')[1];
                                    if (confirmBtn) confirmBtn.click();
                                }
                            });
                        }
                    }, 100);
                };

                // Logic Tải Đội Hình Lên Bàn Cờ
                window.loadSpecificBoard = (type, id) => {
                    const data = window.getAllSavedData();
                    if (type === 'auto' && data.auto) window._builderBoardState = data.auto.board;
                    else if (type === 'manual') {
                        const found = data.manual.find(x => x.id === id);
                        if (found) window._builderBoardState = found.board;
                    }
                    renderBoard();
                    renderPool();
                    closeModal();
                    uiAlert('Thành công', 'Đội hình đã được tải lên bàn cờ!', 'info');
                };

                // Logic Xóa Slot
                window.deleteSpecificBoard = (id) => {
                    const data = window.getAllSavedData();
                    data.manual = data.manual.filter(x => x.id !== id);
                    localStorage.setItem(BUILDER_STORAGE_KEY, JSON.stringify(data));
                    window.openLoadMenu(); // Gọi lại hàm để giao diện tự cập nhật lập tức
                };


                // --- CÁC HÀM XUẤT NHẬP CŨ & FIREBASE ---
                const generateJSONPayload = () => {
                    const boardPos = []; const unitsList = [];
                    for (let r = 0; r < 4; r++) {
                        for (let c = 0; c < 7; c++) {
                            const cell = window._builderBoardState[r][c];
                            if (cell) {
                                boardPos.push({ champion: cell.champ, coordinates: { row: r, col: c } });
                                unitsList.push({ champion: cell.champ, items: [...cell.items] });
                            }
                        }
                    }
                    return boardPos.length === 0 ? null : { "CompTitle": "Custom", "CompRowTags": ["Custom"], "BoardPositions": boardPos, "UnitsContainer": unitsList };
                };

                window.clearBuilderBoard = () => uiConfirm('Làm sạch', 'Xóa toàn bộ đội hình hiện tại trên bàn cờ?', () => { 
                    window._builderBoardState = Array(4).fill(null).map(() => Array(7).fill(null)); 
                    window._builderActiveTool = null; 
                    window.autoSaveBoard(); // Lưu lại tự động bàn cờ trống
                    renderBoard(); 
                    renderPool(); 
                });
                
                window.downloadBoardJSON = () => { const out = generateJSONPayload(); if (!out) return; const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify([out], null, 4)); const link = document.createElement('a'); link.setAttribute("href", dataStr); link.setAttribute("download", "tft_comp.json"); link.click(); };

                window.shareToFirebase = () => {
                    if (!generateJSONPayload()) { uiAlert('Lỗi', 'Bàn cờ trống!', 'info'); return; }
                    uiAlert('<span class="text-rose-500 font-black">Chia sẻ Cloud</span>', `
                <div class="flex flex-col gap-3">
                    <p class="text-xs text-slate-500">Đội hình sẽ được lưu vào Firestore công khai.</p>
                    <div class="flex justify-center p-1 min-h-[78px]"><div id="recaptcha-container"></div></div>
                    <button id="btn-upload-fs" onclick="window.processFS()" class="w-full py-2 bg-rose-500 text-white font-bold rounded-lg shadow-md transition-colors hover:bg-rose-600">Chia sẻ</button>
                </div>
            `);
                    setTimeout(() => { if (window.grecaptcha) grecaptcha.render('recaptcha-container', { 'sitekey': RECAPTCHA_SITE_KEY, 'theme': 'dark' }); }, 100);
                };

                window.processFS = async () => {
                    if (!grecaptcha.getResponse()) return uiAlert('Lỗi', 'Xác nhận Captcha!', 'error');
                    const btn = document.getElementById('btn-upload-fs'); btn.disabled = true; btn.innerText = 'Đang tải...';
                    const shareCode = 'TFT-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                    try {
                        await window._fsSetDoc(window._fsDoc(window._db, "shared_comps", shareCode), { ...generateJSONPayload(), shareCode, createdAt: new Date().toISOString() });
                        closeModal();
                        uiAlert('Thành công', `Mã chia sẻ: <b class="text-xl text-premium-gold select-all">${shareCode}</b>`, 'info');
                    } catch (e) { uiAlert('Lỗi', 'Không thể kết nối Firestore.', 'error'); btn.disabled = false; btn.innerText = 'Thử lại'; }
                };

                window.openImportModal = () => {
                    uiAlert('<span class="text-blue-500 font-black">Nhập Đội Hình</span>', `
                <div class="flex flex-col gap-3">
                    <input type="file" id="fs-file" accept=".json" class="hidden" onchange="const r=new FileReader(); r.onload=e=>document.getElementById('imp-area').value=e.target.result; r.readAsText(this.files[0])">
                    <button onclick="document.getElementById('fs-file').click()" class="w-full py-2 bg-slate-700 text-white rounded-lg text-xs font-bold">Chọn File JSON</button>
                    <textarea id="imp-area" class="w-full h-32 bg-black/40 border border-slate-700 rounded-lg p-2 text-[10px] text-emerald-400 font-mono outline-none" placeholder="Dán mã TFT-XXXX hoặc JSON"></textarea>
                    <button id="btn-imp" onclick="window.doImp()" class="w-full py-2 bg-blue-500 text-white font-bold rounded-lg">Xác nhận</button>
                </div>
            `);
                };

                window.doImp = async () => {
                    const val = document.getElementById('imp-area').value.trim(); if (!val) return;
                    const btn = document.getElementById('btn-imp');
                    try {
                        let data;
                        if (val.startsWith('TFT-')) {
                            btn.innerText = 'Truy vấn...';
                            const snap = await window._fsGetDoc(window._fsDoc(window._db, "shared_comps", val));
                            if (!snap.exists()) return uiAlert('Lỗi', 'Mã không tồn tại!', 'error');
                            data = snap.data();
                        } else data = JSON.parse(val);

                        const parsed = Array.isArray(data) ? data[0] : data;
                        window._builderBoardState = Array(4).fill(null).map(() => Array(7).fill(null));
                        const itemMap = {};
                        if (parsed.UnitsContainer) parsed.UnitsContainer.forEach((u, i) => { itemMap[u.champion + '_' + i] = u.items || []; itemMap[u.champion] = u.items || []; });
                        let count = {};
                        parsed.BoardPositions.forEach(p => {
                            const r = p.coordinates.row, c = p.coordinates.col;
                            if (r < 4 && c < 7) {
                                count[p.champion] = (count[p.champion] || 0);
                                window._builderBoardState[r][c] = { champ: p.champion, items: [...(itemMap[p.champion + '_' + count[p.champion]] || itemMap[p.champion] || [])] };
                                count[p.champion]++;
                            }
                        });
                        window.autoSaveBoard(); // Lưu tự động lại bản cờ vừa nạp
                        closeModal(); renderBoard(); renderPool();
                    } catch (e) { uiAlert('Lỗi', 'Dữ liệu không hợp lệ.', 'error'); }
                };

                // RENDER GIAO DIỆN VÀ GẮN SỰ KIỆN
                renderBuilderInterface();

            } catch (error) {
                gridContainer.innerHTML = `<div class="p-4 text-center text-red-500 text-sm bg-red-100 rounded-xl">Lỗi Builder: ${error.message}</div>`;
            }
        }


        // Hàm xử lý đóng/mở Card khi được nhấn
        function toggleCard(cardElement) {
            // Chỉ đơn giản là toggle class 'is-expanded' trên thẻ Card được nhấn
            // CSS sẽ tự xử lý phần còn lại (xoay icon, trượt nội dung)
            cardElement.classList.toggle('is-expanded');
        }
        // Logic Chuyển Tab (Cập nhật cho kiểu dáng Pill)
        function switchTab(tabId) {
            currentTabId = tabId;
            Tabs.forEach(tab => {
                const btn = document.getElementById(`btn-${tab.id}`);
                const content = document.getElementById(`content-${tab.id}`);

                if (tab.id === tabId) {
                    // Set active classes
                    btn.className = `shrink-0 px-4 py-2 text-sm font-semibold rounded-full transition-colors flex items-center gap-1.5 border bg-premium-gold text-black border-premium-gold shadow-[0_0_10px_rgba(212,175,55,0.3)]`;
                    content.classList.add('active');

                    // Cuộn menu sao cho tab active ở giữa màn hình (rất tiện cho mobile)
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    // Set inactive classes
                    btn.className = `shrink-0 px-4 py-2 text-sm font-semibold rounded-full transition-colors flex items-center gap-1.5 border bg-premium-card text-slate-400 border-premium-border hover:bg-slate-800 hover:text-slate-200`;
                    content.classList.remove('active');
                }
            });
        }

        // Modal Logic
        const modalEl = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMsg = document.getElementById('modal-message');
        const modalActions = document.getElementById('modal-actions');

        function closeModal() { modalEl.classList.remove('show'); }

        function uiAlert(title, message, type = 'info') {
            const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500"></i>' : '<i class="fa-solid fa-circle-info text-premium-accent"></i>';
            modalTitle.innerHTML = `${icon} ${title}`;
            modalMsg.innerHTML = message;
            modalActions.innerHTML = `<button onclick="closeModal()" class="px-5 py-2 bg-premium-card border border-premium-border hover:bg-slate-800 text-white text-sm font-semibold rounded-xl transition-colors">Đóng</button>`;
            modalEl.classList.add('show');
        }

        function uiConfirm(title, message, onConfirm) {
            modalTitle.innerHTML = `<i class="fa-solid fa-circle-question text-premium-gold"></i> ${title}`;
            modalMsg.innerHTML = message;
            modalActions.innerHTML = '';

            const btnCancel = document.createElement('button');
            btnCancel.className = "px-4 py-2 bg-transparent text-slate-400 hover:text-white text-sm font-medium rounded-xl transition-colors";
            btnCancel.innerText = "Huỷ";
            btnCancel.onclick = closeModal;

            const btnAccept = document.createElement('button');
            btnAccept.className = "px-4 py-2 bg-premium-gold text-black hover:bg-yellow-400 text-sm font-bold rounded-xl transition-colors";
            btnAccept.innerText = "Xác nhận";
            btnAccept.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };

            modalActions.appendChild(btnCancel);
            modalActions.appendChild(btnAccept);
            modalEl.classList.add('show');
        }

        function testConfirm() {
            uiConfirm('Cài đặt', 'Bạn có muốn làm mới dữ liệu trang Wiki không?', () => {
                setTimeout(() => uiAlert('Thành công', 'Dữ liệu đã được làm mới!'), 300);
            });
        }

        document.addEventListener('DOMContentLoaded', initWiki);
    </script>
</body>

</html>
