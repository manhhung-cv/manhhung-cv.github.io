                                                <img src="${img}" class="w-full h-full object-cover object-[80%]" ${onErrorFallback}>
                                            </div>
                                            <span class="text-[8px] sm:text-[9px] text-slate-400 font-semibold truncate w-full text-center mt-1 group-hover/early:text-premium-gold transition-colors">${c}</span>
                                        </div>
                                    `;
                                }).join('');
                                
                                return `
                                    <div class="flex items-center justify-between bg-white/[0.02] p-2 rounded-lg border border-white/5">
                                        <div class="flex gap-2 items-start flex-nowrap overflow-x-auto no-scrollbar pb-1 pt-1">${teamHTML}</div>
                                        <div class="flex items-center gap-1 bg-emerald-900/30 px-1.5 py-0.5 rounded border border-emerald-500/20 shrink-0 ml-3 self-center">
                                            <i class="fa-solid fa-trophy text-[8px] text-emerald-400"></i>
                                            <span class="text-[9px] font-black text-emerald-400 leading-none">${opt.win_rate}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('');
                            earlyCompHTML = `<div class="flex flex-col gap-2">${earlyCompHTML}</div>`;
                        }

                        let boardHTML = '<p class="text-[10px] text-slate-500 italic flex items-center justify-center h-full">Không có dữ liệu xếp cờ.</p>';
                        if (comp.BoardPositions && comp.BoardPositions.length > 0) {
                            const champHexesHTML = comp.BoardPositions.map(pos => {
                                const cData = masterChamps[cleanName(pos.champion)];
                                const img = cData ? cData.image : './asset/placeholder.png';
                                let bgBorder = 'bg-slate-600';
                                if(cData) {
                                    if(cData.cost===2) bgBorder='bg-emerald-500';
                                    if(cData.cost===3) bgBorder='bg-blue-500';
                                    if(cData.cost===4) bgBorder='bg-purple-500';
                                    if(cData.cost===5) bgBorder='bg-yellow-400';
                                }
                                const isOddRow = pos.coordinates.row % 2 !== 0;
                                const left = pos.coordinates.col * 13.33 + (isOddRow ? 6.66 : 0);
                                const top = pos.coordinates.row * 23.07;
                                
                                return `
                                    <div class="absolute w-[13.33%] h-[30.76%] z-10 transition-transform hover:scale-110 scale-[0.92] drop-shadow-[0_2px_4px_rgba(0,0,0,0.6)] cursor-pointer" 
                                         style="left: ${left}%; top: ${top}%;" title="${pos.champion}" onclick="window.openChampModalFromComp('${pos.champion}')">
                                        <div class="w-full h-full p-[2px] ${bgBorder}" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">
                                            <img src="${img}" class="w-full h-full object-cover object-[80%] bg-slate-900" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);" ${onErrorFallback}>
                                        </div>
                                    </div>
                                `;
                            }).join('');

                            boardHTML = `
                                <div class="relative w-full max-w-[340px] mx-auto aspect-[2/1] bg-[#0B101A] rounded-xl overflow-hidden shadow-inner p-1.5 border border-white/5">
                                    ${emptyHexesHTML}
                                    ${champHexesHTML}
                                </div>
                            `;
                        }

                        let levelingHTML = '<span class="text-[10px] text-slate-500 italic">Không có dữ liệu.</span>';
                        if (comp.CompQuickStart?.leveling?.length > 0) {
                            levelingHTML = `<div class="flex items-center gap-1 overflow-x-auto no-scrollbar pb-1">` + 
                            comp.CompQuickStart.leveling.map((lvl, index) => `
                                <div class="flex items-center">
                                    <div class="flex flex-col items-center bg-black/40 px-1.5 py-0.5 rounded shadow-inner border border-white/5">
                                        <span class="text-[8.5px] font-bold text-slate-400 leading-tight">${lvl.level}</span>
                                        <span class="text-[9px] text-premium-gold font-black leading-tight">${lvl.stage}</span>
                                    </div>
                                    ${index < comp.CompQuickStart.leveling.length - 1 ? `<div class="w-2 h-[1px] bg-slate-700 mx-1"></div>` : ''}
                                </div>
                            `).join('') + `</div>`;
                        }

                        let copyCodeHTML = '';
                        if (comp.CopyTeamCode) {
                            const btnId = `copy-btn-${compIndex}`;
                            copyCodeHTML = `
                                <div class="copy-btn-container shrink-0 lg:ml-auto z-20">
                                    <button id="${btnId}" onclick="window.copyToClipboard('${comp.CopyTeamCode}', '${btnId}')" 
                                        class="flex items-center gap-1.5 bg-white/5 hover:bg-premium-gold hover:text-black text-slate-300 border border-white/10 px-2.5 py-1.5 rounded-lg text-[9.5px] font-bold transition-all shadow-sm outline-none">
                                        <i class="fa-regular fa-clone"></i>
                                    </button>
                                </div>
                            `;
                        }

                        return `
                            <div class="comp-card bg-[#0e1420]/95 backdrop-blur-xl border border-white/5 hover:border-premium-gold/40 rounded-2xl shadow-xl transition-all duration-300 relative overflow-hidden group">
                                <div class="absolute -inset-10 bg-premium-gold/5 blur-3xl z-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                
                                <div class="flex flex-col xl:flex-row gap-3 xl:gap-5 p-3.5 relative z-10">
                                    
                                    <div class="flex flex-col gap-1 xl:w-[180px] shrink-0 justify-center">
                                        <div class="flex gap-1.5 flex-wrap">${tagsHTML}</div>
                                        <h3 class="text-[15px] font-black text-white transition-colors leading-tight tracking-wide drop-shadow-md">${comp.CompTitle}</h3>
                                    </div>
                                    
                                    <div class="flex items-start gap-1.5 overflow-x-auto no-scrollbar flex-1 pt-1 pb-1 xl:pb-0">
                                        ${unitsHTML}
                                    </div>
                                    
                                    <div class="flex items-center gap-2 shrink-0 ml-auto border-t xl:border-t-0 border-white/5 pt-2 xl:pt-0 w-full xl:w-auto justify-between xl:justify-end">
                                       ${copyCodeHTML}
                                       <button onclick="window.toggleCompDetails(this)" class="w-7 h-7 rounded-full bg-white/5 flex items-center justify-center transition-colors hover:bg-premium-gold/20 outline-none">
                                            <i class="fa-solid fa-chevron-down text-slate-400 text-[11px] expand-icon transition-transform duration-300 hover:text-premium-gold"></i>
                                       </button>
                                    </div>
                                </div>
                                
                                <div class="comp-details hidden border-t border-white/5 bg-[#05080d]/60 p-4 relative z-10">
                                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 xl:gap-8">
                                        
                                        <div class="xl:col-span-7 flex flex-col gap-5">
                                            <div>
                                                <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1.5"><i class="fa-solid fa-shapes"></i> Kích hoạt Tộc Hệ</div>
                                                <div class="flex flex-wrap gap-1.5">${traitsHTML}</div>
                                            </div>
                                            
                                            <div>
                                                <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1.5"><i class="fa-solid fa-ring"></i> Đi Chợ</div>
                                                ${carouselHTML}
                                            </div>

                                            <div>
                                                <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1.5"><i class="fa-solid fa-chess-board"></i> Đội Hình Đầu Game</div>
                                                ${earlyCompHTML}
                                            </div>
                                        </div>

                                        <div class="xl:col-span-5 flex flex-col gap-5">
                                            
                                            <div class="flex flex-col gap-2">
                                                <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1.5 xl:justify-center mb-1">
                                                    <i class="fa-solid fa-map-location-dot"></i> Xếp Vị Trí
                                                </div>
                                                <div class="flex-1 flex items-start justify-center">
                                                    ${boardHTML}
                                                </div>
                                            </div>

                                            <div class="flex flex-col gap-2 pt-3 border-t border-white/5">
                                                <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1 flex items-center gap-1.5 xl:justify-center">
                                                    <i class="fa-solid fa-arrow-up-right-dots"></i> Nhịp Lên Cấp
                                                </div>
                                                <div class="xl:flex xl:justify-center">
                                                    ${levelingHTML}
                                                </div>
                                            </div>

                                        </div>

                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                };

                window.copyToClipboard = (text, btnId) => {
                    navigator.clipboard.writeText(text).then(() => {
                        const btn = document.getElementById(btnId);
                        if(btn) {
                            const originalHTML = btn.innerHTML;
                            const originalClass = btn.className;
                            btn.className = "flex items-center justify-center gap-1.5 bg-emerald-500 text-white border border-emerald-400 px-2.5 py-1.5 rounded-lg text-[9.5px] font-bold transition-all shadow-[0_0_8px_rgba(16,185,129,0.5)] z-20 relative";
                            btn.innerHTML = `<i class="fa-solid fa-check"></i>`;
                            setTimeout(() => {
                                btn.className = originalClass;
                                btn.innerHTML = originalHTML;
                            }, 1500);
                        }
                    }).catch(err => console.error('Lỗi Copy: ', err));
                };

                const searchInput = document.getElementById('search-comp');
                const clearBtn = document.getElementById('clear-search-comp');

                searchInput.addEventListener('input', (e) => {
                    const val = e.target.value;
                    searchQuery = val;
                    clearBtn.classList.toggle('hidden', val.length === 0);
                    renderComps();
                });

                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    searchQuery = '';
                    clearBtn.classList.add('hidden');
                    searchInput.focus();
                    renderComps();
                });

                renderComps();

            } catch (error) {
                gridContainer.innerHTML = `<div class="p-4 text-center text-red-400 text-sm border border-red-900/50 bg-red-900/10 rounded-xl">Lỗi tải dữ liệu Đội Hình: ${error.message}</div>`;
            }
        }
        // Hàm xử lý đóng/mở Card khi được nhấn
        function toggleCard(cardElement) {
            // Chỉ đơn giản là toggle class 'is-expanded' trên thẻ Card được nhấn
            // CSS sẽ tự xử lý phần còn lại (xoay icon, trượt nội dung)
            cardElement.classList.toggle('is-expanded');
        }
        // Logic Chuyển Tab (Cập nhật cho kiểu dáng Pill)
        function switchTab(tabId) {
            currentTabId = tabId;
            Tabs.forEach(tab => {
                const btn = document.getElementById(`btn-${tab.id}`);
                const content = document.getElementById(`content-${tab.id}`);

                if (tab.id === tabId) {
                    // Set active classes
                    btn.className = `shrink-0 px-4 py-2 text-sm font-semibold rounded-full transition-colors flex items-center gap-1.5 border bg-premium-gold text-black border-premium-gold shadow-[0_0_10px_rgba(212,175,55,0.3)]`;
                    content.classList.add('active');

                    // Cuộn menu sao cho tab active ở giữa màn hình (rất tiện cho mobile)
                    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    // Set inactive classes
                    btn.className = `shrink-0 px-4 py-2 text-sm font-semibold rounded-full transition-colors flex items-center gap-1.5 border bg-premium-card text-slate-400 border-premium-border hover:bg-slate-800 hover:text-slate-200`;
                    content.classList.remove('active');
                }
            });
        }

        // Modal Logic
        const modalEl = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMsg = document.getElementById('modal-message');
        const modalActions = document.getElementById('modal-actions');

        function closeModal() { modalEl.classList.remove('show'); }

        function uiAlert(title, message, type = 'info') {
            const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500"></i>' : '<i class="fa-solid fa-circle-info text-premium-accent"></i>';
            modalTitle.innerHTML = `${icon} ${title}`;
            modalMsg.innerHTML = message;
            modalActions.innerHTML = `<button onclick="closeModal()" class="px-5 py-2 bg-premium-card border border-premium-border hover:bg-slate-800 text-white text-sm font-semibold rounded-xl transition-colors">Đóng</button>`;
            modalEl.classList.add('show');
        }

        function uiConfirm(title, message, onConfirm) {
            modalTitle.innerHTML = `<i class="fa-solid fa-circle-question text-premium-gold"></i> ${title}`;
            modalMsg.innerHTML = message;
            modalActions.innerHTML = '';

            const btnCancel = document.createElement('button');
            btnCancel.className = "px-4 py-2 bg-transparent text-slate-400 hover:text-white text-sm font-medium rounded-xl transition-colors";
            btnCancel.innerText = "Huỷ";
            btnCancel.onclick = closeModal;

            const btnAccept = document.createElement('button');
            btnAccept.className = "px-4 py-2 bg-premium-gold text-black hover:bg-yellow-400 text-sm font-bold rounded-xl transition-colors";
            btnAccept.innerText = "Xác nhận";
            btnAccept.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };

            modalActions.appendChild(btnCancel);
            modalActions.appendChild(btnAccept);
            modalEl.classList.add('show');
        }

        function testConfirm() {
            uiConfirm('Cài đặt', 'Bạn có muốn làm mới dữ liệu trang Wiki không?', () => {
                setTimeout(() => uiAlert('Thành công', 'Dữ liệu đã được làm mới!'), 300);
            });
        }

        document.addEventListener('DOMContentLoaded', initWiki);
    </script>
</body>

</html>
