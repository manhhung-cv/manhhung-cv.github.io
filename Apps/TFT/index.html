<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TFT Wiki</title>
<meta name="description" content="Từ điển TFT">
<meta name="author" content="Hunq">
<meta name="theme-color" content="#000000">
<meta name="robots" content="index, follow">
<link rel="icon" href="/Asset/logo/logo.png">

<meta property="og:type" content="website">
<meta property="og:title" content="TFT Wiki">
<meta property="og:description" content="Từ điển TFT">
<meta property="og:image" content="/Asset/Banner/Banner.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TFT Wiki">
<meta name="twitter:description" content="Từ điển TFT">
<meta name="twitter:image" content="/Asset/Banner/Banner.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TFT Wiki">
<link rel="apple-touch-icon" href="/Asset/logo/iconApps.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premium: {
                            bg: '#090d14',      /* Nền app tối sâu */
                            card: '#121722',    /* Nền thẻ */
                            border: '#1f2937',  /* Viền xám tối */
                            gold: '#d4af37',    /* Vàng TFT */
                            accent: '#38bdf8'   /* Xanh nhẹ */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Ẩn thanh cuộn cho mobile app feel */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hiệu ứng Modal */
        .modal-overlay {
            transition: opacity 0.2s ease;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            transition: transform 0.2s ease;
            transform: scale(0.95);
        }

        .modal-overlay.show .modal-box {
            transform: scale(1);
        }

        /* CSS cho chức năng ẩn/hiện nội dung Card */
        .card-expandable-body {
            /* Mặc định ẩn bằng cách xét chiều cao tối đa = 0 */
            max-height: 0;
            overflow: hidden;
            /* Tạo hiệu ứng chuyển động mượt mà */
            transition: max-height 0.3s ease-out, opacity 0.2s ease-out, padding 0.3s ease-out;
            opacity: 0;
            /* Bỏ padding dọc khi đóng */
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }

        /* Khi Card có class 'is-expanded' (được mở) */
        .bg-premium-card.is-expanded .card-expandable-body {
            /* Cho phép hiển thị chiều cao tối đa (đặt một con số đủ lớn) */
            max-height: 1000px;
            opacity: 1;
            /* Khôi phục padding gốc */
            padding-top: 0.875rem !important;
            /* t-3.5 */
            padding-bottom: 0.875rem !important;
            /* b-3.5 */
        }

        /* Hiệu ứng xoay icon Chevron */
        .expand-chevron {
            transition: transform 0.3s ease;
        }

        .bg-premium-card.is-expanded .expand-chevron {
            transform: rotate(180deg);
            color: #d4af37;
            /* Đổi sang màu vàng khi mở */
        }
    </style>
</head>

<body
    class="bg-premium-bg text-slate-300 font-sans antialiased min-h-screen flex flex-col selection:bg-premium-gold selection:text-black">

    <header class="sticky top-0 z-40 bg-premium-bg/95 backdrop-blur shadow-sm shadow-black/50">
        <div class="px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2 text-white">
                <i class="fa-solid fa-chess-knight text-premium-gold"></i> TFT Wiki
            </h1>
            <button onclick="testConfirm()" class="text-slate-400 hover:text-white p-2">
                <i class="fa-solid fa-ellipsis-vertical text-lg"></i>
            </button>
        </div>

        <nav id="tab-nav"
            class="flex overflow-x-auto no-scrollbar px-4 pb-3 pt-1 gap-2 border-b border-premium-border scroll-smooth">
        </nav>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 lg:p-6 relative">
        <div id="tab-containers">
        </div>
    </main>

    <div id="custom-modal"
        class="modal-overlay fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="modal-box bg-premium-card border border-premium-border rounded-2xl p-5 w-full max-w-sm shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2 flex items-center gap-2"></h3>
            <p id="modal-message" class="text-sm text-slate-400 mb-5 leading-relaxed"></p>
            <div class="flex justify-end gap-2" id="modal-actions"></div>
        </div>
    </div>

    <script>
        const Tabs = [
            { id: 'comps', name: 'Đôi Hình', icon: 'fa-users' },
            { id: 'gods', name: 'Thần', icon: 'fa-bolt' },
            { id: 'champions', name: 'Tướng', icon: 'fa-user-ninja' },
            { id: 'items', name: 'Trang bị', icon: 'fa-khanda' },
            { id: 'traits', name: 'Tộc hệ', icon: 'fa-users' },
        ];

        let currentTabId = Tabs[0].id;

        function initWiki() {
    const navContainer = document.getElementById('tab-nav');
    const contentContainer = document.getElementById('tab-containers');

    Tabs.forEach((tab) => {
        // Tạo nút Navigation dạng Pill (Viên thuốc)
        const btn = document.createElement('button');
        btn.id = `btn-${tab.id}`;
        // CSS cơ bản cho nút
        btn.className = `shrink-0 px-4 py-2 text-sm font-semibold rounded-full transition-colors flex items-center gap-1.5 border `;

        // Set trạng thái active/inactive
        if (tab.id === currentTabId) {
            btn.className += `bg-premium-gold text-black border-premium-gold shadow-[0_0_10px_rgba(212,175,55,0.3)]`;
        } else {
            btn.className += `bg-premium-card text-slate-400 border-premium-border hover:bg-slate-800 hover:text-slate-200`;
        }

        btn.innerHTML = `<i class="fa-solid ${tab.icon}"></i> ${tab.name}`;
        btn.onclick = () => switchTab(tab.id);
        navContainer.appendChild(btn);

        // Tạo Content Container
        const contentDiv = document.createElement('div');
        contentDiv.id = `content-${tab.id}`;
        contentDiv.className = `tab-content ${tab.id === currentTabId ? 'active' : ''}`;

        // XỬ LÝ LỖI GIAO DIỆN TẠI ĐÂY:
        // Kiểm tra xem ID của tab hiện tại có phải là tab Tướng không
        // (Thay 'champions' bằng ID thực tế của bạn nếu khác)
        const isChampionsTab = (tab.id === 'champions' || tab.id === 'tuong');
        
        // Nếu là tab Tướng thì chỉ dùng 1 cột, ngược lại thì chia 2, 3, 4 cột tùy kích thước màn hình
        const gridClass = isChampionsTab 
            ? "grid grid-cols-1 gap-4" 
            : "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4";

        contentDiv.innerHTML = `
            <div class="flex items-center gap-3 mb-5 px-1">
                <div class="w-10 h-10 rounded-xl bg-premium-card flex items-center justify-center border border-premium-border text-premium-accent">
                    <i class="fa-solid ${tab.icon} text-lg"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-white leading-tight">${tab.name}</h2>
                    <p class="text-xs text-slate-500">Dữ liệu ${tab.name.toLowerCase()}</p>
                </div>
            </div>
            
            <div id="grid-${tab.id}" class="${gridClass}">
                <div class="col-span-full text-center py-10 text-slate-500 text-sm">Chưa có dữ liệu</div>
            </div>
        `;
        contentContainer.appendChild(contentDiv);
    });

    loadGodsData();
    loadOriginData();
    loadTraitsData();
    loadChampionsData();
    loadItemsData();
    loadCompsData();
}
       // ---------------------------------------------------------
        // HÀM FETCH VÀ RENDER DỮ LIỆU TỪ gods.json (TÍCH HỢP TAGS & BEST_FOR)
        // ---------------------------------------------------------
        async function loadGodsData() {
            const gridContainer = document.getElementById('grid-gods');
            if (!gridContainer) return;

            try {
                const response = await fetch('./asset/gods.json');
                if (!response.ok) throw new Error('Không tìm thấy file gods.json');
                
                const godsData = await response.json();

                // --- HÀM XỬ LÝ ĐÓNG/MỞ THẺ (TOGGLE) ---
                window.toggleGodCard = (cardElement) => {
                    const detailsWrapper = cardElement.querySelector('.god-details');
                    const chevronIcon = cardElement.querySelector('.expand-chevron');

                    if (detailsWrapper.classList.contains('hidden')) {
                        detailsWrapper.classList.remove('hidden');
                        chevronIcon.classList.add('rotate-180');
                        cardElement.classList.add('border-premium-gold/50'); 
                    } else {
                        detailsWrapper.classList.add('hidden');
                        chevronIcon.classList.remove('rotate-180');
                        cardElement.classList.remove('border-premium-gold/50');
                    }
                };

                // Cấu hình lưới hiển thị
                gridContainer.innerHTML = '';
                gridContainer.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-16";

                const onErrorFallback = `onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiBmaWxsPSIjMWUyOTNiIiBzdHJva2U9IiM0NzU1NjkiIHN0cm9rZS13aWR0aD0iMiI+PHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiLz48dGV4dCB4PSI1MCIgeT0iNTUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI0MCIgZmlsbD0iIzQ3NTU2OSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+PzwvdGV4dD48L3N2Zz4='";`;

                godsData.forEach(god => {
                    
                    // 1. XỬ LÝ TAGS (Hiển thị ở mặt ngoài của thẻ)
                    let tagsHTML = '';
                    if (god.tags && Array.isArray(god.tags) && god.tags.length > 0) {
                        tagsHTML = god.tags.map(tag => 
                            `<span class="px-2 py-[3px] rounded-md border border-premium-accent/50 bg-premium-accent/20 text-premium-accent text-[8.5px] font-black uppercase tracking-wider backdrop-blur-md shadow-[0_0_8px_rgba(56,189,248,0.25)]">
                                ${tag}
                            </span>`
                        ).join('');
                    }

                    // 2. XỬ LÝ LỜI KHUYÊN CHIẾN THUẬT (Hiển thị bên trong phần mở rộng)
                    let bestForHTML = '';
                    if (god.best_for) {
                        bestForHTML = `
                            <div class="mb-4 p-3 rounded-xl bg-sky-900/20 border border-sky-500/20 flex items-start gap-2.5 shadow-inner">
                                <i class="fa-solid fa-lightbulb text-sky-400 text-[13px] mt-0.5 drop-shadow-md"></i>
                                <p class="text-[11px] text-sky-100/90 leading-relaxed">
                                    <span class="text-sky-300 font-bold uppercase text-[9.5px] tracking-widest mr-1">Lời khuyên:</span>
                                    ${god.best_for}
                                </p>
                            </div>
                        `;
                    }

                    // 3. XỬ LÝ CÁC GIAI ĐOẠN (STAGES)
                    let stagesHTML = '';
                    if (god.stages && Array.isArray(god.stages)) {
                        stagesHTML = god.stages.map(stage => {
                            const isFinalStage = stage.stage_label.includes('4-7');
                            
                            let perksHTML = '';
                            if (stage.perks && Array.isArray(stage.perks)) {
                                perksHTML = stage.perks.map(perk => `
                                    <div class="bg-black/40 p-2.5 rounded-lg border ${isFinalStage ? 'border-yellow-500/20' : 'border-white/5'} shadow-inner mb-2 last:mb-0">
                                        <h4 class="text-[11px] font-bold ${isFinalStage ? 'text-yellow-400' : 'text-premium-gold'} drop-shadow-sm">${perk.title}</h4>
                                        ${perk.description ? `<p class="text-[10.5px] text-slate-400 mt-1 leading-snug">${perk.description.replace(/\n/g, '<br>')}</p>` : ''}
                                    </div>
                                `).join('');
                            }

                            if (isFinalStage) {
                                return `
                                    <div class="mt-3 p-3 bg-gradient-to-r from-premium-gold/15 to-transparent border-l-2 border-premium-gold rounded-r-xl shadow-sm">
                                        <div class="text-[10px] font-black text-premium-gold uppercase mb-2 flex items-center gap-1.5 drop-shadow-md">
                                            <i class="fa-solid fa-bolt text-yellow-400"></i> ${stage.stage_label}
                                        </div>
                                        ${perksHTML}
                                    </div>
                                `;
                            } else {
                                return `
                                    <div class="bg-white/[0.02] p-3 rounded-xl border border-white/5 mb-3 last:mb-0 shadow-sm">
                                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-2.5 flex items-center gap-1.5">
                                            <i class="fa-solid fa-play text-[8px] text-slate-500"></i> ${stage.stage_label}
                                        </div>
                                        <div class="flex flex-col">
                                            ${perksHTML}
                                        </div>
                                    </div>
                                `;
                            }
                        }).join('');
                    }

                    // 4. RENDER THẺ HTML CHÍNH
                    const cardHTML = `
                        <div class="bg-premium-card rounded-2xl overflow-hidden shadow-lg ring-1 ring-white/10 hover:ring-premium-gold/30 transition-all duration-300 flex flex-col group">

                            <div class="relative h-[180px] w-full overflow-hidden shrink-0">
                                <img src="${god.avatar}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${god.name}" loading="lazy" ${onErrorFallback}>

                                <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-transparent h-16"></div>
                                <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#090d14] via-[#090d14]/90 to-transparent h-[130px]"></div>

                                <div class="absolute bottom-0 w-full h-1/2 bg-gradient-to-t from-premium-gold/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>

                                <div class="absolute top-3 left-3 z-10 pointer-events-none">
                                    <span class="text-[9.5px] font-black text-premium-gold uppercase tracking-widest drop-shadow-md bg-black/60 px-2.5 py-1.5 rounded-lg border border-premium-gold/30 backdrop-blur-sm">
                                        <i class="fa-solid fa-crown mr-1"></i> ${god.sub_title}
                                    </span>
                                </div>

                                <div class="absolute bottom-3 left-4 flex flex-col gap-1.5 z-10 pointer-events-none pr-12">
                                    <h3 class="text-[28px] font-black text-white drop-shadow-lg tracking-tight group-hover:text-premium-gold transition-colors duration-300 leading-none">${god.name}</h3>
                                    
                                    ${tagsHTML ? `
                                        <div class="flex flex-wrap gap-1.5 mt-0.5">
                                            ${tagsHTML}
                                        </div>
                                    ` : ''}
                                </div>

                                <div class="absolute bottom-3 right-4 z-20 cursor-pointer" onclick="window.toggleGodCard(this.closest('.bg-premium-card'))">
                                    <div class="w-8 h-8 rounded-full bg-black/60 backdrop-blur-md border border-white/10 flex items-center justify-center hover:bg-premium-gold/30 hover:border-premium-gold/80 transition-colors shadow-lg">
                                        <i class="fa-solid fa-chevron-down expand-chevron text-slate-300 text-sm drop-shadow transition-transform duration-300"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="god-details hidden bg-[#090d14] border-t border-white/5">
                                <div class="p-4 flex flex-col">
                                    ${bestForHTML}
                                    ${stagesHTML ? stagesHTML : '<p class="text-[11px] text-slate-500 text-center italic">Không có dữ liệu giai đoạn.</p>'}
                                </div>
                            </div>
                        </div>
                    `;
                    gridContainer.innerHTML += cardHTML;
                });

            } catch (error) {
                gridContainer.innerHTML = `<div class="col-span-full text-center py-8 text-red-400 text-sm border border-red-900/50 bg-red-900/10 rounded-xl">Lỗi tải dữ liệu Thần: ${error.message}</div>`;
            }
        }

        // ---------------------------------------------------------
        // 1. HÀM FETCH VÀ RENDER DỮ LIỆU TỪ origin.json
        // ---------------------------------------------------------
        async function loadOriginData() {
            const gridContainer = document.getElementById('grid-origin-synergies');
            if (!gridContainer) return;

            try {
                const response = await fetch('./asset/origin.json');
                if (!response.ok) throw new Error('Không tìm thấy file origin.json');

                const origins = await response.json();
                gridContainer.innerHTML = '';

                origins.forEach(origin => {

                    // 1. Dựng HTML Tướng
                    // Lọc bỏ tướng rác (trùng tên với Trait) nếu có
                    const validChampions = origin.champions ? origin.champions.filter(champ => champ.name !== origin.traitName) : [];
                    let championsHTML = '';

                    if (validChampions.length > 0) {
                        championsHTML = validChampions.map(champ => {
                            // Vì dữ liệu mới không có trường cost, ta sẽ dùng viền mặc định
                            return `
                                <div class="flex flex-col items-center w-[46px] flex-shrink-0 cursor-pointer group" 
                                     onclick="event.stopPropagation(); uiAlert('Thông tin Tướng', '<span class=\\'text-premium-gold font-bold\\'>${champ.name}</span>')">
                                    <img src="${champ.icon}" alt="${champ.name}" 
                                         class="w-10 h-10 rounded-[10px] border border-slate-600 object-cover bg-black shadow-sm group-hover:scale-105 group-hover:border-slate-400 transition-all">
                                    <span class="text-[8.5px] text-slate-400 font-medium text-center w-full truncate mt-1 group-hover:text-white transition-colors">
                                        ${champ.name}
                                    </span>
                                </div>
                            `;
                        }).join('');
                    }

                    // 2. Dựng HTML Mốc hiệu ứng (từ mảng stats)
                    let statsHTML = '';
                    if (origin.stats && origin.stats.length > 0) {
                        statsHTML = origin.stats.map(stat => {
                            return `
                                <div class="flex items-start gap-2">
                                    <span class="shrink-0 min-w-[20px] px-1 py-0.5 rounded bg-premium-gold/10 border border-premium-gold/30 text-premium-gold text-[9px] font-bold text-center mt-0.5">
                                        ${stat.count}
                                    </span>
                                    <p class="text-[11px] text-slate-300 leading-snug">${stat.effect}</p>
                                </div>
                            `;
                        }).join('');
                    }

                    // 3. Ghép Card Origin
                    const cardHTML = `
                        <div class="col-span-full md:col-span-1 lg:col-span-1 bg-premium-card border border-premium-border rounded-xl overflow-hidden flex flex-col h-full shadow-lg transition-colors hover:border-slate-600 cursor-pointer"
                             onclick="toggleCard(this)">
                            
                            <div class="p-3.5 flex items-center gap-3 border-b border-white/5 bg-gradient-to-r from-white/[0.03] to-transparent">
                                <div class="w-10 h-10 flex items-center justify-center shrink-0">
                                    <div class="w-full h-full bg-premium-gold" 
                                         style="-webkit-mask-image: url('${origin.traitIcon}'); -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; mask-image: url('${origin.traitIcon}'); mask-size: contain; mask-repeat: no-repeat; mask-position: center;">
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <h3 class="text-base font-bold text-white leading-tight">${origin.traitName}</h3>
                                    <p class="text-[9px] font-semibold text-premium-accent uppercase tracking-wider">Origin</p>
                                </div>
                                <i class="fa-solid fa-chevron-down expand-chevron text-slate-600 text-sm p-1"></i>
                            </div>
                            
                            <div class="card-expandable-body p-3.5 flex flex-col gap-3">
                                ${origin.description ? `<p class="text-[11px] text-slate-400 italic leading-relaxed">"${origin.description}"</p>` : ''}
                                ${statsHTML ? `<div class="flex flex-col gap-2 pt-1">${statsHTML}</div>` : ''}
                            </div>

                            <div class="p-3 bg-black/40 border-t border-white/5" onclick="event.stopPropagation();">
                                <div class="flex flex-wrap items-start justify-between gap-y-3">
                                    ${championsHTML}
                                    <div class="w-[46px] h-0"></div><div class="w-[46px] h-0"></div><div class="w-[46px] h-0"></div><div class="w-[46px] h-0"></div><div class="w-[46px] h-0"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    gridContainer.innerHTML += cardHTML;
                });

            } catch (error) {
                gridContainer.innerHTML = `<div class="col-span-full text-center py-8 text-red-400 text-sm">Lỗi tải dữ liệu Origin. ${error.message}</div>`;
            }
        }
       // ---------------------------------------------------------
        // HÀM FETCH VÀ RENDER DỮ LIỆU TỪ traits.json (GIAO DIỆN THU GỌN - ACCORDION - PREMIUM GOLD)
        // ---------------------------------------------------------
        async function loadTraitsData() {
            const gridContainer = document.getElementById('grid-traits'); 
            if (!gridContainer) return;

            try {
                const [resTraits, resChamps] = await Promise.all([
                    fetch('./asset/traits.json'),
                    fetch('./asset/champions.json')
                ]); 

                if (!resTraits.ok || !resChamps.ok) {
                    throw new Error('Không tìm thấy file dữ liệu Tộc Hệ hoặc Tướng.');
                }

                const traitsData = await resTraits.json();
                const champsData = await resChamps.json();

                const masterChamps = {};
                champsData.forEach(champ => {
                    masterChamps[champ.name.toLowerCase()] = champ; 
                });

                // --- HÀM XỬ LÝ ĐÓNG/MỞ THẺ (TOGGLE) ---
                window.toggleTraitDetails = (headerElement) => {
                    const card = headerElement.closest('.bg-premium-card');
                    const detailsWrapper = card.querySelector('.trait-details');

                    <div class="sticky top-14 z-30 bg-[#090d14]/95 backdrop-blur-xl border border-white/10 rounded-2xl p-3 shadow-lg mb-6 -mx-1 px-4">
                        <div class="relative group flex items-center">

                                class="w-full bg-black/40 border border-white/5 text-white text-[13px] rounded-xl pl-10 pr-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-premium-gold/50 transition-all placeholder:text-slate-500 shadow-inner">
                            
                            <button id="clear-search-trait" class="absolute right-4 hidden text-slate-500 hover:text-white transition-colors p-1">

                            </button>
                        </div>
                    </div>

                    <div id="trait-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-start">
                    </div>
                `;

                // --- HÀM RENDER CHÍNH ---
                const renderTraits = (searchQuery = '') => {
                    const listContainer = document.getElementById('trait-list-container');
                    listContainer.innerHTML = '';

                    const filteredTraits = traitsData.filter(t => 
                        t.trait_name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                        (t.description && t.description.toLowerCase().includes(searchQuery.toLowerCase()))
                    );

                    if (filteredTraits.length === 0) {
                        listContainer.innerHTML = `
                            <div class="col-span-full py-16 flex flex-col items-center justify-center text-slate-500">
                                <i class="fa-solid fa-ghost text-4xl mb-3 opacity-20"></i>
                                <span class="text-[12px] font-medium">Không tìm thấy Tộc/Hệ phù hợp.</span>
                            </div>`;
                        return;
                    }

                    const onErrorFallback = `onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiBmaWxsPSIjMWUyOTNiIiBzdHJva2U9IiM0NzU1NjkiIHN0cm9rZS13aWR0aD0iMiI+PHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiLz48dGV4dCB4PSI1MCIgeT0iNTUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI0MCIgZmlsbD0iIzQ3NTU2OSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+PzwvdGV4dD48L3N2Zz4='";`;

                    listContainer.innerHTML = filteredTraits.map(trait => {
                        
                        let levelsHTML = '';
                        if (trait.levels && trait.levels.length > 0) {
                            levelsHTML = trait.levels.map(lvl => `
                                <div class="flex items-start gap-2.5">
                                    <span class="bg-black/60 text-premium-gold font-black text-[10px] min-w-[22px] text-center py-[3px] rounded border border-white/10 shrink-0 mt-0.5 shadow-sm">${lvl.milestone}</span>
                                    <p class="text-[11.5px] text-slate-300 leading-relaxed font-medium">${lvl.description.replace(/\n/g, '<br>')}</p>
                                </div>
                            `).join('');
                        }

                        let heroesHTML = '';
                        if (trait.heroes && trait.heroes.length > 0) {
                            let mappedHeroes = trait.heroes.map(heroObj => {
                                return masterChamps[heroObj.name.toLowerCase()];
                            }).filter(champData => champData !== undefined);

                            mappedHeroes.sort((a, b) => a.cost - b.cost);

                            heroesHTML = mappedHeroes.map(hero => {
                                let borderColor = 'border-slate-500'; let badgeBg = 'bg-slate-700 text-white';
                                if (hero.cost === 2) { borderColor = 'border-emerald-500'; badgeBg = 'bg-emerald-600 text-white'; }
                                if (hero.cost === 3) { borderColor = 'border-blue-500'; badgeBg = 'bg-blue-600 text-white'; }
                                if (hero.cost === 4) { borderColor = 'border-purple-500'; badgeBg = 'bg-purple-600 text-white'; }
                                if (hero.cost === 5) { borderColor = 'border-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.4)]'; badgeBg = 'bg-yellow-500 text-black'; }

                                return `
                                    <div class="relative w-10 h-10 rounded-lg border-[1.5px] ${borderColor} overflow-hidden shrink-0 hover:-translate-y-1 transition-transform cursor-pointer shadow-md bg-black" title="${hero.name}">
                                        <img src="${hero.image}" class="w-full h-full object-cover object-[80%]" loading="lazy" ${onErrorFallback}>
                                        <div class="absolute bottom-0 right-0 ${badgeBg} text-[8.5px] font-black px-1.5 py-[1px] leading-none rounded-tl-md border-t border-l border-white/20">
                                            ${hero.cost}
                                        </div>
                                    </div>
                                `;
                            }).join('');
                        }

                        const traitIconHTML = trait.icon_file 
                            ? `<img src="${trait.icon_file}" class="w-5 h-5 object-contain opacity-80 group-hover:opacity-100 group-hover:scale-110 group-hover:drop-shadow-[0_0_8px_rgba(212,175,55,0.8)] transition-all" ${onErrorFallback}>`
                            : `<i class="fa-solid fa-shapes text-[16px] text-slate-400 group-hover:text-premium-gold transition-colors drop-shadow-md"></i>`;

                        return `
                            <div class="bg-premium-card border border-white/10 hover:border-premium-gold/30 rounded-2xl p-4 flex flex-col transition-all duration-300 shadow-lg group relative overflow-hidden">
                                <div class="absolute -inset-10 bg-premium-gold/5 blur-3xl z-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                
                                <div class="flex items-center justify-between cursor-pointer z-10" onclick="window.toggleTraitDetails(this)">

                                    </div>

                                    <div class="mt-3 z-10">
                                        <div class="flex flex-wrap gap-2">
                                            ${heroesHTML}
                                        </div>
                                    </div>

                                        ${levelsHTML ? `
                                            <div class="flex flex-col gap-2 bg-black/30 p-3 rounded-xl border border-white/5 shadow-inner">

                const searchInput = document.getElementById('search-trait');
                const clearBtn = document.getElementById('clear-search-trait');

                searchInput.addEventListener('input', (e) => {
                    const val = e.target.value;
                    clearBtn.classList.toggle('hidden', val.length === 0);
                    renderTraits(val);
                });

                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    clearBtn.classList.add('hidden');
                    searchInput.focus();
                    renderTraits('');
                });

                renderTraits();

            } catch (error) {
                gridContainer.innerHTML = `<div class="p-4 text-center text-red-400 text-sm border border-red-900/50 bg-red-900/10 rounded-xl">Lỗi tải dữ liệu Tộc Hệ: ${error.message}</div>`;
            }
        }

        // ---------------------------------------------------------
        // 4. HÀM FETCH VÀ RENDER DỮ LIỆU TỪ champions.json (TỐI ƯU DESKTOP)
        // ---------------------------------------------------------
        async function loadChampionsData() {
            const gridContainer = document.getElementById('grid-champions'); 
            if (!gridContainer) return;

            try {
                const [resChamps, resItems, resBuilds] = await Promise.all([
                    fetch('./asset/champions.json'),
                    fetch('./asset/items.json'),
                    fetch('./asset/champion_builds.json')
                ]);

                if (!resChamps.ok || !resItems.ok || !resBuilds.ok) {
                    throw new Error('Không thể tải đầy đủ dữ liệu (Champions, Items, hoặc Builds).');
                }

                const champions = await resChamps.json();
                const itemsData = await resItems.json();
                const buildsData = await resBuilds.json();

                window._masterItems = {};
                for (const itemArray of Object.values(itemsData)) {
                    if (Array.isArray(itemArray)) {
                        itemArray.forEach(item => {
                            window._masterItems[item.name] = item;
                        });
                    }
                }

                window._masterBuilds = {};
                if (Array.isArray(buildsData)) {
                    buildsData.forEach(b => {
                        const validBuilds = b.builds.filter(build => build.items && build.items.length > 0);
                        if (validBuilds.length > 0) {
                            window._masterBuilds[b.unit] = validBuilds; 
                        }
                    });
                }

                const cleanItemName = (rawName) => {
                    if (!rawName) return '';
                    return rawName.replace(/<[^>]+>/g, '').trim(); 
                };

                let activeCosts = new Set();
                let activeTraits = new Set();
                let searchQuery = '';
                let isDetailedView = false; 

                window._currentFilteredChampsForPopup = [];

                const allTraits = [...new Set(champions.flatMap(c => c.traits.map(t => t.name)))].sort();
                
                const costButtonsHTML = [1, 2, 3, 4, 5].map(cost => `
                    <button class="filter-cost-btn shrink-0 px-3.5 py-1.5 rounded-full bg-slate-800/90 backdrop-blur-xl border border-white/10 text-slate-300 font-bold text-[10.5px] hover:bg-white/10 transition-all shadow-md flex items-center gap-1" data-cost="${cost}">
                        ${cost} <i class="fa-solid fa-coins text-[8px] opacity-70"></i>
                    </button>
                `).join('');

                const traitButtonsHTML = allTraits.map(trait => `
                    <button class="filter-trait-btn shrink-0 px-3.5 py-1.5 rounded-full bg-slate-800/90 backdrop-blur-xl border border-white/10 text-slate-300 font-bold text-[10.5px] hover:bg-white/10 transition-all shadow-md" data-trait="${trait}">
                        ${trait}
                    </button>
                `).join('');

                gridContainer.innerHTML = `
                    <div class="flex flex-col relative pb-40 min-h-screen w-full">
                        
                        <div id="champ-list-container" class="w-full flex flex-col gap-8"></div>

                        <div class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[94%] max-w-[420px] z-50 flex flex-col gap-2 pointer-events-none">
                            <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pointer-events-auto px-1 w-full snap-x">
                                <span class="text-[9px] font-black text-premium-gold uppercase px-1 drop-shadow-md shrink-0 tracking-widest">Giá:</span>
                                ${costButtonsHTML}
                            </div>
                            <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pointer-events-auto px-1 pb-1 w-full snap-x">
                                <span class="text-[9px] font-black text-premium-accent uppercase px-1 drop-shadow-md shrink-0 tracking-widest">Hệ:</span>
                                ${traitButtonsHTML}
                            </div>
                            <div class="group bg-slate-800/95 backdrop-blur-2xl border border-white/20 rounded-full shadow-[0_15px_35px_rgba(0,0,0,0.6)] overflow-hidden flex items-center pl-4 pr-2 py-2 pointer-events-auto hover:border-premium-gold/50 transition-colors relative">
                                <i class="fa-solid fa-magnifying-glass text-slate-400 group-focus-within:text-premium-gold text-[13px]"></i>
                                <input type="text" id="search-champ" placeholder="Tìm tướng (VD: Aatrox)..." class="w-full bg-transparent border-none text-white text-[13px] ml-2.5 pr-8 focus:outline-none placeholder:text-slate-500">
                                <button id="clear-search-champ" class="absolute right-12 hidden text-slate-500 hover:text-white transition-colors p-1"><i class="fa-solid fa-circle-xmark text-sm"></i></button>
                                <button id="toggle-view-champ" class="ml-2 w-8 h-8 shrink-0 flex items-center justify-center rounded-full bg-white/5 text-premium-gold transition-colors border border-white/10 hover:bg-white/10"><i class="fa-solid fa-list" id="view-icon-champ"></i></button>
                            </div>
                        </div>

                    </div>
                `;

                window.renderBuildTab = (champName, styleIndex) => {
                    const builds = window._masterBuilds[champName];
                    if (!builds || builds.length === 0) return '<p class="text-[10px] text-slate-500 text-center py-4 italic">Chưa có dữ liệu gợi ý.</p>';

                    const currentBuild = builds[styleIndex];
                    
                    const itemsHTML = currentBuild.items.map(rawItemName => {
                        const itemName = cleanItemName(rawItemName); 
                        const itemData = window._masterItems[itemName];
                        
                        if (!itemData) {
                            return `<div class="flex flex-col items-center flex-1 min-w-0 opacity-50"><div class="w-10 h-10 rounded-lg border border-slate-700 bg-slate-800 flex items-center justify-center mb-1"><i class="fa-solid fa-question text-slate-500 text-xs"></i></div><span class="text-[8px] text-slate-400 font-medium truncate w-full text-center px-0.5">${itemName}</span></div>`;
                        }

                        let recipeHTML = '<div class="h-4 mt-1"></div>'; 
                        if (itemData.recipe && itemData.recipe.length === 2) {
                            recipeHTML = `
                                <div class="flex items-center gap-[2px] mt-1 justify-center bg-black/40 rounded px-1 py-0.5 border border-white/5">
                                    <img src="${itemData.recipe[0].image}" class="w-3.5 h-3.5 rounded-sm object-cover opacity-80">
                                    <i class="fa-solid fa-plus text-[5px] text-slate-500"></i>
                                    <img src="${itemData.recipe[1].image}" class="w-3.5 h-3.5 rounded-sm object-cover opacity-80">
                                </div>
                            `;
                        }

                        const isRadiant = itemData.name.toLowerCase().includes('ánh sáng');
                        const imgBorder = isRadiant ? 'border-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.4)]' : 'border-slate-600';

                        return `<div class="flex flex-col items-center flex-1 min-w-0"><img src="${itemData.image}" class="w-10 h-10 rounded-lg border-[1.5px] ${imgBorder} object-cover bg-black shadow-md mb-1"><span class="text-[8px] md:text-[9.5px] ${isRadiant ? 'text-yellow-400' : 'text-slate-300'} font-bold truncate w-full text-center px-0.5">${itemData.name}</span>${recipeHTML}</div>`;
                    }).join('');

                    const tabsHTML = builds.map((b, idx) => `
                        <button onclick="document.getElementById('build-content').innerHTML = window.renderBuildTab('${champName}', ${idx})" 
                                class="px-2.5 py-1.5 rounded-lg text-[9.5px] font-bold transition-all whitespace-nowrap shadow-sm border ${idx === styleIndex ? 'bg-premium-gold text-black border-transparent shadow-[0_0_5px_rgba(212,175,55,0.5)]' : 'bg-slate-800 border-white/10 text-slate-400 hover:bg-slate-700 hover:text-white'}">
                            Cách ${idx + 1}
                        </button>
                    `).join('');

                    const statsHTML = `
                        <div class="flex items-center justify-center gap-3 mb-3 px-1">
                            <span class="text-[9.5px] text-emerald-400 font-bold bg-emerald-900/20 border border-emerald-500/30 px-2.5 py-0.5 rounded shadow-sm flex items-center gap-1.5">
                                <i class="fa-solid fa-trophy"></i> Top TB: ${currentBuild.avg_place}
                            </span>
                            <span class="text-[9.5px] text-blue-400 font-bold bg-blue-900/20 border border-blue-500/30 px-2.5 py-0.5 rounded shadow-sm flex items-center gap-1.5">
                                <i class="fa-solid fa-chart-line"></i> Thắng: ${currentBuild.win_rate}
                            </span>
                        </div>
                    `;

                    return `
                        <div class="flex flex-col gap-2.5">
                            <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pb-1 border-b border-white/5 snap-x">${tabsHTML}</div>
                            ${statsHTML}
                            <div class="flex gap-2 justify-between items-start bg-black/20 p-2 rounded-xl border border-white/5 shadow-inner">${itemsHTML}</div>
                        </div>
                    `;
                };

                window.openChampModal = (index) => {
                    const champ = window._currentFilteredChampsForPopup[index];
                    if (!champ) return;

                    let borderColor = 'border-slate-400'; let textColor = 'text-slate-300';
                    if (champ.cost === 2) { borderColor = 'border-emerald-500'; textColor = 'text-emerald-400'; }
                    if (champ.cost === 3) { borderColor = 'border-blue-500'; textColor = 'text-blue-400'; }
                    if (champ.cost === 4) { borderColor = 'border-purple-500'; textColor = 'text-purple-400'; }
                    if (champ.cost === 5) { borderColor = 'border-yellow-400'; textColor = 'text-yellow-400'; }

                    const titleHTML = `
                        <div class="flex items-center justify-between w-full pr-4">
                            <span class="text-white font-black drop-shadow-md text-[19px] tracking-tight">${champ.name}</span>
                            <span class="text-xs font-black ${textColor} bg-black/60 backdrop-blur-sm px-2 py-0.5 rounded-lg border border-white/10 shadow-sm flex items-center gap-1">
                                ${champ.cost} <i class="fa-solid fa-coins text-[10px]"></i>
                            </span>
                        </div>
                    `;

                    const traitPills = champ.traits.map(t => `<span class="px-2 py-0.5 rounded border border-premium-accent/30 bg-premium-accent/10 text-premium-accent text-[9.5px] md:text-[10.5px] font-bold uppercase tracking-wider drop-shadow-md backdrop-blur-md">${t.name}</span>`).join('');

                    const buildsSectionHTML = `
                        <div class="mt-2 bg-slate-900/50 rounded-xl border border-white/10 p-3 shadow-lg relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-premium-gold via-transparent to-transparent opacity-50"></div>
                            <div class="text-[10px] md:text-[11px] font-black text-premium-gold uppercase tracking-widest mb-3 flex items-center gap-2 drop-shadow-md">
                                <i class="fa-solid fa-chart-pie"></i> Thống kê lên đồ
                            </div>
                            <div id="build-content">${window.renderBuildTab(champ.name, 0)}</div>
                        </div>
                    `;

                    const contentHTML = `
                        <div class="flex flex-col gap-3 mt-2 text-left">
                            <div class="w-full h-[100px] md:h-[120px] rounded-xl overflow-hidden border-2 ${borderColor} relative shadow-md">
                                <img src="${champ.image}" class="w-full h-full object-cover object-[80%]" alt="${champ.name}">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                <div class="absolute bottom-2 left-2 flex flex-wrap gap-1.5">${traitPills}</div>
                            </div>
                            <div class="flex gap-2">
                                <div class="flex-1 bg-white/5 border border-white/10 rounded-xl p-2.5 flex flex-col items-center justify-center gap-1 shadow-inner">
                                    <i class="fa-solid fa-user-shield text-premium-accent text-sm md:text-base drop-shadow-md"></i>
                                    <span class="text-[8.5px] md:text-[10px] text-slate-400 uppercase tracking-widest">Vai trò</span>
                                    <span class="text-[11px] md:text-[12px] font-bold text-slate-200 text-center leading-tight">${champ.role}</span>
                                </div>
                                <div class="flex-1 bg-white/5 border border-white/10 rounded-xl p-2.5 flex flex-col items-center justify-center gap-1 shadow-inner">
                                    <i class="fa-solid fa-crosshairs text-rose-400 text-sm md:text-base drop-shadow-md"></i>
                                    <span class="text-[8.5px] md:text-[10px] text-slate-400 uppercase tracking-widest">Tầm đánh</span>
                                    <span class="text-[12px] md:text-[13px] font-bold text-slate-200">${champ.range} ô</span>
                                </div>
                            </div>
                            ${buildsSectionHTML}
                        </div>
                    `;
                    uiAlert(titleHTML, contentHTML);
                };

                const renderChampions = () => {
                    const listContainer = document.getElementById('champ-list-container');
                    const viewIcon = document.getElementById('view-icon-champ');
                    
                    listContainer.innerHTML = '';
                    window._currentFilteredChampsForPopup = [];
                    let globalIndex = 0;

                    const filteredChamps = champions.filter(champ => {
                        const matchSearch = champ.name.toLowerCase().includes(searchQuery.toLowerCase());
                        const matchCost = activeCosts.size === 0 || activeCosts.has(champ.cost);
                        const matchTraits = activeTraits.size === 0 || [...activeTraits].every(st => champ.traits.some(t => t.name === st));
                        return matchSearch && matchCost && matchTraits;
                    });

                    if (filteredChamps.length === 0) {
                        listContainer.innerHTML = `<div class="py-20 flex flex-col items-center justify-center text-slate-500"><i class="fa-solid fa-ghost text-4xl mb-3 opacity-20"></i><span class="text-[11.5px] font-medium">Không tìm thấy tướng phù hợp.</span></div>`;
                        return;
                    }

                    viewIcon.className = isDetailedView ? "fa-solid fa-border-all" : "fa-solid fa-list";

                    const costTiers = [1, 2, 3, 4, 5];
                    costTiers.forEach(tier => {
                        const champsInTier = filteredChamps.filter(c => c.cost === tier);
                        if (champsInTier.length === 0) return; 

                        champsInTier.forEach(c => window._currentFilteredChampsForPopup.push(c));

                        let tierColor = 'text-slate-300'; let tierBg = 'bg-slate-400';
                        if (tier === 2) { tierColor = 'text-emerald-400'; tierBg = 'bg-emerald-500'; }
                        if (tier === 3) { tierColor = 'text-blue-400'; tierBg = 'bg-blue-500'; }
                        if (tier === 4) { tierColor = 'text-purple-400'; tierBg = 'bg-purple-500'; }
                        if (tier === 5) { tierColor = 'text-yellow-400'; tierBg = 'bg-yellow-500'; }

                        // ĐÃ SỬA: Giảm số cột trên Desktop (lg:grid-cols-7 xl:grid-cols-8) và tăng khoảng cách (md:gap-4)
                        let tierHTML = `
                            <div class="flex flex-col gap-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-1 h-5 rounded-full ${tierBg} shadow-[0_0_8px_currentColor]"></div>
                                    <h2 class="text-base font-black ${tierColor} uppercase tracking-widest flex items-center gap-1.5 drop-shadow-md">${tier} VÀNG</h2>

        // ---------------------------------------------------------
        // 6. HÀM FETCH VÀ RENDER DỮ LIỆU TỪ comps.json (TỐI ƯU EARLY COMP)
        // ---------------------------------------------------------
        async function loadCompsData() {
            const gridContainer = document.getElementById('grid-comps'); 
            if (!gridContainer) return;

            try {
                // TẢI 4 FILE ĐỂ CÓ THỂ MỞ MODAL TƯỚNG BÊN TRONG TAB ĐỘI HÌNH
                const [resComps, resChamps, resItems, resBuilds] = await Promise.all([
                    fetch('./asset/comps.json'),
                    fetch('./asset/champions.json'),
                    fetch('./asset/items.json'),
                    fetch('./asset/champion_builds.json')
                ]);

                if (!resComps.ok || !resChamps.ok || !resItems.ok || !resBuilds.ok) {
                    throw new Error('Không thể tải đầy đủ dữ liệu Đội Hình, Tướng, Trang Bị hoặc Cẩm Nang.');
                }

                const compsData = await resComps.json();
                const champsData = await resChamps.json();
                const itemsData = await resItems.json();
                const buildsData = await resBuilds.json();

                const masterChamps = {};
                champsData.forEach(champ => { masterChamps[champ.name.toLowerCase().trim()] = champ; });

                const masterItems = {};
                for (const itemArray of Object.values(itemsData)) {
                    if (Array.isArray(itemArray)) {
                        itemArray.forEach(item => { masterItems[item.name.toLowerCase().trim()] = item; });
                    }
                }

                window._masterBuildsForComps = {};
                if (Array.isArray(buildsData)) {
                    buildsData.forEach(b => {
                        const validBuilds = b.builds.filter(build => build.items && build.items.length > 0);
                        if (validBuilds.length > 0) {
                            window._masterBuildsForComps[b.unit] = validBuilds; 
                        }
                    });
                }

                const cleanName = (rawName) => rawName ? rawName.replace(/<[^>]+>/g, '').trim().toLowerCase() : '';
                const onErrorFallback = `onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiBmaWxsPSIjMWUyOTNiIiBzdHJva2U9IiM0NzU1NjkiIHN0cm9rZS13aWR0aD0iMiI+PHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiLz48dGV4dCB4PSI1MCIgeT0iNTUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI0MCIgZmlsbD0iIzQ3NTU2OSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+PzwvdGV4dD48L3N2Zz4='";`;
                
                let searchQuery = '';

                // --- HÀM 1: XỬ LÝ ĐÓNG/MỞ THẺ ĐỘI HÌNH BẰNG NÚT CHEVRON ---
                window.toggleCompDetails = (btnElement) => {
                    const card = btnElement.closest('.comp-card');
                    const detailsWrapper = card.querySelector('.comp-details');
                    const chevronIcon = btnElement.querySelector('.expand-icon');

                    if (detailsWrapper.classList.contains('hidden')) {
                        detailsWrapper.classList.remove('hidden');
                        chevronIcon.classList.add('rotate-180');
                        card.classList.add('border-premium-gold/40');
                    } else {
                        detailsWrapper.classList.add('hidden');
                        chevronIcon.classList.remove('rotate-180');
                        card.classList.remove('border-premium-gold/40');
                    }
                };

                // --- HÀM 2: MỞ MODAL TƯỚNG ---
                window.renderBuildTabInComp = (champName, styleIndex) => {
                    const builds = window._masterBuildsForComps[champName];
                    if (!builds || builds.length === 0) return '<p class="text-[10px] text-slate-500 text-center py-4 italic">Chưa có dữ liệu gợi ý.</p>';

                    const currentBuild = builds[styleIndex];
                    
                    const itemsHTML = currentBuild.items.map(rawItemName => {
                        const itemName = cleanName(rawItemName); 
                        const itemData = masterItems[itemName];
                        
                        if (!itemData) {
                            return `<div class="flex flex-col items-center flex-1 min-w-0 opacity-50"><div class="w-10 h-10 rounded-lg border border-slate-700 bg-slate-800 flex items-center justify-center mb-1"><i class="fa-solid fa-question text-slate-500 text-xs"></i></div><span class="text-[8px] text-slate-400 font-medium truncate w-full text-center px-0.5">${rawItemName}</span></div>`;
                        }

                        let recipeHTML = '<div class="h-4 mt-1"></div>'; 
                        if (itemData.recipe && itemData.recipe.length === 2) {
                            recipeHTML = `
                                <div class="flex items-center gap-[2px] mt-1 justify-center bg-black/40 rounded px-1 py-0.5 border border-white/5">
                                    <img src="${itemData.recipe[0].image}" class="w-3.5 h-3.5 rounded-sm object-cover opacity-80" ${onErrorFallback}>
                                    <i class="fa-solid fa-plus text-[5px] text-slate-500"></i>
                                    <img src="${itemData.recipe[1].image}" class="w-3.5 h-3.5 rounded-sm object-cover opacity-80" ${onErrorFallback}>
                                </div>
                            `;
                        }

                        const isRadiant = itemData.name.toLowerCase().includes('ánh sáng');
                        const imgBorder = isRadiant ? 'border-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.4)]' : 'border-slate-600';

                        return `<div class="flex flex-col items-center flex-1 min-w-0"><img src="${itemData.image}" class="w-10 h-10 rounded-lg border-[1.5px] ${imgBorder} object-cover bg-black shadow-md mb-1" ${onErrorFallback}><span class="text-[8px] md:text-[9.5px] ${isRadiant ? 'text-yellow-400' : 'text-slate-300'} font-bold truncate w-full text-center px-0.5">${itemData.name}</span>${recipeHTML}</div>`;
                    }).join('');

                    const tabsHTML = builds.map((b, idx) => `
                        <button onclick="document.getElementById('build-content-comp').innerHTML = window.renderBuildTabInComp('${champName}', ${idx})" 
                                class="px-2.5 py-1.5 rounded-lg text-[9.5px] font-bold transition-all whitespace-nowrap shadow-sm border ${idx === styleIndex ? 'bg-premium-gold text-black border-transparent shadow-[0_0_5px_rgba(212,175,55,0.5)]' : 'bg-slate-800 border-white/10 text-slate-400 hover:bg-slate-700 hover:text-white'}">
                            Cách ${idx + 1}
                        </button>
                    `).join('');

                    const statsHTML = `
                        <div class="flex items-center justify-center gap-3 mb-3 px-1">
                            <span class="text-[9.5px] text-emerald-400 font-bold bg-emerald-900/20 border border-emerald-500/30 px-2.5 py-0.5 rounded shadow-sm flex items-center gap-1.5">
                                <i class="fa-solid fa-trophy"></i> Top TB: ${currentBuild.avg_place}
                            </span>
                            <span class="text-[9.5px] text-blue-400 font-bold bg-blue-900/20 border border-blue-500/30 px-2.5 py-0.5 rounded shadow-sm flex items-center gap-1.5">
                                <i class="fa-solid fa-chart-line"></i> Thắng: ${currentBuild.win_rate}
                            </span>
                        </div>
                    `;

                    return `
                        <div class="flex flex-col gap-2.5">
                            <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar pb-1 border-b border-white/5 snap-x">${tabsHTML}</div>
                            ${statsHTML}
                            <div class="flex gap-2 justify-between items-start bg-black/20 p-2 rounded-xl border border-white/5 shadow-inner">${itemsHTML}</div>
                        </div>
                    `;
                };

                window.openChampModalFromComp = (champNameRaw) => {
                    const champ = masterChamps[cleanName(champNameRaw)];
                    if (!champ) return;

                    let borderColor = 'border-slate-400'; let textColor = 'text-slate-300';
                    if (champ.cost === 2) { borderColor = 'border-emerald-500'; textColor = 'text-emerald-400'; }
                    if (champ.cost === 3) { borderColor = 'border-blue-500'; textColor = 'text-blue-400'; }
                    if (champ.cost === 4) { borderColor = 'border-purple-500'; textColor = 'text-purple-400'; }
                    if (champ.cost === 5) { borderColor = 'border-yellow-400'; textColor = 'text-yellow-400'; }

                    const titleHTML = `
                        <div class="flex items-center justify-between w-full pr-4">
                            <span class="text-white font-black drop-shadow-md text-[19px] tracking-tight">${champ.name}</span>
                            <span class="text-xs font-black ${textColor} bg-black/60 backdrop-blur-sm px-2 py-0.5 rounded-lg border border-white/10 shadow-sm flex items-center gap-1">
                                ${champ.cost} <i class="fa-solid fa-coins text-[10px]"></i>
                            </span>
                        </div>
                    `;

                    const traitPills = champ.traits.map(t => `<span class="px-2 py-0.5 rounded border border-premium-accent/30 bg-premium-accent/10 text-premium-accent text-[9.5px] md:text-[10.5px] font-bold uppercase tracking-wider drop-shadow-md backdrop-blur-md">${t.name}</span>`).join('');

                    const buildsSectionHTML = `
                        <div class="mt-2 bg-slate-900/50 rounded-xl border border-white/10 p-3 shadow-lg relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-premium-gold via-transparent to-transparent opacity-50"></div>
                            <div class="text-[10px] md:text-[11px] font-black text-premium-gold uppercase tracking-widest mb-3 flex items-center gap-2 drop-shadow-md">
                                <i class="fa-solid fa-chart-pie"></i> Thống kê lên đồ
                            </div>
                            <div id="build-content-comp">${window.renderBuildTabInComp(champ.name, 0)}</div>
                        </div>
                    `;

                    const contentHTML = `
                        <div class="flex flex-col gap-3 mt-2 text-left">
                            <div class="w-full h-[100px] md:h-[120px] rounded-xl overflow-hidden border-2 ${borderColor} relative shadow-md">
                                <img src="${champ.image}" class="w-full h-full object-cover object-[80%]" alt="${champ.name}" ${onErrorFallback}>
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                <div class="absolute bottom-2 left-2 flex flex-wrap gap-1.5">${traitPills}</div>
                            </div>
                            <div class="flex gap-2">
                                <div class="flex-1 bg-white/5 border border-white/10 rounded-xl p-2.5 flex flex-col items-center justify-center gap-1 shadow-inner">
                                    <i class="fa-solid fa-user-shield text-premium-accent text-sm md:text-base drop-shadow-md"></i>
                                    <span class="text-[8.5px] md:text-[10px] text-slate-400 uppercase tracking-widest">Vai trò</span>
                                    <span class="text-[11px] md:text-[12px] font-bold text-slate-200 text-center leading-tight">${champ.role}</span>
                                </div>
                                <div class="flex-1 bg-white/5 border border-white/10 rounded-xl p-2.5 flex flex-col items-center justify-center gap-1 shadow-inner">
                                    <i class="fa-solid fa-crosshairs text-rose-400 text-sm md:text-base drop-shadow-md"></i>
                                    <span class="text-[8.5px] md:text-[10px] text-slate-400 uppercase tracking-widest">Tầm đánh</span>
                                    <span class="text-[12px] md:text-[13px] font-bold text-slate-200">${champ.range} ô</span>
                                </div>
                            </div>
                            ${buildsSectionHTML}
                        </div>
                    `;
                    uiAlert(titleHTML, contentHTML);
                };

                // --- RENDER KHUNG GIAO DIỆN CHÍNH ---
                gridContainer.className = "flex flex-col relative pb-20 min-h-screen w-full"; 
                gridContainer.innerHTML = `
                    <div class="sticky top-14 z-30 bg-[#090d14]/95 backdrop-blur-xl border border-white/10 rounded-2xl p-3 shadow-lg mb-6 -mx-1 px-4">
                        <div class="relative group flex items-center">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-400 group-focus-within:text-premium-gold transition-colors text-[13px]"></i>
                            <input type="text" id="search-comp" placeholder="Tìm đội hình (VD: Kai'Sa, Vô Pháp)..." 
                                class="w-full bg-black/40 border border-white/5 text-white text-[13px] rounded-xl pl-10 pr-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-premium-gold/50 transition-all placeholder:text-slate-500 shadow-inner">
                            <button id="clear-search-comp" class="absolute right-4 hidden text-slate-500 hover:text-white transition-colors p-1">
                                <i class="fa-solid fa-circle-xmark text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div id="comp-list-container" class="grid grid-cols-1 gap-4 items-start w-full"></div>
                `;

                // --- HÀM RENDER ĐỘI HÌNH ---
                const renderComps = () => {
                    const listContainer = document.getElementById('comp-list-container');
                    listContainer.innerHTML = '';

                    const filteredComps = compsData.filter(comp => 
                        comp.CompTitle.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        comp.UnitsContainer.some(u => u.champion.toLowerCase().includes(searchQuery.toLowerCase()))
                    );

                    if (filteredComps.length === 0) {
                        listContainer.innerHTML = `
                            <div class="py-16 flex flex-col items-center justify-center text-slate-500">
                                <i class="fa-solid fa-ghost text-4xl mb-3 opacity-20"></i>
                                <span class="text-[12px] font-medium">Không tìm thấy Đội Hình phù hợp.</span>
                            </div>`;
                        return;
                    }

                    let emptyHexesHTML = '';
                    for (let r = 0; r < 4; r++) {
                        for (let c = 0; c < 7; c++) {
                            const isOddRow = r % 2 !== 0;
                            const left = c * 13.33 + (isOddRow ? 6.66 : 0);
                            const top = r * 23.07;
                            emptyHexesHTML += `
                                <div class="absolute w-[13.33%] h-[30.76%] bg-[#112233]/80 scale-[0.92] transition-colors" 
                                     style="left: ${left}%; top: ${top}%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">
                                </div>
                            `;
                        }
                    }

                    listContainer.innerHTML = filteredComps.map((comp, compIndex) => {
                        
                        let tagsHTML = '';
                        if (comp.CompRowTags && comp.CompRowTags.length > 0) {
                            tagsHTML = comp.CompRowTags.map(tag => 
                                `<span class="px-2 py-[1px] rounded bg-premium-gold/10 border border-premium-gold/20 text-premium-gold text-[9px] font-bold uppercase tracking-wider">${tag}</span>`
                            ).join('');
                        }

                        let unitsHTML = '';
                        let traitCounts = {}; 
                        
                        if (comp.UnitsContainer && comp.UnitsContainer.length > 0) {
                            const sortedUnits = [...comp.UnitsContainer].sort((a, b) => b.items.length - a.items.length);

                            unitsHTML = sortedUnits.map(unit => {
                                const cName = cleanName(unit.champion);
                                const champData = masterChamps[cName];
                                const champImage = champData ? champData.image : './asset/placeholder.png';
                                const champCost = champData ? champData.cost : 1;

                                if (champData && champData.traits) {
                                    champData.traits.forEach(t => { traitCounts[t.name] = (traitCounts[t.name] || 0) + 1; });
                                }

                                let borderColor = 'border-slate-600'; 
                                if (champCost === 2) borderColor = 'border-emerald-500';
                                if (champCost === 3) borderColor = 'border-blue-500';
                                if (champCost === 4) borderColor = 'border-purple-500';
                                if (champCost === 5) borderColor = 'border-yellow-400';

                                const items = unit.items || [];
                                let itemsHTML = '';
                                if (items.length > 0) {
                                    itemsHTML = items.map(itemName => {
                                        const iData = masterItems[cleanName(itemName)];
                                        const img = iData ? iData.image : './asset/placeholder.png';
                                        return `<img src="${img}" class="w-[14px] h-[14px] sm:w-[15px] sm:h-[15px] rounded-[3px] border border-[#090d14] object-cover shadow-sm bg-black" title="${iData ? iData.name : itemName}" ${onErrorFallback}>`;
                                    }).join('');
                                }

                                return `
                                    <div class="flex flex-col items-center w-12 sm:w-[50px] shrink-0 group/unit cursor-pointer" onclick="window.openChampModalFromComp('${unit.champion}')">
                                        <div class="relative w-full mb-1.5 transition-transform duration-300 group-hover/unit:-translate-y-1">
                                            <div class="w-full aspect-square rounded-[6px] border-2 ${borderColor} overflow-hidden bg-black shadow-md">
                                                <img src="${champImage}" class="w-full h-full object-cover object-[80%]" title="${unit.champion}" ${onErrorFallback}>
                                            </div>
                                            <div class="absolute -bottom-2 left-0 w-full flex justify-center gap-[1.5px] z-10">
                                                ${itemsHTML}
                                            </div>
                                        </div>
                                        <span class="text-[10px] sm:text-[11px] text-slate-200 font-bold truncate w-full text-center mt-1 group-hover/unit:text-premium-gold transition-colors drop-shadow-md">${unit.champion}</span>
                                    </div>
                                `;
                            }).join('');
                        }

                        const sortedTraits = Object.entries(traitCounts).sort((a,b) => b[1] - a[1]);
                        let traitsHTML = sortedTraits.map(([tName, tCount]) => `
                            <div class="flex items-center gap-1.5 pl-2 pr-1 py-0.5 bg-slate-800/80 border border-slate-700/50 rounded-full shadow-sm">
                                <span class="text-[10px] font-semibold text-slate-200">${tName}</span>
                                <div class="w-4 h-4 rounded-full bg-premium-gold flex items-center justify-center shadow-inner border border-yellow-300">
                                    <span class="text-[9px] font-black text-black leading-none">${tCount}</span>
                                </div>
                            </div>

                        let carouselHTML = '<span class="text-[10px] text-slate-500 italic">Không có dữ liệu.</span>';
                        if (comp.CompQuickStart?.carousel?.length > 0) {
                            carouselHTML = `<div class="flex items-center gap-1 overflow-x-auto no-scrollbar pb-1">` + 
                            comp.CompQuickStart.carousel.slice(0, 5).map((cItem, index) => {
                                const iData = masterItems[cleanName(cItem.item)];
                                const img = iData ? iData.image : './asset/placeholder.png';
                                return `
                                    <div class="flex items-center">
                                        <img src="${img}" class="w-6 h-6 rounded border border-slate-600 bg-black object-cover shadow-sm" ${onErrorFallback}>
                                        ${index < Math.min(4, comp.CompQuickStart.carousel.length - 1) ? `<i class="fa-solid fa-angle-right text-[8px] text-slate-600 mx-1"></i>` : ''}
                                    </div>
                                `;
                            }).join('') + `</div>`;
                        }

                        // --- ĐÃ SỬA: ĐỘI HÌNH EARLY COMP TO RÕ, CÓ TÊN TƯỚNG BÊN DƯỚI ---
                        let earlyCompHTML = '<span class="text-[10px] text-slate-500 italic">Không có dữ liệu.</span>';
                        if (comp.CompEarlyOptions?.length > 0) {
                            earlyCompHTML = comp.CompEarlyOptions.slice(0, 2).map(opt => {
                                const teamHTML = opt.team_comp.map(c => {
                                    const cData = masterChamps[cleanName(c)];
                                    const img = cData ? cData.image : './asset/placeholder.png';
                                    let borderColor = 'border-slate-600';
                                    if(cData) {
                                        if(cData.cost===2) borderColor='border-emerald-500';
                                        if(cData.cost===3) borderColor='border-blue-500';
                                        if(cData.cost===4) borderColor='border-purple-500';
                                        if(cData.cost===5) borderColor='border-yellow-400';
