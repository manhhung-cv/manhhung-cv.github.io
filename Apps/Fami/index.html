<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Theo Dõi Mục Tiêu Gia Đình</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    <!-- Canvas Confetti cho hiệu ứng pháo giấy -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #FAFAFA;
            color: #374151;
        }
        .btn-flat {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-flat:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 transparent !important;
        }
        .btn-flat:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0 0 #D1D5DB !important;
        }
        .progress-bar {
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card-flat {
            background: #ffffff;
            border: 2px solid #E5E7EB;
            border-radius: 1.5rem;
            box-shadow: 0 4px 0 0 #E5E7EB;
            transition: transform 0.2s;
        }
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Modal background */
        .modal-bg {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="pb-16">

    <!-- Header / Navbar Flat -->
    <nav class="bg-white border-b-2 border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-500 w-10 h-10 rounded-xl flex items-center justify-center transform rotate-3">
                        <i class="fa-solid fa-house-chimney text-white text-xl"></i>
                    </div>
                    <h1 class="font-black text-xl md:text-2xl tracking-tight text-gray-800">Family<span class="text-indigo-500">Goals</span></h1>
                </div>
                
                <div class="flex items-center gap-3">
                    <!-- Nút Admin -->
                    <button id="btn-admin-login" onclick="window.showAdminModal()" class="hidden md:flex items-center gap-2 bg-gray-100 hover:bg-gray-200 border-2 border-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold transition">
                        <i class="fa-solid fa-lock"></i> Đăng nhập Admin
                    </button>
                    <div id="admin-badge" class="hidden items-center gap-2 bg-green-100 border-2 border-green-500 text-green-700 px-4 py-2 rounded-xl font-bold">
                        <i class="fa-solid fa-unlock"></i> Quyền Admin
                    </div>

                    <!-- Tổng điểm -->
                    <div class="flex items-center gap-2 bg-yellow-400 border-2 border-yellow-500 shadow-[0_3px_0_0_#D97706] px-4 py-2 md:px-5 rounded-2xl">
                        <i class="fa-solid fa-star text-yellow-100 text-lg"></i>
                        <span class="font-extrabold text-yellow-900 text-sm md:text-lg">Tổng: <span id="family-total-points" class="ml-1 text-lg md:text-xl">0</span></span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Trạng thái Loading -->
    <div id="loading-state" class="fixed inset-0 z-40 bg-white flex flex-col items-center justify-center">
        <i class="fa-solid fa-spinner fa-spin text-5xl text-indigo-500 mb-4"></i>
        <h2 class="text-xl font-bold text-gray-600">Đang kết nối Máy chủ Đám mây...</h2>
    </div>

    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 space-y-16 hidden">
        <!-- Phần 1: Các thành viên -->
        <section>
            <div class="flex items-center gap-3 mb-6">
                <h2 class="text-2xl md:text-3xl font-black text-gray-800">Team Gia Đình</h2>
                <div class="h-1 flex-1 bg-gray-200 rounded-full"></div>
            </div>
            <div id="members-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Phần 2: Mục tiêu chung -->
        <section>
            <div class="flex items-center gap-3 mb-6">
                <h2 class="text-2xl md:text-3xl font-black text-gray-800">Nhiệm Vụ Tổ Đội</h2>
                <div class="h-1 flex-1 bg-gray-200 rounded-full"></div>
            </div>
            <div id="common-goals-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>

        <!-- Phần 3: Mục tiêu cá nhân -->
        <section>
            <div class="flex items-center gap-3 mb-6">
                <h2 class="text-2xl md:text-3xl font-black text-gray-800">Mục Tiêu Cá Nhân</h2>
                <div class="h-1 flex-1 bg-gray-200 rounded-full"></div>
            </div>
            <div id="individual-goals-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <!-- Admin Login Modal -->
    <div id="admin-modal" class="fixed inset-0 z-50 modal-bg hidden flex items-center justify-center px-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full border-4 border-gray-200 shadow-2xl pop-in">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-3xl text-indigo-500"></i>
                </div>
                <h3 class="text-2xl font-black text-gray-800">Xác thực Admin</h3>
                <p class="text-gray-500 font-semibold mt-1">Chỉ Admin mới có thể cộng điểm.</p>
            </div>
            <input type="password" id="admin-pin" placeholder="Nhập mã PIN (Mặc định: 123456)" 
                class="w-full bg-gray-100 border-2 border-gray-200 rounded-xl px-4 py-3 font-bold text-center mb-4 focus:outline-none focus:border-indigo-500 transition">
            <p id="admin-error" class="text-red-500 text-sm font-bold text-center mb-4 hidden">Mã PIN không chính xác!</p>
            <div class="flex gap-3">
                <button onclick="window.closeAdminModal()" class="flex-1 bg-gray-200 text-gray-700 font-black py-3 rounded-xl hover:bg-gray-300 transition">Hủy</button>
                <button onclick="window.verifyAdmin()" class="flex-1 bg-indigo-500 text-white font-black py-3 rounded-xl hover:bg-indigo-600 transition shadow-[0_4px_0_0_#4338CA] btn-flat">Xác nhận</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK & Logic Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Khởi tạo Firebase
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-goals-app';

        // Trạng thái ứng dụng
        let currentUser = null;
        let isAdmin = false; // Mặc định không phải admin
        const ADMIN_PIN = "123456"; // Mã PIN mặc định

        // Dữ liệu sẽ được đồng bộ từ Cloud
        let membersData = [];
        let commonGoalsData = [];
        let individualGoalsData = [];

        // 1. DỮ LIỆU MẪU ĐỂ KHỞI TẠO LẦN ĐẦU
        const defaultMembers = [
            { id: 'm1', name: 'Bố (Hùng)', points: 1450, icon: 'fa-user-astronaut', color: 'text-blue-500', bg: 'bg-blue-100', barBg: 'bg-blue-500', shadowColor: '#2563EB' },
            { id: 'm2', name: 'Mẹ (Mai)', points: 1520, icon: 'fa-crown', color: 'text-rose-500', bg: 'bg-rose-100', barBg: 'bg-rose-500', shadowColor: '#E11D48' },
            { id: 'm3', name: 'Anh Hai (Bi)', points: 680, icon: 'fa-gamepad', color: 'text-green-500', bg: 'bg-green-100', barBg: 'bg-green-500', shadowColor: '#16A34A' },
            { id: 'm4', name: 'Em Gái (Bống)', points: 120, icon: 'fa-star-and-crescent', color: 'text-purple-500', bg: 'bg-purple-100', barBg: 'bg-purple-500', shadowColor: '#9333EA' }
        ];

        const defaultCommonGoals = [
            // Mục tiêu sử dụng Ảnh (URL)
            { id: 'cg1', type: 'image', imageUrl: 'https://images.unsplash.com/photo-1540202404-b711142289eb?auto=format&fit=crop&w=600&q=80', title: 'Chuyến du lịch biển', target: 5000 },
            // Mục tiêu sử dụng Icon
            { id: 'cg2', type: 'icon', icon: 'fa-tv', iconBg: 'bg-orange-100', iconColor: 'text-orange-500', title: 'Mua TV OLED 65 inch', target: 3500 }
        ];

        const defaultIndividualGoals = [
            { id: 'ig1', type: 'icon', icon: 'fa-mobile-screen', assigneeId: 'm1', title: 'Đổi điện thoại mới', target: 2000 },
            // Mục tiêu sử dụng Ảnh (URL) cho cá nhân
            { id: 'ig2', type: 'image', imageUrl: 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=300&q=80', assigneeId: 'm2', title: 'Khóa Yoga cao cấp', target: 1600 },
            { id: 'ig3', type: 'icon', icon: 'fa-robot', assigneeId: 'm3', title: 'Robot Transformer', target: 1000 },
            { id: 'ig4', type: 'icon', icon: 'fa-house-chimney-window', assigneeId: 'm4', title: 'Nhà búp bê cỡ lớn', target: 500 }
        ];

        // 2. KHỞI TẠO XÁC THỰC
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Lỗi đăng nhập:", error);
            }
        };

        // 3. THEO DÕI VÀ KIỂM TRA DỮ LIỆU ĐÁM MÂY
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await checkAndSeedData(); // Tạo dữ liệu mẫu nếu chưa có
                setupRealtimeListeners(); // Bật chế độ lắng nghe Real-time
            }
        });

        async function checkAndSeedData() {
            const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
            const snap = await getDocs(membersRef);
            
            // Nếu Database trống, đẩy dữ liệu mẫu lên
            if (snap.empty) {
                for (const m of defaultMembers) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', m.id), m); }
                for (const cg of defaultCommonGoals) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'commonGoals', cg.id), cg); }
                for (const ig of defaultIndividualGoals) { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'individualGoals', ig.id), ig); }
            }
        }

        function setupRealtimeListeners() {
            if (!currentUser) return;

            // Lắng nghe Members
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), (snapshot) => {
                membersData = snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.id.localeCompare(b.id));
                checkIfReadyToRender();
            }, (error) => console.error(error));

            // Lắng nghe Mục tiêu chung
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'commonGoals'), (snapshot) => {
                commonGoalsData = snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.id.localeCompare(b.id));
                checkIfReadyToRender();
            }, (error) => console.error(error));

            // Lắng nghe Mục tiêu cá nhân
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'individualGoals'), (snapshot) => {
                individualGoalsData = snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.id.localeCompare(b.id));
                checkIfReadyToRender();
            }, (error) => console.error(error));
        }

        let readyCount = 0;
        function checkIfReadyToRender() {
            // Khi đủ cả 3 bảng dữ liệu tải xong thì ẩn màn hình Loading
            if (membersData.length > 0 && commonGoalsData.length > 0 && individualGoalsData.length > 0) {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                renderAll();
            }
        }

        // 4. LOGIC XỬ LÝ (Giao diện Admin & Thêm điểm)
        
        window.showAdminModal = () => {
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-pin').value = '';
            document.getElementById('admin-error').classList.add('hidden');
            document.getElementById('admin-pin').focus();
        };

        window.closeAdminModal = () => {
            document.getElementById('admin-modal').classList.add('hidden');
        };

        window.verifyAdmin = () => {
            const pin = document.getElementById('admin-pin').value;
            if (pin === ADMIN_PIN) {
                isAdmin = true;
                window.closeAdminModal();
                // Thay đổi UI
                document.getElementById('btn-admin-login').classList.add('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('admin-badge').classList.add('flex');
                renderAll(); // Cập nhật lại UI để hiện nút bấm
                
                // Pháo giấy nhẹ báo đăng nhập thành công
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.2 }, zIndex: 9999, colors: ['#4ADE80', '#ffffff'] });
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
            }
        };

        window.addPointsToCloud = async (memberId, currentPoints, pointsToAdd, event, colorHex) => {
            if (!isAdmin) return; // Bảo vệ vòng ngoài
            
            // Bắn pháo giấy ngay lập tức để UI mượt mà
            const rect = event.target.getBoundingClientRect();
            confetti({
                particleCount: 50, spread: 70,
                origin: { x: (rect.left + rect.width / 2) / window.innerWidth, y: (rect.top + rect.height / 2) / window.innerHeight },
                colors: [colorHex, '#FFD700', '#FFFFFF'], disableForReducedMotion: true
            });

            // Cập nhật lên Cloud Storage
            try {
                const memberRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', memberId);
                await updateDoc(memberRef, { points: currentPoints + pointsToAdd });
                // Giao diện sẽ tự động cập nhật nhờ onSnapshot!
            } catch (error) {
                console.error("Lỗi khi cộng điểm:", error);
            }
        };

        // 5. RENDER GIAO DIỆN
        function formatNumber(num) { return num.toLocaleString('vi-VN'); }
        function getFamilyTotalPoints() { return membersData.reduce((total, m) => total + m.points, 0); }

        function renderMembers() {
            const container = document.getElementById('members-container');
            container.innerHTML = '';

            membersData.forEach(member => {
                const buttonDisplay = isAdmin ? 'flex' : 'hidden'; // Chỉ hiện nếu là Admin
                const card = document.createElement('div');
                card.className = `card-flat p-6 flex flex-col items-center relative`;
                card.innerHTML = `
                    <div class="w-24 h-24 rounded-full ${member.bg} flex items-center justify-center mb-4 border-4 border-white shadow-sm">
                        <i class="fa-solid ${member.icon} text-4xl ${member.color}"></i>
                    </div>
                    <h3 class="text-xl font-extrabold text-gray-800 mb-1">${member.name}</h3>
                    <div class="text-3xl font-black ${member.color} mb-6 flex items-baseline gap-1 bg-gray-50 px-4 py-2 rounded-2xl border-2 border-gray-100">
                        ${formatNumber(member.points)}
                        <i class="fa-solid fa-star text-yellow-400 text-lg"></i>
                    </div>
                    <div class="${buttonDisplay} gap-3 w-full mt-auto">
                        <button onclick="window.addPointsToCloud('${member.id}', ${member.points}, 10, event, '${member.shadowColor}')" 
                            class="btn-flat flex-1 ${member.barBg} text-white font-black py-3 rounded-2xl"
                            style="box-shadow: 0 4px 0 0 ${member.shadowColor};">
                            +10
                        </button>
                        <button onclick="window.addPointsToCloud('${member.id}', ${member.points}, 50, event, '${member.shadowColor}')" 
                            class="btn-flat flex-1 ${member.barBg} text-white font-black py-3 rounded-2xl"
                            style="box-shadow: 0 4px 0 0 ${member.shadowColor};">
                            +50
                        </button>
                    </div>
                    ${!isAdmin ? `<div class="w-full text-center text-xs font-bold text-gray-400 mt-2 bg-gray-100 py-2 rounded-lg border-2 border-gray-200 border-dashed">Yêu cầu quyền Admin</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function createProgressBar(percent, colorClass) {
            return `
                <div class="w-full bg-gray-100 rounded-full h-6 border-2 border-gray-200 overflow-hidden p-0.5 mt-2">
                    <div class="progress-bar ${colorClass} h-full rounded-full relative" style="width: ${percent}%">
                        <div class="absolute top-0.5 left-1.5 right-1.5 h-1.5 bg-white/30 rounded-full"></div>
                    </div>
                </div>`;
        }

        function renderCommonGoals() {
            const container = document.getElementById('common-goals-container');
            container.innerHTML = '';
            const totalFamilyPoints = getFamilyTotalPoints();

            commonGoalsData.forEach(goal => {
                let progressPercent = Math.min((totalFamilyPoints / goal.target) * 100, 100);
                const isCompleted = progressPercent === 100;

                // Xử lý hiển thị Ảnh hoặc Icon
                let visualHtml = '';
                if (goal.type === 'image' && goal.imageUrl) {
                    visualHtml = `<img src="${goal.imageUrl}" class="w-full h-full object-cover rounded-xl" alt="Mục tiêu">`;
                } else {
                    visualHtml = `<i class="fa-solid ${goal.icon} text-6xl ${goal.iconColor}"></i>`;
                }

                const card = document.createElement('div');
                card.className = `card-flat overflow-hidden flex flex-col sm:flex-row p-2 ${isCompleted ? 'border-green-400 bg-green-50' : ''}`;
                card.innerHTML = `
                    <div class="sm:w-1/3 h-48 sm:h-auto ${goal.type==='icon' ? goal.iconBg : 'bg-gray-200'} rounded-2xl flex items-center justify-center relative border-2 border-white overflow-hidden">
                        ${visualHtml}
                        ${isCompleted ? `
                        <div class="absolute -top-2 -right-2 bg-green-500 text-white text-xs font-black px-3 py-1 rounded-xl shadow-sm border-2 border-white pop-in">
                            HOÀN THÀNH!
                        </div>` : ''}
                    </div>
                    <div class="p-5 flex flex-col justify-center flex-1">
                        <h3 class="text-2xl font-black text-gray-800 mb-4">${goal.title}</h3>
                        <div class="mt-auto">
                            <div class="flex justify-between items-end mb-1">
                                <span class="font-bold text-gray-500">Tiến độ gia đình</span>
                                <span class="font-black text-gray-800 text-lg">${formatNumber(totalFamilyPoints)} / ${formatNumber(goal.target)}</span>
                            </div>
                            ${createProgressBar(progressPercent, isCompleted ? 'bg-green-400' : 'bg-yellow-400')}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderIndividualGoals() {
            const container = document.getElementById('individual-goals-container');
            container.innerHTML = '';

            individualGoalsData.forEach(goal => {
                const member = membersData.find(m => m.id === goal.assigneeId);
                if (!member) return;

                let progressPercent = Math.min((member.points / goal.target) * 100, 100);
                const isCompleted = progressPercent === 100;

                // Xử lý hiển thị Ảnh hoặc Icon cho mục tiêu cá nhân
                let visualHtml = '';
                if (goal.type === 'image' && goal.imageUrl) {
                    visualHtml = `<img src="${goal.imageUrl}" class="w-full h-full object-cover rounded-[14px]" alt="Mục tiêu">`;
                } else {
                    visualHtml = `<div class="w-full h-full rounded-[14px] ${member.bg} flex items-center justify-center"><i class="fa-solid ${goal.icon} text-2xl ${member.color}"></i></div>`;
                }

                const card = document.createElement('div');
                card.className = `card-flat p-5 flex flex-col relative ${isCompleted ? 'border-green-400 bg-green-50' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center border-2 border-white shadow-sm p-0.5">
                            ${visualHtml}
                        </div>
                        <div class="bg-white border-2 border-gray-100 px-3 py-1 rounded-xl flex items-center gap-2">
                            <div class="w-5 h-5 rounded-full ${member.barBg} text-white flex items-center justify-center text-[10px]">
                                <i class="fa-solid ${member.icon}"></i>
                            </div>
                            <span class="text-sm font-bold text-gray-600">${member.name.split(' ')[0]}</span>
                        </div>
                    </div>
                    <h3 class="font-black text-lg text-gray-800 mb-4 truncate">${goal.title}</h3>
                    <div class="mt-auto">
                        <div class="flex justify-between text-sm mb-1 font-black">
                            <span class="text-gray-400">${formatNumber(member.points)}</span>
                            <span class="text-gray-800">${formatNumber(goal.target)}</span>
                        </div>
                        ${createProgressBar(progressPercent, isCompleted ? 'bg-green-400' : member.barBg)}
                    </div>
                    ${isCompleted ? `
                    <div class="absolute -top-3 -right-3 bg-green-500 text-white w-10 h-10 flex items-center justify-center rounded-full border-4 border-white pop-in">
                        <i class="fa-solid fa-check"></i>
                    </div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function renderAll() {
            document.getElementById('family-total-points').innerText = formatNumber(getFamilyTotalPoints());
            renderMembers();
            renderCommonGoals();
            renderIndividualGoals();
        }

        // Bắt đầu khởi tạo
        initAuth();

    </script>
</body>
</html>
