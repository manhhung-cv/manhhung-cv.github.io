<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Audio Player - Pro Log</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #ffffff;
            --secondary: #a0a0a0;
            --accent: #00ffcc;
            --border: #333333;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .app-container {
                grid-template-columns: 1fr 1fr;
            }
            .visualizer-section {
                grid-column: 1 / -1;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        h2, h3 {
            font-weight: 500;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Player & Playlist */
        audio {
            width: 100%;
            height: 36px;
            margin-bottom: 15px;
            border-radius: 6px;
            outline: none;
        }

        .upload-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--border);
            color: var(--primary);
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: background 0.3s;
        }

        .upload-btn:hover { background: #444; }
        input[type="file"] { display: none; }

        .playlist {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .playlist li {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--secondary);
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist li:hover, .playlist li.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary);
        }

        /* Equalizer */
        .eq-header-controls {
            display: flex;
            gap: 10px;
        }

        select, button {
            background: var(--bg);
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .eq-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 160px;
            padding-top: 20px;
        }

        .eq-band {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 18%;
        }

        .eq-val {
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .eq-label {
            font-size: 0.75rem;
            color: var(--secondary);
            margin-top: 10px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            transform: rotate(-90deg);
            margin: 40px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        /* Visualizer */
        canvas {
            width: 100%;
            height: 200px;
            background: var(--bg);
            border-radius: var(--radius);
            margin-bottom: 15px;
        }

        /* Live Data Log - Cập nhật layout mới */
        .log-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            background: #000;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        @media (min-width: 768px) {
            .log-panel {
                grid-template-columns: 1fr 1fr;
            }
        }

        .log-box {
            background: #111;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .log-title {
            color: #888;
            font-size: 0.7rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-data {
            color: #0f0;
            word-wrap: break-word;
        }
        
        /* Highlight màu riêng cho Band */
        .color-bass { color: #ff3366; }
        .color-mid { color: #00ffcc; }
        .color-treb { color: #ffcc00; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="card visualizer-section">
            <h2>
                Visualizer
                <div class="eq-header-controls">
                    <select id="vis-style">
                        <option value="bars">Bars</option>
                        <option value="wave">Waveform</option>
                    </select>
                </div>
            </h2>
            <canvas id="visualizer"></canvas>
            
            <div style="font-size: 0.8rem; color: var(--secondary); margin-bottom: 8px;">Live Audio Data:</div>
            
            <div class="log-panel">
                <div class="log-box">
                    <div class="log-title">Frequency Bands (0 - 255)</div>
                    <div class="log-data" id="log-bands">Chờ âm thanh...</div>
                </div>
                <div class="log-box">
                    <div class="log-title">Raw Bins Array (Top 16)</div>
                    <div class="log-data" id="log-bins">[ ... ]</div>
                </div>
            </div>
            
        </div>

        <div class="card">
            <h2>Music Player</h2>
            <audio id="audio-player" controls></audio>
            
            <label class="upload-btn">
                + Thêm nhạc vào Playlist
                <input type="file" id="audio-upload" accept="audio/*" multiple>
            </label>

            <ul class="playlist" id="playlist-ui">
                <li style="text-align:center; color: #555;">Chưa có bài hát nào. Hãy tải lên!</li>
            </ul>
        </div>

        <div class="card">
            <h2>
                5-Band EQ
                <div class="eq-header-controls">
                    <select id="eq-preset">
                        <option value="default">Default</option>
                        <option value="pop">Pop</option>
                        <option value="dance">Dance</option>
                        <option value="bass">Bass Boost</option>
                    </select>
                    <button id="eq-reset">Reset</button>
                </div>
            </h2>
            <div class="eq-grid">
                </div>
        </div>

    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const audioUpload = document.getElementById('audio-upload');
        const playlistUI = document.getElementById('playlist-ui');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const logBands = document.getElementById('log-bands');
        const logBins = document.getElementById('log-bins');
        const eqGrid = document.querySelector('.eq-grid');
        const presetSelect = document.getElementById('eq-preset');
        const resetBtn = document.getElementById('eq-reset');
        const visStyleSelect = document.getElementById('vis-style');

        let audioCtx, source, analyser;
        let filters = [];
        let playlist = [];
        let currentTrackIndex = 0;
        let visStyle = 'bars';
        
        const frequencies = [60, 230, 910, 3600, 14000];
        const eqPresets = {
            default: [0, 0, 0, 0, 0],
            pop: [-1, 2, 4, 3, -2],
            dance: [5, 3, 0, 2, 4],
            bass: [6, 4, 0, 0, 0]
        };

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createEQUI() {
            frequencies.forEach((freq, i) => {
                const label = freq >= 1000 ? (freq/1000) + 'k' : freq;
                const bandHTML = `
                    <div class="eq-band">
                        <span class="eq-val" id="val-${i}">0 dB</span>
                        <input type="range" class="eq-slider" min="-12" max="12" value="0" step="0.5" data-index="${i}">
                        <span class="eq-label">${label}</span>
                    </div>
                `;
                eqGrid.insertAdjacentHTML('beforeend', bandHTML);
            });

            document.querySelectorAll('.eq-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    const val = parseFloat(e.target.value);
                    updateEQBand(idx, val);
                    presetSelect.value = 'custom';
                });
            });
        }
        createEQUI();

        function updateEQBand(index, value) {
            document.getElementById(`val-${index}`).innerText = `${value > 0 ? '+' : ''}${value} dB`;
            document.querySelector(`.eq-slider[data-index="${index}"]`).value = value;
            if (filters[index]) {
                filters[index].gain.value = value;
            }
        }

        function applyPreset(presetName) {
            const values = eqPresets[presetName] || eqPresets.default;
            values.forEach((val, idx) => updateEQBand(idx, val));
            if(presetName !== 'custom') presetSelect.value = presetName;
        }

        presetSelect.addEventListener('change', (e) => applyPreset(e.target.value));
        resetBtn.addEventListener('click', () => applyPreset('default'));

        audioUpload.addEventListener('change', function(e) {
            const files = Array.from(this.files);
            if (files.length === 0) return;

            if (playlist.length === 0) playlistUI.innerHTML = ''; 

            files.forEach(file => {
                const url = URL.createObjectURL(file);
                playlist.push({ name: file.name, url: url });
                
                const li = document.createElement('li');
                li.innerText = file.name;
                const index = playlist.length - 1;
                li.addEventListener('click', () => playTrack(index));
                playlistUI.appendChild(li);
            });

            if (audioPlayer.src === "" || audioPlayer.src.includes(window.location.host) === false) {
                playTrack(0);
            }
        });

        function playTrack(index) {
            currentTrackIndex = index;
            const track = playlist[index];
            audioPlayer.src = track.url;
            audioPlayer.play();

            document.querySelectorAll('.playlist li').forEach((li, i) => {
                li.classList.toggle('active', i === index);
            });

            initAudioContext();
        }

        audioPlayer.addEventListener('ended', () => {
            if (currentTrackIndex < playlist.length - 1) {
                playTrack(currentTrackIndex + 1);
            }
        });

        function initAudioContext() {
            if (audioCtx) return;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(audioPlayer);
            analyser = audioCtx.createAnalyser();
            
            // Giữ fftSize 256 (tạo ra 128 bins)
            analyser.fftSize = 256; 

            let prevNode = source;

            frequencies.forEach((freq, i) => {
                let filter = audioCtx.createBiquadFilter();
                filter.type = i === 0 ? 'lowshelf' : (i === frequencies.length - 1 ? 'highshelf' : 'peaking');
                filter.frequency.value = freq;
                
                const currentVal = parseFloat(document.querySelector(`.eq-slider[data-index="${i}"]`).value);
                filter.gain.value = currentVal;
                
                filters.push(filter);
                prevNode.connect(filter);
                prevNode = filter;
            });

            prevNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            drawVisualizer();
        }

        visStyleSelect.addEventListener('change', (e) => visStyle = e.target.value);

        // Hàm hỗ trợ tính toán trung bình của một mảng con
        function getAverageOfRange(array, startIndex, endIndex) {
            let sum = 0;
            for (let i = startIndex; i < endIndex; i++) {
                sum += array[i];
            }
            return Math.round(sum / (endIndex - startIndex)) || 0;
        }

        let frameCount = 0;
        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            frameCount++;

            const bufferLength = analyser.frequencyBinCount; // Sẽ là 128
            const dataArray = new Uint8Array(bufferLength);
            
            // Xóa Canvas
            ctx.fillStyle = 'var(--bg)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cập nhật mảng dataArray tùy theo kiểu Visualizer
            if (visStyle === 'bars') {
                analyser.getByteFrequencyData(dataArray);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i] * 0.8; 
                    ctx.fillStyle = `rgb(${dataArray[i]}, 255, 204)`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            } else if (visStyle === 'wave') {
                analyser.getByteTimeDomainData(dataArray);
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'var(--accent)';
                ctx.beginPath();
                const sliceWidth = canvas.width * 1.0 / bufferLength;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.lineTo(canvas.width, canvas.height / 2);
                ctx.stroke();
                
                // Trở lại Frequency Data để xuất log vì wave dùng TimeDomainData
                analyser.getByteFrequencyData(dataArray); 
            }

            // --- LOGIC XUẤT LOG (Cập nhật mỗi 10 frame để chống lag) ---
            if (frameCount % 10 === 0) {
                // 1. Log Raw Bins
                const rawBinsStr = Array.from(dataArray).slice(0, 16).join(', ');
                logBins.innerText = `[ ${rawBinsStr} ... ]`;

                // 2. Log Frequency Bands (Gom nhóm Bins)
                // Lưu ý: với fftSize = 256, bufferLength = 128. Mỗi Bin chênh nhau ~172Hz (với sample rate 44.1kHz)
                const bassVal = getAverageOfRange(dataArray, 0, 3);    // Bins 0-2: ~0 -> 516Hz (Bass)
                const midVal = getAverageOfRange(dataArray, 3, 20);    // Bins 3-19: ~516 -> 3400Hz (Mid)
                const trebVal = getAverageOfRange(dataArray, 20, 128); // Bins 20-127: ~3400 -> 22000Hz (Treble)

                logBands.innerHTML = `
                    <span class="color-bass">Bass: ${bassVal}</span> | 
                    <span class="color-mid">Mid: ${midVal}</span> | 
                    <span class="color-treb">Treb: ${trebVal}</span>
                `;
            }
        }
    </script>
</body>
</html>
