<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HunqFM - Premium Live Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #030303; 
            color: #EAEAEA;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Premium Accent Colors */
        .text-champagne { color: #C5B390; }
        .bg-champagne { background-color: #C5B390; }
        .border-champagne { border-color: #C5B390; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: #C5B390; }

        .pulse-dot {
            animation: pulse-ring 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        /* Thanh Seek & EQ - Thiết kế sợi chỉ thanh mảnh */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 8px;
            width: 8px;
            border-radius: 50%;
            background: #C5B390;
            cursor: pointer;
            margin-top: -3.5px;
            box-shadow: 0 0 12px rgba(197, 179, 144, 0.4);
            transition: transform 0.3s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#C5B390] selection:text-black h-screen overflow-hidden">

    <nav class="w-full flex justify-between items-center px-8 py-10 md:px-16 border-b border-white/5 shrink-0 z-30 relative bg-[#030303]/80 backdrop-blur-md">
        <div class="font-serif text-2xl md:text-3xl tracking-widest text-white font-light">
            Hunq<span class="text-champagne italic">FM</span>
        </div>
        
        <div class="flex items-center gap-8 md:gap-10">
            <button onclick="toggleVisualizer()" id="btn-visualizer" class="text-[9px] uppercase tracking-[0.25em] text-neutral-500 hover:text-champagne transition-all duration-500 focus:outline-none flex items-center gap-3">
                <span class="hidden md:inline font-light">Phổ Âm</span>
            </button>
            
            <button onclick="toggleFXPanel()" id="btn-fx" class="text-[9px] uppercase tracking-[0.25em] text-neutral-500 hover:text-champagne transition-all duration-500 focus:outline-none flex items-center gap-3">
                <span class="hidden md:inline font-light">Hiệu Ứng Studio</span>
            </button>

            <div class="w-px h-3 bg-white/10 hidden md:block"></div>
            
            <div class="flex items-center gap-3">
                <span id="live-led" class="w-1.5 h-1.5 rounded-full bg-neutral-800 transition-colors duration-700"></span>
                <span id="status-text" class="text-[9px] uppercase tracking-[0.25em] text-neutral-600 font-light">Đang chờ</span>
            </div>
        </div>
    </nav>

    <div id="fx-panel" class="w-full bg-[#050505] border-b border-white/5 shrink-0 overflow-hidden transition-all duration-700 ease-in-out max-h-0 opacity-0 relative z-20">
        <div class="max-w-5xl mx-auto px-8 py-12 flex flex-col md:flex-row justify-between h-full gap-16">
            <div class="flex-1 flex flex-col gap-8">
                <h3 class="text-[9px] uppercase tracking-[0.3em] text-champagne font-light">Bộ Chỉnh Âm</h3>
                <div class="w-full grid grid-cols-3 gap-8">
                    <div class="flex flex-col items-center gap-4 group">
                        <span class="text-[8px] tracking-[0.3em] text-neutral-500 group-hover:text-champagne transition-colors">TRẦM</span>
                        <input type="range" id="eq-low" min="-15" max="15" value="0" step="1" oninput="updateEQ('low', this.value)">
                        <span id="val-low" class="text-[9px] font-light text-neutral-400">0</span>
                    </div>
                    <div class="flex flex-col items-center gap-4 group">
                        <span class="text-[8px] tracking-[0.3em] text-neutral-500 group-hover:text-champagne transition-colors">TRUNG</span>
                        <input type="range" id="eq-mid" min="-15" max="15" value="0" step="1" oninput="updateEQ('mid', this.value)">
                        <span id="val-mid" class="text-[9px] font-light text-neutral-400">0</span>
                    </div>
                    <div class="flex flex-col items-center gap-4 group">
                        <span class="text-[8px] tracking-[0.3em] text-neutral-500 group-hover:text-champagne transition-colors">CAO</span>
                        <input type="range" id="eq-high" min="-15" max="15" value="0" step="1" oninput="updateEQ('high', this.value)">
                        <span id="val-high" class="text-[9px] font-light text-neutral-400">0</span>
                    </div>
                </div>
            </div>

            <div class="w-px bg-white/5 hidden md:block"></div>

            <div class="flex-1 flex flex-col gap-8">
                <h3 class="text-[9px] uppercase tracking-[0.3em] text-champagne font-light">Cài Đặt Phổ Âm</h3>
                <div class="flex flex-col gap-6 justify-center h-full">
                    <div class="flex items-center justify-between border-b border-white/5 pb-4">
                        <span class="text-[8px] tracking-[0.3em] text-neutral-500">VỊ TRÍ</span>
                        <button id="btn-vis-pos" onclick="toggleVisPos()" class="text-[8px] text-neutral-300 hover:text-champagne uppercase tracking-[0.2em] transition-colors font-light focus:outline-none">Nền</button>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[8px] tracking-[0.3em] text-neutral-500">CHẾ ĐỘ MÀU</span>
                        <button id="btn-vis-color" onclick="toggleVisColor()" class="text-[8px] text-neutral-300 hover:text-champagne uppercase tracking-[0.2em] transition-colors font-light focus:outline-none">Động</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="flex-grow flex flex-col w-full mx-auto overflow-hidden relative z-0">
        
        <div class="flex-grow flex flex-col justify-center px-8 py-12 md:px-20 lg:px-32 relative overflow-hidden group transition-all duration-700 items-center">
            
            <div id="vis-bg-container" class="absolute inset-0 w-full h-full pointer-events-none z-0">
                <canvas id="visualizer-canvas" class="w-full h-full opacity-0 transition-opacity duration-1000"></canvas>
            </div>
            
            <div class="absolute inset-0 bg-gradient-to-t from-[#030303] via-transparent to-[#030303]/30 pointer-events-none z-0"></div>

            <div class="relative z-10 w-full max-w-4xl h-full flex flex-col justify-center">
                
                <div class="flex gap-10 md:gap-16 mb-16 overflow-x-auto pb-4 shrink-0 border-b border-white/5 no-scrollbar justify-center">
                    <button onclick="changeChannel('vinahouse')" id="btn-vinahouse" class="channel-btn text-[9px] uppercase tracking-[0.25em] pb-4 border-b border-champagne text-champagne transition-all duration-500 focus:outline-none font-light">Vinahouse</button>
                    <button onclick="changeChannel('chillout')" id="btn-chillout" class="channel-btn text-[9px] uppercase tracking-[0.25em] pb-4 border-b border-transparent text-neutral-600 hover:text-neutral-300 transition-all duration-500 whitespace-nowrap focus:outline-none font-light">Chill Out</button>
                    <button onclick="changeChannel('remix')" id="btn-remix" class="channel-btn text-[9px] uppercase tracking-[0.25em] pb-4 border-b border-transparent text-neutral-600 hover:text-neutral-300 transition-all duration-500 focus:outline-none font-light">Remix</button>
                    <button onclick="changeChannel('custom')" id="btn-custom" class="channel-btn text-[9px] uppercase tracking-[0.25em] pb-4 border-b border-transparent text-neutral-600 hover:text-neutral-300 transition-all duration-500 flex items-center gap-2 focus:outline-none font-light">
                        Cá Nhân
                    </button>
                </div>

                <div class="flex flex-col justify-center min-h-[200px] text-center md:text-left">
                    <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
                        <h2 class="text-[8px] uppercase tracking-[0.4em] text-champagne/80 font-light">Đang Phát</h2>
                        
                        <div id="upload-container" class="hidden transition-opacity duration-500">
                            <label class="cursor-pointer border border-white/10 px-6 py-2.5 text-[8px] uppercase tracking-[0.3em] text-neutral-400 hover:border-champagne hover:text-champagne transition-all duration-500 rounded-full flex items-center gap-2 bg-transparent">
                                <span>Thêm Tệp Âm Thanh</span>
                                <input type="file" id="file-upload" multiple accept="audio/*" class="hidden" onchange="handleFileUpload(event)">
                            </label>
                        </div>
                    </div>

                    <h1 id="track-name" class="font-serif text-4xl md:text-6xl lg:text-[5.5rem] leading-[1.1] text-white font-light tracking-wide max-w-4xl transition-opacity duration-700 line-clamp-3">
                        Kết nối để đồng bộ tác phẩm.
                    </h1>
                    
                    <div id="vis-inline-container" class="w-full max-w-2xl h-16 mt-12 hidden relative overflow-hidden border-b border-white/5 opacity-70"></div>
                    <p id="custom-meta" class="text-[9px] text-neutral-500 mt-6 tracking-[0.3em] hidden uppercase font-light"></p>
                </div>

                <div class="mt-20 flex flex-col shrink-0 gap-10 w-full relative z-20">
                    
                    <div class="flex items-center gap-6 w-full group">
                        <span id="time-current" class="text-[9px] tracking-[0.2em] font-light text-neutral-500 w-12 text-right">00:00</span>
                        <div class="flex-1 relative flex items-center h-4">
                            <input type="range" id="seek-bar" class="absolute w-full z-10" min="0" max="100" step="0.1" value="0" 
                                   oninput="handleSeek(this.value)" 
                                   onmousedown="isSeeking = true" 
                                   onmouseup="isSeeking = false"
                                   ontouchstart="isSeeking = true"
                                   ontouchend="isSeeking = false">
                        </div>
                        <span id="time-duration" class="text-[9px] tracking-[0.2em] font-light text-neutral-500 w-12">00:00</span>
                    </div>

                    <div class="flex items-center justify-between w-full">
                        <div class="w-32 hidden md:block"></div> 
                        
                        <button id="master-play-btn" onclick="togglePlay()" class="w-20 h-20 md:w-24 md:h-24 rounded-full border border-white/10 flex items-center justify-center text-white hover:border-champagne hover:text-champagne transition-all duration-700 focus:outline-none shrink-0 bg-transparent relative group">
                            <div class="absolute inset-0 rounded-full bg-champagne/0 group-hover:bg-champagne/5 transition-colors duration-700"></div>
                            
                            <svg id="icon-play" class="w-6 h-6 md:w-8 md:h-8 ml-1.5 transition-transform duration-500 group-hover:scale-105 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
                            <svg id="icon-stop" class="w-5 h-5 md:w-6 md:h-6 hidden transition-transform duration-500 group-hover:scale-105 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>

                        <div class="w-32 flex justify-end items-center">
                            <button onclick="toggleLiveMode()" id="btn-sync-mode" class="text-[8px] px-4 py-2 border border-white/20 text-neutral-300 rounded-full uppercase tracking-[0.3em] transition-all duration-500 hover:border-champagne hover:text-champagne focus:outline-none font-light">
                                Đồng Bộ: Bật
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const trackUrl = "https://dl.dropboxusercontent.com/scl/fi/zjq2d379gg16klrw0fc1m/Vietmix-4.mp3?rlkey=msa6cqbs3221dfxml1jhmnbcf&st=c8gaw3zh&raw=1";
        const FADE_DURATION = 5;

        const playlists = {
            vinahouse: [
                { title: "Khởi Nguồn Âm Thanh", src: trackUrl, duration: 5415 },
                { title: "Tuyệt Đỉnh Không Gian", src: trackUrl, duration: 7825 },
                { title: "Dư Âm Hạ Cánh", src: trackUrl, duration: 4230 }
            ],
            chillout: [
                { title: "Bình Minh Thư Thái", src: trackUrl, duration: 3600 },
                { title: "Chiều Tà Yên Bình", src: trackUrl, duration: 3600 }
            ],
            remix: [
                { title: "Bản Phối Độc Quyền", src: trackUrl, duration: 7200 }
            ],
            custom: [] 
        };

        // --- 2. STATE MANAGEMENT & AUDIO INIT ---
        let currentChannel = 'vinahouse';
        let isPlaying = false;
        let activePlayer = 0; 
        let syncInterval = null;
        let currentTrackIndex = -1;
        
        // Trạng thái tua & Sync
        let isLiveSync = true;
        let isSeeking = false;

        const players = [new Audio(), new Audio()];
        players.forEach(p => {
            p.preload = 'metadata';
            p.crossOrigin = 'anonymous'; 
        });

        // --- 3. WEB AUDIO API & VISUALIZER CORE ---
        let audioCtx, analyser, dataArray, bufferLength;
        let eqBands = {};
        let isWebAudioInitialized = false;
        let isFXPanelOpen = false;
        let isVisualizerActive = false; 
        let animationId;
        
        let visPos = 'bg';       
        let visColor = 'dynamic'; 

        const canvas = document.getElementById('visualizer-canvas');
        const canvasCtx = canvas.getContext('2d');

        function initWebAudio() {
            if (isWebAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                eqBands.low = audioCtx.createBiquadFilter();
                eqBands.low.type = "lowshelf";
                eqBands.low.frequency.value = 250; 

                eqBands.mid = audioCtx.createBiquadFilter();
                eqBands.mid.type = "peaking";
                eqBands.mid.frequency.value = 1000;
                eqBands.mid.Q.value = 1;

                eqBands.high = audioCtx.createBiquadFilter();
                eqBands.high.type = "highshelf";
                eqBands.high.frequency.value = 4000;

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; 
                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                eqBands.low.connect(eqBands.mid);
                eqBands.mid.connect(eqBands.high);
                eqBands.high.connect(analyser);
                analyser.connect(audioCtx.destination);

                const source0 = audioCtx.createMediaElementSource(players[0]);
                const source1 = audioCtx.createMediaElementSource(players[1]);
                source0.connect(eqBands.low);
                source1.connect(eqBands.low);

                isWebAudioInitialized = true;
            } catch (error) {
                console.error("Web Audio API Init Error:", error);
            }
        }

        function updateEQ(band, value) {
            if (!isWebAudioInitialized) initWebAudio();
            eqBands[band].gain.value = value;
            document.getElementById(`val-${band}`).innerText = value > 0 ? `+${value}` : value;
        }

        // Toggles cho UI
        function toggleFXPanel() {
            const panel = document.getElementById('fx-panel');
            const btnFX = document.getElementById('btn-fx');
            isFXPanelOpen = !isFXPanelOpen;

            if (isFXPanelOpen) {
                panel.style.maxHeight = '500px'; 
                panel.style.opacity = '1';
                btnFX.classList.add('text-champagne');
                btnFX.classList.remove('text-neutral-500');
            } else {
                panel.style.maxHeight = '0'; 
                panel.style.opacity = '0';
                btnFX.classList.remove('text-champagne');
                btnFX.classList.add('text-neutral-500');
            }
        }

        function toggleVisPos() {
            visPos = visPos === 'bg' ? 'inline' : 'bg';
            document.getElementById('btn-vis-pos').innerText = visPos === 'bg' ? 'Nền' : 'Nội dòng';
            
            const inlineContainer = document.getElementById('vis-inline-container');
            const bgContainer = document.getElementById('vis-bg-container');
            
            cancelAnimationFrame(animationId);
            
            if (visPos === 'bg') {
                inlineContainer.classList.add('hidden');
                bgContainer.appendChild(canvas);
            } else {
                inlineContainer.classList.remove('hidden');
                inlineContainer.appendChild(canvas);
            }
            
            updateVisOpacity();
            if (isVisualizerActive && isPlaying) drawVisualizer();
        }

        function toggleVisColor() {
            visColor = visColor === 'dynamic' ? 'solid' : 'dynamic';
            document.getElementById('btn-vis-color').innerText = visColor === 'dynamic' ? 'Động' : 'Champagne';
        }

        function updateVisOpacity() {
            if (!isVisualizerActive) {
                canvas.style.opacity = '0';
            } else {
                canvas.style.opacity = visPos === 'bg' ? '0.08' : '1';
            }
        }

        function toggleVisualizer() {
            isVisualizerActive = !isVisualizerActive;
            const btnVis = document.getElementById('btn-visualizer');
            
            if (isVisualizerActive) {
                btnVis.classList.add('text-champagne');
                btnVis.classList.remove('text-neutral-500');
                
                if (isPlaying) {
                    if (!isWebAudioInitialized) initWebAudio();
                    drawVisualizer();
                }
            } else {
                btnVis.classList.remove('text-champagne');
                btnVis.classList.add('text-neutral-500');
                cancelAnimationFrame(animationId);
            }
            updateVisOpacity();
        }

        function drawVisualizer() {
            cancelAnimationFrame(animationId);
            
            if (!isVisualizerActive || !isPlaying || !isWebAudioInitialized) return;

            animationId = requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);

            if (canvas.width !== canvas.clientWidth) canvas.width = canvas.clientWidth;
            if (canvas.height !== canvas.clientHeight) canvas.height = canvas.clientHeight;

            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 3;
            let barHeight;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height * (visPos === 'bg' ? 0.9 : 1.0);
                
                if (visColor === 'dynamic') {
                    const intensity = dataArray[i] / 255;
                    // Sử dụng tông màu ấm vàng nhạt sang trọng
                    canvasCtx.fillStyle = `rgba(197, 179, 144, ${intensity * 0.8})`; 
                } else {
                    canvasCtx.fillStyle = `rgba(197, 179, 144, 0.4)`; 
                }
                
                canvasCtx.beginPath();
                canvasCtx.roundRect(x, canvas.height - barHeight, barWidth - 1, barHeight, [2, 2, 0, 0]);
                canvasCtx.fill();

                x += barWidth;
            }
        }

        // --- 4. TÍNH NĂNG TUA & CHẾ ĐỘ SYNC ---
        function toggleLiveMode() {
            isLiveSync = !isLiveSync;
            const btn = document.getElementById('btn-sync-mode');
            const led = document.getElementById('live-led');
            const statusText = document.getElementById('status-text');

            if (isLiveSync) {
                btn.innerText = "Đồng Bộ: Bật";
                btn.className = "text-[8px] px-4 py-2 border border-champagne text-champagne rounded-full uppercase tracking-[0.3em] transition-all duration-500 focus:outline-none font-light shadow-[0_0_15px_rgba(197,179,144,0.15)]";
                
                statusText.innerText = "Đang đồng bộ";
                led.classList.replace('bg-neutral-800', 'bg-champagne');
                led.classList.add('pulse-dot');
                
                if (isPlaying) {
                    currentTrackIndex = -1; 
                    engineTick();
                }
            } else {
                btn.innerText = "Đồng Bộ: Tắt";
                btn.className = "text-[8px] px-4 py-2 border border-white/20 text-neutral-400 rounded-full uppercase tracking-[0.3em] transition-all duration-500 hover:border-champagne hover:text-champagne focus:outline-none font-light";
                
                statusText.innerText = "Phát tự do";
                led.classList.replace('bg-champagne', 'bg-neutral-800');
                led.classList.remove('pulse-dot');
            }
        }

        function handleSeek(percent) {
            if (!isPlaying && !players[activePlayer].src) return;
            
            if (isLiveSync) toggleLiveMode();

            const currentPlayer = players[activePlayer];
            if (currentPlayer.duration) {
                const targetTime = (percent / 100) * currentPlayer.duration;
                currentPlayer.currentTime = targetTime;
                
                document.getElementById('time-current').innerText = formatTime(targetTime);
            }
        }

        // --- 5. CORE LOGIC ---
        function getPlaybackState() {
            const playlist = playlists[currentChannel];
            if (!playlist || playlist.length === 0) return null;

            const sTotal = playlist.reduce((acc, track) => acc + track.duration, 0);
            if (sTotal === 0) return null;

            const unixNow = Math.floor(Date.now() / 1000);
            const pCurrent = unixNow % sTotal;

            let accumulatedTime = 0;
            for (let i = 0; i < playlist.length; i++) {
                if (pCurrent < accumulatedTime + playlist[i].duration) {
                    return {
                        trackIndex: i,
                        track: playlist[i],
                        offset: pCurrent - accumulatedTime, 
                        timeRemaining: (accumulatedTime + playlist[i].duration) - pCurrent
                    };
                }
                accumulatedTime += playlist[i].duration;
            }
        }

        function applyCrossfade(fadingOutPlayer, fadingInPlayer) {
            let fadeStep = 1 / (FADE_DURATION * 10); 
            fadingInPlayer.volume = 0;
            
            fadingInPlayer.play().catch(e => console.error("Crossfade Play Error:", e));

            let fadeInterval = setInterval(() => {
                if (fadingOutPlayer.volume > fadeStep) {
                    fadingOutPlayer.volume -= fadeStep;
                } else {
                    fadingOutPlayer.volume = 0;
                    fadingOutPlayer.pause();
                }

                if (fadingInPlayer.volume < 1 - fadeStep) {
                    fadingInPlayer.volume += fadeStep;
                } else {
                    fadingInPlayer.volume = 1;
                }

                if (fadingOutPlayer.volume === 0 && fadingInPlayer.volume === 1) {
                    clearInterval(fadeInterval);
                }
            }, 100);
        }

        function engineTick() {
            if (!isPlaying) return;

            const currentPlayer = players[activePlayer];
            const trackNameEl = document.getElementById('track-name');

            if (isLiveSync) {
                const state = getPlaybackState();
                
                if (!state) {
                    if (trackNameEl.innerText !== "Đang chờ tệp âm thanh...") {
                        trackNameEl.innerText = "Đang chờ tệp âm thanh...";
                        document.getElementById('time-current').innerText = "00:00";
                        document.getElementById('time-duration').innerText = "00:00";
                    }
                    players[0].pause();
                    players[1].pause();
                    return;
                }
                
                if (trackNameEl.innerText !== state.track.title) {
                    trackNameEl.style.opacity = 0;
                    setTimeout(() => {
                        trackNameEl.innerText = state.track.title;
                        trackNameEl.style.opacity = 1;
                    }, 500);
                }

                if (state.trackIndex !== currentTrackIndex) {
                    const prevPlayerIndex = activePlayer;
                    activePlayer = (activePlayer + 1) % 2; 
                    
                    const nextPlayer = players[activePlayer];
                    const prevPlayer = players[prevPlayerIndex];

                    nextPlayer.src = state.track.src;
                    currentTrackIndex = state.trackIndex;

                    nextPlayer.onloadedmetadata = () => {
                        nextPlayer.currentTime = state.offset;
                        if (prevPlayer.paused || !prevPlayer.src) {
                            nextPlayer.volume = 1;
                            nextPlayer.play().catch(e => console.error("Playback Error:", e));
                        } else {
                            applyCrossfade(prevPlayer, nextPlayer);
                        }
                    };

                    if (nextPlayer.readyState >= 1) {
                        nextPlayer.onloadedmetadata();
                        nextPlayer.onloadedmetadata = null;
                    }
                } else {
                    if (currentPlayer.readyState >= 3 && !currentPlayer.paused) {
                        if (Math.abs(currentPlayer.currentTime - state.offset) > 3) {
                            currentPlayer.currentTime = state.offset;
                        }
                    }
                }
            } 
            else {
                if (currentPlayer.duration > 0 && (currentPlayer.duration - currentPlayer.currentTime <= 0.5)) {
                    const playlist = playlists[currentChannel];
                    let nextIndex = currentTrackIndex + 1;
                    if (nextIndex >= playlist.length) nextIndex = 0; 
                    
                    const prevPlayerIndex = activePlayer;
                    activePlayer = (activePlayer + 1) % 2;
                    const nextPlayer = players[activePlayer];
                    const prevPlayer = players[prevPlayerIndex];
                    
                    nextPlayer.src = playlist[nextIndex].src;
                    currentTrackIndex = nextIndex;
                    
                    nextPlayer.onloadedmetadata = () => {
                        nextPlayer.currentTime = 0;
                        applyCrossfade(prevPlayer, nextPlayer);
                    };
                    
                    if (nextPlayer.readyState >= 1) {
                        nextPlayer.onloadedmetadata();
                        nextPlayer.onloadedmetadata = null;
                    }

                    trackNameEl.style.opacity = 0;
                    setTimeout(() => {
                        trackNameEl.innerText = playlist[nextIndex].title;
                        trackNameEl.style.opacity = 1;
                    }, 500);
                }
            }

            if (currentPlayer.duration) {
                const curr = currentPlayer.currentTime || 0;
                const dur = currentPlayer.duration || 0;
                
                document.getElementById('time-current').innerText = formatTime(curr);
                document.getElementById('time-duration').innerText = formatTime(dur);
                
                if (!isSeeking) {
                    document.getElementById('seek-bar').value = (curr / dur) * 100;
                }
            }
        }

        // --- 6. UI CONTROLS ---
        function togglePlay() {
            if (!isWebAudioInitialized) initWebAudio();
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isPlaying = !isPlaying;
            
            const playIcon = document.getElementById('icon-play');
            const stopIcon = document.getElementById('icon-stop');
            const statusText = document.getElementById('status-text');
            const led = document.getElementById('live-led');

            if (isPlaying) {
                playIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                
                if (isLiveSync) {
                    statusText.innerText = "Đang đồng bộ";
                    led.classList.replace('bg-neutral-800', 'bg-champagne');
                    led.classList.add('pulse-dot');
                }
                
                if (currentTrackIndex === -1 && isLiveSync) currentTrackIndex = -1; 
                if (currentTrackIndex === -1 && !isLiveSync) {
                     currentTrackIndex = 0;
                     const pl = playlists[currentChannel];
                     if(pl && pl.length > 0) {
                         players[activePlayer].src = pl[0].src;
                         players[activePlayer].play();
                         document.getElementById('track-name').innerText = pl[0].title;
                     }
                }
                
                engineTick();
                syncInterval = setInterval(engineTick, 1000);
                
                if (isVisualizerActive) drawVisualizer();

            } else {
                playIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
                
                statusText.innerText = "Đã tạm dừng";
                led.classList.replace('bg-champagne', 'bg-neutral-800');
                led.classList.remove('pulse-dot');
                
                clearInterval(syncInterval);
                players[0].pause();
                players[1].pause();
                cancelAnimationFrame(animationId);
            }
        }

        function changeChannel(channelId) {
            currentChannel = channelId;
            
            if (!isLiveSync) toggleLiveMode();
            
            document.querySelectorAll('.channel-btn').forEach(btn => {
                btn.classList.remove('border-champagne', 'text-champagne');
                btn.classList.add('border-transparent', 'text-neutral-600');
            });
            const activeBtn = document.getElementById(`btn-${channelId}`);
            activeBtn.classList.remove('border-transparent', 'text-neutral-600');
            activeBtn.classList.add('border-champagne', 'text-champagne');

            const uploadContainer = document.getElementById('upload-container');
            const customMeta = document.getElementById('custom-meta');

            if (channelId === 'custom') {
                uploadContainer.classList.remove('hidden');
                if (playlists.custom.length > 0) customMeta.classList.remove('hidden');
            } else {
                uploadContainer.classList.add('hidden');
                customMeta.classList.add('hidden');
            }

            const trackNameEl = document.getElementById('track-name');
            trackNameEl.style.opacity = 0;

            setTimeout(() => {
                if (channelId === 'custom' && playlists.custom.length === 0) {
                    trackNameEl.innerText = "Thêm bộ sưu tập âm thanh của bạn.";
                    document.getElementById('time-current').innerText = "00:00";
                    document.getElementById('time-duration').innerText = "00:00";
                    document.getElementById('seek-bar').value = 0;
                    if (isPlaying) {
                        players[0].pause();
                        players[1].pause();
                    }
                } else if (isPlaying) {
                    players[0].pause();
                    players[1].pause();
                    currentTrackIndex = -1;
                    document.getElementById('status-text').innerText = "Đang tải tác phẩm...";
                    engineTick();
                } else {
                    let channelName = channelId.charAt(0).toUpperCase() + channelId.slice(1);
                    if (channelId === 'custom') channelName = "Cá Nhân";
                    if (channelId === 'chillout') channelName = "Chill Out";
                    
                    trackNameEl.innerText = `Kênh ${channelName} đã sẵn sàng.`;
                    document.getElementById('time-current').innerText = "00:00";
                    document.getElementById('time-duration').innerText = "00:00";
                    document.getElementById('seek-bar').value = 0;
                }
                trackNameEl.style.opacity = 1;
            }, 500);
        }

        function getAudioDuration(fileUrl) {
            return new Promise((resolve) => {
                const tempAudio = new Audio(fileUrl);
                tempAudio.onloadedmetadata = () => resolve(tempAudio.duration);
                tempAudio.onerror = () => resolve(0); 
            });
        }

        async function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            const trackNameEl = document.getElementById('track-name');
            const customMetaEl = document.getElementById('custom-meta');
            
            trackNameEl.innerText = "Đang thẩm âm... Vui lòng đợi.";
            customMetaEl.classList.add('hidden');

            if (playlists.custom.length > 0) {
                playlists.custom.forEach(track => URL.revokeObjectURL(track.src));
            }

            let newCustomPlaylist = [];
            let totalSeconds = 0;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const blobUrl = URL.createObjectURL(file); 
                const duration = await getAudioDuration(blobUrl);
                
                if (duration > 0) {
                    newCustomPlaylist.push({
                        title: file.name.replace(/\.[^/.]+$/, ""), 
                        src: blobUrl,
                        duration: duration
                    });
                    totalSeconds += duration;
                }
            }

            playlists.custom = newCustomPlaylist;
            
            if (currentChannel === 'custom') {
                trackNameEl.innerText = "Dòng thời gian âm nhạc đã thiết lập.";
                customMetaEl.innerText = `${playlists.custom.length} Tác Phẩm • Tổng thời lượng: ${formatTime(totalSeconds)}`;
                customMetaEl.classList.remove('hidden');

                if (isPlaying) {
                    currentTrackIndex = -1;
                    engineTick();
                }
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
    </script>
