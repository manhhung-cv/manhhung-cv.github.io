<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiMeg - Minimal Dashboard</title>
    <!-- Tích hợp Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh font chữ thanh lịch hơn */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom scrollbar mỏng nhẹ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased p-6 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">MobiMeg Data</h1>
            <p class="text-sm text-gray-500 font-medium">Hệ thống quản lý tài khoản tự động</p>
        </header>

        <!-- Controls -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <button onclick="loadData()" class="px-5 py-2.5 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-all shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Tải lại
            </button>
            <button onclick="triggerAction('scrape_now')" class="px-5 py-2.5 text-sm font-medium rounded-lg bg-gray-900 text-white hover:bg-gray-800 transition-all shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Cào ngay
            </button>
            <button onclick="triggerAction('start_auto')" class="px-5 py-2.5 text-sm font-medium rounded-lg border border-gray-200 bg-white text-green-600 hover:bg-green-50 hover:border-green-200 transition-all shadow-sm">
                Bật tự động (1h)
            </button>
            <button onclick="triggerAction('stop_auto')" class="px-5 py-2.5 text-sm font-medium rounded-lg border border-gray-200 bg-white text-red-600 hover:bg-red-50 hover:border-red-200 transition-all shadow-sm">
                Tắt tự động
            </button>
        </div>

        <!-- Status Box -->
        <div class="max-w-2xl mx-auto bg-white border border-gray-200 rounded-xl p-4 mb-10 text-center shadow-sm flex items-center justify-center gap-2">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75" id="status-ping"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-gray-500" id="status-dot"></span>
            </span>
            <span class="text-sm font-medium text-gray-600">Trạng thái hệ thống:</span>
            <span id="status-text" class="text-sm font-bold text-gray-800 tracking-wide">Đang kiểm tra...</span>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900"></div>
            <span class="ml-3 text-sm font-medium text-gray-500">Đang tải dữ liệu...</span>
        </div>

        <!-- Grid Container -->
        <div id="data-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Thẻ bài viết sẽ được JS chèn vào đây -->
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // CẤU HÌNH API
        const API_URL = "https://script.google.com/macros/s/AKfycbzYRYfr2Yx7Evls04QTEsYpLboqa-SG-9faX5oVIOGB0T_LF1c5n7uZv4r_5ylp5wjx/exec";
        const TOKEN = "AdminPro2026";

        function formatDate(dateString) {
            if (!dateString) return "N/A";
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                let oldText = btnElement.innerText;
                btnElement.innerText = "Copied!";
                btnElement.classList.replace('text-gray-500', 'text-green-600');
                btnElement.classList.add('bg-green-50');
                setTimeout(() => {
                    btnElement.innerText = oldText;
                    btnElement.classList.replace('text-green-600', 'text-gray-500');
                    btnElement.classList.remove('bg-green-50');
                }, 1500);
            });
        }

        function createCard(item) {
            let imgUrl = item.image || 'https://via.placeholder.com/400x300?text=No+Image';
            let id = item.account_id || "Trống";
            let pass = item.password || "Trống";

            return `
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
                    <div class="relative h-44 overflow-hidden bg-gray-100 group">
                        <img src="${imgUrl}" alt="Cover" onerror="this.src='https://via.placeholder.com/400x300?text=Error'" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur text-xs font-bold px-2.5 py-1 rounded-md text-gray-700 shadow-sm">
                            #${item.no}
                        </div>
                    </div>
                    
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="text-sm font-semibold text-gray-900 leading-snug line-clamp-2 mb-4 flex-1" title="${item.title}">${item.title}</h3>
                        
                        <div class="space-y-2 mb-5">
                            <div class="flex justify-between items-center px-3 py-2 bg-gray-50/50 border border-gray-100 rounded-lg">
                                <span class="text-[11px] uppercase tracking-wider font-semibold text-gray-400">ID</span>
                                <div class="flex items-center gap-2 overflow-hidden">
                                    <span class="text-sm font-medium text-gray-800 truncate">${id}</span>
                                    <button class="shrink-0 text-[11px] font-medium text-gray-500 hover:text-gray-900 transition-colors px-2 py-1 rounded" onclick="copyToClipboard('${id}', this)">Copy</button>
                                </div>
                            </div>
                            <div class="flex justify-between items-center px-3 py-2 bg-gray-50/50 border border-gray-100 rounded-lg">
                                <span class="text-[11px] uppercase tracking-wider font-semibold text-gray-400">Pass</span>
                                <div class="flex items-center gap-2 overflow-hidden">
                                    <span class="text-sm font-medium text-gray-800 truncate">${pass}</span>
                                    <button class="shrink-0 text-[11px] font-medium text-gray-500 hover:text-gray-900 transition-colors px-2 py-1 rounded" onclick="copyToClipboard('${pass}', this)">Copy</button>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center pt-4 border-t border-gray-100 mt-auto">
                            <span class="text-[11px] text-gray-400 font-medium flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${formatDate(item.timestamp)}
                            </span>
                            <a href="${item.url}" target="_blank" class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1">
                                Tới bài
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const grid = document.getElementById('data-grid');
            const loader = document.getElementById('loader');
            
            grid.innerHTML = "";
            loader.classList.remove('hidden');

            try {
                let response = await fetch(`${API_URL}?action=get_data&token=${TOKEN}`);
                let result = await response.json();

                if (result.success) {
                    if (result.data.length === 0) {
                        grid.innerHTML = "<div class='col-span-full text-center py-10 text-gray-500 font-medium'>Chưa có dữ liệu nào. Hãy bấm Cào ngay!</div>";
                    } else {
                        let sortedData = result.data.sort((a, b) => b.no - a.no);
                        sortedData.forEach(item => { grid.innerHTML += createCard(item); });
                    }
                } else {
                    alert("Lỗi tải dữ liệu: " + result.error);
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ API.");
            } finally {
                loader.classList.add('hidden');
            }
            checkStatus();
        }

        function updateStatusUI(status) {
            const statusText = document.getElementById('status-text');
            const ping = document.getElementById('status-ping');
            const dot = document.getElementById('status-dot');
            
            statusText.innerText = status;
            
            // Reset classes
            statusText.className = "text-sm font-bold tracking-wide";
            ping.className = "animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 hidden";
            dot.className = "relative inline-flex rounded-full h-3 w-3";

            if(status === "IDLE") {
                statusText.classList.add("text-green-600");
                dot.classList.add("bg-green-500");
            } else if(status.includes("LỖI")) {
                statusText.classList.add("text-red-600");
                dot.classList.add("bg-red-500");
            } else if(status.includes("ĐÃ DỪNG")) {
                statusText.classList.add("text-gray-500");
                dot.classList.add("bg-gray-400");
            } else {
                statusText.classList.add("text-blue-600");
                dot.classList.add("bg-blue-500");
                ping.classList.replace("hidden", "bg-blue-400"); // Hiệu ứng nhấp nháy khi đang chạy
            }
        }

        async function checkStatus() {
            try {
                let response = await fetch(`${API_URL}?action=get_progress&token=${TOKEN}`);
                let result = await response.json();
                if (result.success) {
                    updateStatusUI(result.current_status);
                }
            } catch (e) {
                updateStatusUI("Mất kết nối API");
            }
        }

        async function triggerAction(action) {
            updateStatusUI("Đang gửi lệnh...");
            
            try {
                let response = await fetch(`${API_URL}?action=${action}&token=${TOKEN}`);
                let result = await response.json();
                
                checkStatus();
                
                if(action === "scrape_now") {
                    let interval = setInterval(async () => {
                        await checkStatus();
                        let currentText = document.getElementById('status-text').innerText;
                        if(currentText === "DONE" || currentText === "IDLE" || currentText.includes("LỖI")) {
                            clearInterval(interval);
                            loadData(); 
                        }
                    }, 3000);
                } else {
                    alert(result.message || result.error);
                }
            } catch (e) {
                alert("Lỗi kết nối khi gửi lệnh.");
                updateStatusUI("Lỗi kết nối");
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
