<!DOCTYPE html>
<html lang="vi" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSTK — Luxury GenZ Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Cấu hình Tailwind hỗ trợ class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .font-serif-luxury {
            font-family: 'Cormorant Garamond', serif;
        }
        /* Custom scrollbar siêu mỏng nghệ thuật */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; border-radius: 99px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 99px; }
    </style>
</head>
<body class="h-full bg-[#fbfbfa] text-stone-800 dark:bg-[#0c0c0e] dark:text-stone-200 min-h-screen selection:bg-stone-900 selection:text-white dark:selection:bg-white dark:selection:text-black">

    <div class="max-w-6xl mx-auto px-6 pt-6 flex justify-end">
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-full border border-stone-200 dark:border-stone-800 bg-white dark:bg-stone-900/50 hover:scale-105 active:scale-95 transition-all shadow-sm flex items-center justify-center group" aria-label="Toggle theme">
            <svg class="w-4 h-4 text-amber-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
            <svg class="w-4 h-4 text-stone-500 block dark:hidden group-hover:text-stone-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
        </button>
    </div>

    <div class="max-w-6xl mx-auto px-6 pb-16 pt-4 flex flex-col min-h-screen">
        
        <header class="text-center mb-12 md:mb-16">
            <span class="text-[9px] uppercase tracking-[0.4em] text-stone-400 dark:text-stone-500 font-bold block mb-3 animate-pulse">● System Live</span>
            <h1 class="text-5xl md:text-6xl font-serif-luxury font-light tracking-tight text-stone-900 dark:text-white mb-3">CSTK Studio</h1>
            <p class="text-xs font-light text-stone-400 dark:text-stone-500 tracking-widest max-w-xs mx-auto">Vault lưu trữ thông tin tự động thế hệ mới</p>
            <div class="h-[1px] w-8 bg-stone-300 dark:bg-stone-800 mx-auto my-6"></div>
            
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-stone-100 dark:bg-stone-900 border border-stone-200/60 dark:border-stone-800 rounded-full">
                <span class="w-1.5 h-1.5 rounded-full bg-stone-400 dark:bg-stone-600 transition-colors duration-500" id="status-dot"></span>
                <span id="status-text" class="text-[10px] uppercase tracking-[0.2em] text-stone-500 dark:text-stone-400 font-semibold font-mono">STANDBY</span>
            </div>
        </header>

        <div class="bg-white/80 dark:bg-stone-900/40 backdrop-blur-md border border-stone-200/80 dark:border-stone-800/80 p-4 rounded-2xl mb-12 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-[11px] uppercase tracking-[0.15em] text-stone-400 font-mono font-medium pl-2">
                INDEXED // <span class="text-stone-900 dark:text-white font-bold" id="total-count">00 ITEMS</span>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-2 w-full md:w-auto">
                <button onclick="loadData()" class="flex-1 md:flex-none px-4 py-2 text-xs font-semibold rounded-xl border border-stone-200 dark:border-stone-800 bg-white dark:bg-stone-900 text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-800 transition-all active:scale-95">
                    Tải lại
                </button>
                <button onclick="triggerAction('scrape_now')" class="flex-1 md:flex-none px-5 py-2 text-xs font-bold rounded-xl bg-stone-900 dark:bg-white text-white dark:text-stone-900 hover:bg-stone-800 dark:hover:bg-stone-100 transition-all active:scale-95 shadow-md shadow-stone-950/10 dark:shadow-white/5">
                    Cào dữ liệu
                </button>
                <button onclick="triggerAction('start_auto')" class="flex-1 md:flex-none px-4 py-2 text-xs font-semibold rounded-xl border border-stone-200 dark:border-stone-800 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50/50 dark:hover:bg-emerald-950/20 transition-all active:scale-95">
                    Auto On
                </button>
                <button onclick="triggerAction('stop_auto')" class="flex-1 md:flex-none px-4 py-2 text-xs font-semibold rounded-xl border border-stone-200 dark:border-stone-800 text-stone-400 dark:text-stone-600 hover:text-stone-600 dark:hover:text-stone-400 transition-all active:scale-95">
                    Auto Off
                </button>
            </div>
        </div>

        <div id="loader" class="hidden flex-1 flex flex-col justify-center items-center py-24">
            <div class="w-8 h-8 border-2 border-stone-200 dark:border-stone-800 border-t-stone-900 dark:border-t-white rounded-full animate-spin mb-4"></div>
            <span class="text-[10px] font-mono uppercase tracking-[0.2em] text-stone-400 dark:text-stone-600">Đang đồng bộ Matrix...</span>
        </div>

        <div id="data-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 opacity-100 transition-opacity duration-500 flex-1">
            </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx6ZHdA8Uf0UeGV15ipndEesZy8TeTH5uU3irxdiawWDVWeCvO8vn7GyQBHQQal0e3x/exec";
        const TOKEN = "AdminPro2026";

        // Khởi tạo Darkmode dựa trên tùy chọn hệ thống hoặc LocalStorage
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        function formatDate(dateString) {
            if (!dateString) return "N/A";
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                let originalText = btnElement.innerText;
                btnElement.innerText = "COPIED";
                btnElement.classList.add('text-stone-900', 'dark:text-white', 'font-bold', 'scale-110');
                btnElement.disabled = true;
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.classList.remove('text-stone-900', 'dark:text-white', 'font-bold', 'scale-110');
                    btnElement.disabled = false;
                }, 1200);
            });
        }

        function createCard(item) {
            let imgUrl = item.image || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600';
            let id = item.account_id || "—";
            let pass = item.password || "—";

            return `
                <div class="group flex flex-col justify-between bg-white dark:bg-stone-900/30 border border-stone-200/70 dark:border-stone-800/80 p-5 rounded-2xl hover:border-stone-400 dark:hover:border-stone-600 hover:shadow-[0_20px_40px_rgba(0,0,0,0.03)] dark:hover:shadow-[0_20px_40px_rgba(0,0,0,0.4)] transition-all duration-500 relative overflow-hidden">
                    <div>
                        <div class="relative aspect-[16/10] w-full overflow-hidden bg-stone-100 dark:bg-stone-900 rounded-xl mb-4">
                            <img src="${imgUrl}" alt="Visual" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600'" class="w-full h-full object-cover scale-100 group-hover:scale-[1.04] transition-transform duration-700 ease-out dark:opacity-80 dark:group-hover:opacity-100">
                            
                            <div class="absolute top-3 left-3 bg-stone-900/90 dark:bg-white/90 text-white dark:text-stone-900 text-[9px] font-mono font-bold tracking-widest px-2.5 py-0.5 rounded-md shadow-sm">
                                #${String(item.no).padStart(3, '0')}
                            </div>
                        </div>
                        
                        <h3 class="text-base font-serif-luxury font-normal text-stone-900 dark:text-stone-100 leading-snug line-clamp-2 mb-6 group-hover:text-stone-600 dark:group-hover:text-stone-300 transition-colors" title="${item.title}">
                            ${item.title}
                        </h3>
                        
                        <div class="space-y-3 mb-4">
                            <div class="flex justify-between items-baseline border-b border-stone-100 dark:border-stone-800/60 pb-2.5">
                                <span class="text-[9px] uppercase tracking-wider text-stone-400 dark:text-stone-500 font-semibold font-mono">ACCOUNT_ID</span>
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <span class="text-xs text-stone-800 dark:text-stone-300 font-mono font-medium truncate max-w-[150px]">${id}</span>
                                    <button class="text-[10px] uppercase tracking-widest text-stone-400 dark:text-stone-500 hover:text-stone-900 dark:hover:text-white transition-all font-bold active:scale-90" onclick="copyToClipboard('${id}', this)">Copy</button>
                                </div>
                            </div>
                            <div class="flex justify-between items-baseline border-b border-stone-100 dark:border-stone-800/60 pb-2.5">
                                <span class="text-[9px] uppercase tracking-wider text-stone-400 dark:text-stone-500 font-semibold font-mono">PASSWORD</span>
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <span class="text-xs text-stone-800 dark:text-stone-300 font-mono font-medium truncate max-w-[150px]">${pass}</span>
                                    <button class="text-[10px] uppercase tracking-widest text-stone-400 dark:text-stone-500 hover:text-stone-900 dark:hover:text-white transition-all font-bold active:scale-90" onclick="copyToClipboard('${pass}', this)">Copy</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-2 mt-2">
                        <span class="text-[10px] font-medium text-stone-400 dark:text-stone-500 font-mono">
                            ${formatDate(item.timestamp)}
                        </span>
                        <a href="${item.url}" target="_blank" class="text-[10px] uppercase tracking-widest font-bold text-stone-900 dark:text-white hover:text-stone-500 dark:hover:text-stone-400 transition-colors flex items-center gap-1 border-b border-stone-900 dark:border-white pb-0.5 hover:border-transparent">
                            Visit
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const grid = document.getElementById('data-grid');
            const loader = document.getElementById('loader');
            
            grid.innerHTML = "";
            grid.classList.add('opacity-0');
            loader.classList.remove('hidden');

            try {
                let response = await fetch(`${API_URL}?action=get_data&token=${TOKEN}`);
                let result = await response.json();

                if (result.success) {
                    if (result.data.length === 0) {
                        grid.innerHTML = "<div class='col-span-full text-center py-20 text-stone-400 dark:text-stone-600 text-xs font-mono uppercase tracking-widest border border-dashed border-stone-200 dark:border-stone-800 rounded-2xl'>[Database Empty // No Records Found]</div>";
                    } else {
                        document.getElementById('total-count').innerText = `${String(result.data.length).padStart(2, '0')} ITEMS`;
                        let sortedData = result.data.sort((a, b) => b.no - a.no);
                        sortedData.forEach(item => { grid.innerHTML += createCard(item); });
                    }
                    grid.classList.remove('opacity-0');
                } else {
                    alert("Lỗi tải dữ liệu: " + result.error);
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ API.");
            } finally {
                loader.classList.add('hidden');
            }
            checkStatus();
        }

        function updateStatusUI(status) {
            const statusText = document.getElementById('status-text');
            const dot = document.getElementById('status-dot');
            
            statusText.innerText = status;
            dot.className = "w-1.5 h-1.5 rounded-full transition-colors duration-500";

            if(status === "IDLE") {
                statusText.className = "text-[10px] uppercase tracking-[0.2em] text-emerald-600 dark:text-emerald-400 font-bold font-mono";
                dot.classList.add("bg-emerald-500");
            } else if(status.includes("LỖI") || status === "Lỗi kết nối" || status === "Mất kết nối API") {
                statusText.className = "text-[10px] uppercase tracking-[0.2em] text-rose-500 font-bold font-mono";
                dot.classList.add("bg-rose-500");
            } else if(status.includes("ĐÃ DỪNG")) {
                statusText.className = "text-[10px] uppercase tracking-[0.2em] text-stone-400 dark:text-stone-600 font-bold font-mono";
                dot.classList.add("bg-stone-300", "dark:bg-stone-700");
            } else {
                statusText.className = "text-[10px] uppercase tracking-[0.2em] text-amber-500 font-bold font-mono animate-pulse";
                dot.classList.add("bg-amber-400", "animate-ping");
            }
        }

        async function checkStatus() {
            try {
                let response = await fetch(`${API_URL}?action=get_progress&token=${TOKEN}`);
                let result = await response.json();
                if (result.success) {
                    updateStatusUI(result.current_status);
                }
            } catch (e) {
                updateStatusUI("Mất kết nối API");
            }
        }

        async function triggerAction(action) {
            updateStatusUI("PROCESSING...");
            
            try {
                let response = await fetch(`${API_URL}?action=${action}&token=${TOKEN}`);
                let result = await response.json();
                
                checkStatus();
                
                if(action === "scrape_now") {
                    let interval = setInterval(async () => {
                        await checkStatus();
                        let currentText = document.getElementById('status-text').innerText;
                        if(currentText === "DONE" || currentText === "IDLE" || currentText.includes("LỖI")) {
                            clearInterval(interval);
                            loadData(); 
                        }
                    }, 3000);
                } else {
                    alert(result.message || result.error);
                }
            } catch (e) {
                alert("Lỗi kết nối khi gửi lệnh.");
                updateStatusUI("Lỗi kết nối");
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
