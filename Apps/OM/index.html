<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Kiện Hàng | Minimal UI</title>
    
    <!-- Fonts: Inter for minimal look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f6f6f6', 100: '#e7e7e7', 200: '#d1d1d1', 300: '#b0b0b0', 400: '#888888', 500: '#6d6d6d', 600: '#5d5d5d', 700: '#4f4f4f', 800: '#454545', 900: '#3d3d3d', 950: '#000000' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 30px -5px rgba(0, 0, 0, 0.08)'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- html2canvas & jsPDF for exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #fafafa; color: #111827; }
        
        /* Custom minimalist scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Minimal Table Styles */
        .min-table th { padding: 14px 16px; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; background-color: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .min-table td { padding: 14px 16px; vertical-align: middle; border-bottom: 1px solid #f3f4f6; transition: background-color 0.15s; }
        .min-table tr:hover td { background-color: #f9fafb; }
        .min-table tr:last-child td { border-bottom: none; }

        /* Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #111827; }
        .toggle-checkbox:checked + .toggle-label { background-color: #111827; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }

        /* Glassmorphism Input */
        .input-minimal { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 0.5rem; transition: all 0.2s; }
        .input-minimal:focus { border-color: #111827; box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.1); outline: none; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col selection:bg-brand-950 selection:text-white">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- Main App Container -->
    <div id="app" class="flex-grow flex flex-col w-full"></div>

    <!-- Off-screen container for exporting data -->
    <div id="export-container" class="absolute top-[-9999px] left-[-9999px] bg-white w-[800px] p-8 text-black"></div>

    <!-- Hidden input cho Nhập JSON -->
    <input type="file" id="import-json-input" accept=".json" class="hidden" onchange="handleImportJSON(event)">

    <script>
        // --- TRẠNG THÁI ỨNG DỤNG ---
        const state = {
            view: 'login', 
            user: null,
            packages: [
                { id: 'pkg-1', name: 'Kiện hàng tháng 10', desc: 'Gom hàng Mỹ - JP', status: 'Đang gom', orders: [] }
            ],
            currentPkgId: null,
            modals: { package: false, export: false, confirm: false, editOrder: false },
            editingPkgId: null,
            editingOrderId: null,
            selectedOrders: [],
            confirmData: null,
            groupByRecipient: false 
        };

        // --- CÁC HÀM TIỆN ÍCH ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        
        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-500"></i>' : '<i class="fa-solid fa-circle-exclamation text-red-500"></i>';
            toast.className = `bg-white shadow-float rounded-xl px-5 py-3.5 flex items-center gap-3 fade-in font-medium border border-gray-100 text-sm text-gray-800`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- HÀM SAO CHÉP (CLIPBOARD) CÓ FALLBACK ---
        const copyTrackingCode = (text, event) => {
            if(event) event.stopPropagation();
            const fallbackCopy = (textToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";  
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('Đã sao chép mã: ' + textToCopy);
                } catch (err) {
                    showToast('Lỗi sao chép!', 'error');
                }
                document.body.removeChild(textArea);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast('Đã sao chép mã: ' + text))
                    .catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        };

        // --- RENDER FUNCTIONS ---
        const render = () => {
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            if (state.view === 'login') app.innerHTML = getLoginHTML();
            else if (state.view === 'dashboard') app.innerHTML = getDashboardHTML();
            else if (state.view === 'packageDetail') app.innerHTML = getPackageDetailHTML();

            renderModals();
        };

        // 1. Màn hình Đăng nhập (Minimal)
        const getLoginHTML = () => `
            <div class="flex-grow flex items-center justify-center p-4 fade-in">
                <div class="bg-white p-10 rounded-3xl shadow-soft border border-gray-100 w-full max-w-sm text-center">
                    <div class="w-14 h-14 bg-gray-50 text-brand-950 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl border border-gray-200">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <h1 class="text-2xl font-semibold mb-2 tracking-tight text-gray-900">Quản lý Đơn hàng</h1>
                    <p class="text-gray-500 text-sm mb-8">Nền tảng gom và quản lý kiện hàng</p>
                    <button onclick="handleLogin()" class="w-full bg-brand-950 text-white py-3 rounded-xl font-medium hover:bg-gray-800 transition-all shadow-sm">
                        Đăng nhập
                    </button>
                </div>
            </div>
        `;

        // 2. Màn hình Dashboard (Danh sách kiện)
        const getDashboardHTML = () => `
            <header class="bg-white border-b border-gray-200 sticky top-0 z-10 bg-opacity-90 backdrop-blur-md">
                <div class="max-w-6xl mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-3 font-semibold text-lg tracking-tight text-gray-900">
                        <div class="bg-gray-100 text-brand-950 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-box-open text-sm"></i></div> 
                        Package<span class="text-gray-400 font-normal">Hub</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="triggerImport()" class="hidden md:flex items-center gap-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-lg transition-colors text-sm font-medium">
                            <i class="fa-solid fa-download text-xs"></i> Nhập JSON
                        </button>
                        <button onclick="exportJSON()" class="hidden md:flex items-center gap-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 px-3 py-2 rounded-lg transition-colors text-sm font-medium">
                            <i class="fa-solid fa-upload text-xs"></i> Xuất JSON
                        </button>
                        <div class="w-px h-5 bg-gray-300 mx-2 hidden md:block"></div>
                        <button onclick="handleLogout()" class="text-gray-500 hover:text-red-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
                            Đăng xuất
                        </button>
                    </div>
                </div>
            </header>
            <main class="max-w-6xl mx-auto px-4 lg:px-6 py-10 w-full flex-grow fade-in">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                    <h2 class="text-2xl font-semibold text-gray-900 tracking-tight">Kiện hàng của bạn</h2>
                    <div class="flex gap-2">
                        <button onclick="triggerImport()" class="md:hidden bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-50 flex items-center justify-center shadow-sm"><i class="fa-solid fa-download"></i></button>
                        <button onclick="exportJSON()" class="md:hidden bg-white border border-gray-200 text-gray-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-50 flex items-center justify-center shadow-sm"><i class="fa-solid fa-upload"></i></button>
                        <button onclick="openPackageModal()" class="bg-brand-950 text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-800 transition-all shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-plus text-xs"></i> Tạo kiện mới
                        </button>
                    </div>
                </div>

                ${state.packages.length === 0 ? `
                    <div class="text-center py-24 border border-dashed border-gray-300 rounded-3xl bg-white shadow-sm">
                        <div class="w-16 h-16 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fa-regular fa-folder-open"></i></div>
                        <p class="text-gray-900 font-medium mb-1">Chưa có kiện hàng</p>
                        <p class="text-gray-500 text-sm mb-6">Bắt đầu bằng cách tạo một kiện hàng mới.</p>
                        <button onclick="openPackageModal()" class="text-brand-950 font-medium text-sm hover:underline">Tạo kiện hàng đầu tiên</button>
                    </div>
                ` : `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        ${state.packages.map(pkg => `
                            <div class="bg-white border border-gray-200 rounded-2xl p-6 hover:shadow-soft transition-all cursor-pointer flex flex-col group relative overflow-hidden" onclick="viewPackage('${pkg.id}')">
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="font-semibold text-lg text-gray-900 truncate pr-2 group-hover:text-blue-600 transition-colors">${pkg.name}</h3>
                                    <span class="px-2.5 py-1 text-[11px] font-medium rounded-full bg-gray-100 text-gray-600 whitespace-nowrap">${pkg.status}</span>
                                </div>
                                <p class="text-gray-500 text-sm mb-6 line-clamp-2 flex-grow">${pkg.desc || '<span class="italic opacity-50">Không có mô tả</span>'}</p>
                                <div class="flex items-center justify-between pt-4 border-t border-gray-100 mt-auto">
                                    <span class="text-sm text-gray-500 font-medium flex items-center gap-1.5"><i class="fa-solid fa-layer-group text-gray-400"></i> ${pkg.orders.length} đơn</span>
                                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="event.stopPropagation(); openPackageModal('${pkg.id}')" class="text-gray-400 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-pen text-xs"></i></button>
                                        <button onclick="event.stopPropagation(); deletePackage('${pkg.id}')" class="text-gray-400 hover:text-red-500 bg-gray-50 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-trash text-xs"></i></button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `}
            </main>
        `;

        // 3. Màn hình Chi tiết kiện hàng
        const getPackageDetailHTML = () => {
            const pkg = state.packages.find(p => p.id === state.currentPkgId);
            if (!pkg) return '';

            // Render Row function for tables (Minimal)
            const renderOrderRows = (orders) => orders.map((order, idx) => `
                <tr class="order-row group" data-search="${order.recipient.toLowerCase()} ${order.trackingCodes.join(' ').toLowerCase()} ${(order.note || '').toLowerCase()}">
                    <td class="text-center w-12 rounded-l-lg">
                        <input type="checkbox" value="${order.id}" onchange="toggleSelectOrder('${order.id}', this)" ${state.selectedOrders.includes(order.id) ? 'checked' : ''} class="order-checkbox w-4 h-4 text-brand-950 bg-gray-100 border-gray-300 rounded focus:ring-brand-950 cursor-pointer accent-brand-950">
                    </td>
                    <td class="text-center text-gray-500 text-sm w-12">${idx + 1}</td>
                    <td class="font-medium text-gray-900">${order.recipient}</td>
                    <td>
                        <div class="flex flex-wrap gap-2">
                            ${order.trackingCodes.map(code => `
                                <button onclick="copyTrackingCode('${code}', event)" class="inline-flex items-center bg-gray-100 hover:bg-gray-200 text-gray-700 px-2.5 py-1 rounded-md transition-colors text-[13px] font-mono font-medium group/btn" title="Click để sao chép">
                                    ${code} <i class="fa-regular fa-copy opacity-0 group-hover/btn:opacity-100 ml-1.5 text-gray-400 transition-opacity"></i>
                                </button>
                            `).join('')}
                        </div>
                    </td>
                    <td class="text-sm text-gray-500">${order.note || '-'}</td>
                    <td class="text-right w-24 rounded-r-lg opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="openEditOrderModal('${order.id}')" class="text-gray-400 hover:text-brand-950 bg-white hover:bg-gray-100 border border-transparent hover:border-gray-200 w-8 h-8 rounded-lg inline-flex items-center justify-center transition-all mr-1 shadow-sm"><i class="fa-solid fa-pen text-xs"></i></button>
                        <button onclick="deleteOrder('${order.id}')" class="text-gray-400 hover:text-red-600 bg-white hover:bg-red-50 border border-transparent hover:border-red-100 w-8 h-8 rounded-lg inline-flex items-center justify-center transition-all shadow-sm"><i class="fa-solid fa-trash text-xs"></i></button>
                    </td>
                </tr>
            `).join('');

            return `
                <header class="bg-white border-b border-gray-200 sticky top-0 z-20 bg-opacity-90 backdrop-blur-md">
                    <div class="max-w-6xl mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="goBack()" class="w-9 h-9 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center hover:bg-gray-100 hover:text-gray-900 text-gray-500 transition-colors">
                                <i class="fa-solid fa-arrow-left text-sm"></i>
                            </button>
                            <div class="flex flex-col">
                                <h1 class="font-semibold text-lg text-gray-900 leading-tight">${pkg.name}</h1>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="w-2 h-2 rounded-full ${pkg.status === 'Đã nhận' ? 'bg-green-500' : 'bg-blue-500'}"></span>
                                    <span class="text-[11px] font-medium text-gray-500 uppercase tracking-wide">${pkg.status}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openExportModal()" class="bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors flex items-center gap-2 shadow-sm">
                                <i class="fa-solid fa-download text-gray-400"></i> <span class="hidden sm:inline">Xuất file</span>
                            </button>
                        </div>
                    </div>
                </header>
                <main class="max-w-6xl mx-auto px-4 lg:px-6 py-8 w-full flex-grow fade-in">
                    
                    <!-- BOX THÊM ĐƠN HÀNG (HÀNG NGANG - ROW LAYOUT) -->
                    <div class="bg-white border border-gray-200 rounded-2xl p-5 mb-8 shadow-sm">
                        <h3 class="font-semibold text-sm text-gray-900 mb-4 flex items-center gap-2">
                            <div class="w-6 h-6 rounded bg-brand-50 flex items-center justify-center text-brand-950"><i class="fa-solid fa-bolt text-xs"></i></div> Thêm đơn nhanh
                        </h3>
                        <div class="flex flex-col lg:flex-row gap-4 lg:items-end">
                            <div class="flex-1 lg:max-w-[250px]">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5 ml-1">Người nhận <span class="text-red-500">*</span></label>
                                <input type="text" id="ord-recipient" class="w-full input-minimal px-3.5 py-2.5 text-sm" placeholder="Tên khách hàng">
                            </div>
                            
                            <div class="flex-[2]">
                                <div class="flex justify-between items-center mb-1.5 ml-1">
                                    <label class="block text-xs font-medium text-gray-500">Mã đơn (Tracking) <span class="text-red-500">*</span></label>
                                    <button onclick="pasteToTracking()" class="text-[11px] font-medium text-brand-950 hover:text-blue-600 flex items-center gap-1 transition-colors">
                                        <i class="fa-solid fa-clipboard text-[10px]"></i> Dán nhanh
                                    </button>
                                </div>
                                <textarea id="ord-tracking" rows="2" class="w-full input-minimal px-3.5 py-2.5 text-sm font-mono leading-relaxed" placeholder="Dán mã (phân cách bằng dấu phẩy hoặc xuống dòng)..."></textarea>
                            </div>

                            <div class="flex-1 lg:max-w-[200px]">
                                <label class="block text-xs font-medium text-gray-500 mb-1.5 ml-1">Ghi chú</label>
                                <input type="text" id="ord-note" class="w-full input-minimal px-3.5 py-2.5 text-sm" placeholder="VD: Hàng dễ vỡ...">
                            </div>

                            <div class="lg:w-[120px] shrink-0">
                                <!-- Chiều cao bằng với input (~42px), margin top để bù lại label trên mobile -->
                                <button onclick="saveOrder()" class="w-full bg-brand-950 text-white font-medium text-sm rounded-lg hover:bg-gray-800 transition-all shadow-sm flex items-center justify-center gap-2 h-[42px] mt-2 lg:mt-0">
                                    <i class="fa-solid fa-plus text-xs"></i> Lưu đơn
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- THANH CÔNG CỤ TABLE -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                        
                        <div class="flex items-center gap-4">
                            <!-- Toggle Tách bảng -->
                            <div class="flex items-center gap-2.5">
                                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" id="toggle-group" onchange="toggleGroupBy(this)" ${state.groupByRecipient ? 'checked' : ''} class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-gray-200 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out" style="top: 2px; left: 2px;"/>
                                    <label for="toggle-group" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                                </div>
                                <span class="text-sm font-medium text-gray-700 select-none cursor-pointer" onclick="document.getElementById('toggle-group').click()">Gộp / Tách theo người nhận</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 w-full md:w-auto">
                            <!-- Search -->
                            <div class="relative w-full md:w-64">
                                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="text" onkeyup="filterOrders(this.value)" class="w-full pl-9 pr-3 py-2 text-sm input-minimal rounded-full" placeholder="Tìm kiếm đơn hàng...">
                            </div>
                            
                            <!-- Bulk Actions -->
                            <div id="bulk-actions" class="${state.selectedOrders.length > 0 ? 'flex' : 'hidden'} items-center gap-2 animate-[fadeIn_0.2s]">
                                <span id="selected-count" class="text-xs font-semibold bg-gray-100 text-gray-700 px-2.5 py-1.5 rounded-md mr-1">${state.selectedOrders.length} đã chọn</span>
                                <button onclick="openExportModal()" class="w-9 h-9 bg-white border border-gray-200 text-gray-700 rounded-full hover:bg-gray-50 flex items-center justify-center transition-colors shadow-sm" title="Xuất file đã chọn">
                                    <i class="fa-solid fa-download text-sm"></i>
                                </button>
                                <button onclick="deleteSelected()" class="w-9 h-9 bg-white border border-red-200 text-red-500 rounded-full hover:bg-red-50 flex items-center justify-center transition-colors shadow-sm" title="Xóa các đơn đã chọn">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    ${pkg.orders.length === 0 ? `
                        <div class="text-center py-20 border border-dashed border-gray-300 rounded-2xl bg-white">
                            <p class="text-gray-500 font-medium">Chưa có đơn hàng nào trong kiện này.</p>
                        </div>
                    ` : `
                        <div id="table-container">
                            ${state.groupByRecipient ? (() => {
                                // Tách bảng theo người nhận
                                const groups = groupOrders(pkg.orders);
                                return Object.keys(groups).sort().map(recipient => `
                                    <div class="mb-8 bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                                        <div class="bg-gray-50 border-b border-gray-200 px-5 py-3.5 flex justify-between items-center">
                                            <div class="flex items-center gap-2">
                                                <div class="w-7 h-7 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500"><i class="fa-solid fa-user text-[10px]"></i></div>
                                                <span class="font-semibold text-gray-900">${recipient}</span>
                                            </div>
                                            <span class="text-xs font-medium bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded-md">${groups[recipient].length} đơn</span>
                                        </div>
                                        <div class="overflow-x-auto">
                                            <table class="w-full min-table text-sm text-left">
                                                <thead>
                                                    <tr>
                                                        <th class="w-12 text-center"></th>
                                                        <th class="w-12 text-center">STT</th>
                                                        <th class="hidden">Người nhận</th>
                                                        <th>Mã đơn (Tracking)</th>

        // --- CÁC HÀM XỬ LÝ SỰ KIỆN CƠ BẢN ---

                try {
                    const data = JSON.parse(evt.target.result);
                    if (Array.isArray(data)) {
                        state.packages = data;
                        showToast('Đã nạp dữ liệu thành công');
                        render();

                e.target.value = '';

            reader.readAsText(file);

        // --- XUẤT FILE ---
        const openExportModal = () => { state.modals.export = true; render(); };

        const executeExport = async (format) => {
            const rawPkg = state.packages.find(p => p.id === state.currentPkgId);
            let ordersToExport = state.selectedOrders.length > 0 ? rawPkg.orders.filter(o => state.selectedOrders.includes(o.id)) : rawPkg.orders;
            if (ordersToExport.length === 0) return showToast('Không có dữ liệu để xuất', 'error');

            const config = {
                stt: document.getElementById('exp-stt').checked,
                recipient: document.getElementById('exp-recipient').checked,
                tracking: document.getElementById('exp-tracking').checked,
                note: document.getElementById('exp-note').checked,
                group: document.getElementById('exp-group').checked
            };

            showToast('Đang tạo file...'); closeModal('export');
            if (format === 'text') exportToCSV({ ...rawPkg, orders: ordersToExport }, config);
            else await exportToGraphics({ ...rawPkg, orders: ordersToExport }, config, format);
        };

        const exportToCSV = (pkg, config) => {
            let csv = "\uFEFF"; 
            const h = [];
            if(config.stt) h.push("STT"); if(config.recipient) h.push("Người nhận");
            if(config.tracking) h.push("Mã đơn"); if(config.note) h.push("Ghi chú");
            csv += h.join(",") + "\n";

            const mkRow = (o, i) => {
                const r = [];
                if(config.stt) r.push(i + 1); if(config.recipient) r.push(`"${o.recipient}"`);
                if(config.tracking) r.push(`"${o.trackingCodes.join(", ")}"`); if(config.note) r.push(`"${o.note || ''}"`);
                return r.join(",");
            };

            if (config.group) {
                const groups = groupOrders(pkg.orders);
                Object.keys(groups).forEach(recipient => {
                    csv += `\n--- Khách: ${recipient} ---\n`;
                    groups[recipient].forEach((o, i) => csv += mkRow(o, i) + "\n");
                });
            } else { pkg.orders.forEach((o, i) => csv += mkRow(o, i) + "\n"); }

            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            a.download = `Data_${pkg.name}.csv`; a.click();
        };

        const exportToGraphics = async (pkg, config, format) => {
            const container = document.getElementById('export-container');
            let html = `
                <div style="font-family: 'Inter', sans-serif; color: #111827; padding: 40px; background: #ffffff;">
                    <div style="text-align: center; margin-bottom: 32px;">
                        <h2 style="font-size: 26px; font-weight: 700; margin: 0 0 12px 0; color: #111827;">${pkg.name}</h2>
                        <span style="font-size: 13px; font-weight: 500; background: #f3f4f6; color: #4b5563; padding: 6px 14px; border-radius: 20px; border: 1px solid #e5e7eb;">Trạng thái: ${pkg.status}</span>
                    </div>
            `;

            const bTbl = (orders, title = null) => {
                let t = title ? `<div style="font-weight: 600; font-size: 16px; margin-top: 32px; margin-bottom: 12px; color: #111827; display: flex; align-items: center; gap: 8px;"><div style="width: 4px; height: 16px; background: #111827; border-radius: 4px;"></div>Khách hàng: ${title}</div>` : '';
                t += `<div style="border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 24px;"><table style="width: 100%; border-collapse: collapse; font-size: 14px; text-align: left;"><thead><tr>`;
                
                const th = `padding: 14px 16px; background: #f9fafb; font-weight: 600; color: #6b7280; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #e5e7eb;`;
                if (config.stt) t += `<th style="${th} width: 50px; text-align: center;">STT</th>`;
                if (config.recipient && !title) t += `<th style="${th}">Người nhận</th>`;
                if (config.tracking) t += `<th style="${th}">Mã đơn (Tracking)</th>`;
                if (config.note) t += `<th style="${th}">Ghi chú</th>`;
                t += `</tr></thead><tbody>`;

                orders.forEach((o, i) => {
                    t += `<tr>`;
                    const td = `padding: 14px 16px; border-bottom: 1px solid #f3f4f6; color: #374151;`;
                    if (config.stt) t += `<td style="${td} text-align: center; color: #6b7280;">${i + 1}</td>`;
                    if (config.recipient && !title) t += `<td style="${td} font-weight: 500; color: #111827;">${o.recipient}</td>`;
                    if (config.tracking) {
                        const codes = o.trackingCodes.map(c => `<div style="background: #f3f4f6; color: #374151; display: inline-block; padding: 4px 8px; border-radius: 6px; margin: 3px; font-family: monospace; font-size: 13px;">${c}</div>`).join('');
                        t += `<td style="${td}">${codes}</td>`;
                    }
                    if (config.note) t += `<td style="${td}">${o.note || ''}</td>`;
                    t += `</tr>`;
                });
                return t + `</tbody></table></div>`;
            };

            if (config.group) {
                const groups = groupOrders(pkg.orders);
                Object.keys(groups).forEach(r => html += bTbl(groups[r], r));
            } else { html += bTbl(pkg.orders); }

            container.innerHTML = html + `<div style="text-align: right; font-size: 12px; color: #9ca3af; margin-top: 32px;">Xuất lúc: ${new Date().toLocaleString('vi-VN')}</div></div>`;
            await new Promise(r => setTimeout(r, 100));

            try {
                const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                if (format === 'image') {
                    const l = document.createElement('a');
                    l.download = `EXP_${pkg.name}.png`; l.href = canvas.toDataURL('image/png'); l.click();
                } else if (format === 'pdf') {
                    const pdf = new window.jspdf.jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                    const img = canvas.toDataURL('image/png');
                    const props = pdf.getImageProperties(img);
                    const w = pdf.internal.pageSize.getWidth();
                    pdf.addImage(img, 'PNG', 0, 0, w, (props.height * w) / props.width);
                    pdf.save(`EXP_${pkg.name}.pdf`);
                }
            } catch { showToast('Lỗi xuất file', 'error'); }
        };

        const groupOrders = (orders) => orders.reduce((acc, o) => { (acc[o.recipient] = acc[o.recipient] || []).push(o); return acc; }, {});

        render();
    </script>
</body>
</html>
