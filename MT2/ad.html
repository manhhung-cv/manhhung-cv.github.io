<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Console | Mai Tây</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
        body { background-color: #F9FAFB; color: #111827; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .min-input { width: 100%; background: transparent; border: 1px solid #E5E7EB; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; transition: all 0.2s; outline: none; }
        .min-input:focus { border-color: #111827; box-shadow: 0 0 0 1px #111827; }
        .btn-primary { background: #111827; color: white; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; padding: 0.5rem 1rem; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.8; }
        .btn-outline { background: white; color: #374151; border: 1px solid #E5E7EB; border-radius: 0.5rem; font-weight: 500; font-size: 0.875rem; padding: 0.5rem 1rem; transition: all 0.2s; cursor: pointer; }
        .btn-outline:hover { background: #F3F4F6; }
        
        .nav-item { color: #6B7280; border-radius: 0.375rem; transition: all 0.2s; }
        .nav-item:hover { background: #F3F4F6; color: #111827; }
        .nav-active { background: #F3F4F6 !important; color: #111827 !important; font-weight: 600; }
        
        .m-nav-item { color: #9CA3AF; transition: color 0.2s; }
        .m-nav-active { color: #111827; }
        
        .subtab { color: #6B7280; border-bottom: 2px solid transparent; padding-bottom: 0.5rem; transition: all 0.2s; }
        .subtab-active { color: #111827; border-bottom-color: #111827; font-weight: 600; }

        .media-thumb:hover .media-overlay { opacity: 1; }
        
        /* Dev Textarea styling */
        .dev-textarea { background-color: #1e1e1e; color: #d4d4d4; }
        .dev-textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    </style>
</head>
<body class="overflow-x-hidden antialiased text-sm">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-2xl text-gray-900"></i>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-gray-50 z-[90] flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-xl border border-gray-200 w-full max-w-sm shadow-sm">
            <div class="mb-8"><h1 class="text-xl font-semibold tracking-tight text-gray-900">Mai Tây Console</h1><p class="text-xs text-gray-500 mt-1">Đăng nhập để quản trị</p></div>
            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)" class="space-y-4">
                <div><label class="block text-xs font-medium text-gray-700 mb-1">Email</label><input type="email" id="adminEmail" required class="min-input py-3"></div>
                <div><label class="block text-xs font-medium text-gray-700 mb-1">Mật khẩu</label><input type="password" id="adminPassword" required class="min-input py-3"></div>
                <button type="submit" id="signInBtn" class="btn-primary py-3 w-full mt-2">Đăng Nhập</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex bg-gray-50">
        
        <aside class="hidden md:flex flex-col w-60 bg-white border-r border-gray-200 fixed inset-y-0 left-0 z-40">
            <div class="p-6 border-b border-gray-100"><h1 class="font-semibold text-base text-gray-900">Console</h1><p class="text-[10px] text-gray-500 uppercase mt-0.5">Mai Tây Studio</p></div>
            <nav id="desktopNav" class="flex-1 overflow-y-auto hide-scroll p-3 space-y-1"></nav>
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3 mb-3 px-2">
                    <div class="w-8 h-8 rounded bg-gray-100 flex items-center justify-center text-xs font-medium text-gray-700" id="userInitial">-</div>
                    <div class="flex-1 min-w-0"><p class="text-xs font-medium text-gray-900 truncate" id="userEmailDisplay">...</p></div>
                </div>
                <button onclick="handleAdminLogout()" class="w-full text-left px-2 py-1.5 text-xs text-red-600 hover:bg-red-50 rounded transition-colors">Đăng xuất</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col md:ml-60 w-full min-h-screen">
            <header class="bg-white border-b border-gray-200 sticky top-0 z-30 px-4 md:px-8 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <h2 id="tabTitle" class="text-lg font-semibold tracking-tight text-gray-900">Dashboard</h2>
                <div class="flex items-center gap-2" id="headerControlGroup">
                    <div class="relative w-full sm:w-64" id="searchContainer">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm..." class="w-full bg-gray-50 border border-transparent focus:border-gray-300 rounded-md pl-8 pr-3 py-1.5 text-sm outline-none transition-all">
                    </div>
                    <button onclick="loadCurrentTabRealtime()" class="w-8 h-8 flex items-center justify-center rounded-md border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-rotate-right text-xs"></i></button>
                    <button id="addRecordBtn" onclick="openCreateModal()" class="h-8 px-3 flex items-center justify-center rounded-md bg-gray-900 text-white text-xs font-medium hover:bg-gray-800 transition-colors"><i class="fa-solid fa-plus mr-1.5"></i> Tạo mới</button>
                </div>
            </header>

            <div id="cmsSubTabGroup" class="bg-white border-b border-gray-200 px-4 md:px-8 pt-3 flex gap-6 overflow-x-auto hide-scroll hidden text-sm">
                <button onclick="switchCmsSubTab('heroBlock')" id="subtab-heroBlock" class="subtab whitespace-nowrap">Ảnh bìa & Hero</button>
                <button onclick="switchCmsSubTab('homeFeatures')" id="subtab-homeFeatures" class="subtab whitespace-nowrap">Chữ chạy Marquee</button>
                <button onclick="switchCmsSubTab('offers')" id="subtab-offers" class="subtab whitespace-nowrap">Ưu Đãi</button>
                <button onclick="switchCmsSubTab('feed')" id="subtab-feed" class="subtab whitespace-nowrap">Reels</button>
                <button onclick="switchCmsSubTab('store')" id="subtab-store" class="subtab whitespace-nowrap">Sản phẩm</button>
            </div>

            <div id="contentArea" class="p-4 md:p-8 pb-24 md:pb-8 flex-1"></div>
        </main>
        
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-between items-center z-40 pb-[var(--safe-bottom)]">
            <button onclick="switchTab('Bookings')" id="m-nav-Bookings" class="m-nav-item flex-1 py-4 flex justify-center items-center"><i class="fa-solid fa-calendar text-lg"></i></button>
            <button onclick="switchTab('Staff')" id="m-nav-Staff" class="m-nav-item flex-1 py-4 flex justify-center items-center"><i class="fa-solid fa-user-group text-lg"></i></button>
            <button onclick="switchTab('Services')" id="m-nav-Services" class="m-nav-item flex-1 py-4 flex justify-center items-center"><i class="fa-solid fa-scissors text-lg"></i></button>
            <button onclick="openMoreMenuMobile()" id="m-nav-More" class="m-nav-item flex-1 py-4 flex justify-center items-center"><i class="fa-solid fa-bars text-lg"></i></button>
        </nav>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center"><h3 id="modalTitle" class="font-semibold text-gray-900 text-lg">Thêm bản ghi</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-xmark text-lg"></i></button></div>
            <div id="modalContent" class="p-6 overflow-y-auto hide-scroll space-y-4"></div>
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 rounded-b-xl flex justify-end gap-2"><button onclick="closeModal()" class="btn-outline text-xs py-2 px-4">Huỷ</button><button id="saveBtn" class="btn-primary text-xs py-2 px-4">Lưu</button></div>
        </div>
    </div>

    <div id="mediaModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-4xl rounded-xl shadow-xl flex flex-col h-[85vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center shrink-0">
                <h3 class="font-semibold text-gray-900 text-lg">Thư viện Media</h3>
                <button onclick="closeMediaModal()" class="text-gray-400 hover:text-gray-700 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="flex px-6 border-b border-gray-100 text-sm font-medium shrink-0">
                <button onclick="switchMediaTab('library')" id="mTab-library" class="px-4 py-3 border-b-2 border-gray-900 text-gray-900">Media đã tải</button>
                <button onclick="switchMediaTab('upload')" id="mTab-upload" class="px-4 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">Tải lên file mới</button>
                <button onclick="switchMediaTab('url')" id="mTab-url" class="px-4 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700">Nhập Link</button>
            </div>
            <div class="flex-1 overflow-y-auto bg-gray-50 p-6 relative">
                <div id="mView-library" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 content-start min-h-full"></div>
                <div id="mView-upload" class="hidden flex-col items-center justify-center h-full max-w-md mx-auto space-y-6">
                    <div class="w-full border-2 border-dashed border-gray-300 rounded-xl p-12 text-center bg-white cursor-pointer hover:bg-gray-50 transition-colors" onclick="document.getElementById('mediaFileInput').click()">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-300 mb-4"></i>
                        <p class="text-sm font-medium text-gray-900 mb-1">Kéo thả file hoặc bấm chọn</p>
                        <p class="text-xs text-gray-500 mb-6">Hỗ trợ JPG, PNG, MP4 (Dưới 50MB)</p>
                        <input type="file" id="mediaFileInput" accept="image/*,video/*" class="hidden" onchange="handleMediaFileSelect(event)">
                        <button type="button" class="btn-outline text-xs pointer-events-none">Chọn File Từ Máy</button>
                    </div>
                    <div id="uploadPreview" class="hidden w-full bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between">
                        <div class="flex items-center gap-3 overflow-hidden"><i class="fa-solid fa-file-image text-gray-400 text-2xl"></i><div class="min-w-0"><p id="uploadFileName" class="text-xs font-semibold text-gray-900 truncate">...</p><p id="uploadFileSize" class="text-[10px] text-gray-500">...</p></div></div>
                        <button id="btnStartUpload" onclick="startCloudinaryUpload()" class="btn-primary text-xs py-1.5 px-3">Tải Lên</button>
                    </div>
                    <div id="uploadProgress" class="hidden w-full text-center"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-gray-900 mb-2"></i><p class="text-xs font-medium text-gray-600">Đang tải lên Cloudinary...</p></div>
                </div>
                <div id="mView-url" class="hidden flex-col items-center justify-center h-full max-w-md mx-auto space-y-4">
                    <div class="w-full bg-white p-6 rounded-xl border border-gray-200 shadow-sm space-y-4">
                        <p class="text-sm font-medium text-gray-900">Dán trực tiếp Link Ảnh/Video</p>
                        <input type="text" id="manualMediaUrl" placeholder="https://..." class="min-input py-3">
                        <button onclick="pickManualMediaUrl()" class="btn-primary w-full py-3">Áp dụng đường dẫn này</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // BỔ SUNG getDocs VÀO IMPORT:
        import { getFirestore, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCTnDNOzI-8JYFfrxtJclFxe7vY27PM6FU", authDomain: "salon-mt.firebaseapp.com", projectId: "salon-mt", storageBucket: "salon-mt.firebasestorage.app", messagingSenderId: "1086041756251", appId: "1:1086041756251:web:5f7c4cc7144cc59be8a57e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwYOUR_NEW_DEPLOYMENT_ID/exec';
        
        const CLOUDINARY_CLOUD_NAME = 'dt8zhfng8'; 
        const CLOUDINARY_UPLOAD_PRESET = 'MT-File';

        const TAB_SCHEMAS = {
            Bookings: { fields: ['bookingCode', 'customerName', 'phone', 'email', 'branchName', 'serviceName', 'staffName', 'startTime', 'endTime', 'status', 'eventId'], labels: ['Mã Lịch', 'Tên Khách', 'Số ĐT', 'Email', 'Chi Nhánh', 'Dịch Vụ', 'Thợ', 'Giờ Bắt Đầu (ISO)', 'Giờ Kết Thúc (ISO)', 'Trạng Thái', 'Event ID'] },
            Staff: { fields: ['id', 'name', 'branchId', 'status', 'exp', 'position', 'desc', 'avatar'], labels: ['ID Thợ', 'Tên Thợ', 'ID Chi Nhánh', 'Trạng Thái', 'Năm KN', 'Vị Trí', 'Mô Tả', 'Ảnh Avatar (Link)'] },
            Services: { fields: ['id', 'name', 'duration', 'price', 'branchId', 'status'], labels: ['ID Dịch Vụ', 'Tên Dịch Vụ', 'Thời Lượng (Phút)', 'Giá Tiền', 'Chi Nhánh (ID/ALL)', 'Trạng Thái'] },
            Branches: { fields: ['id', 'name', 'address', 'openTime', 'closeTime', 'status'], labels: ['ID Chi Nhánh', 'Tên Chi Nhánh', 'Địa Chỉ', 'Giờ Mở (HH:MM)', 'Giờ Đóng (HH:MM)', 'Trạng Thái'] },
            Users: { fields: ['name', 'phone', 'email', 'gender', 'facebook', 'tiktok', 'instagram'], labels: ['Họ Tên', 'Số ĐT', 'Email', 'Giới Tính', 'Facebook', 'Tiktok', 'Instagram'] },
            Config: { fields: ['fallbackOpenTime', 'fallbackCloseTime', 'maintenanceMode', 'notificationEmail', 'bookingIntervalMinutes'], labels: ['Giờ mở mặc định', 'Giờ đóng mặc định', 'Bảo trì (true/false)', 'Email thông báo', 'Khoảng cách ca (Phút)'] },
            CmsLayout: { label: 'CMS Giao Diện' }
        };

        let currentTab = 'Bookings';
        let currentCmsSubTab = 'heroBlock';
        let searchKeyword = '';
        let tabCachedData = [];
        let cmsCachedDocData = {};
        let unsubscribeRealtime = null;

        let mediaStorageData = [];
        let currentTargetInput = null;
        let selectedFileToUpload = null;

        // Window Expose
        window.switchTab = switchTab;
        window.switchCmsSubTab = switchCmsSubTab;
        window.handleAdminLogin = handleAdminLogin;
        window.handleAdminLogout = handleAdminLogout;
        window.openCreateModal = openCreateModal;
        window.openEditModal = openEditModal;
        window.deleteRecord = deleteRecord;
        window.openMoreMenuMobile = openMoreMenuMobile;
        window.closeModal = closeModal;
        window.loadCurrentTabRealtime = loadCurrentTabRealtime;
        window.saveCmsBlockAction = saveCmsBlockAction;
        window.addCmsArrayRow = addCmsArrayRow;
        window.removeCmsArrayRow = removeCmsArrayRow;
        
        window.openMediaManager = openMediaManager;
        window.closeMediaModal = closeMediaModal;
        window.switchMediaTab = switchMediaTab;
        window.handleMediaFileSelect = handleMediaFileSelect;
        window.startCloudinaryUpload = startCloudinaryUpload;
        window.pickMediaToInput = pickMediaToInput;
        window.deleteMediaFromLibrary = deleteMediaFromLibrary;
        window.pickManualMediaUrl = pickManualMediaUrl;

        // Dev Mode Expose
        window.loadDevData = loadDevData;
        window.formatDevJson = formatDevJson;
        window.saveDevData = saveDevData;

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loader').classList.add('hidden');
            if (user && (user.email.includes('admin') || user.email === "admin@maitaysalon.com")) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('userEmailDisplay').innerText = user.email;
                document.getElementById('userInitial').innerText = user.email.charAt(0).toUpperCase();
                renderDesktopTabsNav();
                switchTab(currentTab);
                
                onSnapshot(doc(db, "MaiTayData/Core/Config/mediaStorage"), snap => {
                    if(snap.exists()) { mediaStorageData = snap.data().items || []; renderMediaLibrary(); }
                });
            } else if (user) { alert("Tài khoản không có quyền Admin."); signOut(auth); } 
            else { document.getElementById('app').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }
        });

        async function handleAdminLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('signInBtn'); btn.innerText = 'Đang xử lý...'; btn.disabled = true;
            try { await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPassword').value); } 
            catch (err) { alert("Lỗi đăng nhập."); btn.innerText = 'Đăng Nhập'; btn.disabled = false; }
        }

        async function handleAdminLogout() {
            if(confirm("Xác nhận đăng xuất?")){ if(unsubscribeRealtime) unsubscribeRealtime(); await signOut(auth); location.reload(); }
        }

        function renderDesktopTabsNav() {
            const nav = document.getElementById('desktopNav');
            const tabs = [ 
                { id: 'Bookings', icon: 'fa-calendar', label: 'Lịch Đặt Hẹn' }, 
                { id: 'Staff', icon: 'fa-user-group', label: 'Đội Ngũ Thợ' }, 
                { id: 'Services', icon: 'fa-scissors', label: 'Dịch Vụ' }, 
                { id: 'Branches', icon: 'fa-shop', label: 'Chi Nhánh' }, 
                { id: 'Users', icon: 'fa-users', label: 'Khách Hàng' }, 
                { id: 'Config', icon: 'fa-sliders', label: 'Cấu Hình Lõi' }, 
                { id: 'CmsLayout', icon: 'fa-layer-group', label: 'CMS Web' },
                { id: 'DEV', icon: 'fa-code', label: 'Dev Workspace' } // TAB DEV THÊM Ở ĐÂY
            ];
            nav.innerHTML = tabs.map(t => `<button onclick="switchTab('${t.id}')" id="d-nav-${t.id}" class="nav-item w-full flex items-center gap-3 px-3 py-2 text-sm text-left"><i class="fa-solid ${t.icon} w-5 text-center text-gray-400"></i> <span>${t.label}</span></button>`).join('');
        }

        function switchTab(name) {
            currentTab = name;
            const titleMap = { Bookings: 'Lịch Đặt Hẹn', Staff: 'Đội Ngũ Thợ', Services: 'Dịch Vụ', Branches: 'Chi Nhánh', Users: 'Khách Hàng', Config: 'Cấu Hình Hệ Thống', CmsLayout: 'Quản Trị Giao Diện (CMS)', DEV: 'Developer Workspace' };
            document.getElementById('tabTitle').innerText = titleMap[name] || name;
            
            const isNoSearch = ['CmsLayout', 'Config', 'DEV'].includes(name);
            document.getElementById('searchContainer').style.display = isNoSearch ? 'none' : 'block';
            document.getElementById('addRecordBtn').style.display = isNoSearch ? 'none' : 'flex';
            document.getElementById('cmsSubTabGroup').style.display = name === 'CmsLayout' ? 'flex' : 'none';

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
            if(document.getElementById(`d-nav-${name}`)) document.getElementById(`d-nav-${name}`).classList.add('nav-active');
            document.querySelectorAll('.m-nav-item').forEach(el => el.classList.remove('m-nav-active'));
            if(document.getElementById(`m-nav-${name}`)) document.getElementById(`m-nav-${name}`).classList.add('m-nav-active');

            loadCurrentTabRealtime();
        }

        function switchCmsSubTab(subTabName) {
            currentCmsSubTab = subTabName;
            document.querySelectorAll('.subtab').forEach(el => el.classList.remove('subtab-active'));
            document.getElementById(`subtab-${subTabName}`).classList.add('subtab-active');
            renderViewArea();
        }

        function loadCurrentTabRealtime() {
            if (unsubscribeRealtime) { unsubscribeRealtime(); unsubscribeRealtime = null; }
            
            if (currentTab === 'DEV') { renderViewArea(); return; } // Dev view tự lo liệu data fetch
            if (currentTab === 'Config') { unsubscribeRealtime = onSnapshot(doc(db, "MaiTayData/Core/Config/system"), snap => { tabCachedData = snap.exists() ? [snap.data()] : [{}]; renderViewArea(); }); return; }
            if (currentTab === 'CmsLayout') { unsubscribeRealtime = onSnapshot(doc(db, "MaiTayData/Core/Config/cms"), snap => { cmsCachedDocData = snap.exists() ? snap.data() : {}; switchCmsSubTab(currentCmsSubTab); }); return; }
            
            const colRef = collection(db, `MaiTayData/Core/${currentTab}`); 
            const q = currentTab === 'Bookings' ? query(colRef, orderBy('startTime', 'desc')) : colRef;
            unsubscribeRealtime = onSnapshot(q, snap => { tabCachedData = []; snap.forEach(d => tabCachedData.push({ docId: d.id, ...d.data() })); renderViewArea(); });
        }

        function renderViewArea() {
            const area = document.getElementById('contentArea'); area.innerHTML = '';
            
            if (currentTab === 'DEV') { renderDevEditor(area); return; }
            if (currentTab === 'Config') { renderConfigEditor(tabCachedData[0] || {}, area); return; }
            if (currentTab === 'CmsLayout') { renderCmsEditor(area); return; }
            
            let filtered = tabCachedData.filter(item => Object.values(item).some(val => String(val).toLowerCase().includes(searchKeyword.toLowerCase())));
            if(filtered.length === 0) { area.innerHTML = `<div class="py-12 text-center text-gray-400 text-sm">Không có dữ liệu.</div>`; return; }
            
            let container = document.createElement('div'); 
            container.className = "space-y-3 bg-white border border-gray-200 rounded-lg overflow-hidden divide-y divide-gray-100";
            filtered.forEach(item => {
                let badgeHtml = '';
                if (currentTab === 'Bookings') {
                    let stColor = item.status === 'Hoàn thành' ? 'text-green-600 bg-green-50' : item.status === 'Đã huỷ' ? 'text-red-600 bg-red-50' : 'text-gray-600 bg-gray-100';
                    badgeHtml = `<span class="px-2.5 py-1 text-[10px] font-medium rounded-full ${stColor} mr-3">${item.status || 'Mới'}</span>`;
                }

        async function loadDevData() {
            const target = document.getElementById('devTargetSelect').value;
            const textarea = document.getElementById('devJsonTextarea');
            textarea.value = 'Đang tải JSON...';
            try {
                if (target.startsWith('col:')) {
                    const colName = target.replace('col:', '');
                    const snap = await getDocs(collection(db, `MaiTayData/Core/${colName}`));
                    const arr = [];
                    snap.forEach(d => arr.push({ docId: d.id, ...d.data() }));
                    textarea.value = JSON.stringify(arr, null, 4);
                } else {
                    const docPath = target.replace('doc:', '');
                    const snap = await getDoc(doc(db, `MaiTayData/Core/${docPath}`));
                    textarea.value = JSON.stringify(snap.exists() ? snap.data() : {}, null, 4);
                }
            } catch(e) { textarea.value = `Lỗi tải dữ liệu: ${e.message}`; }
        }

        function formatDevJson() {
            const textarea = document.getElementById('devJsonTextarea');
            try { textarea.value = JSON.stringify(JSON.parse(textarea.value), null, 4); } 
            catch(e) { alert("JSON không hợp lệ! Vui lòng kiểm tra lại cú pháp (dấu phẩy, ngoặc kép...)."); }
        }

        async function saveDevData() {
            if (!confirm("CẢNH BÁO: Thao tác này sẽ ghi đè trực tiếp lên Firebase. Dữ liệu bị xoá trong JSON cũng sẽ bị xoá vĩnh viễn trên DB. Chắc chắn tiếp tục?")) return;
            const btn = document.getElementById('btnSaveDev');
            const target = document.getElementById('devTargetSelect').value;
            const textarea = document.getElementById('devJsonTextarea');
            let parsedData;
            try { parsedData = JSON.parse(textarea.value); } catch(e) { alert("JSON lỗi cú pháp! Không thể lưu."); return; }

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-1"></i> Đang lưu...'; btn.disabled = true;
            try {
                if (target.startsWith('col:')) {
                    if (!Array.isArray(parsedData)) throw new Error("Collection phải là một Mảng `[ {...} ]`.");
                    const colName = target.replace('col:', '');
                    const colRef = collection(db, `MaiTayData/Core/${colName}`);
                    
                    const currentSnap = await getDocs(colRef);
                    const currentIds = currentSnap.docs.map(d => d.id);
                    const newIds = parsedData.map(item => item.docId).filter(Boolean);
                    const idsToDelete = currentIds.filter(id => !newIds.includes(id));

                    for (const id of idsToDelete) await deleteDoc(doc(db, `MaiTayData/Core/${colName}`, id));
                    for (const item of parsedData) {
                        const id = item.docId; const dataToSave = { ...item }; delete dataToSave.docId;
                        if (id) await setDoc(doc(db, `MaiTayData/Core/${colName}`, id), dataToSave);
                        else await addDoc(colRef, dataToSave);
                    }
                } else {
                    if (Array.isArray(parsedData) || typeof parsedData !== 'object') throw new Error("Document phải là một Object `{ ... }`.");
                    const docPath = target.replace('doc:', '');
                    await setDoc(doc(db, `MaiTayData/Core/${docPath}`), parsedData);
                }
                alert("Đồng bộ JSON lên Firebase thành công!");
                loadDevData(); 
            } catch(e) { alert("Lỗi lưu DB: " + e.message); } 
            finally { btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-1"></i> Ghi đè DB'; btn.disabled = false; }
        }

            if(type==='store') tpl = `<div class="border border-gray-200 rounded p-4 relative data-row bg-gray-50 flex flex-col sm:flex-row gap-4"><button onclick="removeCmsArrayRow(this)" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 z-10"><i class="fa-solid fa-xmark"></i></button><div class="w-full sm:w-28 shrink-0 flex flex-col gap-2"><div class="aspect-square bg-gray-100 rounded relative group overflow-hidden border border-gray-200"><img src="https://placehold.co/400?text=Sản+Phẩm" class="w-full h-full object-cover preview-img"><div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><button type="button" onclick="openMediaManager(this, 'next')" class="text-white text-[10px] bg-gray-900/80 px-2 py-1 rounded">Đổi ảnh</button><input type="hidden" value="" class="field-img"></div></div><input type="color" value="#111827" class="w-full h-8 p-0 border-0 rounded cursor-pointer field-themeColor shadow-sm" title="Màu Nhãn"></div><div class="flex-1 grid grid-cols-2 gap-3 pr-4"><div><input type="text" placeholder="Mã SP (VD: SP01)" class="min-input py-1.5 px-2 text-xs font-mono field-id"></div><div><input type="text" placeholder="Giá tiền" class="min-input py-1.5 px-2 text-xs field-price"></div><div class="col-span-2"><input type="text" placeholder="Tên sản phẩm" class="min-input py-1.5 px-2 text-sm font-semibold field-name"></div><div><input type="text" placeholder="Thương hiệu" class="min-input py-1.5 px-2 text-xs field-brand"></div><div><input type="text" placeholder="Dòng phụ (VD: Dung tích)" class="min-input py-1.5 px-2 text-xs field-sub"></div><div class="col-span-2"><input type="text" placeholder="Mô tả tóm tắt..." class="min-input py-1.5 px-2 text-xs field-desc"></div></div></div>`;
            document.getElementById(`cms-container-${type}`).insertAdjacentHTML('beforeend', tpl);
        }

        function removeCmsArrayRow(btn) { btn.closest('.data-row').remove(); }

        async function saveCmsBlockAction() {
            const btn = document.getElementById('saveCmsBtn'); btn.innerText = 'Đang lưu...'; btn.disabled = true;
            const p = { ...cmsCachedDocData };
            try {
                if (currentCmsSubTab === 'heroBlock') {
                    p.heroBlock = { 
                        sliderImages: Array.from(document.querySelectorAll('#cms-container-slider .field-url')).map(el => el.value.trim()).filter(v => v), 
                        isFlashSale: document.getElementById('cms-hero-isFlashSale').value === 'true', 
                        normalBooking: {}, 
                        flashSale: { title: document.getElementById('cms-hero-flash-title').value, desc: document.getElementById('cms-hero-flash-desc').value, btnText: document.getElementById('cms-hero-flash-btnText').value, endTime: document.getElementById('cms-hero-flash-endTime').value } 
                    };
                } else if (currentCmsSubTab === 'homeFeatures') {
                    p.homeFeatures = { marqueeTexts: Array.from(document.querySelectorAll('#cms-container-marquee .data-row')).map(r=>({text:r.querySelector('.field-text').value, isHighlight:r.querySelector('.field-highlight').checked})) };
                } else if (currentCmsSubTab === 'offers') {
                    p.offers = Array.from(document.querySelectorAll('#cms-container-offers .data-row')).map(r=>({type:r.querySelector('.field-type').value, code:r.querySelector('.field-code').value, title:r.querySelector('.field-title').value, desc:r.querySelector('.field-desc').value, gradient:r.querySelector('.field-gradient').value, icon:r.querySelector('.field-icon').value}));
                } else if (currentCmsSubTab === 'feed') {
                    p.feed = Array.from(document.querySelectorAll('#cms-container-feed .data-row')).map(r=>({isVideo:true, title:r.querySelector('.field-title').value, url:r.querySelector('.field-url').value, img:r.querySelector('.field-url').value, fomoText:r.querySelector('.field-fomoText').value, fomoIcon:r.querySelector('.field-fomoIcon').value}));
                } else if (currentCmsSubTab === 'store') {
                    p.store = Array.from(document.querySelectorAll('#cms-container-store .data-row')).map(r=>({id:r.querySelector('.field-id').value, price:r.querySelector('.field-price').value, name:r.querySelector('.field-name').value, sub:r.querySelector('.field-sub').value, brand:r.querySelector('.field-brand').value, themeColor:r.querySelector('.field-themeColor').value, img:r.querySelector('.field-img').value, desc:r.querySelector('.field-desc').value}));
                }
                await setDoc(doc(db, "MaiTayData/Core/Config/cms"), p); alert("Đã cập nhật giao diện!");
            } catch(e) { alert("Lỗi: "+e.message); } finally { btn.innerText = 'Xuất bản lên Web'; btn.disabled = false; }
        }

        // ==========================================
        // MEDIA MANAGER
        // ==========================================
        function openMediaManager(btn, direction = 'next') {
            if (direction === 'next') currentTargetInput = btn.nextElementSibling;
            else if (direction === 'prev') {
                currentTargetInput = btn.previousElementSibling;
                if(currentTargetInput && currentTargetInput.tagName !== 'INPUT') currentTargetInput = currentTargetInput.querySelector('input');
            }
            document.getElementById('mediaModal').classList.remove('hidden');
            renderMediaLibrary();
        }

        function closeMediaModal() { document.getElementById('mediaModal').classList.add('hidden'); currentTargetInput = null; }

        function switchMediaTab(tab) {
            document.getElementById('mTab-library').className = tab === 'library' ? 'px-4 py-3 border-b-2 border-gray-900 text-gray-900' : 'px-4 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700';
            document.getElementById('mTab-upload').className = tab === 'upload' ? 'px-4 py-3 border-b-2 border-gray-900 text-gray-900' : 'px-4 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700';
            document.getElementById('mTab-url').className = tab === 'url' ? 'px-4 py-3 border-b-2 border-gray-900 text-gray-900' : 'px-4 py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700';
            
            document.getElementById('mView-library').classList.toggle('hidden', tab !== 'library');
            document.getElementById('mView-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('mView-url').classList.toggle('hidden', tab !== 'url');
            document.getElementById('mView-upload').style.display = tab === 'upload' ? 'flex' : '';
            document.getElementById('mView-url').style.display = tab === 'url' ? 'flex' : '';
        }

        function renderMediaLibrary() {
            const container = document.getElementById('mView-library');
            if (mediaStorageData.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400"><i class="fa-solid fa-box-open text-4xl mb-3"></i><p class="text-sm">Thư viện trống.</p></div>`; return;
            }
            container.innerHTML = mediaStorageData.map(item => `
                <div class="media-thumb bg-white rounded-lg border border-gray-200 overflow-hidden relative group aspect-square shadow-sm flex flex-col justify-between">
                    <div class="h-3/4 w-full bg-gray-100 relative flex items-center justify-center">
                        ${item.type === 'video' ? `<i class="fa-solid fa-play text-gray-300 text-3xl"></i>` : `<img src="${item.url}" class="w-full h-full object-cover">`}
                        <div class="media-overlay absolute inset-0 bg-gray-900/60 opacity-0 transition-opacity flex items-center justify-center gap-2">
                            <button onclick="pickMediaToInput('${item.url}')" class="bg-white text-gray-900 text-xs font-semibold py-1.5 px-3 rounded shadow-sm hover:bg-gray-100">Chọn</button>
                            <button onclick="deleteMediaFromLibrary('${item.url}')" class="bg-red-500 text-white text-xs font-semibold py-1.5 px-2 rounded shadow-sm hover:bg-red-600"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="h-1/4 p-2 flex items-center justify-between bg-white border-t border-gray-100">
                        <span class="text-[10px] font-mono text-gray-500 truncate mr-2">${item.url.split('/').pop()}</span><span class="text-[9px] uppercase font-bold text-gray-400 bg-gray-100 px-1.5 rounded">${item.type}</span>
                    </div>
                </div>
            `).join('');
        }

        function pickMediaToInput(url) {
            if (currentTargetInput) {
                currentTargetInput.value = url;
                const parentRow = currentTargetInput.closest('.data-row');
                if(parentRow) {
                    const imgNode = parentRow.querySelector('.preview-img');
                    if(imgNode) imgNode.src = url;
                }
            }
            closeMediaModal();
        }

        function pickManualMediaUrl() {
            const val = document.getElementById('manualMediaUrl').value.trim();
            if(!val) { alert("Vui lòng dán Link Media!"); return; }
            pickMediaToInput(val);
            document.getElementById('manualMediaUrl').value = '';
        }

        function handleMediaFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 50 * 1024 * 1024) { alert("File quá lớn (Tối đa 50MB)."); return; }
            selectedFileToUpload = file;
            document.getElementById('uploadFileName').innerText = file.name;
            document.getElementById('uploadFileSize').innerText = (file.size / (1024*1024)).toFixed(2) + ' MB';
            document.getElementById('uploadPreview').classList.remove('hidden');
        }

        async function startCloudinaryUpload() {
            if (!selectedFileToUpload) return;
            document.getElementById('btnStartUpload').classList.add('hidden');
            document.getElementById('uploadProgress').classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', selectedFileToUpload);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            try {
                const resourceType = selectedFileToUpload.type.includes('video') ? 'video' : 'image';
                const uploadUrl = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`;
                const res = await fetch(uploadUrl, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    await saveMediaToFirebase(data.secure_url, resourceType);
                    switchMediaTab('library'); selectedFileToUpload = null;
                    document.getElementById('mediaFileInput').value = ''; document.getElementById('uploadPreview').classList.add('hidden');
                } else { throw new Error(data.error?.message || "Lỗi Cloudinary"); }
            } catch (error) { alert("Upload thất bại: " + error.message); } 
            finally { document.getElementById('btnStartUpload').classList.remove('hidden'); document.getElementById('uploadProgress').classList.add('hidden'); }
        }

        async function saveMediaToFirebase(url, type) {
            const newItem = { url, type, createdAt: Date.now() };
            const updatedItems = [newItem, ...mediaStorageData];
            await setDoc(doc(db, "MaiTayData/Core/Config/mediaStorage"), { items: updatedItems });
        }

        async function deleteMediaFromLibrary(urlToDelete) {
            if (!confirm("Xoá tài nguyên này khỏi hệ thống Firebase?")) return;
            const updatedItems = mediaStorageData.filter(item => item.url !== urlToDelete);
            await setDoc(doc(db, "MaiTayData/Core/Config/mediaStorage"), { items: updatedItems });
        }

        // ==========================================
        // CRUD LOGIC CƠ BẢN
        // ==========================================
        function openCreateModal() {
            const sc = TAB_SCHEMAS[currentTab];
            document.getElementById('modalTitle').innerText = `Thêm mới ${currentTab}`;
            document.getElementById('modalContent').innerHTML = sc.fields.map((f, i) => `<div><label class="block text-xs font-medium text-gray-700 mb-1">${sc.labels[i]}</label><input type="text" id="inp-${f}" class="min-input"></div>`).join('');
            document.getElementById('saveBtn').onclick = () => saveCrudAction('create'); 
            document.getElementById('modal').classList.remove('hidden');
        }

        function openEditModal(docId) {
            const sc = TAB_SCHEMAS[currentTab]; const item = tabCachedData.find(r => r.docId === docId); if(!item) return;
            document.getElementById('modalTitle').innerText = `Chỉnh sửa bản ghi`;
            document.getElementById('modalContent').innerHTML = sc.fields.map((f, i) => `<div><label class="block text-xs font-medium text-gray-700 mb-1">${sc.labels[i]}</label><input type="text" id="inp-${f}" value="${item[f]!==undefined?item[f]:''}" class="min-input"></div>`).join('');
            document.getElementById('saveBtn').onclick = () => saveCrudAction('update', docId); 
            document.getElementById('modal').classList.remove('hidden');
        }

        async function saveCrudAction(op, docId = null) {
            const sc = TAB_SCHEMAS[currentTab]; const btn = document.getElementById('saveBtn'); btn.innerText = 'Đang lưu...'; btn.disabled = true;
            const data = {}; sc.fields.forEach(f => data[f] = document.getElementById(`inp-${f}`).value.trim());
            if (data.phone) data.phone = String(data.phone).replace(/[^0-9]/g, '');

            try {
                if (op === 'create') {
                    if (data.id) await setDoc(doc(db, `MaiTayData/Core/${currentTab}`, data.id), data);
                    else if (currentTab === 'Users' && data.phone) await setDoc(doc(db, `MaiTayData/Core/Users`, data.phone), data);
                    else {
                        if (currentTab === 'Bookings' && !data.bookingCode) data.bookingCode = Math.random().toString(36).substring(2,8).toUpperCase();
                        const newDoc = await addDoc(collection(db, `MaiTayData/Core/${currentTab}`), data);
                        if (currentTab === 'Bookings') {
                            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'create_event', data }) }).then(r=>r.json()).then(res=>{ if(res.eventId) updateDoc(doc(db, "MaiTayData/Core/Bookings", newDoc.id), { eventId: res.eventId }); }).catch(()=>{});
                        }
                    }
                } else if (op === 'update' && docId) {
                    await updateDoc(doc(db, `MaiTayData/Core/${currentTab}`, docId), data);
                    if (currentTab === 'Bookings' && data.status === 'Đã huỷ' && data.eventId) fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel_event', eventId: data.eventId }) }).catch(()=>{});
                }
                closeModal();
            } catch(e) { alert("Lỗi: "+e.message); } finally { btn.innerText = 'Lưu'; btn.disabled = false; }
        }

        async function deleteRecord(docId, eventId = '') {
            if(!confirm("Xóa bản ghi vĩnh viễn?")) return;
            try { await deleteDoc(doc(db, `MaiTayData/Core/${currentTab}`, docId)); if (currentTab === 'Bookings' && eventId) fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel_event', eventId }) }).catch(()=>{}); } 
            catch(e) { alert("Lỗi: "+e.message); }
        }

        async function saveConfigAction() {
            const data = {}; TAB_SCHEMAS.Config.fields.forEach(f => { let v = document.getElementById(`cfg-${f}`).value.trim(); data[f] = v==='true'?true:v==='false'?false:(!isNaN(v)&&v!=='')?Number(v):v; });
            await setDoc(doc(db, "MaiTayData/Core/Config/system"), data); alert("Đã lưu cấu hình.");
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        document.getElementById('searchInput').addEventListener('input', () => { searchKeyword = document.getElementById('searchInput').value; renderViewArea(); });

        function openMoreMenuMobile() {
            document.getElementById('tabTitle').innerText = 'Mở rộng';
            document.getElementById('searchContainer').style.display = 'none'; document.getElementById('addRecordBtn').style.display = 'none'; document.getElementById('cmsSubTabGroup').style.display = 'none';
            document.querySelectorAll('.m-nav-item').forEach(el => el.classList.remove('m-nav-active'));
            document.getElementById('m-nav-More').classList.add('m-nav-active');
            
            document.getElementById('contentArea').innerHTML = `
                <div class="space-y-2">
                    <button onclick="switchTab('Branches')" class="w-full text-left p-4 bg-white border border-gray-200 rounded-lg text-sm font-medium"><i class="fa-solid fa-shop w-6 text-gray-400"></i> Chi Nhánh</button>
                    <button onclick="switchTab('Users')" class="w-full text-left p-4 bg-white border border-gray-200 rounded-lg text-sm font-medium"><i class="fa-solid fa-users w-6 text-gray-400"></i> Khách Hàng</button>
                    <button onclick="switchTab('Config')" class="w-full text-left p-4 bg-white border border-gray-200 rounded-lg text-sm font-medium"><i class="fa-solid fa-sliders w-6 text-gray-400"></i> Cấu Hình Hệ Thống</button>
                    <button onclick="switchTab('CmsLayout')" class="w-full text-left p-4 bg-white border border-gray-200 rounded-lg text-sm font-medium"><i class="fa-solid fa-layer-group w-6 text-gray-400"></i> Quản Trị Giao Diện CMS</button>
                    <button onclick="switchTab('DEV')" class="w-full text-left p-4 bg-white border border-gray-200 rounded-lg text-sm font-medium text-blue-600"><i class="fa-solid fa-code w-6"></i> Dev Workspace (JSON)</button>
                    <button onclick="handleAdminLogout()" class="w-full text-left p-4 bg-red-50 text-red-600 rounded-lg text-sm font-medium mt-4"><i class="fa-solid fa-power-off w-6"></i> Đăng xuất</button>
                </div>`;
        }
    </script>
