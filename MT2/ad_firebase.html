<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mai Tây - Admin Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Glassmorphism Toggle */
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toggle-label { width: 3.5rem; height: 1.75rem; background-color: #cbd5e1; border-radius: 9999px; transition: all 0.3s; }
        
        /* Smooth Card Hover */
        .admin-card { transition: transform 0.2s, box-shadow 0.2s; }
        .admin-card:hover { transform: translateY(-2px); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05); }

        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="text-slate-800">

    <div id="view-login" class="h-screen w-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white/60 backdrop-blur-2xl rounded-[2.5rem] shadow-[0_8px_32px_rgba(0,0,0,0.04)] p-8 border border-white/50 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-100 rounded-full blur-3xl opacity-50 z-0"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-rose-100 rounded-full blur-3xl opacity-50 z-0"></div>
            
            <div class="relative z-10">
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-slate-900 rounded-3xl mx-auto mb-5 flex items-center justify-center shadow-xl shadow-slate-900/20">
                        <i class="fa-solid fa-fingerprint text-white text-2xl"></i>
                    </div>
                    <h1 class="text-2xl font-black tracking-tight text-slate-900">Admin Studio</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Mai Tây & Hiền Trần</p>
                </div>
                <form id="loginForm" class="space-y-4">
                    <input type="email" id="email" placeholder="Email quản lý" required class="w-full bg-white/80 border border-slate-100 p-4 rounded-2xl font-medium text-sm outline-none focus:ring-2 focus:ring-slate-900/5 transition-all">
                    <input type="password" id="password" placeholder="Mật khẩu" required class="w-full bg-white/80 border border-slate-100 p-4 rounded-2xl font-medium text-sm outline-none focus:ring-2 focus:ring-slate-900/5 transition-all">
                    <p id="loginError" class="text-xs font-bold text-rose-500 hidden text-center"></p>
                    <button type="submit" id="btnLogin" class="w-full bg-slate-900 text-white py-4 mt-2 rounded-2xl font-black uppercase tracking-widest text-[11px] active:scale-95 transition-transform shadow-lg shadow-slate-900/20">Mở Khóa Hệ Thống</button>
                </form>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen flex-col pb-32">
        
        <header class="glass-header sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-slate-800 to-slate-900 rounded-[1rem] flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-wand-magic-sparkles text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-base font-black text-slate-900 leading-tight">Quản Trị Chiến Dịch</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Giao diện trực quan</p>
                </div>
            </div>
            <button id="btnLogout" class="text-[11px] font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-xl transition-colors">Đăng xuất</button>
        </header>

        <div class="p-4 md:p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-8">
                
                <div class="admin-card bg-white p-6 rounded-[2rem] border border-slate-100 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-sm font-black uppercase tracking-widest text-slate-900 flex items-center gap-2">
                                <i class="fa-solid fa-bolt text-rose-500"></i> Sự kiện Flash Sale
                            </h2>
                            <p class="text-[10px] text-slate-400 font-medium mt-1">Bật để hiển thị đếm ngược trên trang chủ</p>
                        </div>
                        <div class="relative inline-block w-14 align-middle select-none">
                            <input type="checkbox" id="isFlashSale" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                            <label for="isFlashSale" class="toggle-label block overflow-hidden h-7 rounded-full cursor-pointer"></label>
                        </div>
                    </div>
                    
                    <div class="space-y-4 bg-slate-50/50 p-4 rounded-2xl border border-slate-50">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Tiêu đề Sale</label>
                            <input type="text" id="fsTitle" placeholder="VD: Giảm 30% Hóa Chất" class="w-full bg-white border border-slate-200 p-3 rounded-xl font-semibold text-xs outline-none focus:border-slate-400">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Mô tả điều kiện</label>
                            <textarea id="fsDesc" rows="2" placeholder="Chỉ áp dụng cho 5 khách đầu tiên..." class="w-full bg-white border border-slate-200 p-3 rounded-xl font-medium text-xs outline-none resize-none focus:border-slate-400"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Hiệu lực (Giờ)</label>
                                <div class="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden">
                                    <input type="number" id="fsHours" min="1" max="72" class="w-full p-3 font-semibold text-xs outline-none text-center" value="3">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Text Nút Bấm</label>
                                <input type="text" id="fsBtnText" placeholder="GIỮ CHỖ NGAY" class="w-full bg-white border border-slate-200 p-3 rounded-xl font-bold text-[10px] outline-none uppercase text-center focus:border-slate-400">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="admin-card bg-white p-6 rounded-[2rem] border border-slate-100">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-sm font-black uppercase tracking-widest text-slate-900"><i class="fa-solid fa-images mr-2 text-slate-400"></i>Ảnh Bìa Salon</h2>
                            <p class="text-[10px] text-slate-400 font-medium mt-1">Nên chọn ảnh ngang, chất lượng cao</p>
                        </div>
                        <button onclick="triggerUpload('slider', false)" class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-colors">
                            <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Tải ảnh lên
                        </button>
                    </div>
                    <div id="sliderContainer" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div class="admin-card bg-white p-6 rounded-[2rem] border border-slate-100">
                    <div class="flex justify-between items-center mb-5">
                        <h2 class="text-sm font-black uppercase tracking-widest text-slate-900"><i class="fa-solid fa-bullhorn mr-2 text-slate-400"></i>Thông Báo Chạy</h2>
                        <button onclick="addMarqueeItem()" class="text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider">+ Thêm</button>
                    </div>
                    <div id="marqueeContainer" class="space-y-3"></div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-8">
                
                <div class="admin-card bg-white p-6 rounded-[2rem] border border-slate-100">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                        <div>
                            <h2 class="text-sm font-black uppercase tracking-widest text-slate-900"><i class="fa-solid fa-clapperboard mr-2 text-slate-400"></i>Bản Tin (Feed TikTok)</h2>
                            <p class="text-[10px] text-slate-400 font-medium mt-1">Đăng ảnh mẫu tóc hoặc video Reels/TikTok</p>
                        </div>
                        <button onclick="addFeedItem()" class="bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-widest px-4 py-2.5 rounded-xl hover:bg-indigo-100 transition-colors">
                            <i class="fa-solid fa-plus mr-1"></i> Viết Bài Mới
                        </button>
                    </div>
                    <div id="feedContainer" class="space-y-5 max-h-[70vh] overflow-y-auto no-scrollbar pr-1"></div>
                </div>

                <div class="admin-card bg-white p-6 rounded-[2rem] border border-slate-100">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-900 mb-5"><i class="fa-solid fa-ticket mr-2 text-slate-400"></i>Voucher & Ưu Đãi</h2>
                    <div id="offersContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-slate-200/50 p-2 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] flex items-center gap-4 z-50">
            <span id="saveMessage" class="flex items-center text-[11px] font-bold px-4 w-32 justify-center"></span>
            <button id="btnSave" class="bg-slate-900 text-white px-8 py-4 rounded-3xl font-black uppercase tracking-[0.2em] text-[10px] active:scale-95 transition-all flex items-center gap-2 hover:shadow-lg hover:shadow-slate-900/20">
                <i class="fa-solid fa-cloud-arrow-up text-sm"></i> ĐỒNG BỘ LÊN APP
            </button>
        </div>
    </div>

    <datalist id="fomoList">
        <option value="Xu hướng tuần này">
        <option value="Lịch hôm nay sắp kín">
        <option value="Mẫu tóc hot nhất">
        <option value="Chỉ còn vài slot trống">
        <option value="Dịch vụ được yêu thích">
    </datalist>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. CẤU HÌNH API
        const firebaseConfig = {
            apiKey: "AIzaSyCTnDNOzI-8JYFfrxtJclFxe7vY27PM6FU",
            authDomain: "salon-mt.firebaseapp.com",
            projectId: "salon-mt",
            storageBucket: "salon-mt.firebasestorage.app",
            messagingSenderId: "1086041756251",
            appId: "1:1086041756251:web:5f7c4cc7144cc59be8a57e",
            measurementId: "G-3BV9HNVP29"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CLOUDINARY CREDENTIALS
        const CLOUD_NAME = "dt8zhfng8"; 
        const UPLOAD_PRESET = "MT-File"; 

        let rootAppConfig = {};

        // 2. UI HELPERS & XÓA PHẦN TỬ
        window.removeNode = (btn) => {
            const node = btn.closest('.data-node');
            node.style.transform = "scale(0.95)"; node.style.opacity = "0";
            setTimeout(() => node.remove(), 200);
        };

        // 3. LOGIC TẢI LÊN CLOUDINARY SIÊU NHANH
        // type = 'slider' | 'feed-img' | 'feed-vid'
        window.triggerUpload = (type, targetId = null) => {
            const isVideo = type === 'feed-vid';
            const fileInput = document.createElement('input');
            fileInput.type = 'file'; fileInput.accept = isVideo ? 'video/*' : 'image/*';
            
            fileInput.onchange = async (e) => {
                const file = e.target.files[0]; if(!file) return;

                // Tạo UI Loading tùy ngữ cảnh
                let loadingEl;
                if(type === 'slider') {
                    loadingEl = document.createElement('div');
                    loadingEl.className = "h-24 bg-slate-100 rounded-2xl flex items-center justify-center animate-pulse border-2 border-dashed border-slate-200";
                    loadingEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-slate-400 text-xl"></i>';
                    document.getElementById('sliderContainer').appendChild(loadingEl);
                } else {
                    const btnEl = document.getElementById(`btn_${targetId}`);
                    btnEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btnEl.disabled = true;
                }

                try {
                    const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${isVideo ? 'video' : 'image'}/upload`, { method: 'POST', body: formData });
                    const data = await res.json();
                    
                    if(data.secure_url) {
                        if(type === 'slider') {
                            loadingEl.remove(); addSliderItem(data.secure_url);
                        } else {
                            document.getElementById(targetId).value = data.secure_url;
                            if(!isVideo) document.getElementById(`preview_${targetId}`).src = data.secure_url; // Hiện Thumbnail
                        }
                    }
                } catch (err) { alert("Lỗi tải ảnh lên. Vui lòng thử lại!"); if(loadingEl) loadingEl.remove(); } 
                finally {
                    if(type !== 'slider') {
                        const btnEl = document.getElementById(`btn_${targetId}`);
                        btnEl.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Tải lên'; btnEl.disabled = false;
                    }
                }
            };
            fileInput.click();
        };

        // 4. CÁC HÀM TẠO GIAO DIỆN CON (Trực quan hóa)
        window.addSliderItem = (url = "") => {
            const html = `
                <div class="data-node relative group h-24 rounded-2xl overflow-hidden shadow-sm border border-slate-100 bg-slate-50 transition-all">
                    <img src="${url}" class="w-full h-full object-cover">
                    <input type="hidden" class="slider-url" value="${url}">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
                        <button onclick="removeNode(this)" class="bg-white text-rose-500 w-8 h-8 rounded-full shadow-lg hover:scale-110 transition-transform"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    </div>
                </div>`;
            document.getElementById('sliderContainer').insertAdjacentHTML('beforeend', html);
        };

        window.addMarqueeItem = (text = "", isHighlight = false) => {
            const html = `
                <div class="data-node flex gap-2 items-center bg-slate-50/50 p-2 rounded-xl border border-slate-100 transition-all">
                    <input type="text" value="${text}" placeholder="Nội dung thông báo..." class="mq-text flex-1 bg-transparent text-xs outline-none px-2 font-medium">
                    <label class="flex items-center gap-1.5 cursor-pointer bg-white px-2 py-1.5 rounded-lg border border-slate-100">
                        <input type="checkbox" class="mq-highlight accent-emerald-500" ${isHighlight ? 'checked' : ''}><span class="text-[9px] font-bold text-slate-500">HOT</span>
                    </label>
                    <button onclick="removeNode(this)" class="text-rose-400 hover:text-rose-600 px-2"><i class="fa-solid fa-circle-minus"></i></button>
                </div>`;
            document.getElementById('marqueeContainer').insertAdjacentHTML('beforeend', html);
        };

        window.addFeedItem = (feed = { isVideo: false, title: "", url: "", img: "", fomoText: "", fomoIcon: "fa-star text-yellow-400" }) => {
            const uid = Math.random().toString(36).substr(2, 6);
            const imgId = `img_${uid}`, vidId = `vid_${uid}`;
            
            const html = `
                <div class="data-node feed-item bg-slate-50/50 p-4 rounded-3xl border border-slate-100 relative transition-all">
                    <button onclick="removeNode(this)" class="absolute top-4 right-4 text-rose-400 hover:bg-rose-100 w-7 h-7 rounded-full flex items-center justify-center transition-colors bg-white shadow-sm border border-rose-50"><i class="fa-solid fa-trash text-[10px]"></i></button>
                    
                    <div class="flex items-center gap-3 mb-4 pr-10">
                        <div class="bg-white p-1 rounded-xl border border-slate-200 flex text-[10px] font-bold">
                            <label class="cursor-pointer px-3 py-1.5 rounded-lg transition-colors ${!feed.isVideo ? 'bg-slate-900 text-white' : 'text-slate-400'}" onclick="this.parentElement.children[1].classList.remove('bg-slate-900','text-white'); this.parentElement.children[1].classList.add('text-slate-400'); this.classList.add('bg-slate-900','text-white'); this.classList.remove('text-slate-400'); this.parentElement.nextElementSibling.value='false';">🖼️ Ảnh</label>
                            <label class="cursor-pointer px-3 py-1.5 rounded-lg transition-colors ${feed.isVideo ? 'bg-slate-900 text-white' : 'text-slate-400'}" onclick="this.parentElement.children[0].classList.remove('bg-slate-900','text-white'); this.parentElement.children[0].classList.add('text-slate-400'); this.classList.add('bg-slate-900','text-white'); this.classList.remove('text-slate-400'); this.parentElement.nextElementSibling.value='true';">🎥 Video</label>
                        </div>
                        <input type="hidden" class="fd-type" value="${feed.isVideo ? 'true' : 'false'}">
                    </div>

                    <input type="text" class="fd-title w-full bg-white border border-slate-200 p-3 rounded-xl text-xs font-bold mb-4 outline-none focus:border-indigo-400" placeholder="Tiêu đề mẫu tóc / Dịch vụ" value="${feed.title}">
                    
                    <div class="flex gap-4 mb-4">
                        <div class="w-20 h-20 shrink-0 bg-slate-200 rounded-2xl overflow-hidden border border-slate-100 shadow-inner relative group">
                            <img id="preview_${imgId}" src="${feed.img || 'https://placehold.co/100x100?text=Empty'}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <button onclick="triggerUpload('feed-img', '${imgId}')" class="text-white text-xs"><i class="fa-solid fa-camera"></i></button>
                            </div>
                        </div>
                        
                        <div class="flex-1 space-y-2">
                            <div class="flex gap-2">
                                <input type="text" id="${imgId}" class="fd-img flex-1 bg-white border border-slate-200 p-2.5 rounded-xl text-[10px] outline-none" value="${feed.img}" placeholder="Link ảnh Thumbnail" readonly>
                                <button id="btn_${imgId}" onclick="triggerUpload('feed-img', '${imgId}')" class="bg-indigo-50 text-indigo-600 px-3 rounded-xl text-[10px] font-bold shrink-0"><i class="fa-solid fa-cloud-arrow-up"></i> Tải lên</button>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="${vidId}" class="fd-url flex-1 bg-white border border-slate-200 p-2.5 rounded-xl text-[10px] outline-none" value="${feed.url || ''}" placeholder="Link Video (Nếu có)" readonly>
                                <button id="btn_${vidId}" onclick="triggerUpload('feed-vid', '${vidId}')" class="bg-indigo-50 text-indigo-600 px-3 rounded-xl text-[10px] font-bold shrink-0"><i class="fa-solid fa-cloud-arrow-up"></i> Tải lên</button>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2 bg-white p-2 rounded-xl border border-slate-100 shadow-sm">
                        <select class="fd-fomo-icon bg-slate-50 border-none rounded-lg text-xs outline-none cursor-pointer p-2 shrink-0">
                            <option value="fa-star text-yellow-400" ${feed.fomoIcon.includes('star') ? 'selected' : ''}>⭐</option>
                            <option value="fa-fire text-orange-500" ${feed.fomoIcon.includes('fire') ? 'selected' : ''}>🔥</option>
                            <option value="fa-bolt text-yellow-400" ${feed.fomoIcon.includes('bolt') ? 'selected' : ''}>⚡</option>
                            <option value="fa-hourglass-half text-rose-400" ${feed.fomoIcon.includes('hourglass') ? 'selected' : ''}>⏳</option>
                        </select>
                        <input type="text" list="fomoList" class="fd-fomo-text flex-1 bg-transparent border-none text-[11px] font-semibold outline-none px-2" placeholder="Ghi chú thu hút (Gõ hoặc chọn)" value="${feed.fomoText}">
                    </div>
                </div>`;
            document.getElementById('feedContainer').insertAdjacentHTML('afterbegin', html); // Thêm lên đầu
        };

        const gradientOptions = [
            { val: "from-rose-500 to-orange-500", label: "Đỏ - Cam" },
            { val: "from-indigo-500 to-purple-500", label: "Xanh - Tím" },
            { val: "from-emerald-500 to-teal-500", label: "Xanh Lục" },
            { val: "from-slate-700 to-slate-900", label: "Đen Sang Trọng" },
            { val: "from-pink-500 to-rose-400", label: "Hồng Nữ Tính" }
        ];

        window.renderOfferCard = (o, i) => {
            const selectHtml = gradientOptions.map(g => `<option value="${g.val}" ${o.gradient === g.val ? 'selected' : ''}>${g.label}</option>`).join('');
            return `
            <div class="offer-item bg-slate-50/50 p-4 rounded-3xl border border-slate-100 flex flex-col relative data-node" data-idx="${i}">
                <div class="flex justify-between items-center mb-3">
                    <input type="text" class="of-type bg-transparent font-black text-[10px] uppercase tracking-widest text-slate-400 outline-none w-1/2 placeholder-slate-300" value="${o.type || ''}" placeholder="PHÂN LOẠI">
                    <select class="of-gradient bg-white border border-slate-200 rounded-lg text-[9px] font-bold outline-none px-2 py-1 shadow-sm">${selectHtml}</select>
                </div>
                <input type="text" class="of-title w-full bg-white border border-slate-200 p-3 rounded-xl font-bold text-xs mb-2 outline-none focus:border-indigo-400 shadow-sm" value="${o.title || ''}" placeholder="Tiêu đề Voucher">
                <input type="text" class="of-desc w-full bg-white border border-slate-200 p-3 rounded-xl font-medium text-[10px] mb-2 outline-none focus:border-indigo-400 shadow-sm" value="${o.desc || ''}" placeholder="Điều kiện áp dụng">
                <div class="flex gap-2">
                    <input type="text" class="of-code flex-1 bg-white border border-rose-100 p-3 rounded-xl font-mono text-xs font-bold text-rose-500 uppercase outline-none focus:border-rose-300 shadow-sm" value="${o.code || ''}" placeholder="MÃ GIẢM">
                    <input type="text" class="of-icon w-12 bg-white border border-slate-200 p-3 rounded-xl text-center text-xs outline-none shadow-sm" value="${o.icon || 'fa-gift'}" title="Tên icon FontAwesome (VD: fa-gift)">
                </div>
            </div>`;
        };

        // 5. FIREBASE AUTH & LOAD DATA
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden'); document.getElementById('view-admin').classList.add('flex');
                await loadData();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('view-admin').classList.add('hidden'); document.getElementById('view-admin').classList.remove('flex');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); } 
            catch (error) { document.getElementById('loginError').innerText = "Sai thông tin!"; document.getElementById('loginError').classList.remove('hidden'); }
            finally { btn.innerHTML = 'Mở Khóa Hệ Thống'; }
        });
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        async function loadData() {
            try {
                const docSnap = await getDoc(doc(db, "configs", "appConfig"));
                
                // 1. Lấy dữ liệu hoặc tạo object rỗng nếu Document chưa tồn tại
                rootAppConfig = docSnap.exists() ? docSnap.data() : {};

                // 2. KHỞI TẠO CẤU TRÚC AN TOÀN (Bắt buộc để tránh lỗi undefined .forEach)
                rootAppConfig.heroBlock = rootAppConfig.heroBlock || {};
                rootAppConfig.heroBlock.sliderImages = rootAppConfig.heroBlock.sliderImages || [];
                rootAppConfig.heroBlock.flashSale = rootAppConfig.heroBlock.flashSale || {};
                
                rootAppConfig.homeFeatures = rootAppConfig.homeFeatures || {};
                rootAppConfig.homeFeatures.marqueeTexts = rootAppConfig.homeFeatures.marqueeTexts || [];
                
                rootAppConfig.offers = rootAppConfig.offers || [];
                rootAppConfig.feed = rootAppConfig.feed || [];

                // 3. ĐỔ DỮ LIỆU FLASH SALE
                document.getElementById('isFlashSale').checked = rootAppConfig.heroBlock.isFlashSale || false;
                const fs = rootAppConfig.heroBlock.flashSale;
                document.getElementById('fsTitle').value = fs.title || "";
                document.getElementById('fsDesc').value = fs.desc || "";
                document.getElementById('fsHours').value = fs.endHoursFromNow || 3;
                document.getElementById('fsBtnText').value = fs.btnText || "";

                // 4. ĐỔ DỮ LIỆU MẢNG (Sử dụng Optional Chaining ?. để an toàn tuyệt đối)
                
                // Slider
                const sliderBox = document.getElementById('sliderContainer');
                sliderBox.innerHTML = '';
                (rootAppConfig.heroBlock.sliderImages || []).forEach(img => addSliderItem(img));

                // Marquee
                const marqueeBox = document.getElementById('marqueeContainer');
                marqueeBox.innerHTML = '';
                (rootAppConfig.homeFeatures.marqueeTexts || []).forEach(m => addMarqueeItem(m.text, m.isHighlight));

                // Feed
                const feedBox = document.getElementById('feedContainer');
                feedBox.innerHTML = '';
                (rootAppConfig.feed || []).forEach(f => addFeedItem(f));

                // Offers
                const offersBox = document.getElementById('offersContainer');
                // Nếu offers chưa có đủ 3 cái mặc định, ta tạo mảng tạm để render đủ slot
                const currentOffers = rootAppConfig.offers.length > 0 ? rootAppConfig.offers : [{}, {}, {}];
                offersBox.innerHTML = currentOffers.map((o, i) => renderOfferCard(o, i)).join('');
                
                console.log("Dữ liệu đã được tải và kiểm lỗi an toàn.");

            } catch (error) { 
                console.error("Lỗi chi tiết:", error); 
                alert("Không thể tải dữ liệu. Vui lòng kiểm tra lại kết nối mạng hoặc quyền truy cập Firebase!"); 
            }
        }
        
        // 6. GOM DATA & SAVE
        document.getElementById('btnSave').addEventListener('click', async () => {
            const btn = document.getElementById('btnSave');
            const msg = document.getElementById('saveMessage');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-sm"></i> ĐANG XỬ LÝ...';
            
            try {
                const updateData = {
                    heroBlock: {
                        isFlashSale: document.getElementById('isFlashSale').checked,
                        flashSale: {
                            title: document.getElementById('fsTitle').value,
                            desc: document.getElementById('fsDesc').value,
                            endHoursFromNow: parseFloat(document.getElementById('fsHours').value) || 3,
                            btnText: document.getElementById('fsBtnText').value
                        },
                        sliderImages: Array.from(document.querySelectorAll('.slider-url')).map(el => el.value).filter(v => v)
                    },
                    homeFeatures: {
                        marqueeTexts: Array.from(document.querySelectorAll('#marqueeContainer .data-node')).map(el => ({
                            text: el.querySelector('.mq-text').value,
                            isHighlight: el.querySelector('.mq-highlight').checked
                        }))
                    },
                    feed: Array.from(document.querySelectorAll('.feed-item')).map((el, i) => ({
                        id: 'f' + i,
                        isVideo: el.querySelector('.fd-type').value === 'true',
                        title: el.querySelector('.fd-title').value,
                        img: el.querySelector('.fd-img').value,
                        url: el.querySelector('.fd-url').value,
                        fomoText: el.querySelector('.fd-fomo-text').value,
                        fomoIcon: el.querySelector('.fd-fomo-icon').value
                    })),
                    offers: Array.from(document.querySelectorAll('.offer-item')).map(el => ({
                        type: el.querySelector('.of-type').value,
                        title: el.querySelector('.of-title').value,
                        desc: el.querySelector('.of-desc').value,
                        code: el.querySelector('.of-code').value.toUpperCase(),
                        gradient: el.querySelector('.of-gradient').value,
                        icon: el.querySelector('.of-icon').value
                    }))
                };

                // Chỉ merge các field tĩnh (nếu có trên db) để không làm mất chúng
                const finalData = { ...rootAppConfig, ...updateData };
                
                await setDoc(doc(db, "configs", "appConfig"), finalData);
                
                msg.innerHTML = '<span class="text-emerald-500"><i class="fa-solid fa-check-circle mr-1"></i> Thành công</span>';
                setTimeout(() => msg.innerHTML = '', 3000);
            } catch (err) {
                msg.innerHTML = '<span class="text-rose-500"><i class="fa-solid fa-circle-exclamation mr-1"></i> Lỗi lưu</span>';
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up text-sm"></i> ĐỒNG BỘ LÊN APP';
            }
        });
    </script>
</body>
</html>
