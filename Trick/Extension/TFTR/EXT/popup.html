<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    /* Minimal Premium Dark Mode */
    body { width: 340px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #f5f5f7; margin: 0; }
    h3 { text-align: center; font-weight: 600; margin-top: 0; font-size: 18px; letter-spacing: 0.5px; }
    .card { background: #1c1c1e; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2c2c2e; }
    
    button { width: 100%; padding: 12px; cursor: pointer; background: #0a84ff; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: 0.2s ease; }
    button:hover:not(:disabled) { background: #0070e6; }
    button:disabled { background: #3a3a3c; color: #8e8e93; cursor: not-allowed; }
    
    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
    .setting-row:last-child { margin-bottom: 0; }
    
    input[type="number"] { width: 60px; padding: 6px; border-radius: 6px; border: 1px solid #3a3a3c; background: #2c2c2e; color: #fff; text-align: center; font-size: 14px; outline: none; }
    input[type="number"]:focus { border-color: #0a84ff; }
    
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 180px; overflow-y: auto; font-size: 13px; margin-top: 12px; padding-right: 4px;}
    .checkbox-grid::-webkit-scrollbar { width: 4px; }
    .checkbox-grid::-webkit-scrollbar-thumb { background: #48484a; border-radius: 4px; }
    
    label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type="checkbox"] { accent-color: #0a84ff; cursor: pointer; width: 16px; height: 16px; }
    
    #status { margin-top: 12px; font-size: 12px; text-align: center; color: #8e8e93; line-height: 1.5; white-space: pre-line; }

    /* Custom Modal */
    #customModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
    .modal-content { background: #1c1c1e; padding: 24px; border-radius: 14px; text-align: center; width: 80%; border: 1px solid #2c2c2e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .modal-text { margin-bottom: 20px; font-size: 15px; color: #f5f5f7; }
    .modal-btn { background: #30d158; }
    .modal-btn:hover { background: #28b84d; }
  </style>
</head>
<body>
  <h3>MetaTFT Scraper</h3>
  
  <div class="card">
    <button id="scanBtn">1. Quét Danh Sách Tướng</button>
  <div id="unitContainer" style="display:none; margin-top: 16px; border-top: 1px solid #2c2c2e; padding-top: 12px;">
      <!-- Khung chứa "Chọn tất cả" và "Bộ đếm" -->
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <label style="font-weight: 600; color: #0a84ff;"><input type="checkbox" id="selectAll"> Chọn tất cả</label>
        <span id="selectionCount" style="font-size: 13px; font-weight: bold; color: #30d158;">Đã chọn: 0/0</span>
      </div>
      
      <div id="unitList" class="checkbox-grid"></div>
    </div>
  </div>

  <div class="card">
    <div class="setting-row">
      <label><input type="checkbox" id="toggleBestBuilds" checked> Dữ liệu Best Builds</label>
    </div>
    <div class="setting-row">
      <label><input type="checkbox" id="toggleBuilds" checked> Dữ liệu Builds</label>
    </div>
    <div class="setting-row">
      <span style="color: #8e8e93; font-size: 13px;">Số lượng Builds (để trống = tất cả):</span>
      <input type="number" id="buildsCount" min="1" placeholder="All">
    </div>
  </div>

  <button id="startBtn" disabled>2. Bắt Đầu Lấy Dữ Liệu</button>
  <div id="status">Sẵn sàng. Vui lòng quét danh sách tướng.</div>

  <!-- Custom Alert Modal -->
  <div id="customModal">
    <div class="modal-content">
      <div class="modal-text" id="modalText">Message</div>
      <button class="modal-btn" id="closeModalBtn">Đã hiểu</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
