<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chuyển đổi tiền tệ</title>
    <style>
        body { width: 320px; font-family: Arial, sans-serif; padding: 15px; margin: 0; background-color: #f9fafb; }
        .container { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; color: #4b5563; }
        select, input { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; }
        .input-row select { width: 90px; background-color: #f3f4f6; }
        .info-box { background: #eff6ff; padding: 10px; border-radius: 6px; font-size: 13px; color: #1e3a8a; text-align: center; }
        .text-muted { font-size: 11px; color: #6b7280; text-align: center; margin-top: 5px; }
        .warning { color: #dc2626; font-size: 11px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-group">
            <label for="sourceSelect">Nguồn tỷ giá</label>
            <select id="sourceSelect">
                <option value="standard">ExchangeRate-API (Thế giới)</option>
                <option value="smiles">Smiles (Chỉ JPY ↔ VND)</option>
            </select>
            <span id="smilesWarning" class="warning">Nguồn Smiles chỉ hỗ trợ Yên Nhật và VNĐ.</span>
        </div>

        <div class="form-group">
            <div class="input-row">
                <input type="text" id="in1" value="1" autocomplete="off">
                <select id="sel1">
                    <option value="USD">USD</option>
                    <option value="JPY" selected>JPY</option>
                    <option value="KRW">KRW</option>
                    <option value="CNY">CNY</option>
                    <option value="VND">VND</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <div class="input-row">
                <input type="text" id="in2" autocomplete="off">
                <select id="sel2">
                    <option value="VND" selected>VND</option>
                    <option value="USD">USD</option>
                    <option value="JPY">JPY</option>
                    <option value="KRW">KRW</option>
                    <option value="CNY">CNY</option>
                </select>
            </div>
        </div>

        <div class="info-box" id="rateText">Đang tải dữ liệu...</div>
        <div class="text-muted" id="updateTime">Cập nhật: --:--:--</div>
        
        <div id="popularRates" class="text-muted"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
